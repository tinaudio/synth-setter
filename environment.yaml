# reasons you might want to use `environment.yaml` instead of pip + pyproject.toml:
# - pip installs packages in a loop, without ensuring dependencies across all packages
#   are fulfilled simultaneously, but conda achieves proper dependency control across
#   all packages
# - conda allows for installing packages without requiring certain compilers or
#   libraries to be available in the system, since it installs precompiled binaries

name: myenv

channels:
  # conda-forge first so shared deps (pillow, libtiff, etc.) come from the
  # well-maintained community channel with bundled system libs. The pytorch
  # channel is kept as a fallback for torch-specific builds.
  - conda-forge
  - pytorch
  - defaults

# Split of responsibilities between conda and pip:
# - conda owns the torch stack (python, pytorch, torchvision, lightning, torchmetrics)
#   because that's the whole reason to use the conda path — precompiled binaries.
# - pip handles the project install via `.[dev]` (the project itself plus its
#   `dev` optional-dependency group from pyproject.toml). Since #1247 the torch
#   stack lives in `[project.dependencies]`, so the pip spec now formally
#   overlaps with the conda-installed packages above. pip's
#   already-satisfied-skip behavior keeps conda's binaries authoritative as
#   long as their versions satisfy the project's lower bounds; that is
#   exactly what the matched specs below guarantee.
#
# The torch-stack version specs here are kept in lock-step with
# pyproject.toml's [project.dependencies] torch entries: if those raise a
# lower bound, bump the matching spec here too. Otherwise conda could legally
# resolve to an older version than the pip spec allows, and pip would
# reinstall from PyPI on top of conda's binary — defeating the whole reason
# to use the conda path.

dependencies:
  - python=3.10
  - pytorch>=2.0.0
  - torchvision>=0.15.0
  - torchaudio>=2.0.0
  - lightning>=2.6.0
  - torchmetrics>=0.11.4

  # --------- loggers --------- #
  # - wandb
  # - neptune-client
  # - mlflow
  # - comet-ml
  # - aim>=3.16.2 # no lower than 3.16.2, see https://github.com/aimhubio/aim/issues/2550

  # torchmetrics imports `pkg_resources`, which ships with setuptools. conda's
  # minimal base env doesn't include it, so install it explicitly.
  - setuptools
  - pip>=23
  - pip:
      # Non-torch pip deps — conda owns the torch stack above, pip owns everything
      # else. hydra-core, rich, pre-commit, pytest, etc. all come in via the
      # project's [project.dependencies] and [dev] extra in pyproject.toml.
      - ".[dev]"
