# @package _global_

# Top-level @hydra.main composition for the SkyPilot launcher. Mirrors dataset.yaml
# in shape: this entrypoint exposes Hydra-managed launcher knobs, the chief one being
# the `compute_template` field that names which `configs/compute/<name>.yaml` to ship
# to `sky.Task.from_yaml_config(...)` after `ComputeConfig` Pydantic validation.
#
# `compute_template` is a name (string), not a Hydra group sub-tree, because the
# compute YAMLs contain bash blocks with literal `${VAR}` shell expansions that
# conflict with OmegaConf's interpolation grammar at DictConfig-load time. The
# launcher reads `cfg.compute_template`, resolves it to a path under `configs/compute/`,
# and loads + validates the file directly via `load_compute_config_yaml`.
#
# Field is `compute_template` (not `compute`) because Hydra reads `compute=X` as a
# defaults-list group override (the `configs/compute/` directory makes `compute` a
# group name); using a distinct field name lets the user override the string value
# directly: `compute_template=local-template`.

defaults:
  - _self_

compute_template: runpod-template
