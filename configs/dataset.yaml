# @package _global_

# Top-level @hydra.main composition for dataset generation. Mirrors eval.yaml's
# shape: each group below contributes a slice of the DatasetSpec the entrypoint
# constructs in main(). Required (???) fields are filled in by an experiment.

defaults:
  - _self_
  - data: ???
  - render: ???
  - r2: default
  - paths: default
  - hydra: default
  - experiment: ???

task_name: ???
# ``configs/hydra/default.yaml`` interpolates ``${run_name}`` into ``hydra.run.dir``;
# dataset experiments don't have a distinct run_name concept (the spec's ``run_id`` is
# derived from ``task_name`` + ``created_at`` at validate-time), so default it to
# ``task_name`` for the Hydra output-dir interpolation. Dropped before DatasetSpec
# construction (it's not a spec field).
run_name: ${task_name}
output_format: hdf5
base_seed: 42

train_val_test_sizes: ???
# Reserved for per-sample seeding (#884); not consumed yet. Defaulted here
# so experiments don't all duplicate the same triple.
train_val_test_seeds: [42, 43, 44]

r2_bucket: ${r2.bucket}
r2_prefix_root: ${r2.prefix_root}
