# @package _global_

# Top-level @hydra.main composition for dataset generation. Mirrors eval.yaml's
# shape: each group below contributes a slice of the DatasetSpec the entrypoint
# constructs in main(). Required (???) fields are filled in by an experiment.
#
# Example invocations:
#   python -m src.generate_dataset experiment=datagen/ci-materialize-test
#   python -m src.generate_dataset experiment=datagen/surge-simple-480k-10k
#   python -m src.generate_dataset experiment=datagen/runpod-smoke-shard \
#       render.sample_rate=22050
#
# Datagen experiments live under configs/experiment/datagen/<name>.yaml.
# Hydra's `--help` does not recurse into subgroups, so it will not enumerate
# them — list them with `ls configs/experiment/datagen/` or
# `python -c "import os; print(os.listdir('configs/experiment/datagen'))"`.

defaults:
  - _self_
  - data: ???
  - render: ???
  - hydra: default
  - experiment: ???

task_name: ???
output_format: hdf5
base_seed: 42

train_val_test_sizes: ???

# Default R2 bucket; experiments override (e.g. `r2_bucket: experiments`).
# `r2_prefix_root` is omitted here — DatasetSpec's model default ("data") applies.
r2_bucket: intermediate-data
