# CI smoke-test config — minimum viable generation run.
# Used by the dataset-generation workflow on pull_request events.
# Shard count matches the workflow's SkyPilot num_nodes so each worker
# renders exactly one shard and the partitioning code path is exercised
# (rather than 2 of 3 workers sitting idle on an empty range).
param_spec: surge_simple
plugin_path: plugins/Surge XT.vst3
output_format: hdf5
sample_rate: 16000
shard_size: 4
num_shards: 3
base_seed: 42
r2_bucket: intermediate-data

splits:
  train: 3
  val: 0
  test: 0

preset_path: presets/surge-base.vstpreset
channels: 2
velocity: 100
signal_duration_seconds: 4.0
min_loudness: -55.0
sample_batch_size: 4
