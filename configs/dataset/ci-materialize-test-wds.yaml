# CI-only config for spec materialization smoke test (wds output_format).
# Used by test-spec-materialization.yml workflow's wds matrix leg.
param_spec: surge_simple
plugin_path: plugins/Surge XT.vst3
output_format: wds
sample_rate: 16000
shard_size: 32
num_shards: 3
base_seed: 42
r2_bucket: intermediate-data
splits:
  train: 1
  val: 1
  test: 1
preset_path: presets/surge-simple.vstpreset
channels: 2
velocity: 100
signal_duration_seconds: 4.0
min_loudness: -50.0
sample_batch_size: 32
