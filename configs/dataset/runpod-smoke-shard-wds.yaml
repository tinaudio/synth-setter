# CI smoke-test config for the wds matrix leg of test-dataset-generation.
# Sibling of runpod-smoke-shard.yaml with output_format set to wds.
param_spec: surge_simple
plugin_path: plugins/Surge XT.vst3
output_format: wds
sample_rate: 16000
shard_size: 4
num_shards: 3
num_workers: 3
base_seed: 42
r2_bucket: intermediate-data

splits:
  train: 3
  val: 0
  test: 0

preset_path: presets/surge-simple.vstpreset
channels: 2
velocity: 100
signal_duration_seconds: 4.0
min_loudness: -50.0
sample_batch_size: 4
