# @package _global_

# Small experiment dataset: 10k total samples → 10 shards at samples_per_shard=1000.

defaults:
  - override /data: surge_simple
  - override /render: surge_simple
  - _self_

task_name: 10-1k-shards

train_val_test_sizes: [10000, 0, 0]

r2_bucket: experiments

render:
  sample_rate: 44100
  min_loudness: -50.0
  samples_per_render_batch: 64
  samples_per_shard: 1000
