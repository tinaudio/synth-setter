# SkyPilot task template for RunPod — DEBUG variant: clone feat-branch on
# the worker, then run the branch's `scripts/run-linux-vst-headless.sh`
# around an `echo` job-done line.
#
# Differs from runpod-debug-headless-template.yaml in two ways:
#   1. The wrapper script the worker runs is the branch's HEAD copy
#      (cloned in setup), NOT the version baked into the dev-snapshot
#      image. If we ever modify the wrapper on the feat branch, this
#      variant exercises it before the image gets rebuilt.
#   2. Setup does the git clone itself, so we test that path on the
#      worker (separate from sky.workdir / file_mounts shipping).
#
# Hangs in this variant but not the in-image headless variant ⇒ the
# branch's wrapper edits regressed the child-process lifecycle.

resources:
  cloud: runpod
  accelerators:
    {
      RTX3070:1,
      RTX3080:1,
      RTX3090:1,
      RTXA4000:1,
      RTX4000Ada:1,
      A40:1,
      RTX4090:1,
    }
  use_spot: false
  disk_size: 50
  image_id: docker:tinaudio/synth-setter:dev-snapshot

envs:
  RCLONE_CONFIG_R2_TYPE: ""
  RCLONE_CONFIG_R2_PROVIDER: ""
  RCLONE_CONFIG_R2_ACCESS_KEY_ID: ""
  RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ""
  RCLONE_CONFIG_R2_ENDPOINT: ""

setup: |
  set -euo pipefail
  cd /tmp
  rm -rf synth-setter-branch
  git clone --depth 1 --branch feat/skypilot-runpod-smoke \
    https://github.com/tinaudio/synth-setter.git synth-setter-branch
  echo "synth-setter@feat/skypilot-runpod-smoke = $(git -C synth-setter-branch rev-parse HEAD)"

run: |
  set -euo pipefail
  cd /tmp/synth-setter-branch
  scripts/run-linux-vst-headless.sh echo "skypilot-debug branch+headless+echo done (host: $(hostname), pwd: $(pwd))"
