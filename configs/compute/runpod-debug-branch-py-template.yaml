# SkyPilot task template for RunPod — DEBUG variant: clone feat-branch on
# the worker, then run the branch's `scripts/run-linux-vst-headless.sh`
# around a Python interpreter that does some real branch-side work
# (pedalboard import + module load through src.data.vst).
#
# Tighter signal than branch-echo: the wrapper isolates the X11 question;
# the Python child exercises the same import chain that the production
# generate_dataset hits. If branch-echo passes but this hangs, the hang
# is in Python interpreter teardown after pedalboard / X11 use, not in
# the wrapper itself.

resources:
  cloud: runpod
  accelerators:
    {
      RTX3070:1,
      RTX3080:1,
      RTX3090:1,
      RTXA4000:1,
      RTX4000Ada:1,
      A40:1,
      RTX4090:1,
    }
  use_spot: false
  disk_size: 50
  image_id: docker:tinaudio/synth-setter:dev-snapshot

envs:
  RCLONE_CONFIG_R2_TYPE: ""
  RCLONE_CONFIG_R2_PROVIDER: ""
  RCLONE_CONFIG_R2_ACCESS_KEY_ID: ""
  RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ""
  RCLONE_CONFIG_R2_ENDPOINT: ""

setup: |
  set -euo pipefail
  cd /tmp
  rm -rf synth-setter-branch
  git clone --depth 1 --branch feat/skypilot-runpod-smoke \
    https://github.com/tinaudio/synth-setter.git synth-setter-branch
  echo "synth-setter@feat/skypilot-runpod-smoke = $(git -C synth-setter-branch rev-parse HEAD)"

run: |
  set -euo pipefail
  cd /tmp/synth-setter-branch
  # The image already has plugins/Surge XT.vst3 baked under /usr/lib/vst3/...
  # Recreate the symlink the launcher / worker normally rely on so VST3 init
  # can find Surge XT, then call into the same import chain generate_dataset
  # walks and exit cleanly. The point of this variant is to see whether
  # SkyPilot registers job completion when the Python interpreter has touched
  # pedalboard + X11 — the production-hang surface.
  mkdir -p plugins
  ln -sf "/usr/lib/vst3/Surge XT.vst3" "plugins/Surge XT.vst3"
  PYTHONPATH=/tmp/synth-setter-branch \
    scripts/run-linux-vst-headless.sh python -c "
  from src.data.vst.core import load_plugin
  plugin = load_plugin('plugins/Surge XT.vst3')
  print('plugin loaded:', plugin)
  print('skypilot-debug branch+headless+py done')
  "
