# SkyPilot task template for OCI — DEBUG / no-op variant.
#
# OCI sibling of configs/compute/runpod-debug-template.yaml. Used by
# .github/workflows/test-skypilot-debug.yml to exercise the launcher
# (provision -> setup -> submit -> poll -> tail -> teardown) on OCI without
# running the real worker pipeline. Any hang or failure here is in the
# launcher's SkyPilot/OCI interaction, NOT in the dataset generation code.
#
# OCI-specific: no `image_id` field — SkyPilot's OCI backend rejects the
# `docker:<image>` syntax. The noop probe doesn't need the worker image
# (it just echoes), so it skips docker entirely. SkyPilot picks the OCI
# Ubuntu marketplace image via `image_tag_general` in ~/.sky/config.yaml
# (set by the workflow at cred-write time).
#
# Region intentionally not pinned — `~/.oci/config` is the single source
# of truth (set via OCI_REGION at CI cred-write time).

resources:
  cloud: oci
  # Always-Free shape so noop launches against fresh tenancies with zero
  # paid compute quota. The prod template uses cpus/memory floors instead.
  instance_type: VM.Standard.E2.1.Micro
  use_spot: false
  disk_size: 30

setup: |
  set -euo pipefail
  echo "synth-setter debug worker ready (host: $(hostname), uname: $(uname -a))"

run: |
  set -euo pipefail
  echo "skypilot-debug job done (host: $(hostname), pwd: $(pwd))"
