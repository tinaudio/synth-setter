# SkyPilot task template for the local Kubernetes (kind) backend.
#
# Loaded by pipeline/entrypoints/skypilot_launch.py via sky.Task.from_yaml(...)
# when --template configs/compute/local-template.yaml is passed (the
# `skypilot-local` row of test-dataset-generation's matrix). Provisioning
# expects a `sky local up`-managed kind cluster ("skypilot" kubectl context)
# already running.
#
# The launcher detects `cloud: kubernetes` and runs the cred bootstrap with
# `--provider local`, which writes the R2 cred files (kind itself needs no
# compute provider auth) AND upserts a shrunken `jobs.controller.resources`
# block into `~/.sky/config.yaml` so the managed-jobs controller pod fits on
# the kind cluster `sky local up` provisions in CI (the SkyPilot defaults
# of cpus=4+/mem=4x/disk_size=50 don't fit, and k8s rejects disk_size).
# R2 still ships the materialized spec
# (`r2://<bucket>/skypilot-launcher-specs/<cluster>.json`).
#
# Image: `tinaudio/synth-setter:<worker-image-tag>` is loaded into the kind
# cluster via `kind load docker-image` ahead of launch (CI does this; for
# local dev `kind load docker-image tinaudio/synth-setter:dev-snapshot --name skypilot`
# pulls from the local docker daemon). `image_id` is set per-launch by the
# launcher from --worker-image-tag.

resources:
  cloud: kubernetes
  # Managed-jobs on single-node kind (CI's `sky local up --no-gpus`): the kind
  # node has ~4 vCPU allocatable, kube-system + ingress-nginx + the
  # `sky-jobs-controller` pod consume ~2050m, leaving ~1950m. A `cpus: 2+`
  # worker request rounded up past that headroom and pinned the worker pod in
  # `FailedScheduling/Insufficient cpu`, which silently hangs
  # `sky.jobs.tail_logs`. Smoke shard needs little CPU; `1+` fits with room.
  cpus: 1+
  memory: 4+
  # NB: `disk_size` deliberately omitted — Kubernetes rejects it ("Disk size is
  # not supported by Kubernetes. To add additional disk, use volumes."), and
  # under managed jobs the controller doesn't transparently skip the field the
  # way cluster-launch did. Specifying it here used to be a silent no-op; with
  # `sky.jobs.launch` it kept the worker pod Pending until the GHA timeout.

# Placeholders. Real values are injected by the launcher via update_envs.
# WORKER_SPEC_URI is set per-cluster by the launcher to the r2:// URI of the
# uploaded spec; the worker downloads from there via load_spec_from_uri.
envs:
  RCLONE_CONFIG_R2_TYPE: ""
  RCLONE_CONFIG_R2_PROVIDER: ""
  RCLONE_CONFIG_R2_ACCESS_KEY_ID: ""
  RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ""
  RCLONE_CONFIG_R2_ENDPOINT: ""
  WORKER_SPEC_URI: ""
  WORKER_GIT_REF: ""
  SYNTH_SETTER_WORKER_RANK: ""
  SYNTH_SETTER_NUM_WORKERS: ""

setup: |
  set -euo pipefail
  echo "synth-setter worker ready (host: $(hostname))"

# The image ships scripts/docker_entrypoint.py baked at /usr/local/bin/entrypoint.py,
# but PR CI bypasses image bake-lag via sync_worker_checkout.sh (WORKER_GIT_REF).
# Run the synced script from the checkout — not the baked one — so the worker
# picks up entrypoint changes from the PR head before main publishes a new
# dev-snapshot.
run: |
  set -euo pipefail
  cd /home/build/synth-setter
  echo "skypilot-run-cwd: $(pwd)"
  bash scripts/sync_worker_checkout.sh
  exec python scripts/docker_entrypoint.py generate_dataset --spec "$WORKER_SPEC_URI"
