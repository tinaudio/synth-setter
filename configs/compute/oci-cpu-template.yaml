# SkyPilot task template for OCI (Oracle Cloud Infrastructure), CPU-only.
# Sibling of runpod-template.yaml — see docs/design/skypilot-compute-integration.md.
#
# OCI-specific: the worker image is pulled and run as a sub-docker invocation
# inside the run: block because SkyPilot's OCI backend rejects `image_id: docker:<image>`.
# Region intentionally not pinned — `~/.oci/config` is the single source of truth.

resources:
  any_of:
    - { cloud: oci, instance_type: VM.Standard.E4.Flex, cpus: 4+, memory: 16+ }
    - { cloud: oci, instance_type: VM.Standard.E5.Flex, cpus: 4+, memory: 16+ }
    - { cloud: oci, instance_type: VM.Standard.E6.Flex, cpus: 4+, memory: 16+ }
  cpus: 4+
  memory: 16+
  use_spot: false
  disk_size: 50

# Placeholders. Real values are injected by the launcher via update_envs;
# WORKER_IMAGE is set per-launch from --worker-image-tag.
envs:
  RCLONE_CONFIG_R2_TYPE: ""
  RCLONE_CONFIG_R2_PROVIDER: ""
  RCLONE_CONFIG_R2_ACCESS_KEY_ID: ""
  RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ""
  RCLONE_CONFIG_R2_ENDPOINT: ""
  WORKER_SPEC_URI: ""
  WORKER_IMAGE: ""
  WORKER_GIT_REF: ""
  SYNTH_SETTER_WORKER_RANK: ""
  SYNTH_SETTER_NUM_WORKERS: ""

# setup: installs docker.io on the stock OCI Ubuntu VM (no docker preinstalled
# in skypilot:cpu-ubuntu-2204) and pre-pulls the worker image so run: stays
# fast and pull errors surface in setup: logs.
#
# Lock-waiting is two-stage because `cloud-init status --wait` returns "done"
# before apt-daily / unattended-upgrades release /var/lib/dpkg/lock-frontend
# on stock OCI Ubuntu images — see #776 follow-up.
setup: |
  set -euo pipefail
  : "${WORKER_IMAGE:?WORKER_IMAGE must be set by the launcher (--worker-image-tag); refusing to docker pull an unset image}"
  if command -v cloud-init >/dev/null 2>&1; then
    echo "waiting for cloud-init to finish (cap 5min)..."
    sudo timeout 300 cloud-init status --wait || true
  fi
  echo "waiting for apt/dpkg locks to release (cap 10min)..."
  deadline=$((SECONDS + 600))
  while sudo fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/lib/dpkg/lock >/dev/null 2>&1; do
    if (( SECONDS > deadline )); then
      echo "apt/dpkg locks still held after 10min; aborting" >&2
      exit 1
    fi
    sleep 5
  done
  if ! command -v docker >/dev/null 2>&1; then
    sudo apt-get -o DPkg::Lock::Timeout=300 update -qq
    sudo DEBIAN_FRONTEND=noninteractive apt-get -o DPkg::Lock::Timeout=300 install -y -qq docker.io
  fi
  sudo systemctl enable --now docker
  sudo -E docker pull "$WORKER_IMAGE"
  echo "synth-setter worker ready (host: $(hostname), docker: $(sudo -E docker --version))"

# run: launches the worker container ourselves (OCI backend can't ingest a
# docker image_id). --privileged + --ulimit nofile is the expedient hammer
# for the Xvfb/dbus stack — follow-up to find the minimal cap set: #776.
#
# The synced sky_workdir is bind-mounted into the image's baked repo path so
# the worker runs the PR's checkout (incl. scripts/skypilot_worker_bootstrap.sh
# while dev-snapshot lags behind #783). This mirrors what SkyPilot's RunPod
# backend does automatically for `image_id: docker:...` pods.
#
# plugins/ is .gitignored, so the symlink to /usr/lib/vst3 from the GHA
# launcher container is not in the synced workdir. Recreated below before
# bootstrap so extract_renderer_version finds the VST3 bundle. The bash -c
# script must be apostrophe-free — see CLAUDE.md "No Comments Inside YAML
# run: Block-Scalars".
run: |
  set -euo pipefail
  : "${WORKER_IMAGE:?WORKER_IMAGE must be set by the launcher (--worker-image-tag); refusing to docker run an unset image}"
  echo "skypilot-run-cwd: $(pwd) host: $(hostname)"
  sudo -E docker run --rm \
    --privileged \
    --ulimit nofile=65536:65536 \
    -v "$(pwd):/home/build/synth-setter" \
    -w /home/build/synth-setter \
    -e RCLONE_CONFIG_R2_TYPE \
    -e RCLONE_CONFIG_R2_PROVIDER \
    -e RCLONE_CONFIG_R2_ACCESS_KEY_ID \
    -e RCLONE_CONFIG_R2_SECRET_ACCESS_KEY \
    -e RCLONE_CONFIG_R2_ENDPOINT \
    -e WORKER_SPEC_URI \
    -e WORKER_GIT_REF \
    -e SYNTH_SETTER_WORKER_RANK \
    -e SYNTH_SETTER_NUM_WORKERS \
    -e PYTHONPATH=/home/build/synth-setter \
    "$WORKER_IMAGE" \
    bash -c '
      set -euo pipefail
      mkdir -p plugins
      ln -sf "/usr/lib/vst3/Surge XT.vst3" "plugins/Surge XT.vst3"
      exec bash scripts/skypilot_worker_bootstrap.sh
    '
