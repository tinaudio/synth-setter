# SkyPilot task template for OCI (Oracle Cloud Infrastructure), CPU-only.
# Sibling of runpod-template.yaml — see docs/design/skypilot-compute-integration.md.
#
# OCI-specific: SkyPilot's OCI backend rejects `image_id: docker:<image>`
# ("Docker image is currently not supported on OCI"), so the worker image
# is pulled and run as a sub-docker invocation inside the run: block on a
# stock Ubuntu 22.04 VM (selected via `image_tag_general:
# skypilot:cpu-ubuntu-2204` in the workflow's ~/.sky/config.yaml writer).
# Operators dispatching locally pin the image tag via `docker_image_tag`
# in the workflow input, OR by editing WORKER_IMAGE below; PR CI rewrites
# WORKER_IMAGE via sed before launch.

resources:
  cloud: oci
  cpus: 4+
  memory: 16+
  use_spot: false
  disk_size: 50
  # Region intentionally not pinned — `~/.oci/config` is the single source
  # of truth (set via OCI_REGION at CI cred-write time).

# Placeholders. Real values are injected by the launcher via update_envs.
envs:
  RCLONE_CONFIG_R2_TYPE: ""
  RCLONE_CONFIG_R2_PROVIDER: ""
  RCLONE_CONFIG_R2_ACCESS_KEY_ID: ""
  RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ""
  RCLONE_CONFIG_R2_ENDPOINT: ""
  WORKER_SPEC_URI: ""
  # Default below is the CI sed pin target — see "Pin worker image tag"
  # step in .github/workflows/test-dataset-generation.yml.
  WORKER_IMAGE: "tinaudio/synth-setter:dev-snapshot"
  WORKER_GIT_REF: ""
  SYNTH_SETTER_WORKER_RANK: ""
  SYNTH_SETTER_NUM_WORKERS: ""

# setup: installs docker.io on the stock OCI Ubuntu VM (no docker preinstalled
# in skypilot:cpu-ubuntu-2204) and pre-pulls the worker image so run: stays
# fast and pull errors surface in setup: logs.
setup: |
  set -euo pipefail
  if command -v cloud-init >/dev/null 2>&1; then
    echo "waiting for cloud-init to finish before touching apt (cap 5min)..."
    sudo timeout 300 cloud-init status --wait || true
  fi
  if ! command -v docker >/dev/null 2>&1; then
    sudo apt-get -o DPkg::Lock::Timeout=300 update -qq
    sudo DEBIAN_FRONTEND=noninteractive apt-get -o DPkg::Lock::Timeout=300 install -y -qq docker.io
  fi
  sudo systemctl enable --now docker
  sudo -E docker pull "$WORKER_IMAGE"
  echo "synth-setter worker ready (host: $(hostname), docker: $(sudo -E docker --version))"

# run: launches the worker container ourselves (OCI backend can't ingest a
# docker image_id). --privileged + --ulimit nofile is the expedient hammer
# for the Xvfb/dbus stack — follow-up to find the minimal cap set: #776.
# WORKER_GIT_REF checkout happens inside the container before invoking the
# shared script — the checkout is what brings scripts/skypilot_worker_run.sh
# into the baked image's working tree until the next dev-snapshot rebuild.
run: |
  set -euo pipefail
  echo "skypilot-run-cwd: $(pwd) host: $(hostname)"
  sudo -E docker run --rm \
    --privileged \
    --ulimit nofile=65536:65536 \
    -e RCLONE_CONFIG_R2_TYPE \
    -e RCLONE_CONFIG_R2_PROVIDER \
    -e RCLONE_CONFIG_R2_ACCESS_KEY_ID \
    -e RCLONE_CONFIG_R2_SECRET_ACCESS_KEY \
    -e RCLONE_CONFIG_R2_ENDPOINT \
    -e WORKER_SPEC_URI \
    -e WORKER_GIT_REF \
    -e SYNTH_SETTER_WORKER_RANK \
    -e SYNTH_SETTER_NUM_WORKERS \
    -e PYTHONPATH=/home/build/synth-setter \
    "$WORKER_IMAGE" \
    bash -c '
      set -euo pipefail
      cd /home/build/synth-setter
      git config --global --add safe.directory /home/build/synth-setter
      if [[ -n "${WORKER_GIT_REF:-}" ]]; then
        if ! [[ "$WORKER_GIT_REF" =~ ^[0-9a-f]{7,40}$ ]]; then
          echo "ERROR: WORKER_GIT_REF must be a 7-40 char hex git SHA, got: $WORKER_GIT_REF" >&2
          exit 1
        fi
        git fetch --depth=1 origin -- "$WORKER_GIT_REF"
      fi
      bash <(git show "${WORKER_GIT_REF:-HEAD}:scripts/skypilot_worker_run.sh")
    '
