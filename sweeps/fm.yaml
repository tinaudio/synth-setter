program: src/train.py
# Hardcoded — wandb sweep CLI does not support OmegaConf resolvers.
# WANDB_ENTITY / WANDB_PROJECT env vars override these at runtime.
entity: tinaudio
project: synth-setter
command:
  - python
  - src/train.py
  - ${args_no_hyphens}
name: fm_sweep_flowonly
method: grid
metric:
  goal: minimize
  name: val/lsd
parameters:
  experiment:
    values:
      # - fm/flow
      # - fm/ffn_mse
      # - fm/ffn_asym
      # - fm/flow_asym
      - fm/flow_fixed
      - fm/flow_fixed_asym
  "experiment/fm/algorithm":
    values:
      - conditional
      - mixed
      - hierarchical
