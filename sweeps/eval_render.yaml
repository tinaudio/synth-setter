program: src/synth_setter/cli/eval.py
# Pinned in YAML — wandb sweep CLI does not support OmegaConf resolvers and ignores
# WANDB_ENTITY / WANDB_PROJECT at sweep-creation time (those only steer wandb.init in each trial).
entity: tinaudio
project: synth-setter
command:
  - ${interpreter}
  - ${program}
  - experiment=experiment=surge/fake_oracle
  - data.ext=h5
  - logger=wandb render=surge_simple
  - ${args_no_hyphens}
name: generate_dataset_cadence_sweep
method: grid
# grid ignores `metric` at scheduling time; the field stays for dashboard
# legibility on runs that do log it.
metric:
  goal: minimize
  name: generation.samples_per_second
parameters:
  render.plugin_reload_cadence:
    values:
      - once
      - render
  render.gui_toggle_cadence:
    values:
      - never
      - once
