program: src/train.py
# Hardcoded — wandb sweep CLI does not support OmegaConf resolvers.
# WANDB_ENTITY / WANDB_PROJECT env vars override these at runtime.
entity: tinaudio
project: synth-setter
command:
  - python
  - src/train.py
  - ${args_no_hyphens}
name: ksin_sweep_flowonly
method: grid
metric:
  goal: minimize
  name: val/lsd
parameters:
  experiment:
    values:
      - ksin/flow
      - ksin/flow_fixed
      - ksin/ffn_chamfer
      - ksin/ffn_mse
      - ksin/ffn_sort
      - ksin/ffn_asym
      - ksin/flow_asym
      - ksin/flow_fixed_asym
  data.k:
    values:
      # - 1
      # - 4
      - 16
      # - 8
      # - 32
