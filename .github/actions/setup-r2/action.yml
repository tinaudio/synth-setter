name: Setup R2
description: >-
  Export canonical SYNTH_SETTER_STORAGE_* settings plus the RCLONE_CONFIG_R2_*
  projection rclone needs to reach Cloudflare R2. Subsequent job steps see the
  vars via $GITHUB_ENV. Drift is caught by tests/infra/test_setup_r2_action.py.

inputs:
  access-key-id:
    description: secrets.RCLONE_CONFIG_R2_ACCESS_KEY_ID
    required: true
  secret-access-key:
    description: secrets.RCLONE_CONFIG_R2_SECRET_ACCESS_KEY
    required: true
  endpoint:
    description: secrets.RCLONE_CONFIG_R2_ENDPOINT
    required: true
  install-rclone:
    description: Install the pinned rclone binary first (Ubuntu runners only).
    required: false
    default: "false"

runs:
  using: composite
  steps:
    # Pinned, not apt: Ubuntu ships rclone 1.60.1, whose S3 backend fails every
    # first write to R2 with `NotImplemented`. Keep in step with local dev.
    - name: Install rclone
      if: inputs.install-rclone == 'true'
      shell: bash
      env:
        PINNED_RCLONE_VERSION: "1.68.2"
      run: |
        set -euo pipefail
        tmp="$(mktemp -d)"
        trap 'rm -rf "${tmp}"' EXIT
        release="rclone-v${PINNED_RCLONE_VERSION}-linux-amd64"
        curl -fsSL --retry 3 -o "${tmp}/rclone.zip" \
          "https://downloads.rclone.org/v${PINNED_RCLONE_VERSION}/${release}.zip"
        unzip -q "${tmp}/rclone.zip" -d "${tmp}"
        sudo install -m 0755 "${tmp}/${release}/rclone" /usr/local/bin/rclone
        rclone version | head -1

    # Secrets pass through step env so they are masked in logs while the action
    # writes both the public storage contract and today's rclone backend env.
    - name: Export R2 credentials
      shell: bash
      env:
        ACCESS_KEY_ID: ${{ inputs.access-key-id }}
        SECRET_ACCESS_KEY: ${{ inputs.secret-access-key }}
        ENDPOINT: ${{ inputs.endpoint }}
      run: |
        set -euo pipefail
        {
          echo "SYNTH_SETTER_STORAGE_PROVIDER=r2"
          echo "SYNTH_SETTER_STORAGE_ACCESS_KEY_ID=${ACCESS_KEY_ID}"
          echo "SYNTH_SETTER_STORAGE_SECRET_ACCESS_KEY=${SECRET_ACCESS_KEY}"
          echo "SYNTH_SETTER_STORAGE_ENDPOINT_URL=${ENDPOINT}"
          echo "RCLONE_CONFIG_R2_TYPE=s3"
          echo "RCLONE_CONFIG_R2_PROVIDER=Cloudflare"
          echo "RCLONE_CONFIG_R2_ACCESS_KEY_ID=${ACCESS_KEY_ID}"
          echo "RCLONE_CONFIG_R2_SECRET_ACCESS_KEY=${SECRET_ACCESS_KEY}"
          echo "RCLONE_CONFIG_R2_ENDPOINT=${ENDPOINT}"
        } >> "${GITHUB_ENV}"
