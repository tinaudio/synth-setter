name: Bug
description: Something isn't working
title: "fix(<domain>): "
labels: []
type: Bug
body:
  - type: dropdown
    id: domain
    attributes:
      label: Domain Label
      options:
        - data-pipeline
        - ci-automation
        - code-health
        - evaluation
        - storage
        - testing
        - training
    validations:
      required: true
  - type: dropdown
    id: milestone
    attributes:
      label: Milestone
      options:
        - data-pipeline v1.0.0
        - evaluation v1.0.0
        - training v1.0.0
        - storage v1.0.0
        - ci-automation v1.0.0
        - code-health v1.0.0
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: parent
    attributes:
      label: Parent Issue
      description: "If this bug is scoped to a phase or epic (e.g., #137)"
      placeholder: "#"
    validations:
      required: false
