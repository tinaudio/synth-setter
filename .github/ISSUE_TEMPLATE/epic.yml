name: Epic
description: Umbrella issue grouping phases or stages for a work stream
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Epics group related phases/stages under a single tracking issue.
        Link a design doc if one exists (brain dumps count).

  - type: input
    id: design-doc
    attributes:
      label: Design doc
      description: Path to the design doc (e.g., docs/design/data-pipeline.md)
      placeholder: docs/design/
    validations:
      required: false

  - type: textarea
    id: overview
    attributes:
      label: Overview
      description: Brief description of the work stream this epic covers
    validations:
      required: true

  - type: textarea
    id: phases
    attributes:
      label: Phases / Stages
      description: List the phases or stages (will become sub-issues)
      placeholder: |
        - [ ] Phase 1: ...
        - [ ] Phase 2: ...
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Other epics or issues this work depends on
      placeholder: |
        - #74 (data pipeline)
    validations:
      required: false
