name: Step
description: A single implementation step — one PR, one deliverable
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Steps are the atomic unit of work — each step = one PR.
        Add this issue as a sub-issue of the parent phase.

  - type: input
    id: phase
    attributes:
      label: Phase
      description: Parent phase issue number (e.g., #69)
      placeholder: "#"
    validations:
      required: true

  - type: input
    id: step-id
    attributes:
      label: Step ID
      description: Step number within the phase (e.g., 2.1)
      placeholder: "N.M"
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What this step delivers
    validations:
      required: true

  - type: textarea
    id: files
    attributes:
      label: Files to create/modify
      description: List of files this step touches
      placeholder: |
        - `src/...` (new)
        - `tests/...` (new)
    validations:
      required: false

  - type: textarea
    id: tests
    attributes:
      label: Tests
      description: Test strategy for this step
      placeholder: |
        - Unit tests for ...
        - Integration test for ...
    validations:
      required: false

  - type: textarea
    id: blocked-by
    attributes:
      label: Blocked by
      description: Issues that must be completed before this step can start
    validations:
      required: false
