name: Test Spec Materialization

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag"
        required: false
        default: "dev-snapshot"

jobs:
  materialize:
    uses: ./.github/workflows/spec-materialization.yml
    with:
      image_tag: ${{ inputs.image_tag }}
      config_path: configs/dataset/ci-materialize-test.yaml
      artifact_name: test-materialized-spec
    secrets: inherit

  validate-test-config:
    needs: materialize
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download spec artifact
        uses: actions/download-artifact@v4
        with:
          name: test-materialized-spec

      - name: Assert test-specific values
        run: |
          echo "=== Test Assertions (ci-materialize-test.yaml) ==="
          python3 -c "
          import json, sys
          spec = json.load(open('spec.json'))

          # 3 shards (ci-materialize-test.yaml: num_shards=3, splits 1/1/1)
          assert len(spec['shards']) == 3, f'Expected 3 shards, got {len(spec[\"shards\"])}'
          print(f'  num_shards: {len(spec[\"shards\"])} (expected 3)')

          # Deterministic seeds: base_seed=42 + shard_id
          seeds = [s['seed'] for s in spec['shards']]
          assert seeds == [42, 43, 44], f'Expected seeds [42, 43, 44], got {seeds}'
          print(f'  seeds: {seeds} (expected [42, 43, 44])')

          # Zero-padded filenames
          filenames = [s['filename'] for s in spec['shards']]
          assert filenames == ['shard-000000.h5', 'shard-000001.h5', 'shard-000002.h5'], f'Bad filenames: {filenames}'
          print(f'  filenames: {filenames}')

          # Config passthrough fields
          assert spec['param_spec'] == 'surge_simple', f'Bad param_spec: {spec[\"param_spec\"]}'
          assert spec['sample_rate'] == 16000, f'Bad sample_rate: {spec[\"sample_rate\"]}'
          assert spec['shard_size'] == 32, f'Bad shard_size: {spec[\"shard_size\"]}'
          assert spec['base_seed'] == 42, f'Bad base_seed: {spec[\"base_seed\"]}'
          assert spec['velocity'] == 100, f'Bad velocity: {spec[\"velocity\"]}'
          print('  config passthrough: all correct')

          print('All test assertions passed.')
          "
