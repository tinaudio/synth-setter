name: Test Spec Materialization

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag"
        required: false
        default: "dev-snapshot"

jobs:
  materialize:
    uses: ./.github/workflows/spec-materialization.yml
    with:
      image_tag: ${{ inputs.image_tag }}
      experiment: generate_dataset/ci-materialize-test
      artifact_name: test-materialized-spec
    secrets: inherit

  validate-test-config:
    needs: materialize
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      # `pip install -e .` installs the project + its light base only — pip
      # never installs PEP 735 dependency-groups, so the heavy runtime stays
      # out (see #1139).
      - name: Install synth_setter (light base provides validate_spec deps)
        run: pip install -e .

      # Fail fast if a new top-level import on the validate_spec path needs a dep
      # the light base doesn't carry (it would otherwise surface mid-run).
      - name: Import smoke-guard for validate_spec
        run: python3 -c "from synth_setter.pipeline.ci.validate_spec import main"

      - name: Download spec artifact
        uses: actions/download-artifact@v4
        with:
          name: test-materialized-spec

      - name: Assert test-specific values
        run: python3 -m synth_setter.pipeline.ci.validate_spec input_spec.json --test-values
