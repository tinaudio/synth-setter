name: Test Spec Materialization

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag"
        required: false
        default: "dev-snapshot"

jobs:
  materialize:
    strategy:
      fail-fast: false
      matrix:
        include:
          - output_format: hdf5
            config_path: configs/dataset/ci-materialize-test.yaml
          - output_format: wds
            config_path: configs/dataset/ci-materialize-test-wds.yaml
    uses: ./.github/workflows/spec-materialization.yml
    with:
      image_tag: ${{ inputs.image_tag }}
      config_path: ${{ matrix.config_path }}
      artifact_name: test-materialized-spec-${{ matrix.output_format }}
    secrets: inherit

  validate-test-config:
    needs: materialize
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        output_format: [hdf5, wds]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download spec artifact
        uses: actions/download-artifact@v4
        with:
          name: test-materialized-spec-${{ matrix.output_format }}

      - name: Assert test-specific values
        run: python3 -m pipeline.ci.validate_spec input_spec.json --test-values
