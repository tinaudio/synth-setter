name: Spec Materialization

on:
  pull_request:
    paths:
      - "pipeline/schemas/spec.py"
      - "pipeline/schemas/config.py"
      - "pipeline/schemas/prefix.py"
      - "tests/pipeline/test_schemas/test_spec.py"
      - "tests/pipeline/fixtures/**"
  push:
    branches: [main]
    paths:
      - "pipeline/schemas/spec.py"

jobs:
  test-spec-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements.txt
      - name: Run spec tests
        run: pytest tests/pipeline/test_schemas/test_spec.py -v --tb=short
