name: Flush Investigation Notebook

# Runs the flush-investigation notebook inside Docker (requires Surge XT VST),
# converts to HTML with embedded audio, and uploads as an artifact with provenance.
#
# Depends on: Docker build infra from PR #229.
# Trigger: manual dispatch or weekly schedule.

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref to test (branch, tag, or SHA)"
        required: false
        default: "main"
  schedule:
    # Weekly: Sunday 06:00 UTC
    - cron: "0 6 * * 0"

jobs:
  run-notebook:
    name: Run flush investigation notebook
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.git_ref || 'main' }}

      - name: Capture checked-out SHA
        id: meta
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (dev-snapshot target)
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          make docker-build-dev-snapshot \
            GIT_REF=${{ steps.meta.outputs.sha }} \
            DOCKER_BUILD_FLAGS="--load"

      - name: Run notebook inside Docker
        env:
          SURGE_VST3_PATH: /usr/lib/vst3/Surge XT.vst3
        run: |
          mkdir -p reports
          docker run --rm \
            --entrypoint bash \
            -v "${{ github.workspace }}/notebooks:/workspace/notebooks" \
            -v "${{ github.workspace }}/reports:/reports" \
            -e SURGE_VST3_PATH="${SURGE_VST3_PATH}" \
            synth-setter:dev-snapshot \
            -c "
              uv pip install -q jupyter nbconvert auraloss librosa &&
              cd /home/build/synth-setter &&
              scripts/run-linux-vst-headless.sh \
                jupyter nbconvert \
                  --to html \
                  --execute \
                  --ExecutePreprocessor.timeout=600 \
                  --output-dir=/reports \
                  /workspace/notebooks/flush-investigation.ipynb
            "

      - name: Add provenance metadata to report
        run: |
          cat >> reports/flush-investigation.html <<PROVENANCE
          <!-- Provenance
            workflow: ${{ github.workflow }}
            run_id: ${{ github.run_id }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            git_sha: ${{ steps.meta.outputs.sha }}
            git_ref: ${{ github.event.inputs.git_ref || 'main' }}
            triggered_by: ${{ github.actor }}
            timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          -->
          PROVENANCE

      - name: Upload notebook HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: flush-investigation-${{ steps.meta.outputs.sha }}
          path: reports/flush-investigation.html
          retention-days: 90
