name: Nightly VST Marker Sweep

# Nightly safety net: runs every ``requires_vst`` test by marker, not by the
# hand-maintained file allowlists the sibling VST workflows use — so a newly
# added VST test can't run nowhere in CI, as
# ``tests/data/vst/test_dawdreamer_dataset_e2e.py`` did (#1825). Runs in the
# ``dev-snapshot`` image under ``run-linux-vst-headless.sh`` (baked plugins +
# Xvfb), same as ``test-vst-slow.yml``. Sharded via a ``--collect-only`` file
# matrix, not ``pytest-split`` (absent from the image) or ``pytest-xdist``
# (unsafe: one Xvfb display, VST-host loads must stay serial). ``nightly.yml``
# already covers the non-VST suite.

on:
  # 04:00 UTC — offset from nightly.yml (06:00) and nightly-parallel-datagen.yml
  # (05:00) to avoid Docker-pull / runner-queue contention.
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag (e.g. dev-snapshot, dev-snapshot-<sha>)"
        required: false
        default: "dev-snapshot"

concurrency:
  group: nightly-vst-sweep-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE: tinaudio/synth-setter:${{ inputs.image_tag || 'dev-snapshot' }}
  # Single source of the marker for both the discover collect and the per-shard
  # run, so they can't drift. Mirrors ``make test-vst-cpu``.
  VST_MARKER: "requires_vst and not gpu and not mps"
  SHARD_TOTAL: "4"

jobs:
  discover:
    name: Discover requires_vst tests and shard them
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      matrix: ${{ steps.shard.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Pull image
        run: docker pull "$IMAGE"

      # Fail fast on a broken plugin / image / mount layout before the fan-out.
      # Covers the two primary synths the marker sweep exercises.
      - name: Smoke-test Surge XT and OB-Xf plugin load
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/home/build/synth-setter" \
            "$IMAGE" \
            bash -c '
              set -euo pipefail
              cd /home/build/synth-setter
              git config --global --add safe.directory /home/build/synth-setter
              src/synth_setter/scripts/run-linux-vst-headless.sh \
                python -X faulthandler -c "
              from synth_setter.data.vst.core import load_plugin
              load_plugin(\"/usr/lib/vst3/Surge XT.vst3\")
              load_plugin(\"/usr/lib/vst3/OB-Xf.vst3\")
              "
            '

      # --collect-only is import-only (no plugin load); keep the headless wrapper
      # so a future import-time VST-host touch can't break collection.
      - name: Collect requires_vst node IDs
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/home/build/synth-setter" \
            -e "VST_MARKER=$VST_MARKER" \
            "$IMAGE" \
            bash -c '
              set -euo pipefail
              cd /home/build/synth-setter
              git config --global --add safe.directory /home/build/synth-setter
              src/synth_setter/scripts/run-linux-vst-headless.sh \
                pytest --collect-only -q -p no:cacheprovider -m "$VST_MARKER"
            ' | tee "${{ runner.temp }}/collected.txt"

      # Round-robin unique test files into SHARD_TOTAL cells; refuse an empty
      # matrix — 0 collected tests would ship a silently-green net.
      - name: Build shard matrix
        id: shard
        env:
          COLLECTED: ${{ runner.temp }}/collected.txt
        run: |
          python3 - <<'PY'
          import json, os

          total = int(os.environ["SHARD_TOTAL"])
          files = sorted(
              {
                  line.split("::", 1)[0]
                  for line in open(os.environ["COLLECTED"], encoding="utf-8")
                  if line.startswith("tests/") and "::" in line
              }
          )
          if not files:
              raise SystemExit(
                  "::error::marker selected 0 requires_vst tests — refusing to "
                  "emit an empty (silently-green) matrix"
              )

          buckets: list[list[str]] = [[] for _ in range(total)]
          for i, path in enumerate(files):
              buckets[i % total].append(path)
          include = [
              {"shard": i + 1, "files": " ".join(bucket)}
              for i, bucket in enumerate(buckets)
              if bucket
          ]
          matrix = {"include": include}

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write("matrix=" + json.dumps(matrix) + "\n")
          print(f"discovered {len(files)} files across {len(include)} shards")
          print(json.dumps(matrix, indent=2))
          PY

  vst_sweep:
    name: VST sweep shard ${{ matrix.shard }}
    needs: discover
    runs-on: ubuntu-latest-4core
    timeout-minutes: 90
    # Neither shard masks the other: every failing VST test must be named in
    # its own red cell.
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Pull image
        run: docker pull "$IMAGE"

      # Mount THIS ref's src+tests and run the shard's files under the headless
      # wrapper (pedalboard's VST-host import needs a live X display). Baked
      # ``/usr/lib/vst3/*.vst3`` are symlinked into ``plugins/`` because the
      # render configs use relative paths (e.g. ``plugins/OB-Xf.vst3``);
      # ``matrix.files`` carries no spaces, so ``read -ra`` splits it safely.
      - name: Run VST sweep shard in Docker
        env:
          SHARD_FILES: ${{ matrix.files }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/home/build/synth-setter" \
            -e HYDRA_FULL_ERROR=1 \
            -e "VST_MARKER=$VST_MARKER" \
            -e "SHARD_FILES=$SHARD_FILES" \
            -e "SYNTH_SETTER_PLUGIN_PATH=/usr/lib/vst3/Surge XT.vst3" \
            "$IMAGE" \
            bash -c '
              set -euo pipefail
              cd /home/build/synth-setter
              git config --global --add safe.directory /home/build/synth-setter
              mkdir -p plugins
              for p in /usr/lib/vst3/*.vst3; do
                ln -sf "$p" "plugins/$(basename "$p")"
              done
              read -ra shard_files <<< "$SHARD_FILES"
              src/synth_setter/scripts/run-linux-vst-headless.sh \
                pytest -vv -s \
                  --cov=src --cov-branch --cov-report=xml --cov-report=term \
                  -m "$VST_MARKER" \
                  "${shard_files[@]}"
            '

      # Name the failing shard in the run log + job summary. A red run is the
      # signal; auto-filing a ticket is left to nightly.yml's lighter pattern.
      - name: Annotate shard failure
        if: failure()
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHARD: ${{ matrix.shard }}
          SHARD_FILES: ${{ matrix.files }}
        run: |
          set -euo pipefail
          echo "::error::VST sweep shard ${SHARD} failed — the failing node ID is in the pytest log"
          read -ra shard_files <<< "$SHARD_FILES"
          {
            echo "### VST sweep shard ${SHARD} failed"
            echo ""
            echo "Files in this shard:"
            for f in "${shard_files[@]}"; do echo "- \`${f}\`"; done
            echo ""
            echo "Failing node ID is in the pytest log: ${RUN_URL}"
          } >> "$GITHUB_STEP_SUMMARY"

      # coverage.xml is written inside the container at the workspace mount, so
      # it lands at ${{ github.workspace }}/coverage.xml on the host.
      - name: Upload coverage to Codecov
        if: always() && hashFiles('coverage.xml') != ''
        uses: ./.github/actions/upload-coverage
        with:
          flags: vst-nightly-shard-${{ matrix.shard }}
          token: ${{ secrets.CODECOV_TOKEN }}
