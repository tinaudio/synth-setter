name: unsnooze issues

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *" # daily at 08:00 UTC

jobs:
  unsnooze_issue:
    runs-on: ubuntu-latest
    name: unsnooze issues
    permissions:
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: unsnooze issues
        uses: multilocale/snooze-issue-action/unsnooze@v1.0.0
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
