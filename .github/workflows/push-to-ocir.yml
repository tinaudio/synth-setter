name: Push To Registries

# Mirrors dev-snapshot to OCIR and GHCR so OCI workers pull in-region.
#
# Required secrets:
#   OCIR_REGION_KEY        — OCIR region key (e.g. iad, phx, fra); forms the
#                            registry hostname <key>.ocir.io.
#   OCIR_TENANCY_NAMESPACE — Object Storage namespace for the tenancy; the
#                            second segment of the OCIR image path.
#   OCIR_USERNAME          — full OCIR username, including any
#                            <namespace>/ prefix the tenancy requires.
#   OCIR_TOKEN             — OCI Auth Token with repos:push scope on the
#                            target repository.

# TEMPORARY smoke-test scaffolding (revert before merge, like the May 2026
# ci/push-to-ocir-smoketest run): the pull_request trigger exercises the job on
# every push to this PR, and TAG_SUFFIX keeps test pushes off the real
# dev-snapshot tags.
on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/push-to-ocir.yml

jobs:
  push-to-registries:
    name: Mirror dev-snapshot to OCIR and GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to OCIR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          registry: ${{ secrets.OCIR_REGION_KEY }}.ocir.io
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Pull dev-snapshot from Docker Hub, retag, push to registries
        env:
          TAG_SUFFIX: ${{ github.event_name == 'pull_request' && '-test' || '' }}
          SOURCE_IMAGE: tinaudio/synth-setter:dev-snapshot
          OCIR_REGION_KEY: ${{ secrets.OCIR_REGION_KEY }}
          OCIR_TENANCY_NAMESPACE: ${{ secrets.OCIR_TENANCY_NAMESPACE }}
        run: |
          set -euo pipefail
          docker pull "$SOURCE_IMAGE"
          ocir_image="${OCIR_REGION_KEY}.ocir.io/${OCIR_TENANCY_NAMESPACE}/synth-setter:dev-snapshot${TAG_SUFFIX}"
          ghcr_image="ghcr.io/tinaudio/synth-setter:dev-snapshot${TAG_SUFFIX}"
          docker tag "$SOURCE_IMAGE" "$ocir_image"
          docker push "$ocir_image"
          docker tag "$SOURCE_IMAGE" "$ghcr_image"
          docker push "$ghcr_image"
