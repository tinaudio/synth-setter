name: Mutation Testing

# Mutation testing is slow and noisy; run on demand or weekly, never on every PR.
# This workflow exists primarily as a Level-1 verification gate for the
# `[tool.mutmut]` configuration — it proves the mutmut sandbox imports resolve
# and that `mutmut run` actually completes end-to-end. The end-to-end completion
# is *not* possible on macOS (Apple's fork-safety + heavy C-extension imports in
# tests/conftest.py — torch, h5py, hydra — cause SIGSEGV in forked children).
# On ubuntu-latest, os.fork() works cleanly.

on:
  workflow_dispatch:
  schedule:
    # Sundays at 09:00 UTC — once a week is enough for a slow-changing config
    # whose own pre-merge gate is the CI test suite (test.yml).
    - cron: "0 9 * * 0"

permissions:
  contents: read

jobs:
  mutmut_run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # tomllib avoids mutmut's legacy TOML parser failure on PEP 735 groups — see #1414.
      - name: Set up Python 3.12.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.12.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.28"
          enable-cache: true

      # Frozen sync, CPU torch via [tool.uv.sources] — see test.yml for rationale.
      - name: Install dependencies (uv sync --frozen, CPU torch)
        run: uv sync --frozen --extra cpu --no-default-groups --group dev

      - name: Run mutmut
        env:
          HYDRA_FULL_ERROR: "1"
        run: uv run mutmut run

      - name: Print results
        if: always()
        run: uv run mutmut results

      - name: Upload mutants/ artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutmut-mutants
          path: mutants/
          retention-days: 14
          if-no-files-found: warn
