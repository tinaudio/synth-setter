name: Docker Image Build and Push

# Builds a dev-snapshot Docker image, pushes to Docker Hub, and runs smoke
# tests against the pushed image.
#
# Triggers:
# - Manual dispatch or push to main: full build + push + smoke tests
# - Pull request (Docker-related paths): build-only validation (no push)
#
# git_ref resolution:
# The git_ref input accepts any ref form (branch, tag, or full SHA). After
# checkout, `git rev-parse HEAD` resolves it to a 40-char lowercase commit
# SHA (steps.source.outputs.sha), which is what gets baked into the image
# via the SYNTH_PERMUTATIONS_GIT_REF build-arg. The build ALWAYS pins to
# the resolved commit SHA — the original input form is discarded.
# The resolved SHA is validated as 40-char lowercase hex by load_image_config
# (src/synth_setter/pipeline/schemas/image_config.py) in the "Load image config" step.

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref to build (branch, tag, or full SHA). Resolved to a 40-char commit SHA via `git rev-parse HEAD` after checkout; the build pins to the resolved commit."
        required: false
        default: "main"
      issue_number:
        description: "GitHub issue number for config metadata."
        required: false
        default: "311"
  push:
    branches: [main]
  pull_request:
    paths:
      - "docker/**"
      - "configs/image/**"
      - "src/synth_setter/pipeline/schemas/image_config.py"
      - "src/synth_setter/pipeline/ci/load_image_config.py"
      - ".github/workflows/docker-build-validation.yml"
      - "pyproject.toml"
      - "tests/docker/**"

jobs:
  docker-build:
    name: Build and push Docker image
    runs-on: ubuntu-latest-4core
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6
        with:
          # pull_request: use PR head; dispatch: use input; push: triggering SHA.
          # `github.sha` pins push runs to the commit that fired the workflow so
          # back-to-back merges don't cause one run to build a later main commit
          # (and skip the immutable dev-snapshot-<sha> tag for the triggering one).
          ref: ${{ github.event.pull_request.head.sha || github.event.inputs.git_ref || github.sha }}

      # Emits three outputs:
      #   sha         — 40-char commit SHA, baked into the image
      #   is_main     — "true" when this build represents the *current* main
      #                 HEAD and should advance the shared `dev-snapshot`/`latest`
      #                 tags. Covers push-to-main runs whose triggering SHA still
      #                 equals origin/main's HEAD, the common ref forms a user
      #                 might paste into the dispatch input (`main`,
      #                 `refs/heads/main`, `refs/remotes/origin/main`), and the
      #                 case where the resolved HEAD equals origin/main's HEAD
      #                 (e.g., a literal SHA dispatch that happens to be main).
      #                 Push runs whose triggering SHA has been overtaken by a
      #                 newer main commit (delayed/queued runs, manual re-runs
      #                 of older pushes) fall through to `false` so they only
      #                 publish the immutable `dev-snapshot-<sha>` tag and don't
      #                 clobber the floating tags with an older commit.
      #   branch_slug — Docker-tag-safe branch name for the `dev-snapshot-<branch>`
      #                 floating tag, or empty when no meaningful branch applies
      #                 (push-to-main run, any main ref form, a git_ref already
      #                 resolved to a SHA, or a git tag dispatch). Well-known
      #                 ref prefixes (`refs/heads/`, `refs/remotes/origin/`) are
      #                 stripped before slugging so the same branch produces the
      #                 same tag regardless of how the operator typed it.
      #                 Slashes become dashes; charset is restricted to
      #                 [A-Za-z0-9_.-]; truncated to 100 chars to leave room
      #                 for the `dev-snapshot-` prefix under Docker's 128-char
      #                 tag limit.
      #                 Known limitation: branches whose slugs collide after
      #                 normalization (e.g., `feat/foo` and `feat-foo`, or two
      #                 branches sharing their first 100 normalized chars) will
      #                 share the same `dev-snapshot-<slug>` tag and overwrite
      #                 each other. Branches whose names are already Docker-tag
      #                 -safe and ≤100 chars are unaffected.
      - name: Resolve checked-out commit SHA, main flag, and branch slug
        id: source
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_REF: ${{ github.event.inputs.git_ref }}
          PR_HEAD_REF: ${{ github.head_ref }}
        run: |
          resolved_sha=$(git rev-parse HEAD)
          echo "sha=${resolved_sha}" >> "$GITHUB_OUTPUT"

          is_main="false"
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            case "$DISPATCH_REF" in
              main|refs/heads/main|refs/remotes/origin/main)
                is_main="true"
                ;;
            esac
          fi
          if [ "$is_main" = "false" ] \
              && { [ "$EVENT_NAME" = "push" ] || [ "$EVENT_NAME" = "workflow_dispatch" ]; }; then
            main_sha=$(git ls-remote origin refs/heads/main | awk '{print $1}')
            if [ -n "$main_sha" ] && [ "$resolved_sha" = "$main_sha" ]; then
              is_main="true"
            fi
          fi
          echo "is_main=${is_main}" >> "$GITHUB_OUTPUT"

          raw_branch=""
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$is_main" = "false" ]; then
            if ! printf '%s' "$DISPATCH_REF" | grep -Eq '^[0-9a-fA-F]{40}$'; then
              candidate="$DISPATCH_REF"
              case "$candidate" in
                refs/heads/*)          candidate="${candidate#refs/heads/}" ;;
                refs/remotes/origin/*) candidate="${candidate#refs/remotes/origin/}" ;;
              esac
              is_tag="false"
              case "$DISPATCH_REF" in
                refs/tags/*) is_tag="true" ;;
              esac
              if [ "$is_tag" = "false" ] \
                  && git ls-remote --tags origin "refs/tags/${candidate}" 2>/dev/null | grep -q .; then
                is_tag="true"
              fi
              if [ "$is_tag" = "false" ]; then
                raw_branch="$candidate"
              fi
            fi
          elif [ "$EVENT_NAME" = "pull_request" ]; then
            raw_branch="$PR_HEAD_REF"
          fi
          slug=""
          if [ -n "$raw_branch" ]; then
            slug=$(printf '%s' "$raw_branch" | tr '/' '-' | tr -c 'A-Za-z0-9_.-' '-' | cut -c1-100)
          fi
          echo "branch_slug=${slug}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # load_image_config only needs pyyaml + pydantic (pydantic-core
      # resolves transitively). Keep the runner-side env minimal: install
      # the project with --no-deps so the full [project.dependencies]
      # doesn't drag in torch/skypilot/librosa, then add pyyaml and
      # pydantic in a second command with their own deps.
      - name: Install synth_setter (editable; provides the load_image_config CLI plus its pyyaml + pydantic deps)
        run: |
          uv pip install --system --no-deps -e .
          uv pip install --system pyyaml pydantic

      - name: Load image config
        id: config
        run: |
          python -m synth_setter.pipeline.ci.load_image_config \
            --config configs/image/dev-snapshot.yaml \
            --github-sha '${{ steps.source.outputs.sha }}' \
            --issue-number '${{ github.event.pull_request.number || github.event.inputs.issue_number || 311 }}'

      - name: Log in to Docker Hub
        # Only needed for push; PR runs are build-only validation. Gating
        # this step prevents same-repo PRs from failing if DOCKERHUB_*
        # secrets are temporarily unavailable, and matches the existing
        # gate on the Verify Docker Hub push access step below.
        #
        # Note: fork PRs still can't build this Dockerfile even with the
        # gate in place, because the in-image `git fetch origin` resolves
        # SYNTH_PERMUTATIONS_GIT_REF against upstream tinaudio/synth-setter,
        # not the fork. A proper fork-PR build would need to fetch from
        # github.event.pull_request.head.repo.html_url; that's not
        # implemented here.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Docker Hub push access
        if: github.event_name != 'pull_request'
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DH_IMAGE: ${{ steps.config.outputs.image }}
        run: |
          TOKEN=$(curl -sf \
            "https://auth.docker.io/token?service=registry.docker.io&scope=repository:${DH_IMAGE}:pull,push" \
            -u "${DH_USER}:${DH_TOKEN}" \
            | jq -r '.token // empty')
          if [ -z "$TOKEN" ]; then
            echo "::error::Docker Hub token lacks push scope for ${DH_IMAGE}. Regenerate with Read & Write permissions."
            exit 1
          fi
          echo "Docker Hub push access verified."

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.config.outputs.image }}
          # Floating tags `dev-snapshot` and `latest` are gated to push-to-main
          # runs or dispatches that explicitly target main. Dispatching with
          # git_ref pointed at a non-main ref must NOT overwrite either tag —
          # other workflows (test-skypilot-debug, test-dataset-generation)
          # consume `dev-snapshot` by default and would silently run against
          # the feature branch's image until the next main build.
          # Feature-branch dispatches get a per-branch floating tag instead
          # (`dev-snapshot-<branch>`), gated on a non-empty branch_slug.
          # The immutable `dev-snapshot-<sha>` tag is always pushed.
          tags: |
            type=raw,value=dev-snapshot,enable=${{ steps.source.outputs.is_main == 'true' }}
            type=raw,value=dev-snapshot-${{ steps.source.outputs.branch_slug }},enable=${{ steps.source.outputs.branch_slug != '' }}
            type=raw,value=dev-snapshot-${{ steps.source.outputs.sha }}
            type=raw,value=latest,enable=${{ steps.source.outputs.is_main == 'true' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.config.outputs.dockerfile }}
          target: dev-snapshot
          platforms: ${{ steps.config.outputs.target_platform }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_MODE=${{ steps.config.outputs.build_mode }}
            BASE_IMAGE=${{ steps.config.outputs.base_image }}
            TORCH_BACKEND=${{ steps.config.outputs.torch_backend }}
            SYNTH_PERMUTATIONS_GIT_REF=${{ steps.source.outputs.sha }}
          # No BuildKit secrets: the repo is public (no GIT_PAT needed) and
          # R2/W&B credentials flow in at runtime, not build time.
          secrets: ""
          cache-from: type=registry,ref=tinaudio/synth-setter:buildcache
          cache-to: ${{ github.event_name != 'pull_request' && 'type=registry,ref=tinaudio/synth-setter:buildcache,mode=max' || '' }}

      - name: Build and push devcontainer-tools image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.config.outputs.dockerfile }}
          target: devcontainer-tools
          platforms: ${{ steps.config.outputs.target_platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.config.outputs.image }}:devcontainer-tools
            ${{ steps.config.outputs.image }}:devcontainer-tools-${{ steps.source.outputs.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_MODE=${{ steps.config.outputs.build_mode }}
            BASE_IMAGE=${{ steps.config.outputs.base_image }}
            TORCH_BACKEND=${{ steps.config.outputs.torch_backend }}
            SYNTH_PERMUTATIONS_GIT_REF=${{ steps.source.outputs.sha }}
          secrets: ""
          cache-from: type=registry,ref=tinaudio/synth-setter:buildcache
          cache-to: ""

      # The image no longer sets an ENTRYPOINT (#721 dropped it for SkyPilot's
      # RunPod backend, which prepends `bash -c '...'`); CMD defaults to
      # /bin/bash, and `docker run img <argv>` overrides CMD with that argv.
      # So we invoke pytest directly instead of going through the click CLI's
      # `passthrough` subcommand.
      - name: Smoke test — container starts and Python imports work
        if: github.event_name != 'pull_request'
        env:
          SMOKE_IMAGE: ${{ steps.config.outputs.image }}:dev-snapshot-${{ steps.source.outputs.sha }}
        run: |
          docker run --rm \
            -e PYTHONPATH=/home/build/synth-setter \
            "$SMOKE_IMAGE" \
            pytest tests/docker/test_smoke.py::test_pedalboard_importable -v

      - name: Smoke test — VST loads under headless X11
        if: github.event_name != 'pull_request'
        env:
          SMOKE_IMAGE: ${{ steps.config.outputs.image }}:dev-snapshot-${{ steps.source.outputs.sha }}
        run: |
          docker run --rm \
            -e PYTHONPATH=/home/build/synth-setter \
            "$SMOKE_IMAGE" \
            scripts/run-linux-vst-headless.sh \
              pytest tests/docker/test_smoke.py::test_surge_xt_loads -v
