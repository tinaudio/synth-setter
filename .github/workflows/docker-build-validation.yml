name: Docker Image Build and Push

# Builds a dev-snapshot Docker image, pushes to Docker Hub, and runs smoke
# tests against the pushed image.
#
# Triggers:
# - Manual dispatch or weekly schedule: full build + push + smoke tests
# - Pull request (Docker-related paths): build-only validation (no push)

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref to build (branch, tag, or SHA). Builds and pushes to Docker Hub."
        required: false
        default: "main"
  schedule:
    # Weekly: Sunday 06:00 UTC
    - cron: "0 6 * * 0"
  pull_request:
    paths:
      - "docker/**"
      - "configs/image/**"
      - "scripts/image_config.py"
      - "scripts/ci/load_image_config.py"
      - ".github/workflows/docker-build-validation.yml"
      - "requirements*.txt"
      - "tests/docker/**"

jobs:
  docker-build:
    name: Build and push Docker image
    runs-on: ubuntu-latest-4core
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6
        with:
          # pull_request: use PR head; dispatch: use input; schedule: main
          ref: ${{ github.event.pull_request.head.sha || github.event.inputs.git_ref || 'main' }}

      - name: Resolve checked-out commit SHA
        id: source
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install config dependencies
        run: pip install pyyaml pydantic

      - name: Load image config
        id: config
        run: |
          # TODO(#323): PYTHONPATH=. needed because scripts/ is not an installable package
          PYTHONPATH=. python scripts/ci/load_image_config.py \
            --config configs/image/dev-snapshot.yaml \
            --github-sha '${{ steps.source.outputs.sha }}' \
            --issue-number 311

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Verify Docker Hub push access
        if: github.event_name != 'pull_request'
        run: |
          TOKEN=$(curl -sf \
            "https://auth.docker.io/token?service=registry.docker.io&scope=repository:${{ steps.config.outputs.image }}:pull,push" \
            -u '${{ secrets.DOCKERHUB_USERNAME }}:${{ secrets.DOCKERHUB_TOKEN }}' \
            | jq -r '.token // empty')
          if [ -z "$TOKEN" ]; then
            echo "::error::Docker Hub token lacks push scope for ${{ steps.config.outputs.image }}. Regenerate with Read & Write permissions."
            exit 1
          fi
          echo "Docker Hub push access verified."

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.config.outputs.image }}
          tags: |
            type=raw,value=dev-snapshot
            type=raw,value=dev-snapshot-${{ steps.source.outputs.sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.config.outputs.dockerfile }}
          target: dev-snapshot
          platforms: ${{ steps.config.outputs.target_platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_MODE=${{ steps.config.outputs.build_mode }}
            BASE_IMAGE=${{ steps.config.outputs.base_image }}
            TORCH_INDEX_URL=${{ steps.config.outputs.torch_index_url }}
            SYNTH_PERMUTATIONS_GIT_REF=${{ steps.source.outputs.sha }}
            R2_BUCKET=${{ steps.config.outputs.r2_bucket }}
            R2_ENDPOINT=${{ steps.config.outputs.r2_endpoint }}
          secrets: |
            git_pat=${{ secrets.GIT_PAT }}
            r2_access_key_id=${{ secrets.R2_ACCESS_KEY_ID }}
            r2_secret_access_key=${{ secrets.R2_SECRET_ACCESS_KEY }}
            wandb_api_key=${{ secrets.WANDB_API_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — container starts and Python imports work
        if: github.event_name != 'pull_request'
        env:
          SMOKE_IMAGE: ${{ steps.config.outputs.image }}:dev-snapshot-${{ steps.source.outputs.sha }}
        run: |
          docker pull "$SMOKE_IMAGE"
          docker run --rm --entrypoint bash "$SMOKE_IMAGE" \
            -c "pytest tests/docker/test_smoke.py::test_pedalboard_importable -v"

      - name: Smoke test — VST loads under headless X11
        if: github.event_name != 'pull_request'
        env:
          SMOKE_IMAGE: ${{ steps.config.outputs.image }}:dev-snapshot-${{ steps.source.outputs.sha }}
        run: |
          docker run --rm --entrypoint bash "$SMOKE_IMAGE" \
            -c "scripts/run-linux-vst-headless.sh pytest tests/docker/test_smoke.py::test_surge_xt_loads -v"
