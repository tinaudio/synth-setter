name: Docker Build Validation

# Validates that the Docker dev-live image builds successfully and the
# VST plugin loads under headless X11.
#
# Trigger: manual dispatch or weekly schedule.

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref to test (branch, tag, or SHA)"
        required: false
        default: "main"
  schedule:
    # Weekly: Sunday 06:00 UTC
    - cron: "0 6 * * 0"

jobs:
  docker-build:
    name: Build and validate Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.git_ref || 'main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (dev-live target)
        env:
          GIT_PAT: ${{ secrets.GIT_PAT }}
          DOCKER_BUILDKIT: "1"
        run: |
          make docker-build-dev-live \
            GIT_REF=$(git rev-parse HEAD) \
            GIT_PAT=${{ secrets.GIT_PAT }} \
            DOCKER_BUILD_FLAGS="--load"

      - name: Smoke test — container starts and Python imports work
        run: |
          docker run --rm \
            --entrypoint bash \
            synth-setter:dev-live \
            -c "python -c 'from pedalboard import VST3Plugin; print(\"pedalboard OK\")'"

      - name: Smoke test — VST loads under headless X11
        run: |
          docker run --rm \
            --entrypoint bash \
            -v "${{ github.workspace }}:/workspace" \
            synth-setter:dev-live \
            -c "
              cd /workspace &&
              scripts/run-linux-vst-headless.sh python -c \"
                from pedalboard import VST3Plugin
                p = VST3Plugin('/usr/lib/vst3/Surge XT.vst3')
                print('Surge XT loaded, {} parameters'.format(len(p.parameters)))
              \"
            "
