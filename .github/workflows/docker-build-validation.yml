name: Docker Image Build and Push

# Builds a dev-snapshot Docker image, pushes to Docker Hub, and runs smoke
# tests against the pushed image.
#
# Trigger: manual dispatch or weekly schedule.

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref to build (branch, tag, or SHA). Builds and pushes to Docker Hub."
        required: false
        default: "main"
  schedule:
    # Weekly: Sunday 06:00 UTC
    - cron: "0 6 * * 0"

jobs:
  docker-build:
    name: Build and push Docker image
    runs-on: ubuntu-latest-4core
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.git_ref || 'main' }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install config dependencies
        run: pip install pyyaml pydantic

      - name: Load image config
        id: config
        run: |
          python -c "
          from scripts.image_config import load_image_config
          from pathlib import Path
          import os

          cfg = load_image_config(
              Path('configs/image/dev-snapshot.yaml'),
              github_sha='${{ github.sha }}',
              issue_number=311,
          )
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              for field in ['dockerfile', 'image', 'base_image', 'base_image_tag',
                             'build_mode', 'target_platform', 'torch_index_url',
                             'r2_endpoint', 'r2_bucket']:
                  f.write(f'{field}={getattr(cfg, field)}\n')
          "

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.config.outputs.image }}
          tags: |
            type=raw,value=dev-snapshot
            type=raw,value=dev-snapshot-${{ github.sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.config.outputs.dockerfile }}
          target: dev-snapshot
          platforms: ${{ steps.config.outputs.target_platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_MODE=${{ steps.config.outputs.build_mode }}
            BASE_IMAGE=${{ steps.config.outputs.base_image }}
            TORCH_INDEX_URL=${{ steps.config.outputs.torch_index_url }}
            SYNTH_PERMUTATIONS_GIT_REF=${{ github.sha }}
            R2_BUCKET=${{ steps.config.outputs.r2_bucket }}
            R2_ENDPOINT=${{ steps.config.outputs.r2_endpoint }}
          secrets: |
            git_pat=${{ secrets.GIT_PAT }}
            r2_access_key_id=${{ secrets.R2_ACCESS_KEY_ID }}
            r2_secret_access_key=${{ secrets.R2_SECRET_ACCESS_KEY }}
            wandb_api_key=${{ secrets.WANDB_API_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — container starts and Python imports work
        env:
          SMOKE_IMAGE: ${{ steps.config.outputs.image }}:dev-snapshot-${{ github.sha }}
        run: |
          docker pull "$SMOKE_IMAGE"
          docker run --rm \
            --entrypoint bash \
            "$SMOKE_IMAGE" \
            -c "python -c 'from pedalboard import VST3Plugin; print(\"pedalboard OK\")'"

      - name: Smoke test — VST loads under headless X11
        env:
          SMOKE_IMAGE: ${{ steps.config.outputs.image }}:dev-snapshot-${{ github.sha }}
        run: |
          docker run --rm \
            --entrypoint bash \
            "$SMOKE_IMAGE" \
            -c "
              scripts/run-linux-vst-headless.sh python -c \"
                from pedalboard import VST3Plugin
                p = VST3Plugin('/usr/lib/vst3/Surge XT.vst3')
                print('Surge XT loaded, {} parameters'.format(len(p.parameters)))
              \"
            "
