name: Nightly Tests

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  nightly-full-suite:
    runs-on: ubuntu-latest

    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # Frozen sync, CPU torch via [tool.uv.sources] — see test.yml for rationale.
      - name: Install dependencies (uv sync --frozen, CPU torch)
        run: uv sync --frozen --extra cpu --no-default-groups --group dev

      - name: List dependencies
        run: uv pip list --python .venv/bin/python

      # Bare ubuntu runner has no CUDA/MPS device and no Surge XT VST3 binary;
      # exclude the corresponding markers so accelerator/plugin-gated tests are
      # deselected at collection rather than hardfailing in their fixtures. The
      # accelerator-bound surge_xt smoke tests run via `test-gpu.yml` /
      # `test-mps.yml` / `test-vst-slow.yml` against the dev-snapshot image
      # (which ships `/usr/lib/vst3/Surge XT.vst3`).
      - name: Run full test suite
        env:
          HYDRA_FULL_ERROR: "1"
        run: |
          uv run pytest -vv -s -m "not gpu and not mps and not requires_vst"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Nightly test suite failed. Review the logs above for details."
