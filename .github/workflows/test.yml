name: Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "src/synth_setter/configs/**"
      - "scripts/**"
      - "pyproject.toml"
      - "codecov.yml"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main, "release/*", "dev"]
    paths:
      - "src/**"
      - "tests/**"
      - "src/synth_setter/configs/**"
      - "scripts/**"
      - "pyproject.toml"
      - "codecov.yml"
      - ".github/workflows/test.yml"

jobs:
  run_tests_ubuntu:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest"]
        python-version: ["3.10", "3.11"]

    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # --extra cpu routes torch through pytorch-cpu per [tool.uv.sources];
      # --frozen errors on lockfile drift. Ephemeral runner — see #1243.
      - name: Install dependencies (uv sync --frozen, CPU torch)
        run: uv sync --frozen --extra cpu --no-default-groups --group dev

      - name: List dependencies
        run: uv pip list --python .venv/bin/python

      # `--cov=scripts/ci` is needed alongside `--cov=src`: pytest-cov's
      # `--cov` overrides `[tool.coverage.run].source` in `pyproject.toml`.
      - name: Run pytest with coverage
        env:
          HYDRA_FULL_ERROR: "1"
        run: |
          uv run pytest -n auto -m "not slow and not gpu and not mps" -vv -s \
            --cov=src --cov=scripts/ci --cov-branch --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: unit-cpu,unit-cpu-linux
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  run_tests_macos:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: ["macos-latest"]
        python-version: ["3.10"]

    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # macOS: bare `uv sync --frozen` lets torch resolve from PyPI's
      # MPS-capable wheel — no `--extra cpu` on Apple Silicon (the
      # sys_platform marker in [tool.uv.sources] would not match anyway).
      - name: Install dependencies (uv sync --frozen, MPS wheel from PyPI)
        run: uv sync --frozen

      - name: List dependencies
        run: uv pip list --python .venv/bin/python

      # See the ubuntu job above for why `--cov=scripts/ci` is required.
      - name: Run pytest with coverage
        env:
          HYDRA_FULL_ERROR: "1"
        run: |
          uv run pytest -n auto -m "not slow and not gpu and not mps" -vv -s \
            --cov=src --cov=scripts/ci --cov-branch --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: unit-cpu,unit-cpu-macos
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
