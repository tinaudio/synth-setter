name: Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "pipeline/**"
      - "tests/**"
      - "configs/**"
      - "scripts/**"
      - "requirements*.txt"
      - "pyproject.toml"
      - "setup.py"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main, "release/*", "dev"]
    paths:
      - "src/**"
      - "pipeline/**"
      - "tests/**"
      - "configs/**"
      - "scripts/**"
      - "requirements*.txt"
      - "pyproject.toml"
      - "setup.py"
      - ".github/workflows/test.yml"

jobs:
  run_tests_ubuntu:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest"]
        python-version: ["3.10", "3.11"]

    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system sh

      # Install the Surge XT VST3 prebuilt .deb plus the headless X11 / dbus
      # runtime stack needed by `scripts/run-linux-vst-headless.sh` (Xvfb,
      # xsettingsd, openbox, dbus-x11, mesa, x11-utils). Mirrors the steps in
      # `docker/ubuntu22_04/Dockerfile` (prebuilt-install + headless-runtime
      # apt block, lines 184-218 and 289-306) and the symlink at line 316-317.
      # The .deb installs the bundle at /usr/lib/vst3/Surge XT.vst3, which is
      # then symlinked into the repo-relative `plugins/Surge XT.vst3` path
      # that configs, CLI defaults, and tests assume.
      - name: Install Surge XT VST3 + headless X11 stack
        env:
          SURGE_XT_VERSION: "1.3.4"
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            xauth \
            dbus-x11 \
            xsettingsd \
            libgl1-mesa-dri \
            mesa-utils \
            openbox \
            x11-utils \
            x11-xserver-utils
          deb="surge-xt-linux-x64-${SURGE_XT_VERSION}.deb"
          curl -fsSL -o "/tmp/${deb}" \
            "https://github.com/surge-synthesizer/releases-xt/releases/download/${SURGE_XT_VERSION}/${deb}"
          sudo apt-get install -y --no-install-recommends "/tmp/${deb}"
          rm "/tmp/${deb}"
          test -d "/usr/lib/vst3/Surge XT.vst3"
          mkdir -p plugins
          ln -sfn "/usr/lib/vst3/Surge XT.vst3" "plugins/Surge XT.vst3"

      # Mirrors the headless plugin-load smoke check in
      # `docker/ubuntu22_04/Dockerfile:312-314` — fails fast if the .deb
      # install, X11 stack, or symlink is broken before the full pytest run.
      - name: Smoke-test Surge XT plugin load
        run: |
          ./scripts/run-linux-vst-headless.sh \
            python -X faulthandler -c "from src.data.vst.core import load_plugin; load_plugin('plugins/Surge XT.vst3')"

      - name: List dependencies
        run: uv pip list --system

      - name: Run pytest
        env:
          HYDRA_FULL_ERROR: "1"
        run: |
          pytest -n auto -m "not slow and not gpu and not mps" -vv -s

  run_tests_macos:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: ["macos-latest"]
        python-version: ["3.10"]

    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system sh

      # Install the Surge XT VST3 cask and symlink it into the repo-relative
      # `plugins/Surge XT.vst3` path that configs, CLI `--plugin_path` defaults,
      # and the smoke-test fixtures all assume. Mirrors the provisioning step in
      # `tart/macos.pkr.hcl` (the macOS dev VM image).
      - name: Install Surge XT VST3
        run: |
          brew install --cask surge-xt
          mkdir -p plugins
          ln -sfn '/Library/Audio/Plug-Ins/VST3/Surge XT.vst3' 'plugins/Surge XT.vst3'

      # Mirrors the Tart-VM smoke check in `tart/macos.pkr.hcl` — fails fast if
      # the cask install or symlink is broken before the full pytest run.
      - name: Smoke-test Surge XT plugin load
        run: |
          python -X faulthandler -c "from src.data.vst.core import load_plugin; load_plugin('plugins/Surge XT.vst3')"

      - name: List dependencies
        run: uv pip list --system

      - name: Run pytest
        env:
          HYDRA_FULL_ERROR: "1"
        run: pytest -n auto -m "not slow and not gpu" -vv -s

  # upload code coverage report
  code-coverage:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system pytest-cov[toml]
          uv pip install --system sh

      - name: Run tests and collect coverage
        env:
          HYDRA_FULL_ERROR: "1"
        run: pytest -n auto -m "not slow and not gpu and not mps" --cov src # NEEDS TO BE UPDATED WHEN CHANGING THE NAME OF "src" FOLDER

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
    timeout-minutes: 40
