name: Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "pipeline/**"
      - "tests/**"
      - "configs/**"
      - "scripts/**"
      - "requirements*.txt"
      - "pyproject.toml"
      - "setup.py"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main, "release/*", "dev"]
    paths:
      - "src/**"
      - "pipeline/**"
      - "tests/**"
      - "configs/**"
      - "scripts/**"
      - "requirements*.txt"
      - "pyproject.toml"
      - "setup.py"
      - ".github/workflows/test.yml"

jobs:
  run_tests_ubuntu:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest"]
        python-version: ["3.10", "3.11"]

    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system sh

      - name: List dependencies
        run: uv pip list --system

      - name: Cache MNIST dataset
        uses: actions/cache@v4
        with:
          path: data/MNIST
          key: mnist-dataset-v1

      - name: Run pytest
        env:
          HYDRA_FULL_ERROR: "1"
        run: |
          pytest -n auto -m "not slow" -vv -s

  run_tests_macos:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: ["macos-latest"]
        python-version: ["3.10"]

    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system sh

      - name: List dependencies
        run: uv pip list --system

      - name: Cache MNIST dataset
        uses: actions/cache@v4
        with:
          path: data/MNIST
          key: mnist-dataset-v1

      - name: Run pytest
        env:
          HYDRA_FULL_ERROR: "1"
        run: pytest -n auto -m "not slow" -k "not test_mnist_datamodule" -vv -s

  # upload code coverage report
  code-coverage:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system pytest-cov[toml]
          uv pip install --system sh

      - name: Cache MNIST dataset
        uses: actions/cache@v4
        with:
          path: data/MNIST
          key: mnist-dataset-v1

      - name: Run tests and collect coverage
        env:
          HYDRA_FULL_ERROR: "1"
        run: pytest -n auto -m "not slow" --cov src # NEEDS TO BE UPDATED WHEN CHANGING THE NAME OF "src" FOLDER

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
    timeout-minutes: 40
