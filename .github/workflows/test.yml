name: Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    branches: [main, "release/*", "dev"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"

jobs:
  run_tests_ubuntu:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest"]
        python-version: ["3.10", "3.11"]

    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install sh

      - name: List dependencies
        run: |
          python -m pip list

      - name: Cache MNIST dataset
        uses: actions/cache@v4
        with:
          path: data/MNIST
          key: mnist-dataset-v1

      - name: Run pytest
        env:
          HYDRA_FULL_ERROR: "1"
        run: |
          pytest -n auto -m "not slow" -vv -s

  run_tests_macos:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: ["macos-latest"]
        python-version: ["3.10"]

    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install sh

      - name: List dependencies
        run: |
          python -m pip list

      - name: Cache MNIST dataset
        uses: actions/cache@v4
        with:
          path: data/MNIST
          key: mnist-dataset-v1

      - name: Run pytest
        env:
          HYDRA_FULL_ERROR: "1"
        run: pytest -n auto -m "not slow" -vv -s

  # upload code coverage report
  code-coverage:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov[toml]
          pip install sh

      - name: Cache MNIST dataset
        uses: actions/cache@v4
        with:
          path: data/MNIST
          key: mnist-dataset-v1

      - name: Run tests and collect coverage
        env:
          HYDRA_FULL_ERROR: "1"
        run: pytest -n auto -m "not slow" --cov src # NEEDS TO BE UPDATED WHEN CHANGING THE NAME OF "src" FOLDER

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
    timeout-minutes: 40
