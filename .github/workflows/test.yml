name: Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "src/synth_setter/configs/**"
      - "scripts/**"
      - "pyproject.toml"
      - "codecov.yml"
      - "agent/hooks/**"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main, "release/*", "dev"]
    paths:
      - "src/**"
      - "tests/**"
      - "src/synth_setter/configs/**"
      - "scripts/**"
      - "pyproject.toml"
      - "codecov.yml"
      - "agent/hooks/**"
      - ".github/workflows/test.yml"

jobs:
  run_tests_ubuntu:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest"]
        python-version: ["3.10", "3.11"]

    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # --extra cpu routes torch through pytorch-cpu per [tool.uv.sources];
      # --frozen errors on lockfile drift. Ephemeral runner — see #1243.
      - name: Install dependencies (uv sync --frozen, CPU torch)
        run: uv sync --frozen --extra cpu --no-default-groups --group dev

      - name: List dependencies
        run: uv pip list --python .venv/bin/python

      # Marker filter + coverage flags live in `make test-ci-unit` so they
      # can't drift from cpu-slow.yml / nightly.yml — see #1353.
      - name: Run pytest with coverage
        env:
          HYDRA_FULL_ERROR: "1"
        run: make test-ci-unit

      - name: Upload coverage to Codecov
        uses: ./.github/actions/upload-coverage
        with:
          flags: unit-cpu,unit-cpu-linux
          token: ${{ secrets.CODECOV_TOKEN }}

  run_tests_macos:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: ["macos-latest"]
        python-version: ["3.10"]

    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # macOS: bare `uv sync --frozen` lets torch resolve from PyPI's
      # MPS-capable wheel — no `--extra cpu` on Apple Silicon (the
      # sys_platform marker in [tool.uv.sources] would not match anyway).
      - name: Install dependencies (uv sync --frozen, MPS wheel from PyPI)
        run: uv sync --frozen

      - name: List dependencies
        run: uv pip list --python .venv/bin/python

      - name: Run pytest with coverage
        env:
          HYDRA_FULL_ERROR: "1"
        run: make test-ci-unit

      - name: Upload coverage to Codecov
        uses: ./.github/actions/upload-coverage
        with:
          flags: unit-cpu,unit-cpu-macos
          token: ${{ secrets.CODECOV_TOKEN }}
