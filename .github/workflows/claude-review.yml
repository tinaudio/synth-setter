name: Claude Code Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: number

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    timeout-minutes: 15
    env:
      GH_PR_NUMBER: ${{ inputs.pr_number }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/pull/${{ inputs.pr_number }}/head

      - name: Validate API key is configured
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is not configured. Claude review cannot run."
            exit 1
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(git log*)",
                  "Bash(git show*)",
                  "Bash(git diff*)",
                  "Bash(gh pr *)",
                  "Read",
                  "Glob",
                  "Grep"
                ]
              }
            }
          prompt: |
            Review this PR. Follow the Code Review section in CLAUDE.md — invoke all seven
            review skills and evaluate every checklist item against the changed code.
            Prefix each comment with BLOCK: or WARN:.
          show_full_output: true
