name: Claude Code Review

# On-demand via the "needs-claude-review" label.
on:
  pull_request:
    types: [labeled]
    branches: [main]

jobs:
  claude-review:
    if: >-
      github.event.pull_request.head.repo.fork == false &&
      github.event.label.name == 'needs-claude-review'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate API key is configured
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is not configured. Claude review cannot run."
            exit 1
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(git log*)",
                  "Bash(git show*)",
                  "Bash(git diff*)",
                  "Bash(gh pr *)",
                  "Read",
                  "Glob",
                  "Grep",
                  "mcp__github_inline_comment__create_inline_comment"
                ]
              }
            }
          prompt: |
            Review this PR. Follow the Code Review section in CLAUDE.md — invoke all seven
            review skills and evaluate every checklist item against the changed code.
            Use `mcp__github_inline_comment__create_inline_comment` to post inline comments
            on specific lines of changed code. Prefix each comment with BLOCK: or WARN:.
