name: Auto-approve PR

# Re-evaluates whenever a condition might change:
# - CI workflows finish (workflow_run for the two heaviest workflows;
#   check_run for every other check, including ones added later)
# - A review is submitted by a human (bot reviews don't trigger workflows)
# - PR is marked ready for review (leaves draft)
# - Manual trigger via workflow_dispatch
# - Hourly schedule sweep — safety net for blockers that clear without
#   firing any of the above (notably: Copilot review threads being resolved,
#   which GitHub does not expose as a workflow trigger).
on:
  check_run:
    types: [completed]
  workflow_run:
    workflows: ["Tests", "Code Quality PR"]
    types: [completed]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to evaluate"
        required: true
        type: number
  schedule:
    - cron: "0 * * * *"

# Single source of truth for the author allowlist — referenced by both the
# scheduled discover query (jobs.discover) and the eligibility check in
# jobs.auto-approve.conditions.
env:
  ALLOWED_AUTHOR: ktinubu

jobs:
  discover:
    # Skip the check_run we create ourselves — otherwise the workflow loops
    # forever on its own "Auto-approve status" check_run completion.
    if: >-
      github.event_name != 'check_run'
      || github.event.check_run.name != 'Auto-approve status'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      prs: ${{ steps.list.outputs.prs }}
    steps:
      - name: List PRs to evaluate
        id: list
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          export REPO="${{ github.repository }}"
          EVENT="${{ github.event_name }}"
          PRS="[]"

          if [ "$EVENT" = "workflow_run" ]; then
            PR_NUMBER=$(gh api "repos/${REPO}/commits/${{ github.event.workflow_run.head_sha }}/pulls" \
              --jq '.[0].number // empty')
            if [ -n "$PR_NUMBER" ]; then PRS="[${PR_NUMBER}]"; fi
          elif [ "$EVENT" = "check_run" ]; then
            PR_NUMBER=$(gh api "repos/${REPO}/commits/${{ github.event.check_run.head_sha }}/pulls" \
              --jq '.[0].number // empty')
            if [ -n "$PR_NUMBER" ]; then PRS="[${PR_NUMBER}]"; fi
          elif [ "$EVENT" = "workflow_dispatch" ]; then
            PRS="[${{ github.event.inputs.pr_number }}]"
          elif [ "$EVENT" = "schedule" ]; then
            PRS=$(gh api --paginate "repos/${REPO}/pulls?state=open&base=main&per_page=100" \
              --jq '.[]
                | select(.user.login == env.ALLOWED_AUTHOR)
                | select(.draft == false)
                | select(.head.repo.full_name == env.REPO)
                | .number
              ' | jq -cs '.')
          else
            PRS="[${{ github.event.pull_request.number }}]"
          fi

          echo "prs=${PRS}" >> "$GITHUB_OUTPUT"
          echo "::notice::PRs to evaluate: ${PRS}"

  auto-approve:
    needs: discover
    if: needs.discover.outputs.prs != '' && needs.discover.outputs.prs != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
      issues: read
      checks: write
    strategy:
      fail-fast: false
      matrix:
        pr: ${{ fromJSON(needs.discover.outputs.prs) }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APPROVAL_BOT_APP_ID }}
          private-key: ${{ secrets.APPROVAL_BOT_PRIVATE_KEY }}

      - name: Check all conditions
        id: conditions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PR=${{ matrix.pr }}
          REPO="${{ github.repository }}"

          # Fetch PR metadata once
          PR_DATA=$(gh api "repos/${REPO}/pulls/${PR}" --jq '{draft: .draft, base: .base.ref, sha: .head.sha, author: .user.login, head_repo: .head.repo.full_name}')
          IS_DRAFT=$(echo "$PR_DATA" | jq -r '.draft')
          BASE_REF=$(echo "$PR_DATA" | jq -r '.base')
          HEAD_SHA=$(echo "$PR_DATA" | jq -r '.sha')
          HEAD_REPO=$(echo "$PR_DATA" | jq -r '.head_repo')
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

          PR_AUTHOR=$(echo "$PR_DATA" | jq -r '.author')

          # --- Condition: Only approve PRs by the allowlisted author ---
          if [ "$PR_AUTHOR" != "$ALLOWED_AUTHOR" ]; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "reason=PR author ${PR_AUTHOR} is not eligible for auto-approve" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # --- Condition 0: Only approve PRs targeting main ---
          if [ "$BASE_REF" != "main" ]; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "reason=PR targets ${BASE_REF}, not main" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # --- Condition 1: PR is not a draft ---
          if [ "$IS_DRAFT" = "true" ]; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "reason=PR is a draft" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # --- Condition 1b: PR is not from a fork ---
          if [ "$HEAD_REPO" != "$REPO" ]; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "reason=PR is from a fork (${HEAD_REPO})" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # --- Condition 2: All CI checks pass ---
          # BUG FIX: The check-runs API returns ALL runs for a commit, including
          # superseded re-runs of the same check. If check-pr-metadata failed on
          # the first trigger but passed on re-run, the old failure still appears.
          # We must deduplicate by check name and only consider the LATEST run per
          # name (highest ID = most recent). Without this, a stale failure from a
          # re-triggered check permanently blocks auto-approve.
          # See: PR #142 — check-pr-metadata passed on re-run but auto-approve
          # still saw "1 check(s) failed" from the original run.
          #
          # BUG FIX: The "Copilot code review" workflow is GitHub-managed
          # (event=="dynamic") and can leave failed bootstrap check-runs
          # (e.g. a "Prepare" job failing with "Resource not accessible by
          # integration") attached to the head SHA even when the review
          # itself posts successfully in a later run. We can't see or re-run
          # those workflows, and the dedupe-by-name above doesn't help
          # because the failed check_run name only appears in the failing
          # run. Filter the whole Copilot suite out. We deliberately do NOT
          # filter on event=="dynamic" alone — the GitHub-managed default-
          # setup CodeQL pipeline (workflow name "PR #<n>", event="dynamic")
          # contributes the `Analyze (actions)` / `Analyze (python)` checks
          # we DO want to gate on. See PR #1024.
          COPILOT_SUITE_IDS=$(gh api \
            "repos/${REPO}/actions/runs?head_sha=${HEAD_SHA}&per_page=100" \
            --jq '[.workflow_runs[] | select(.name == "Copilot code review") | .check_suite_id] | unique')
          CHECK_DATA=$(gh api "repos/${REPO}/commits/${HEAD_SHA}/check-runs" \
            | jq --argjson skip "$COPILOT_SUITE_IDS" -r '
              [.check_runs[]
                | select((.name | startswith("auto-approve")) | not)
                | select(.name != "Auto-approve status")
                | select(.check_suite.id as $id | $skip | index($id) | not)
              ]
              | group_by(.name)
              | map(sort_by(.id) | last)
              | .[]
              | "\(.status) \(.conclusion // "none") \(.name)"
            ')
          PENDING=$(echo "$CHECK_DATA" | grep -c "^queued\|^in_progress" || true)
          FAILED=$(echo "$CHECK_DATA" | grep -v "^completed success\|^completed skipped\|^completed neutral\|^queued\|^in_progress" | grep -c . || true)
          if [ "$PENDING" -gt 0 ]; then
            echo "result=neutral" >> "$GITHUB_OUTPUT"
            echo "reason=${PENDING} check(s) still running" >> "$GITHUB_OUTPUT"
            exit 0
          elif [ "$FAILED" -gt 0 ]; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "reason=${FAILED} check(s) failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # --- Condition 3: Copilot has reviewed and all threads are resolved ---
          OWNER="${{ github.repository_owner }}"
          REPO_NAME=$(echo "$REPO" | cut -d/ -f2)

          COPILOT_REVIEWS=$(gh api "repos/${REPO}/pulls/${PR}/reviews" \
            --jq '[.[] | select(.user.login == "copilot-pull-request-reviewer[bot]")] | length')
          if [ "$COPILOT_REVIEWS" -eq 0 ]; then
            echo "result=neutral" >> "$GITHUB_OUTPUT"
            echo "reason=Copilot has not reviewed yet" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          UNRESOLVED=$(gh api graphql -f query='
            query($owner: String!, $repo: String!, $pr: Int!) {
              repository(owner: $owner, name: $repo) {
                pullRequest(number: $pr) {
                  reviewThreads(first: 100) {
                    nodes {
                      isResolved
                      comments(first: 1) {
                        nodes { author { login } }
                      }
                    }
                  }
                }
              }
            }' -f owner="$OWNER" -f repo="$REPO_NAME" -F pr="$PR" \
            --jq '[.data.repository.pullRequest.reviewThreads.nodes[]
              | select(.isResolved == false)
              | select(.comments.nodes[0].author.login | startswith("copilot-pull-request-reviewer"))
            ] | length')
          if [ "$UNRESOLVED" -gt 0 ]; then
            echo "result=neutral" >> "$GITHUB_OUTPUT"
            echo "reason=${UNRESOLVED} unresolved Copilot thread(s)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "result=approve" >> "$GITHUB_OUTPUT"
          echo "reason=All conditions met" >> "$GITHUB_OUTPUT"

      - name: Approve PR
        if: steps.conditions.outputs.result == 'approve'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Check if this app already approved (avoid duplicate approvals)
          APP_LOGIN="${{ steps.app-token.outputs.app-slug }}[bot]"
          ALREADY=$(gh api "repos/${{ github.repository }}/pulls/${{ matrix.pr }}/reviews" \
            --jq "[.[] | select(.state == \"APPROVED\") | select(.user.login == \"${APP_LOGIN}\")] | length")
          if [ "$ALREADY" -gt 0 ]; then
            echo "::notice::Bot already approved — skipping duplicate"
            exit 0
          fi
          gh pr review ${{ matrix.pr }} --repo "${{ github.repository }}" --approve \
            --body "All conditions met: CI passing, no unresolved Copilot threads. Auto-approved."

      # GitHub Actions doesn't support neutral exit codes from shell steps
      # (exit 78 was removed in the v1→v2 migration; actions/runner#662).
      # To show an honest status — green for approved, grey for waiting,
      # red for ineligible — we create a check run via the Checks API,
      # which is the only mechanism that supports conclusion: "neutral".
      - name: Report status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ steps.conditions.outputs.result }}';
            const reason = '${{ steps.conditions.outputs.reason }}';
            const headSha = '${{ steps.conditions.outputs.head_sha }}';

            if (!headSha) {
              core.warning(`Skipping status report — conditions step did not produce a head_sha (result=${result})`);
              return;
            }

            // Map result to Checks API conclusion
            // - approve  → success  (green tick)
            // - neutral  → neutral  (grey, not ready yet)
            // - failure  → failure  (red, ineligible)
            const conclusionMap = {
              approve: 'success',
              neutral: 'neutral',
              failure: 'failure',
            };
            const conclusion = conclusionMap[result] || 'failure';

            const titleMap = {
              approve: 'Approved',
              neutral: 'Waiting',
              failure: 'Not eligible',
            };
            const title = titleMap[result] || 'Unknown';

            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: headSha,
              name: 'Auto-approve status',
              status: 'completed',
              conclusion,
              output: {
                title,
                summary: reason,
              },
            });
