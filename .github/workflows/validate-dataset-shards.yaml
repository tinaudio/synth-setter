name: Validate Dataset Shards

# Reusable workflow that validates a generated dataset's spec + shards by
# pulling everything from R2. Consumes the `spec_uri` output emitted by
# `generate-dataset-shards.yaml` (or any caller that uploaded a spec to a
# known r2:// URI). All rclone copies live inside `synth_setter.pipeline.ci.validate_*` —
# the workflow no longer downloads files itself.
#
# Two jobs:
#   * validate-spec   — structural checks on the spec (synth_setter.pipeline.ci.validate_spec).
#   * validate-shard  — iterates spec.shards and validates each downloaded
#                       HDF5 (synth_setter.pipeline.ci.validate_shard).
#
# Required secrets (callers should `secrets: inherit`):
#   RCLONE_CONFIG_R2_ACCESS_KEY_ID, RCLONE_CONFIG_R2_SECRET_ACCESS_KEY,
#   RCLONE_CONFIG_R2_ENDPOINT — used to pull the spec and every shard
#   from R2 inside the validate scripts.

on:
  workflow_call:
    inputs:
      image_tag:
        description: "Docker image tag for validate_shard container."
        required: true
        type: string
      spec_uri:
        description: "r2:// URI of the materialized spec to validate (output of generate-dataset-shards.yaml)."
        required: true
        type: string
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag for validate_shard container."
        required: false
        type: string
        default: "dev-snapshot"
      spec_uri:
        description: "r2:// URI of the materialized spec to validate (canonical under-prefix form: r2://<bucket>/<prefix>input_spec.json)."
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate-spec:
    name: Validate spec structure
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      # `pip install -e .` installs the project + its light base only — pip
      # never installs PEP 735 dependency-groups, so the heavy runtime stays
      # out (see #1139). setup-python's `cache: 'pip'` is requirements-file
      # driven and doesn't apply to an editable install, so cache the pip
      # download dir keyed on this workflow's hash for the base wheels.
      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-validate-spec-${{ runner.os }}-${{ hashFiles('.github/workflows/validate-dataset-shards.yaml') }}
          restore-keys: |
            pip-validate-spec-${{ runner.os }}-

      # Native runner with no preinstalled rclone; `validate_spec` reads the
      # `RCLONE_CONFIG_R2_*` env this exports to pull the spec from R2.
      - name: Set up R2
        uses: ./.github/actions/setup-r2
        with:
          access-key-id: ${{ secrets.RCLONE_CONFIG_R2_ACCESS_KEY_ID }}
          secret-access-key: ${{ secrets.RCLONE_CONFIG_R2_SECRET_ACCESS_KEY }}
          endpoint: ${{ secrets.RCLONE_CONFIG_R2_ENDPOINT }}
          install-rclone: "true"

      - name: Install synth_setter (light base provides validate_spec deps)
        run: pip install -e .

      # Fail fast if a new top-level import on the validate_spec path needs a dep
      # the light base doesn't carry (it would otherwise surface mid-run).
      - name: Import smoke-guard for validate_spec
        run: python3 -c "from synth_setter.pipeline.ci.validate_spec import main"

      - name: Validate spec structure
        run: python3 -m synth_setter.pipeline.ci.validate_spec "${{ inputs.spec_uri }}"

  validate-shard:
    name: Validate shards
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      IMAGE: tinaudio/synth-setter:${{ inputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # validate_shard.py iterates spec.shards and pulls each from R2 via
      # synth_setter.pipeline.r2_io. Run in dev-snapshot so h5py is available without a
      # host-side install.
      - name: Pull dev-snapshot image
        run: docker pull "${IMAGE}"

      # rclone runs inside the container; setup-r2 only exports the
      # `RCLONE_CONFIG_R2_*` values the `docker run -e <VAR>` lines forward.
      - name: Set up R2
        uses: ./.github/actions/setup-r2
        with:
          access-key-id: ${{ secrets.RCLONE_CONFIG_R2_ACCESS_KEY_ID }}
          secret-access-key: ${{ secrets.RCLONE_CONFIG_R2_SECRET_ACCESS_KEY }}
          endpoint: ${{ secrets.RCLONE_CONFIG_R2_ENDPOINT }}

      - name: Validate every shard via R2
        env:
          SPEC_URI: ${{ inputs.spec_uri }}
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${{ github.workspace }}:/home/build/synth-setter:ro" \
            -e RCLONE_CONFIG_R2_TYPE \
            -e RCLONE_CONFIG_R2_PROVIDER \
            -e RCLONE_CONFIG_R2_ACCESS_KEY_ID \
            -e RCLONE_CONFIG_R2_SECRET_ACCESS_KEY \
            -e RCLONE_CONFIG_R2_ENDPOINT \
            -e SPEC_URI \
            "${IMAGE}" \
            python3 -m synth_setter.pipeline.ci.validate_shard "$SPEC_URI"
