name: Tart macOS image — validate & publish

# Two-job workflow for the macOS dev VM image defined in `tart/macos.pkr.hcl`.
#
# 1. `validate` (always): runs `packer fmt -check && packer init && packer
#    validate` on the macos-latest GHA runner. Catches HCL syntax / variable
#    / plugin-resolution regressions in seconds. This is the PR-presubmit gate.
#
# 2. `build_and_push` (workflow_dispatch only): runs the full `packer build`
#    + `tart push` to Docker Hub. Tart requires Apple's Virtualization.framework
#    with hardware virtualization; GHA's standard `macos-latest` runners are
#    themselves nested Apple VMs and refuse to expose virt, producing
#    `Error: Invalid virtual machine configuration. Virtualization is not
#    available` on a `packer build` attempt (verified on PR #1537's first run).
#    The build job pins to `macos-15-xlarge`, GitHub's larger-runner tier that
#    documents nested-virtualization support — only the org's larger-runner
#    plan can dispatch the publish path. Validate stays free for every PR.
#
# Triggers:
# - `pull_request` (paths filter on `tart/macos.pkr.hcl` and this workflow):
#   runs `validate` only. Build is implicitly gated off because the larger-
#   runner cost shouldn't be spent on a draft PR review.
# - `workflow_dispatch`: runs both `validate` (cheap precondition) and
#   `build_and_push`. Inputs let the operator override the baked git ref and
#   skip the `:latest` push for one-off dated publishes.
# - `push` to main with template changes: runs `validate` so a merge can't
#   land a broken template the dispatch path will trip on later.

on:
  workflow_dispatch:
    inputs:
      synth_setter_git_ref:
        description: "Git ref (branch/tag/SHA) to bake into the VM. Empty = the workflow's triggering SHA so the publish step pins to a known commit."
        required: false
        default: ""
      push_latest:
        description: "Also push the `:latest` moving tag in addition to the immutable dated tag. Leave off for one-off dated-only publishes."
        required: false
        type: boolean
        default: true
  pull_request:
    branches: [main]
    paths:
      - "tart/macos.pkr.hcl"
      - ".github/workflows/tart-image-build.yml"
  push:
    branches: [main]
    paths:
      - "tart/macos.pkr.hcl"
      - ".github/workflows/tart-image-build.yml"

permissions:
  contents: read

jobs:
  validate:
    name: Validate Packer template
    runs-on: macos-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install Packer
        run: |
          set -euo pipefail
          brew install hashicorp/tap/packer
          packer --version

      - name: packer fmt -check
        working-directory: tart
        run: packer fmt -check macos.pkr.hcl

      # PACKER_GITHUB_API_TOKEN lifts the 60/hr anonymous rate limit shared
      # across the runner pool's IP so packer can resolve the tart plugin's
      # tag list. The job's default GITHUB_TOKEN suffices (public read).
      - name: packer init
        working-directory: tart
        env:
          PACKER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: packer init macos.pkr.hcl

      - name: packer validate
        working-directory: tart
        run: packer validate macos.pkr.hcl

  build_and_push:
    name: Build VM and push to Docker Hub
    if: github.event_name == 'workflow_dispatch'
    needs: validate
    # macos-15-xlarge is GitHub's larger-runner tier that supports nested
    # virtualization (verified by GitHub's 2025 nested-virt announcement);
    # the standard macos-* runners cannot host Tart's Virtualization.framework
    # call. If the org's larger-runner plan does not include this label the
    # job will queue indefinitely — switch to `cirruslabs/runner` or a
    # self-hosted Apple Silicon runner in that case.
    runs-on: macos-15-xlarge
    timeout-minutes: 90

    env:
      VM_NAME: synth-setter-macos
      DH_IMAGE: tinaudio/synth-setter-macos
      DH_REGISTRY: registry-1.docker.io

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      # Resolve the git ref baked into the VM. Defaults to the workflow's
      # triggering commit SHA so dispatch publishes pin to a known commit
      # (not a moving branch tip) without forcing the operator to paste it.
      - name: Resolve synth-setter git ref
        id: ref
        env:
          INPUT_REF: ${{ inputs.synth_setter_git_ref }}
          DEFAULT_REF: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          if [ -n "$INPUT_REF" ]; then
            echo "ref=$INPUT_REF" >> "$GITHUB_OUTPUT"
          else
            echo "ref=$DEFAULT_REF" >> "$GITHUB_OUTPUT"
          fi
          echo "Using ref: $(grep '^ref=' "$GITHUB_OUTPUT" | tail -1)"

      - name: Install Tart and Packer
        run: |
          set -euo pipefail
          brew install cirruslabs/cli/tart
          brew install hashicorp/tap/packer
          tart --version
          packer --version

      - name: Show available disk
        run: df -h /

      - name: packer init
        working-directory: tart
        env:
          PACKER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: packer init macos.pkr.hcl

      # The build pulls the cirruslabs base image, runs every provisioner, and
      # leaves a local VM named "$VM_NAME". On failure the provisioner output
      # (brew/uv/pytest) is the diagnostic — packer streams it verbatim.
      - name: packer build
        working-directory: tart
        env:
          GIT_REF: ${{ steps.ref.outputs.ref }}
        run: |
          set -euo pipefail
          packer build -var "synth_setter_git_ref=${GIT_REF}" macos.pkr.hcl

      # `tart login` reads username then password from stdin when invoked
      # non-interactively. The subsequent `tart push` inherits the auth token.
      - name: Log in to Docker Hub via tart
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          printf '%s\n%s\n' "$DOCKERHUB_USERNAME" "$DOCKERHUB_TOKEN" \
            | tart login "$DH_REGISTRY"

      # The dated tag is the immutable rollback point; `:latest` is the moving
      # pointer `tart clone tinaudio/synth-setter-macos:latest` resolves
      # against. Both go in a single `tart push` so they share the upload
      # (Tart deduplicates layers across tags pushed in the same invocation).
      - name: tart push
        env:
          PUSH_LATEST: ${{ inputs.push_latest }}
        run: |
          set -euo pipefail
          date_tag=$(date -u +%Y-%m-%d)
          targets=("$DH_REGISTRY/$DH_IMAGE:$date_tag")
          if [ "$PUSH_LATEST" = "true" ]; then
            targets+=("$DH_REGISTRY/$DH_IMAGE:latest")
          fi
          printf 'Pushing %s\n' "${targets[@]}"
          tart push "$VM_NAME" "${targets[@]}"

      # Free disk so the runner ends in a clean state.
      - name: Delete local VM
        if: always()
        run: tart delete "$VM_NAME" || true
