name: Verify act setup

# Regression guard for the local `act` setup documented in
# docs/operations/running-workflows-locally.md. The runbook is the contract
# the rest of the team relies on; if any file listed in `paths:` below drifts
# in a way that breaks `act` (the `.actrc` mappings, the runner Dockerfile,
# this guard itself, or the data-pipeline workflows the guard dry-runs),
# this job fails before the next contributor wastes 20 minutes discovering
# it locally.

on:
  pull_request:
    paths:
      - ".actrc"
      - "docs/operations/act-runner.Dockerfile"
      - ".github/workflows/test-act.yml"
      - ".github/workflows/test-dataset-generation.yml"
      - ".github/workflows/generate-dataset-shards.yml"
      - ".github/workflows/validate-dataset-shards.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-act-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-act:
    name: Verify act parses repo + builds runner image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Pin act to a specific tagged release + verify the tarball checksum,
      # rather than piping nektos/act `master`'s install.sh into sudo bash
      # (supply-chain risk: master can change/be tampered with under us, and
      # the script's own behavior can drift). Bump ACT_VERSION + ACT_SHA256
      # together when adopting new act features.
      - name: Install act
        env:
          ACT_VERSION: v0.2.88
          ACT_SHA256: 1eb9996682dfcc053ac8f3f90f2ec50376f0cdfc229712d82da03d673c63a2b3
        run: |
          set -euo pipefail
          tarball="act_Linux_x86_64.tar.gz"
          curl -fsSL -o "${tarball}" \
            "https://github.com/nektos/act/releases/download/${ACT_VERSION}/${tarball}"
          echo "${ACT_SHA256}  ${tarball}" | sha256sum -c -
          sudo tar -xzf "${tarball}" -C /usr/local/bin act
          rm -f "${tarball}"
          act --version

      # `act -l` parses every workflow file under .github/workflows/ and applies
      # the repo `.actrc` (runner-label mappings). It fails if any workflow YAML
      # is malformed, or if `.actrc` references an unknown flag.
      - name: List workflows (parses every .yml/.yaml + honors .actrc)
        run: act -l

      # `act -n` (dry-run) resolves action references in addition to parsing,
      # catching broken `uses:` pins that `-l` would miss. pr-metadata-gate.yml
      # is a stable, short workflow that exercises the common shape.
      - name: Dry-run pr-metadata-gate.yml
        run: act pull_request -W .github/workflows/pr-metadata-gate.yml -n

      # The runbook's custom-image recipe is what users follow when a workflow
      # shells out to `gh`. Build it from scratch every time (no cache) so a
      # broken upstream apt repo or base-image bump fails this step rather
      # than someone's laptop a week later.
      - name: Build act-runner-gh image from docs Dockerfile
        run: |
          set -euo pipefail
          DOCKER_BUILDKIT=0 docker build --no-cache \
            -f docs/operations/act-runner.Dockerfile \
            -t act-runner-gh:latest \
            docs/operations
          docker run --rm act-runner-gh:latest gh --version

      # Verify the documented `-P ubuntu-latest=<image>` override syntax still
      # works against the just-built image.
      - name: Dry-run with custom runner image
        run: |
          act pull_request \
            -W .github/workflows/pr-metadata-gate.yml \
            -P ubuntu-latest=act-runner-gh:latest \
            --pull=false -n

      # Dry-run the data-pipeline workflow chain. test-dataset-generation has
      # a dynamic matrix (`fromJSON(needs.setup.outputs.providers)`) that act
      # cannot evaluate at dry-run because `-n` skips setup's bash and leaves
      # `needs.setup.outputs.*` empty — so target `setup` specifically, then
      # dry-run each `workflow_call` reusable directly so the parse-chain stays
      # covered. The real-run step below closes the matrix-evaluation gap.
      - name: Dry-run test-dataset-generation chain
        run: |
          set -euo pipefail
          act pull_request -W .github/workflows/test-dataset-generation.yml -j setup -n
          act workflow_dispatch -W .github/workflows/generate-dataset-shards.yml -n
          act workflow_dispatch -W .github/workflows/validate-dataset-shards.yml -n

      # The historical real-run step that exercised the inline `generate-local`
      # job against a kind cluster via act was retired alongside that job in
      # #1110. The launcher-side workflow chain remains covered by:
      #   * the dry-run + setup-job act invocations above (parse + reusable contract);
      #   * the real GHA skypilot-local matrix cell in test-dataset-generation.yml
      #     (full end-to-end on every PR), which is the same path the dropped
      #     real-run step targeted.
