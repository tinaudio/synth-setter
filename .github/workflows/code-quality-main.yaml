# Same as `code-quality-pr.yaml` but triggered on commit to main branch
# and runs on all files (instead of only the changed ones)

name: Code Quality Main

on:
  push:
    branches: [main]

jobs:
  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # Lint/format/type-check only — same install profile as code-quality-pr.
      - name: Install dev tools (uv sync --frozen, no torch)
        run: uv sync --frozen --only-group dev

      # Restores per-hook env caching that `pre-commit/action@v3` did implicitly;
      # key invalidates whenever a hook pin in the config changes.
      - name: Cache pre-commit hook environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-py3.10-${{ hashFiles('.pre-commit-config.yaml') }}

      # `pre-commit/action@v3` shells out to `python -m pip install pre-commit`
      # against whichever python is first on PATH; with `uv sync` putting
      # `.venv/bin/python` on PATH that python has no pip and the action dies
      # with "No module named pip". Run pre-commit straight from the venv
      # through `uv run` instead — pre-commit is in the dev group.
      - name: Run pre-commits
        env:
          # no-commit-to-branch hook rejects commits on main, but this CI job
          # runs after merge to main, so the hook must be skipped. See 628fa8e.
          SKIP: no-commit-to-branch
        run: uv run pre-commit run --all-files
