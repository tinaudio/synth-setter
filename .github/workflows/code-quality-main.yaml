# Same as `code-quality-pr.yaml` but triggered on commit to main branch
# and runs on all files (instead of only the changed ones)

name: Code Quality Main

on:
  push:
    branches: [main]

jobs:
  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - name: Run pre-commits
        uses: pre-commit/action@v3.0.1
        env:
          # no-commit-to-branch hook rejects commits on main, but this CI job
          # runs after merge to main, so the hook must be skipped. See 628fa8e.
          SKIP: no-commit-to-branch
