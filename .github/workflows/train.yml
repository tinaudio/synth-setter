name: Train

# Manually-dispatched training: one-selector UX (#2196). The experiment is the
# self-contained recipe (dataset pin + scientific knobs); this workflow maps it
# to a launch config that supplies compute and operational flags. Experiments
# needing dedicated compute get their own launch config row in the mapping
# below. See src/synth_setter/configs/launch/ and storage-provenance-spec.md §8.
#
# The runner only dispatches: the launcher runs in the dev-snapshot container
# (mirroring generate-dataset-shards.yaml's runpod row) and detaches once the
# managed-jobs controller accepts the job unless the config sets tail=true.
# WORKER_GIT_REF pins the worker checkout to the dispatched SHA so §12
# github_sha provenance records the commit actually trained.
on:
  workflow_dispatch:
    inputs:
      experiment:
        description: "Hydra experiment to train (e.g. surge/flow_simple_440k); must be self-contained"
        required: true
        type: string
      launch_config:
        description: "Expert override: repo-relative launch config path (empty selects by experiment)"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  train:
    name: Dispatch synth-setter-train via SkyPilot (${{ inputs.experiment }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      IMAGE: tinaudio/synth-setter:dev-snapshot
      EXPERIMENT: ${{ inputs.experiment }}
      LAUNCH_CONFIG_INPUT: ${{ inputs.launch_config }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Hardcoded experiment → launch-config mapping (#2196): experiments with
      # dedicated compute needs get their own row; everything else uses the
      # generic RunPod launch. The optional launch_config input overrides the
      # mapping. Replaced by launcher-composed dispatch in a later rollout PR.
      - name: Resolve launch config
        run: |
          set -euo pipefail
          if [ -n "$LAUNCH_CONFIG_INPUT" ]; then
            LAUNCH_CONFIG="$LAUNCH_CONFIG_INPUT"
          else
            case "$EXPERIMENT" in
              surge/flow_simple_440k)
                LAUNCH_CONFIG=src/synth_setter/configs/launch/train-runpod-flow-simple-440k.yaml
                ;;
              surge/ffn_simple_smoke)
                LAUNCH_CONFIG=src/synth_setter/configs/launch/train-runpod-smoke.yaml
                ;;
              *)
                LAUNCH_CONFIG=src/synth_setter/configs/launch/train-runpod.yaml
                ;;
            esac
          fi
          echo "Resolved launch config: $LAUNCH_CONFIG"
          echo "LAUNCH_CONFIG=$LAUNCH_CONFIG" >> "$GITHUB_ENV"

      # Exports canonical storage env plus the rclone projection for the container
      # env pass-through below; rclone itself runs on the SkyPilot worker, not the runner.
      - name: Set up R2
        uses: ./.github/actions/setup-r2
        with:
          access-key-id: ${{ secrets.RCLONE_CONFIG_R2_ACCESS_KEY_ID }}
          secret-access-key: ${{ secrets.RCLONE_CONFIG_R2_SECRET_ACCESS_KEY }}
          endpoint: ${{ secrets.RCLONE_CONFIG_R2_ENDPOINT }}

      - name: Pull image
        run: docker pull "$IMAGE"

      # python -m (not the console script) so the launcher comes from the
      # mounted fresh checkout via the image's editable install, independent
      # of the entry-point shims baked at image-build time. LAUNCH_CONFIG
      # passes through step env so a stray token cannot break out.
      - name: Dispatch via SkyPilot
        env:
          SKYPILOT_API_SERVER_ENDPOINT: ${{ secrets.SKYPILOT_API_SERVER_ENDPOINT }}
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          WORKER_GIT_REF: ${{ github.sha }}
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${{ github.workspace }}:/home/build/synth-setter" \
            -e SKYPILOT_API_SERVER_ENDPOINT \
            -e RUNPOD_API_KEY \
            -e SYNTH_SETTER_STORAGE_PROVIDER \
            -e SYNTH_SETTER_STORAGE_ACCESS_KEY_ID \
            -e SYNTH_SETTER_STORAGE_SECRET_ACCESS_KEY \
            -e SYNTH_SETTER_STORAGE_ENDPOINT_URL \
            -e RCLONE_CONFIG_R2_TYPE \
            -e RCLONE_CONFIG_R2_PROVIDER \
            -e RCLONE_CONFIG_R2_ACCESS_KEY_ID \
            -e RCLONE_CONFIG_R2_SECRET_ACCESS_KEY \
            -e RCLONE_CONFIG_R2_ENDPOINT \
            -e WANDB_API_KEY \
            -e WORKER_GIT_REF \
            -e EXPERIMENT \
            -e LAUNCH_CONFIG \
            "$IMAGE" \
            bash -c '
              set -euo pipefail
              cd /home/build/synth-setter
              python -m synth_setter.pipeline.skypilot_launch \
                --extra-env EXPERIMENT "$EXPERIMENT" \
                "$LAUNCH_CONFIG"
            ' 2>&1 | tee train-dispatch.log

      - name: Upload dispatch log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: train-dispatch-log
          path: train-dispatch.log
          if-no-files-found: warn
          retention-days: 7
