name: Bake OCI Custom Image

# Provisions a one-shot SkyPilot OCI cluster against a chosen task template,
# lets its `setup:` block run (which bakes the worker image + docker.io into
# the boot volume), then calls `oci compute image create` on the underlying
# OCI instance to produce a reusable custom image. The cluster is torn down
# at the end of the job whether the bake succeeded or not.
#
# Why this exists: today every fresh OCI worker re-runs the apt-install +
# `docker pull tinaudio/synth-setter:<tag>` dance from oci-cpu-template.yaml's
# setup: block (~5–10 min depending on image size). Refs #921 — a baked OCI
# boot image lets the launcher skip that setup and saves ~5–10 min of
# wall-clock per OCI worker bring-up.
#
# How the instance OCID is resolved: SkyPilot tags every OCI instance with
# the freeform tag `ray-cluster-name = <cluster_name_on_cloud>` (see
# `sky.provision.oci.query_utils.OCIQueryHelper.query_instances_by_tags`).
# After `sky.launch` returns we read `handle.cluster_name_on_cloud` from
# `sky.status(...)` and feed it into
# `oci search resource structured-search` — same query shape SkyPilot uses
# internally, so the resolution stays in lockstep with how SkyPilot itself
# finds the instance to terminate.
#
# Triggers: workflow_dispatch (operator-driven; OCI VMs are billable and
# bakes should be intentional) + workflow_call (so test-oci-image-bake.yml
# can exercise this workflow at PR time using `uses:` — workflow_dispatch
# can't dispatch a workflow that isn't on the repo's default branch yet,
# which is exactly the new-workflow-in-PR scenario the test gate covers).
#
# Required secrets:
#   RCLONE_CONFIG_R2_ACCESS_KEY_ID, RCLONE_CONFIG_R2_SECRET_ACCESS_KEY,
#   RCLONE_CONFIG_R2_ENDPOINT                                         — R2 (placeholders in the
#                                                                       template's `envs:` block).
#   R2_ACCOUNT_ID                                                     — required by
#                                                                       `scripts/skypilot/write_provider_creds.sh`
#                                                                       when materializing R2 creds.
#   OCI_USER_OCID, OCI_TENANCY_OCID, OCI_FINGERPRINT, OCI_REGION,
#   OCI_COMPARTMENT_OCID, OCI_API_KEY_PEM                             — OCI (both for SkyPilot
#                                                                       provisioning and the
#                                                                       `oci` CLI image-create call).

on:
  workflow_dispatch:
    inputs:
      source_template:
        description: "SkyPilot task template to provision and bake. Defaults to the production OCI CPU worker template."
        required: false
        default: "src/synth_setter/configs/compute/oci-cpu-template.yaml"
      worker_image_tag:
        description: "Docker tag injected as WORKER_IMAGE into the template's setup. Whatever the template pre-pulls will be baked into the resulting OCI image."
        required: false
        default: "dev-snapshot"
      image_display_name:
        description: "Display name for the resulting OCI custom image. Empty = autogenerated as `synth-setter-boot-<short-sha>-<run_id>`."
        required: false
        default: ""
      cluster_name:
        description: "SkyPilot cluster name. Empty = autogenerated as `synth-setter-img-bake-<run_id>-<run_attempt>`. If overriding, must match SkyPilot's cluster-name regex `[a-zA-Z]([-_.a-zA-Z0-9]*[a-zA-Z0-9])?`."
        required: false
        default: ""
      launch_deadline_seconds:
        description: "Wall-clock cap on the SkyPilot provision + setup poll loop."
        required: false
        default: "1200"
      image_create_timeout_seconds:
        description: "Wall-clock cap (seconds) on `oci compute image create --wait-for-state AVAILABLE`. Default 1800s (Oracle's CLI default is 1200; we bump to leave headroom for the boot-volume snapshot)."
        required: false
        default: "1800"
  workflow_call:
    inputs:
      source_template:
        type: string
        required: false
        default: "src/synth_setter/configs/compute/oci-cpu-template.yaml"
      worker_image_tag:
        type: string
        required: false
        default: "dev-snapshot"
      image_display_name:
        type: string
        required: false
        default: ""
      cluster_name:
        type: string
        required: false
        default: ""
      launch_deadline_seconds:
        type: string
        required: false
        default: "1200"
      image_create_timeout_seconds:
        type: string
        required: false
        default: "1800"
    outputs:
      image_ocid:
        description: "OCID of the OCI custom image produced by this run."
        value: ${{ jobs.bake.outputs.image_ocid }}
      image_display_name:
        description: "Display name of the produced image (caller-supplied or autogenerated)."
        value: ${{ jobs.bake.outputs.image_display_name }}

permissions:
  contents: read

jobs:
  bake:
    name: Bake OCI image
    runs-on: ubuntu-latest
    # Worst-case budget: launch_deadline (20m) + SOFTSTOP wait (20m) +
    # image_create timeout (30m) + checkout/install/teardown overhead (~8m) ≈
    # 78m. 120m leaves headroom in case an operator bumps any of the input
    # timeouts.
    timeout-minutes: 120
    outputs:
      image_ocid: ${{ steps.image.outputs.image_ocid }}
      image_display_name: ${{ steps.image_name.outputs.display_name }}
    env:
      SOURCE_TEMPLATE: ${{ inputs.source_template }}
      WORKER_IMAGE: tinaudio/synth-setter:${{ inputs.worker_image_tag }}
      LAUNCH_DEADLINE_SECONDS: ${{ inputs.launch_deadline_seconds }}
      IMAGE_CREATE_TIMEOUT_SECONDS: ${{ inputs.image_create_timeout_seconds }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # rclone runs inside the worker pod, not on the runner; setup-r2 exports
      # the `RCLONE_CONFIG_R2_*` env both the cred bootstrap and the SkyPilot
      # launch step read (via `write_provider_creds.sh` and `os.environ`,
      # respectively) and forward into the pod through `task.update_envs`.
      - name: Set up R2
        uses: ./.github/actions/setup-r2
        with:
          access-key-id: ${{ secrets.RCLONE_CONFIG_R2_ACCESS_KEY_ID }}
          secret-access-key: ${{ secrets.RCLONE_CONFIG_R2_SECRET_ACCESS_KEY }}
          endpoint: ${{ secrets.RCLONE_CONFIG_R2_ENDPOINT }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      # Both deps pinned for reproducibility — later steps parse `oci` JSON
      # output (`data.items[].identifier`, `data.id`), and an upstream CLI
      # bump could shift those field names without warning.
      - name: Install SkyPilot + OCI CLI
        run: |
          set -euo pipefail
          pip install "skypilot[oci]==0.12.0"
          pip install "oci-cli==3.81.1"

      # Bootstrap ~/.oci/config + ~/.oci/oci_api_key.pem + ~/.sky/config.yaml
      # from repo secrets, same as test-skypilot-debug.yml. Both SkyPilot and
      # the `oci` CLI read ~/.oci/config, so this single step authenticates
      # both halves of the workflow.
      - name: Bootstrap OCI credentials
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
          OCI_API_KEY_PEM: ${{ secrets.OCI_API_KEY_PEM }}
        run: bash scripts/skypilot/write_provider_creds.sh --provider oci

      # Resolve cluster_name: caller-provided wins; empty falls back to a
      # bake-default keyed on run_id+run_attempt. Validate against SkyPilot's
      # cluster-name regex so a typo fails fast instead of after provisioning.
      - id: cluster
        env:
          INPUT_CLUSTER_NAME: ${{ inputs.cluster_name }}
        run: |
          set -euo pipefail
          if [[ -n "$INPUT_CLUSTER_NAME" ]]; then
            CLUSTER_NAME="$INPUT_CLUSTER_NAME"
          else
            CLUSTER_NAME="synth-setter-img-bake-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          fi
          SKY_REGEX='^[a-zA-Z]([-_.a-zA-Z0-9]*[a-zA-Z0-9])?$'
          if ! [[ "$CLUSTER_NAME" =~ $SKY_REGEX ]]; then
            echo "::error::cluster_name '${CLUSTER_NAME}' fails SkyPilot regex ${SKY_REGEX}." >&2
            exit 1
          fi
          echo "name=${CLUSTER_NAME}" >> "${GITHUB_OUTPUT}"
          echo "cluster_name: ${CLUSTER_NAME}"

      - id: image_name
        env:
          INPUT_NAME: ${{ inputs.image_display_name }}
        run: |
          set -euo pipefail
          if [[ -n "$INPUT_NAME" ]]; then
            DISPLAY_NAME="$INPUT_NAME"
          else
            SHA_SHORT="${GITHUB_SHA::7}"
            DISPLAY_NAME="synth-setter-boot-${SHA_SHORT}-${GITHUB_RUN_ID}"
          fi
          echo "display_name=${DISPLAY_NAME}" >> "${GITHUB_OUTPUT}"
          echo "image_display_name: ${DISPLAY_NAME}"

      # Launch with down=False so the source instance survives `sky.launch`'s
      # return and is available for imaging. We tear it down ourselves in the
      # always-run teardown step at the end of the job.
      - name: Launch source instance via SkyPilot
        id: launch
        env:
          CLUSTER_NAME: ${{ steps.cluster.outputs.name }}
          TEMPLATE: ${{ env.SOURCE_TEMPLATE }}
          DEADLINE: ${{ env.LAUNCH_DEADLINE_SECONDS }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, os, pathlib, time
          import sky

          cluster = os.environ["CLUSTER_NAME"]
          template = os.environ["TEMPLATE"]
          deadline_seconds = int(os.environ["DEADLINE"])

          task = sky.Task.from_yaml(template)
          task.workdir = os.getcwd()
          task.update_envs(
              {
                  "RCLONE_CONFIG_R2_TYPE": "s3",
                  "RCLONE_CONFIG_R2_PROVIDER": "Cloudflare",
                  "RCLONE_CONFIG_R2_ACCESS_KEY_ID": os.environ["RCLONE_CONFIG_R2_ACCESS_KEY_ID"],
                  "RCLONE_CONFIG_R2_SECRET_ACCESS_KEY": os.environ["RCLONE_CONFIG_R2_SECRET_ACCESS_KEY"],
                  "RCLONE_CONFIG_R2_ENDPOINT": os.environ["RCLONE_CONFIG_R2_ENDPOINT"],
                  "WORKER_IMAGE": os.environ["WORKER_IMAGE"],
                  "WORKER_SPEC_URI": "r2://intermediate-data/skypilot-image-bake/placeholder.json",
                  "WORKER_GIT_REF": "main",
                  "SYNTH_SETTER_WORKER_RANK": "0",
                  "SYNTH_SETTER_NUM_WORKERS": "1",
              }
          )

          print(f"[bake] launching cluster={cluster} template={template}")
          launch_req = sky.launch(
              task,
              cluster_name=cluster,
              idle_minutes_to_autostop=0,
              down=False,
          )
          job_id, _ = sky.stream_and_get(launch_req)
          print(f"[bake] launch resolved, job_id={job_id}")

          deadline = time.monotonic() + deadline_seconds
          terminal = {
              sky.JobStatus.SUCCEEDED,
              sky.JobStatus.FAILED,
              sky.JobStatus.FAILED_SETUP,
              sky.JobStatus.FAILED_DRIVER,
              sky.JobStatus.CANCELLED,
          }
          final = None
          while time.monotonic() < deadline:
              statuses = sky.stream_and_get(sky.job_status(cluster, [job_id])) or {}
              status = statuses.get(job_id)
              print(f"[bake]   status={status.name if status else 'None'}")
              if status in terminal:
                  final = status
                  break
              time.sleep(10)

          if final is None:
              raise SystemExit(f"[bake] job did not reach a terminal state within {deadline_seconds}s")

          # Fail fast on setup/driver/cancelled — the boot volume is missing the
          # things we want baked. SUCCEEDED is the happy path; FAILED is allowed
          # because it means the task `run:` phase failed but `setup:` (which
          # actually populates the image) completed.
          fatal = {
              sky.JobStatus.FAILED_SETUP,
              sky.JobStatus.FAILED_DRIVER,
              sky.JobStatus.CANCELLED,
          }
          if final in fatal:
              raise SystemExit(
                  f"[bake] refusing to image: SkyPilot job ended {final.name}; "
                  "setup did not complete so the boot volume is not bake-ready"
              )

          records = sky.stream_and_get(sky.status([cluster], refresh=sky.StatusRefreshMode.NONE))
          if not records:
              raise SystemExit(f"[bake] sky.status returned no record for cluster {cluster}")
          name_on_cloud = getattr(records[0], "cluster_name_on_cloud", None)
          if not name_on_cloud:
              raise SystemExit("[bake] sky.status record missing cluster_name_on_cloud")
          print(f"[bake] cluster_name_on_cloud={name_on_cloud}")

          pathlib.Path("/tmp/bake-cluster.json").write_text(
              json.dumps({
                  "cluster_name": cluster,
                  "cluster_name_on_cloud": name_on_cloud,
                  "final_job_status": final.name,
              })
          )
          print(f"[bake] launch complete (final_status={final.name}); proceeding to imaging")
          PY

          NAME_ON_CLOUD="$(python -c 'import json; print(json.load(open("/tmp/bake-cluster.json"))["cluster_name_on_cloud"])')"
          echo "name_on_cloud=${NAME_ON_CLOUD}" >> "${GITHUB_OUTPUT}"

      # Resolve the underlying OCI instance OCID via the same freeform-tag
      # query SkyPilot's own OCI provisioner uses to look up instances. Single
      # source of truth — if SkyPilot's tagging convention ever changes, the
      # internal helper and this CLI call move together (or both break, loudly).
      #
      # Single-node only: this workflow snapshots one boot volume per bake, so
      # the resolution requires exactly one RUNNING instance under the cluster
      # tag. Multi-node templates fail fast here with an explicit error rather
      # than silently picking a node — see #921 follow-up if multi-node bakes
      # become a need.
      - name: Resolve OCI instance OCID
        id: instance
        env:
          NAME_ON_CLOUD: ${{ steps.launch.outputs.name_on_cloud }}
          SOURCE_TEMPLATE: ${{ env.SOURCE_TEMPLATE }}
        run: |
          set -euo pipefail
          QUERY="query instance resources where (freeformTags.key = 'ray-cluster-name' && freeformTags.value = '${NAME_ON_CLOUD}')"
          echo "[bake] search query: ${QUERY}"
          RESULT="$(oci search resource structured-search --query-text "${QUERY}")"
          echo "${RESULT}" | python -m json.tool
          INSTANCE_OCID="$(echo "${RESULT}" | python -c "
          import json, os, sys
          template = os.environ.get('SOURCE_TEMPLATE', '<unknown>')
          data = json.load(sys.stdin).get('data', {}).get('items') or []
          running = [i for i in data if i.get('lifecycle-state') == 'RUNNING']
          if not running:
              print('::error::no RUNNING instance matched ray-cluster-name', file=sys.stderr)
              sys.exit(1)
          if len(running) != 1:
              print(
                  f'::error::expected exactly 1 RUNNING instance for single-node bake, '
                  f'got {len(running)} from template {template!r}; multi-node templates '
                  'are not supported by this workflow',
                  file=sys.stderr,
              )
              sys.exit(1)
          print(running[0]['identifier'])
          ")"
          echo "instance_ocid=${INSTANCE_OCID}" >> "${GITHUB_OUTPUT}"
          echo "instance_ocid: ${INSTANCE_OCID}"

      # Oracle recommends imaging a stopped instance for a clean snapshot
      # (https://docs.oracle.com/en-us/iaas/Content/Compute/Tasks/managingcustomimages.htm).
      # SOFTSTOP issues an ACPI shutdown so the in-VM systemd shuts down
      # cleanly; STOP would be a hard power-off.
      - name: Stop source instance
        env:
          INSTANCE_OCID: ${{ steps.instance.outputs.instance_ocid }}
        run: |
          set -euo pipefail
          oci compute instance action \
            --action SOFTSTOP \
            --instance-id "${INSTANCE_OCID}" \
            --wait-for-state STOPPED \
            --max-wait-seconds 1200

      - name: Create custom image
        id: image
        env:
          INSTANCE_OCID: ${{ steps.instance.outputs.instance_ocid }}
          DISPLAY_NAME: ${{ steps.image_name.outputs.display_name }}
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
          TIMEOUT_SECONDS: ${{ env.IMAGE_CREATE_TIMEOUT_SECONDS }}
        run: |
          set -euo pipefail
          RESULT="$(oci compute image create \
            --compartment-id "${OCI_COMPARTMENT_OCID}" \
            --instance-id "${INSTANCE_OCID}" \
            --display-name "${DISPLAY_NAME}" \
            --freeform-tags "{\"created-by\":\"oci-image-bake.yaml\",\"github-run-id\":\"${GITHUB_RUN_ID}\",\"github-sha\":\"${GITHUB_SHA}\"}" \
            --wait-for-state AVAILABLE \
            --max-wait-seconds "${TIMEOUT_SECONDS}")"
          echo "${RESULT}" | python -m json.tool
          IMAGE_OCID="$(echo "${RESULT}" | python -c 'import json,sys; print(json.load(sys.stdin)["data"]["id"])')"
          echo "image_ocid=${IMAGE_OCID}" >> "${GITHUB_OUTPUT}"
          echo "image_ocid: ${IMAGE_OCID}"

      - name: Write image OCID to job summary + artifact
        env:
          IMAGE_OCID: ${{ steps.image.outputs.image_ocid }}
          DISPLAY_NAME: ${{ steps.image_name.outputs.display_name }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/oci-image-bake
          printf '%s\n' "${IMAGE_OCID}" > /tmp/oci-image-bake/image-ocid.txt
          printf '%s\n' "${DISPLAY_NAME}" > /tmp/oci-image-bake/image-display-name.txt
          {
            echo "## OCI image baked"
            echo ""
            echo "- **Display name:** \`${DISPLAY_NAME}\`"
            echo "- **OCID:** \`${IMAGE_OCID}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload image metadata artifact
        if: always() && steps.image.outputs.image_ocid != ''
        uses: actions/upload-artifact@v4
        with:
          name: oci-image-bake-metadata
          path: /tmp/oci-image-bake/
          retention-days: 30
          if-no-files-found: warn

      # Always tear down — bake or no bake, leaving an OCI VM around costs
      # money. `sky down` queries by freeform tag the same way as the OCID
      # lookup above, so a stopped instance will still be terminated.
      - name: Tear down SkyPilot cluster
        if: always()
        env:
          CLUSTER_NAME: ${{ steps.cluster.outputs.name }}
        run: |
          set -euo pipefail
          if [[ -z "${CLUSTER_NAME}" ]]; then
            echo "[bake] no cluster name resolved; nothing to tear down"
            exit 0
          fi
          python - <<'PY'
          import os
          import sky
          cluster = os.environ["CLUSTER_NAME"]
          print(f"[bake] tearing down cluster={cluster}")
          try:
              sky.stream_and_get(sky.down(cluster))
              print(f"[bake] teardown complete for {cluster}")
          except Exception as e:
              print(f"[bake] teardown raised: {e}")
              raise
          PY
