name: Check Auth

# Verifies that the credentials shipped via repo secrets are still valid for
# every provider config the SkyPilot launcher targets. Run this manually after
# rotating any of the provider tokens (see
# docs/operations/credential-rotation-guide.md) and weekly to catch upstream
# credential expiries before they take down test-dataset-generation.
#
# Per provider the workflow:
#   1. Runs scripts/skypilot_write_provider_creds.sh, which materializes
#      ~/.cloudflare/, ~/.runpod/ or ~/.oci/+~/.sky/ and emits rclone-prefixed
#      R2 env-var lines on stdout. The `local` row writes only the R2 cred
#      files (no compute provider auth — kind needs none).
#   2. Asserts the bootstrap stdout actually emitted all five expected
#      RCLONE_CONFIG_R2_* keys (structural check; rclone fall-back masks a
#      partial drop).
#   3. Forwards those env vars into $GITHUB_ENV so the auth probes below see
#      the same RCLONE_CONFIG_R2_* keys the launcher would have injected into
#      the worker.
#   4. R2 auth probe: `rclone lsd r2:` lists buckets at the account level and
#      is the lightest call that exercises the access key + endpoint together.
#   5. Provider auth probe (runpod / oci only): `sky check <provider>`
#      exercises the SkyPilot adapter against the freshly-written cred files.
#      `local` skips this step — kind has no compute provider to check.
#
# When SKYPILOT_API_SERVER_ENDPOINT is set, the bootstrap is skipped entirely
# (the remote API server holds creds; nothing to validate locally) and the
# job exits success early. Mirrors the gating in test-dataset-generation.yml
# and test-skypilot-debug.yml from #834.
#
# Required secrets:
#   R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_ENDPOINT, R2_ACCOUNT_ID — always.
#   RUNPOD_API_KEY                                                    — runpod row.
#   OCI_USER_OCID, OCI_TENANCY_OCID, OCI_FINGERPRINT, OCI_REGION,
#   OCI_COMPARTMENT_OCID, OCI_API_KEY_PEM                             — oci row.

on:
  workflow_dispatch:
  schedule:
    # Mondays 06:00 UTC — early enough in the week to rotate before a Tuesday
    # smoke dispatch if a credential silently expired over the weekend.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  check-auth:
    name: Check ${{ matrix.provider }} auth
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        provider: [runpod, oci, local]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install skypilot
        run: pip install "skypilot[runpod,oci]==0.12.0"

      - name: Install rclone
        run: sudo apt-get update -qq && sudo apt-get install -y -qq rclone

      # When SKYPILOT_API_SERVER_ENDPOINT is set, the remote API server holds
      # provider creds — there's nothing for the local bootstrap to write and
      # nothing to validate. Mirror #834's gating: emit a notice and exit 0.
      - name: Skip when remote API server is configured
        env:
          SKYPILOT_API_SERVER_ENDPOINT: ${{ secrets.SKYPILOT_API_SERVER_ENDPOINT }}
        run: |
          set -euo pipefail
          if [[ -n "${SKYPILOT_API_SERVER_ENDPOINT:-}" ]]; then
            echo "::notice::SKYPILOT_API_SERVER_ENDPOINT is set; remote API server holds provider creds — skipping local cred check"
            echo "SKIP_CRED_CHECK=1" >> "${GITHUB_ENV}"
          fi

      # The bootstrap script emits RCLONE_CONFIG_R2_* lines on stdout that the
      # launcher merges into the worker env. Capture stdout to a file so we
      # can both forward those keys to $GITHUB_ENV and structurally assert
      # all five expected keys made it through (rclone falls back to defaults
      # if one is missing, so a functional `rclone lsd` probe alone wouldn't
      # catch a silently-dropped key).
      - name: Bootstrap provider credentials
        if: ${{ env.SKIP_CRED_CHECK != '1' }}
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
          OCI_API_KEY_PEM: ${{ secrets.OCI_API_KEY_PEM }}
          PROVIDER: ${{ matrix.provider }}
        run: |
          set -euo pipefail
          rclone_env_file="/tmp/check-auth-rclone-env"
          bash scripts/skypilot_write_provider_creds.sh --provider "${PROVIDER}" \
            > "${rclone_env_file}"
          for key in RCLONE_CONFIG_R2_TYPE RCLONE_CONFIG_R2_PROVIDER \
                     RCLONE_CONFIG_R2_ACCESS_KEY_ID RCLONE_CONFIG_R2_SECRET_ACCESS_KEY \
                     RCLONE_CONFIG_R2_ENDPOINT; do
            grep -Eq "^${key}=." "${rclone_env_file}" \
              || { echo "::error::bootstrap stdout missing ${key}="; exit 1; }
          done
          grep -E '^RCLONE_CONFIG_R2_[A-Z_]+=' "${rclone_env_file}" >> "${GITHUB_ENV}"

      - name: Verify cred files exist with restrictive mode
        if: ${{ env.SKIP_CRED_CHECK != '1' }}
        env:
          PROVIDER: ${{ matrix.provider }}
        run: |
          set -euo pipefail
          check_mode_600() {
            local path="$1"
            test -s "${path}" || { echo "::error::missing or empty: ${path}"; exit 1; }
            local mode
            mode="$(stat -c '%a' "${path}")"
            test "${mode}" = "600" \
              || { echo "::error::${path} mode is ${mode}, expected 600"; exit 1; }
            echo "ok: ${path} (mode ${mode})"
          }
          check_mode_600 "${HOME}/.cloudflare/r2.credentials"
          check_mode_600 "${HOME}/.cloudflare/accountid"
          case "${PROVIDER}" in
            runpod)
              check_mode_600 "${HOME}/.runpod/config.toml"
              ;;
            oci)
              check_mode_600 "${HOME}/.oci/config"
              check_mode_600 "${HOME}/.oci/oci_api_key.pem"
              check_mode_600 "${HOME}/.sky/config.yaml"
              ;;
            local)
              # kind needs no compute provider auth; only R2 files above.
              test ! -e "${HOME}/.runpod/config.toml" \
                || { echo "::error::~/.runpod/config.toml unexpectedly written for --provider local"; exit 1; }
              test ! -d "${HOME}/.oci" \
                || { echo "::error::~/.oci unexpectedly written for --provider local"; exit 1; }
              ;;
          esac

      - name: Verify R2 auth (rclone lsd r2:)
        if: ${{ env.SKIP_CRED_CHECK != '1' }}
        run: |
          rclone lsd r2:

      - name: Verify provider auth (sky check)
        if: ${{ env.SKIP_CRED_CHECK != '1' && matrix.provider != 'local' }}
        env:
          PROVIDER: ${{ matrix.provider }}
        run: |
          sky check "${PROVIDER}"
