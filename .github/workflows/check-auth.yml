name: Check Auth

# Verifies that the credentials shipped via repo secrets are still valid for
# every provider config the SkyPilot launcher targets. Run this manually after
# rotating any of the provider tokens (see
# docs/operations/credential-rotation-guide.md) and weekly to catch upstream
# credential expiries before they take down test-dataset-generation.
#
# Per provider the workflow:
#   1. Runs scripts/skypilot_write_provider_creds.sh, which materializes
#      ~/.cloudflare/, ~/.runpod/ or ~/.oci/+~/.sky/ and emits rclone-prefixed
#      R2 env-var lines on stdout.
#   2. Forwards those env vars into $GITHUB_ENV so the auth probes below see
#      the same RCLONE_CONFIG_R2_* keys the launcher would have injected into
#      the worker.
#   3. R2 auth probe: `rclone lsd r2:` lists buckets at the account level and
#      is the lightest call that exercises the access key + endpoint together.
#   4. Provider auth probe: `sky check <provider>` exercises the SkyPilot
#      adapter against the freshly-written cred files.
#
# Required secrets:
#   R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_ENDPOINT, R2_ACCOUNT_ID — always.
#   RUNPOD_API_KEY                                                    — runpod row.
#   OCI_USER_OCID, OCI_TENANCY_OCID, OCI_FINGERPRINT, OCI_REGION,
#   OCI_COMPARTMENT_OCID, OCI_API_KEY_PEM                             — oci row.

on:
  workflow_dispatch:
  # TEMP: pull_request trigger added to prove the workflow passes on PR #832.
  # Drop this trigger once we have a green run; the steady-state cadence is
  # workflow_dispatch + the weekly cron below.
  pull_request:
    paths:
      - ".github/workflows/check-auth.yml"
      - "scripts/skypilot_write_provider_creds.sh"
  schedule:
    # Mondays 06:00 UTC — early enough in the week to rotate before a Tuesday
    # smoke dispatch if a credential silently expired over the weekend.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  check-auth:
    name: Check ${{ matrix.provider }} auth
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        provider: [runpod, oci]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install skypilot
        run: pip install "skypilot[runpod,oci]==0.12.0"

      - name: Install rclone
        run: sudo apt-get update -qq && sudo apt-get install -y -qq rclone

      # The bootstrap script emits RCLONE_CONFIG_R2_* lines on stdout that the
      # launcher merges into the worker env. Forward them into $GITHUB_ENV so
      # later steps in this job see the same keys.
      - name: Bootstrap provider credentials
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
          OCI_API_KEY_PEM: ${{ secrets.OCI_API_KEY_PEM }}
          PROVIDER: ${{ matrix.provider }}
        run: |
          set -euo pipefail
          rclone_env_file="$(mktemp)"
          bash scripts/skypilot_write_provider_creds.sh --provider "${PROVIDER}" \
            > "${rclone_env_file}"
          grep -E '^RCLONE_CONFIG_R2_[A-Z_]+=' "${rclone_env_file}" >> "${GITHUB_ENV}"

      - name: Verify cred files exist with restrictive mode
        env:
          PROVIDER: ${{ matrix.provider }}
        run: |
          set -euo pipefail
          check_mode_600() {
            local path="$1"
            test -s "${path}" || { echo "::error::missing or empty: ${path}"; exit 1; }
            local mode
            mode="$(stat -c '%a' "${path}")"
            test "${mode}" = "600" \
              || { echo "::error::${path} mode is ${mode}, expected 600"; exit 1; }
            echo "ok: ${path} (mode ${mode})"
          }
          check_mode_600 "${HOME}/.cloudflare/r2.credentials"
          check_mode_600 "${HOME}/.cloudflare/accountid"
          case "${PROVIDER}" in
            runpod)
              check_mode_600 "${HOME}/.runpod/config.toml"
              ;;
            oci)
              check_mode_600 "${HOME}/.oci/config"
              check_mode_600 "${HOME}/.oci/oci_api_key.pem"
              test -s "${HOME}/.sky/config.yaml" \
                || { echo "::error::missing or empty: ${HOME}/.sky/config.yaml"; exit 1; }
              ;;
          esac

      - name: Verify R2 auth (rclone lsd r2:)
        run: |
          rclone lsd r2:

      - name: Verify provider auth (sky check)
        env:
          PROVIDER: ${{ matrix.provider }}
        run: |
          sky check "${PROVIDER}"
