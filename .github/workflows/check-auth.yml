name: Check Auth

# Verifies that the credentials shipped via repo secrets are still valid for
# every provider config the SkyPilot launcher targets. Run this manually after
# rotating any of the provider tokens (see
# docs/operations/credential-rotation-guide.md) and weekly to catch upstream
# credential expiries before they take down test-dataset-generation.
#
# Per provider the workflow:
#   1. Runs scripts/skypilot/write_provider_creds.sh, which materializes
#      ~/.cloudflare/, ~/.runpod/ or ~/.oci/+~/.sky/. The script emits no
#      stdout by design so this workflow can run it without a leak surface.
#   2. Verifies the cred files exist with mode 600.
#   3. R2 auth probe: `rclone lsd r2:` lists buckets at the account level —
#      lightest call that exercises the access key + endpoint together.
#   4. Provider auth probe (runpod / oci only): `sky check <provider>`
#      exercises the SkyPilot adapter against the freshly-written cred files.
#      `local` skips this — kind has no compute provider to check.
#
# When SKYPILOT_API_SERVER_ENDPOINT is set the bootstrap is skipped entirely
# (the remote API server holds creds; nothing to validate locally) and the
# job exits success early.
#
# Required secrets:
#   RCLONE_CONFIG_R2_ACCESS_KEY_ID, RCLONE_CONFIG_R2_SECRET_ACCESS_KEY,
#   RCLONE_CONFIG_R2_ENDPOINT, R2_ACCOUNT_ID                          — always.
#   RUNPOD_API_KEY                                                    — runpod row.
#   OCI_USER_OCID, OCI_TENANCY_OCID, OCI_FINGERPRINT, OCI_REGION,
#   OCI_COMPARTMENT_OCID, OCI_API_KEY_PEM                             — oci row.

on:
  workflow_dispatch:
  schedule:
    # Mondays 06:00 UTC — early enough in the week to rotate before a Tuesday
    # smoke dispatch if a credential silently expired over the weekend.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  check-auth:
    name: Check ${{ matrix.provider }} auth
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        provider: [runpod, oci, local]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install skypilot
        run: pip install "skypilot[runpod,oci]==0.12.0"

      - name: Install rclone
        run: sudo apt-get update -qq && sudo apt-get install -y -qq rclone

      # When SKYPILOT_API_SERVER_ENDPOINT is set, the remote API server holds
      # provider creds — there's nothing for the local bootstrap to write and
      # nothing to validate. Emit a notice and exit 0.
      - name: Skip when remote API server is configured
        env:
          SKYPILOT_API_SERVER_ENDPOINT: ${{ secrets.SKYPILOT_API_SERVER_ENDPOINT }}
        run: |
          set -euo pipefail
          if [[ -n "${SKYPILOT_API_SERVER_ENDPOINT:-}" ]]; then
            echo "::notice::SKYPILOT_API_SERVER_ENDPOINT is set; remote API server holds provider creds — skipping local cred check"
            echo "SKIP_CRED_CHECK=1" >> "${GITHUB_ENV}"
          fi

      - name: Bootstrap provider credentials
        if: ${{ env.SKIP_CRED_CHECK != '1' }}
        env:
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.RCLONE_CONFIG_R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.RCLONE_CONFIG_R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.RCLONE_CONFIG_R2_ENDPOINT }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
          OCI_API_KEY_PEM: ${{ secrets.OCI_API_KEY_PEM }}
          PROVIDER: ${{ matrix.provider }}
        run: |
          set -euo pipefail
          bash scripts/skypilot/write_provider_creds.sh --provider "${PROVIDER}"

      - name: Verify cred files exist with restrictive mode
        if: ${{ env.SKIP_CRED_CHECK != '1' }}
        env:
          PROVIDER: ${{ matrix.provider }}
        run: |
          set -euo pipefail
          check_mode_600() {
            local path="$1"
            test -s "${path}" || { echo "::error::missing or empty: ${path}"; exit 1; }
            local mode
            mode="$(stat -c '%a' "${path}")"
            test "${mode}" = "600" \
              || { echo "::error::${path} mode is ${mode}, expected 600"; exit 1; }
            echo "ok: ${path} (mode ${mode})"
          }
          check_mode_600 "${HOME}/.cloudflare/r2.credentials"
          check_mode_600 "${HOME}/.cloudflare/accountid"
          case "${PROVIDER}" in
            runpod)
              check_mode_600 "${HOME}/.runpod/config.toml"
              ;;
            oci)
              check_mode_600 "${HOME}/.oci/config"
              check_mode_600 "${HOME}/.oci/oci_api_key.pem"
              check_mode_600 "${HOME}/.sky/config.yaml"
              ;;
            local)
              # kind needs no compute provider auth; only the R2 files above.
              test ! -e "${HOME}/.runpod/config.toml" \
                || { echo "::error::~/.runpod/config.toml unexpectedly written for --provider local"; exit 1; }
              test ! -d "${HOME}/.oci" \
                || { echo "::error::~/.oci unexpectedly written for --provider local"; exit 1; }
              ;;
          esac

      - name: Verify R2 auth (rclone lsd r2:)
        if: ${{ env.SKIP_CRED_CHECK != '1' }}
        env:
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.RCLONE_CONFIG_R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.RCLONE_CONFIG_R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.RCLONE_CONFIG_R2_ENDPOINT }}
        run: |
          set -euo pipefail
          export RCLONE_CONFIG_R2_TYPE=s3
          export RCLONE_CONFIG_R2_PROVIDER=Cloudflare
          rclone lsd r2:

      - name: Verify provider auth (sky check)
        if: ${{ env.SKIP_CRED_CHECK != '1' && matrix.provider != 'local' }}
        env:
          PROVIDER: ${{ matrix.provider }}
        run: |
          sky check "${PROVIDER}"
