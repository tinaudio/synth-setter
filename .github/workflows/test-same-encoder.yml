# Real-weights SAME-S encoder e2e lane (marker `same_e2e`): installs the
# optional `same` extra, downloads the public stabilityai/SAME-S checkpoint
# (~433 MB, no credentials) through the HF cache, and runs the encode-contract
# and golden-latents equivalence tests. The weekly cron is the numerical-drift
# canary for future lock or upstream bumps; PR/push triggers are path-scoped to
# the SAME surface so the download does not run on unrelated PRs.
name: SAME Encoder E2E

on:
  workflow_dispatch:
  schedule:
    # Weekly drift canary — Mondays 06:17 UTC.
    - cron: "17 6 * * 1"
  push:
    branches: [main]
    paths:
      - "src/synth_setter/pipeline/data/add_embeddings.py"
      - "src/synth_setter/configs/conditioning/**"
      - "tests/pipeline/data/test_same_encoder_e2e.py"
      - "tests/pipeline/data/generate_same_golden.py"
      - "tests/fixtures/same/**"
      - ".github/workflows/test-same-encoder.yml"
  pull_request:
    paths:
      - "src/synth_setter/pipeline/data/add_embeddings.py"
      - "src/synth_setter/configs/conditioning/**"
      - "tests/pipeline/data/test_same_encoder_e2e.py"
      - "tests/pipeline/data/generate_same_golden.py"
      - "tests/fixtures/same/**"
      - ".github/workflows/test-same-encoder.yml"

concurrency:
  group: same-encoder-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  same_encoder_e2e:
    name: SAME-S encode contract + golden equivalence
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.12.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.28"
          enable-cache: true

      # Frozen sync with CPU torch plus the `same` extra (stable-audio-tools;
      # its stale pins are relaxed via [[tool.uv.dependency-metadata]]).
      - name: Install dependencies (uv sync --frozen, CPU torch + same extra)
        run: uv sync --frozen --extra cpu --extra same --no-default-groups --group dev

      # Persist the SAME-S checkpoint across runs; huggingface_hub reuses its
      # default cache, so a hit skips the ~433 MB download entirely.
      - name: Cache SAME-S weights (HF hub cache)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-same-s-v1

      - name: Run SAME e2e tests (real weights, CPU)
        env:
          PYTEST_SESSION_BUDGET_SECONDS: "1500"
        run: uv run --no-sync pytest -m same_e2e tests/pipeline/data/test_same_encoder_e2e.py -vv -s --cov=src --cov-branch --cov-report=xml

      # The real loader/encode path only executes here, so this lane's report
      # is what covers load_same_audio_encoder in codecov.
      - name: Upload coverage to Codecov
        if: always() && hashFiles('coverage.xml') != ''
        uses: ./.github/actions/upload-coverage
        with:
          flags: same-e2e
          token: ${{ secrets.CODECOV_TOKEN }}
