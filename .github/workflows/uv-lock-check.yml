name: uv lock check

# Verifies `uv.lock` stays in sync with `pyproject.toml` on every platform we
# claim to support. The committed lock is a universal lockfile that encodes
# resolutions for macOS, Linux, and Windows simultaneously; a contributor who
# edits `[project.dependencies]` without re-running `uv lock` would otherwise
# only see the breakage in a downstream `uv sync --frozen` job.
#
# Why a matrix: a lock generated only on macOS can encode a Linux-only
# resolution that was never actually validated. Running `uv lock --check` on
# each OS exercises that platform's branch of the universal resolution.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/uv-lock-check.yml"
  pull_request:
    branches: [main, "release/*", "dev"]
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/uv-lock-check.yml"

permissions:
  contents: read

jobs:
  lock-check:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest"]

    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # `uv lock --check` re-runs the resolver against pyproject.toml and
      # exits non-zero if the result would differ from the committed lock.
      # `--locked` would have been an alternative but is sync-side, not
      # lock-side; this is the canonical "lock is up-to-date" probe.
      - name: Verify lockfile is in sync with pyproject.toml
        run: uv lock --check
