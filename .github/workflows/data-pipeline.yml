name: Data Pipeline

# Validates the dataset generation + upload pipeline.
#
# Jobs:
#
#   unit-tests (all branches)
#     Runs pytest tests/test_run_dataset_pipeline.py without Docker, VST
#     plugins, or R2 credentials. Uses LocalFakeUploader and mocked subprocess.
#
#   docker-smoke-test (push to main only)
#     Builds the dev-live Docker image, then runs the Dockerfile `test` target
#     which: (1) validates Surge XT loads under headless X11, and
#            (2) runs pytest -k "not slow" inside the image.
#     No R2 secrets required.
#
#   docker-smoke-test-generate (PRs to main — intentional failure)
#     TODO: Reimplement with MODE=generate-shards. Currently a stub that
#     blocks PRs to main until the generate-shards smoke test is built.
#
#   docker-smoke-test-train (PRs to main — intentional failure)
#     TODO: Reimplement E2E train smoke test using generate-shards pipeline.
#     Currently a stub that blocks PRs to main until reimplemented.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, "release/*", "dev"]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: unit tests (no Docker, no VST, no R2) — runs on every push/PR
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit tests (pipeline + uploader)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v3
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-torch.txt --extra-index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements-app.txt
          pip install sh

      - name: Run pipeline unit tests
        run: |
          pytest tests/test_run_dataset_pipeline.py -v

  # ---------------------------------------------------------------------------
  # Job 2: Docker smoke test — build image + run Dockerfile test target
  # (VST load + pytest -k "not slow" inside Docker)
  # ---------------------------------------------------------------------------
  docker-smoke-test:
    name: Docker smoke test (image builds, VST loads, pytest passes)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (dev-live target, no R2 secrets)
        env:
          GIT_PAT: ${{ secrets.GIT_PAT }}
          DOCKER_BUILDKIT: "1"
        run: |
          make docker-build-dev-live \
            GIT_REF=${{ github.sha }} \
            GIT_PAT=${{ secrets.GIT_PAT }} \
            DOCKER_BUILD_FLAGS="--load"

      - name: Run Dockerfile test target (VST load + pytest -k "not slow")
        # Equivalent to: docker buildx build --target test ...
        # Builds on top of the dev-live image already in the local cache.
        env:
          GIT_PAT: ${{ secrets.GIT_PAT }}
          DOCKER_BUILDKIT: "1"
        run: |
          DOCKER_BUILDKIT=1 docker buildx build \
            -f docker/ubuntu22_04/Dockerfile \
            --secret id=git_pat,env=GIT_PAT \
            --build-arg IMAGE=dev-live \
            --build-arg BUILD_MODE=prebuilt \
            --build-arg SYNTH_PERMUTATIONS_GIT_REF=${{ github.sha }} \
            --build-arg TARGETARCH=amd64 \
            --target test \
            --load \
            -t tinaudio/perm:test \
            .

  # ---------------------------------------------------------------------------
  # Job 3: generate smoke test — TODO: reimplement with MODE=generate-shards
  # ---------------------------------------------------------------------------
  docker-smoke-test-generate:
    name: "TODO: generate-shards smoke test"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - name: Pipeline incomplete
        run: |
          echo "::error::This CI job needs to be implemented with MODE=generate-shards."
          echo "See scripts/docker_entrypoint.sh for usage."
          exit 1

  # ---------------------------------------------------------------------------
  # Job 4: full E2E train smoke test — TODO: reimplement with generate-shards pipeline
  # ---------------------------------------------------------------------------
  docker-smoke-test-train:
    name: "TODO: E2E train smoke test (generate-shards + train)"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - name: Pipeline incomplete
        run: |
          echo "::error::E2E train smoke test needs to be reimplemented for generate-shards pipeline."
          echo "Previous implementation used MODE=generate which has been removed."
          exit 1
