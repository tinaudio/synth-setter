name: Finalize Dataset

# Reusable workflow that runs `synth-setter-finalize-dataset` against an
# already-generated run prefix on R2. Callers (cron via
# `generate-dataset-shards.yaml`, PR-presubmit via
# `test-dataset-finalization.yml`) pass the canonical R2 URI of the
# generate-stage `input_spec.json` through the `dataset_spec_uri` input.
#
# `synth-setter-finalize-dataset` loads the frozen `DatasetSpec` from that
# URI, derives the same R2 prefix it carries (`data/<task_name>/<run_id>/`),
# downloads the shards, builds the split / stats artifacts, and writes
# `dataset.complete` last (so a re-run against a finalized prefix is a no-op).
# Bare-runner install — no docker, no SkyPilot path. The `provider` input is
# carried so callers can keep their per-provider matrices but the body is
# identical across providers.
#
# Required secrets (callers should `secrets: inherit`):
#   RCLONE_CONFIG_R2_ACCESS_KEY_ID, RCLONE_CONFIG_R2_SECRET_ACCESS_KEY,
#   RCLONE_CONFIG_R2_ENDPOINT — same R2 credentials the generate stage uses.

on:
  workflow_call:
    inputs:
      provider:
        description: "Provider tag for log/artifact naming (skypilot-local, runpod, oci, or pr-presubmit). Body is provider-agnostic."
        required: true
        type: string
      dataset_spec_uri:
        description: "Canonical r2:// URI of the generate-stage `input_spec.json`. The CLI loads the spec from here and derives the same r2.prefix generate used."
        required: true
        type: string
      output_format:
        description: "Dataset output format (`hdf5` or `wds`); informational, drives only artifact naming. The CLI re-reads the format from the loaded `DatasetSpec`."
        required: false
        type: string
        default: ""
      run_id:
        description: "Generate stage's run_id. Informational — drives only the upload-artifact filename so matrix callers avoid name collisions."
        required: true
        type: string
      env_ref:
        description: "Git ref / SHA the runner should check out (typically the PR head SHA)."
        required: true
        type: string
  workflow_dispatch:
    inputs:
      provider:
        description: "Provider tag (informational)"
        required: false
        type: string
        default: pr-presubmit
      dataset_spec_uri:
        description: "r2:// URI of the spec JSON (e.g. `r2://intermediate-data/data/smoke-shard/<run_id>/input_spec.json`)"
        required: true
        type: string
      output_format:
        description: "Dataset output format"
        required: true
        type: choice
        default: hdf5
        options:
          - hdf5
          - wds
      run_id:
        description: "Generate stage's run_id; used only for log/artifact naming"
        required: true
        type: string
      env_ref:
        description: "Git ref / SHA to check out"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  finalize:
    name: Run finalize_dataset (${{ inputs.provider }} / ${{ inputs.output_format }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      HYDRA_FULL_ERROR: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.env_ref != '' && inputs.env_ref || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up R2
        uses: ./.github/actions/setup-r2
        with:
          access-key-id: ${{ secrets.RCLONE_CONFIG_R2_ACCESS_KEY_ID }}
          secret-access-key: ${{ secrets.RCLONE_CONFIG_R2_SECRET_ACCESS_KEY }}
          endpoint: ${{ secrets.RCLONE_CONFIG_R2_ENDPOINT }}
          install-rclone: "true"

      # `pipeline.data.reshard` transitively touches the torch-gated `data/`
      # package — CPU torch is the minimum that resolves all imports.
      - name: Install project deps (uv sync --frozen, CPU torch)
        run: uv sync --frozen --extra cpu --no-default-groups --group dev

      - name: Run synth-setter-finalize-dataset
        env:
          DATASET_SPEC_URI: ${{ inputs.dataset_spec_uri }}
          PROJECT_ROOT: ${{ github.workspace }}
        run: |
          set -euo pipefail
          uv run synth-setter-finalize-dataset \
            "dataset_spec_uri=${DATASET_SPEC_URI}" \
            2>&1 | tee finalize.log

      # `run_id` discriminator — matrix callers invoke this reusable multiple
      # times in one run (e.g., one row per output_format), and upload-artifact
      # v4 fails on name collisions. `output_format` falls back to `na` because
      # `generate-dataset-shards.yaml`'s `finalize:` job does not forward it
      # (finalize re-reads the format from the loaded `DatasetSpec`).
      - name: Upload finalize log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: finalize-log-${{ inputs.provider }}-${{ inputs.output_format || 'na' }}-${{ inputs.run_id }}
          path: finalize.log
          if-no-files-found: warn
          retention-days: 7
