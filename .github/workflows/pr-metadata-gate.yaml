name: PR Linked Issue Check

on:
  pull_request:
    types: [opened, edited, synchronize]
    branches: [main, "release/*", "dev"]

permissions:
  pull-requests: read
  issues: read

jobs:
  check-pr-metadata:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check linked issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"

          echo "::group::Fetching PR metadata"
          PR_BODY=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.body // ""') || {
            echo "::error::Failed to fetch PR body from GitHub API"
            exit 1
          }
          echo "::endgroup::"

          # --- Linked issue check ---
          # Check for currently-linked issues via the timeline API
          # Count "connected" events minus "disconnected" events to get current links
          CONNECTED=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/timeline" \
            --paginate --jq '[.[] | select(.event == "connected")] | length') || {
            echo "::error::Failed to fetch timeline events from GitHub API. Re-run the job if transient."
            exit 1
          }
          DISCONNECTED=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/timeline" \
            --paginate --jq '[.[] | select(.event == "disconnected")] | length') || {
            echo "::error::Failed to fetch timeline events from GitHub API. Re-run the job if transient."
            exit 1
          }

          if ! [[ "$CONNECTED" =~ ^[0-9]+$ ]] || ! [[ "$DISCONNECTED" =~ ^[0-9]+$ ]]; then
            echo "::error::Timeline API returned unexpected non-numeric values (connected=${CONNECTED}, disconnected=${DISCONNECTED})"
            exit 1
          fi
          LINKED_ISSUES=$(( CONNECTED - DISCONNECTED ))

          # Check body for any issue/PR references (#N)
          BODY_REFS=$(echo "$PR_BODY" | grep -coE '#[0-9]+') || {
            rc=$?
            if [ "$rc" -eq 1 ]; then
              BODY_REFS=0  # No matches found — expected case
            else
              echo "::error::grep failed with exit code ${rc} while parsing PR body"
              exit 1
            fi
          }

          if [ "${LINKED_ISSUES}" -le 0 ] && [ "${BODY_REFS}" -eq 0 ]; then
            echo "::error::PR #${PR_NUMBER} has no linked GitHub issue. Add an issue reference (e.g., 'Closes #N', 'Part of #N', or just '#N') to the PR body."
            exit 1
          fi

          echo "✓ Linked issue found"

          # --- Collect linked issue numbers ---
          # Extract unique issue numbers from timeline connected events and PR body refs
          ISSUE_NUMBERS=()

          # From timeline: get issue numbers for currently-connected issues
          TIMELINE_ISSUES=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/timeline" \
            --paginate --jq '[.[] | select(.event == "connected") | .source.issue.number // empty] | unique | .[]') || true
          for num in $TIMELINE_ISSUES; do
            ISSUE_NUMBERS+=("$num")
          done

          # From PR body: extract #N references (exclude the PR's own number)
          BODY_ISSUE_NUMS=$(echo "$PR_BODY" | grep -oE '#[0-9]+' | tr -d '#' | sort -un) || true
          for num in $BODY_ISSUE_NUMS; do
            if [ "$num" != "$PR_NUMBER" ]; then
              ISSUE_NUMBERS+=("$num")
            fi
          done

          # Deduplicate
          ISSUE_NUMBERS=($(printf '%s\n' "${ISSUE_NUMBERS[@]}" | sort -un))

          if [ "${#ISSUE_NUMBERS[@]}" -eq 0 ]; then
            echo "::warning::Could not extract specific issue numbers to validate taxonomy metadata."
            echo "All PR metadata checks passed (linked issue present, taxonomy skipped)."
            exit 0
          fi

          echo "::group::Checking taxonomy metadata on linked issues"

          # Keep in sync with docs/design/github-taxonomy.md §2 and §6
          VALID_TYPES=("Epic" "Phase" "Task" "Bug" "Feature")
          DOMAIN_LABELS=("data-pipeline" "ci-automation" "code-health" "documentation" "evaluation" "storage" "testing" "training")
          FAILURES=""

          for ISSUE_NUM in "${ISSUE_NUMBERS[@]}"; do
            echo "--- Checking issue #${ISSUE_NUM} ---"
            MISSING=""

            # Fetch via REST first — needed to detect PRs before GraphQL call
            ISSUE_JSON=$(gh api "repos/${REPO}/issues/${ISSUE_NUM}" \
              --jq '{labels: [.labels[].name], milestone: .milestone.title, is_pr: has("pull_request")}') || {
              echo "::error::Failed to fetch issue #${ISSUE_NUM} via REST"
              FAILURES="${FAILURES}Issue #${ISSUE_NUM} is missing required taxonomy metadata:\n  - Could not verify (REST API error)\n\n"
              continue
            }

            # Skip pull requests (PRs share the issue number space)
            IS_PR=$(echo "$ISSUE_JSON" | jq -r '.is_pr') || IS_PR="false"
            if [ "$IS_PR" = "true" ]; then
              echo "  (skipping #${ISSUE_NUM} — pull request, not an issue)"
              continue
            fi

            # Check issue type via GraphQL (issue types are only available in GraphQL)
            ISSUE_TYPE=$(gh api graphql -f query='
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  issue(number: $number) {
                    issueType { name }
                  }
                }
              }
            ' -f owner="${REPO%/*}" -f repo="${REPO#*/}" -F number="$ISSUE_NUM" \
              --jq '.data.repository.issue.issueType.name // ""') || {
              echo "::error::Failed to query issue type for #${ISSUE_NUM} via GraphQL"
              FAILURES="${FAILURES}Issue #${ISSUE_NUM} is missing required taxonomy metadata:\n  - Could not verify issue type (GraphQL API error)\n\n"
              continue
            }

            if [ -n "$ISSUE_TYPE" ]; then
              TYPE_VALID=false
              for vt in "${VALID_TYPES[@]}"; do
                if [ "$ISSUE_TYPE" = "$vt" ]; then
                  TYPE_VALID=true
                  break
                fi
              done
              if [ "$TYPE_VALID" = true ]; then
                echo "  ✓ Issue type: ${ISSUE_TYPE}"
              else
                MISSING="${MISSING}  - Issue type '${ISSUE_TYPE}' is not one of: ${VALID_TYPES[*]}\n"
              fi
            else
              MISSING="${MISSING}  - No issue type set (must be one of: ${VALID_TYPES[*]})\n"
            fi

            LABELS=$(echo "$ISSUE_JSON" | jq -r '.labels[]' 2>/dev/null) || LABELS=""
            MILESTONE=$(echo "$ISSUE_JSON" | jq -r '.milestone // ""' 2>/dev/null) || MILESTONE=""

            # Check for at least one domain label
            HAS_DOMAIN=false
            for label in $LABELS; do
              for domain in "${DOMAIN_LABELS[@]}"; do
                if [ "$label" = "$domain" ]; then
                  HAS_DOMAIN=true
                  echo "  ✓ Domain label: ${label}"
                  break 2
                fi
              done
            done
            if [ "$HAS_DOMAIN" = false ]; then
              MISSING="${MISSING}  - No domain label (must have one of: ${DOMAIN_LABELS[*]})\n"
            fi

            # Check milestone
            if [ -n "$MILESTONE" ] && [ "$MILESTONE" != "null" ]; then
              echo "  ✓ Milestone: ${MILESTONE}"
            else
              MISSING="${MISSING}  - No milestone assigned\n"
            fi

            if [ -n "$MISSING" ]; then
              FAILURES="${FAILURES}Issue #${ISSUE_NUM} is missing required taxonomy metadata:\n${MISSING}\n"
            fi
          done

          echo "::endgroup::"

          if [ -n "$FAILURES" ]; then
            echo ""
            echo "========================================="
            echo "TAXONOMY METADATA FAILURES"
            echo "========================================="
            printf '%b' "$FAILURES"
            echo "========================================="
            echo ""
            echo "::error::Linked issues are missing required taxonomy metadata. See above for details."
            exit 1
          fi

          echo "✓ All linked issues have required taxonomy metadata"

      - name: Check epic lineage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"

          # Re-extract linked issue numbers (same logic as above step)
          PR_BODY=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.body // ""') || {
            echo "::error::Failed to fetch PR body; cannot perform epic lineage check."
            exit 1
          }

          ISSUE_NUMBERS=()

          TIMELINE_ISSUES=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/timeline" \
            --paginate --jq '[.[] | select(.event == "connected") | .source.issue.number // empty] | unique | .[]') || true
          for num in $TIMELINE_ISSUES; do
            ISSUE_NUMBERS+=("$num")
          done

          BODY_ISSUE_NUMS=$(echo "$PR_BODY" | grep -oE '#[0-9]+' | tr -d '#' | sort -un) || true
          for num in $BODY_ISSUE_NUMS; do
            if [ "$num" != "$PR_NUMBER" ]; then
              ISSUE_NUMBERS+=("$num")
            fi
          done

          ISSUE_NUMBERS=($(printf '%s\n' "${ISSUE_NUMBERS[@]}" | sort -un))

          if [ "${#ISSUE_NUMBERS[@]}" -eq 0 ]; then
            echo "::error::No issue numbers found — cannot verify epic lineage."
            exit 1
          fi

          LINEAGE_FAILURES=0

          echo "::group::Checking epic lineage for linked issues"

          for ISSUE_NUM in "${ISSUE_NUMBERS[@]}"; do
            echo "--- Checking epic lineage for issue #${ISSUE_NUM} ---"

            # Skip pull requests
            IS_PR=$(gh api "repos/${REPO}/issues/${ISSUE_NUM}" --jq 'has("pull_request")') || IS_PR="false"
            if [ "$IS_PR" = "true" ]; then
              echo "  (skipping #${ISSUE_NUM} — pull request, not an issue)"
              continue
            fi

            # Walk up the parent chain to find an Epic ancestor (up to 4 levels).
            # NOTE: The `parent` field on issues requires the GitHub sub-issues feature
            # (currently in public preview). If the field is unavailable or returns null,
            # we fall back to checking whether the issue itself is an Epic (which
            # inherently has epic traceability). Non-Epic issues without a parent
            # chain are treated as errors and cause this check to fail, since we cannot
            # verify their epic lineage.
            CURRENT=$ISSUE_NUM
            DEPTH=0
            FOUND_EPIC=false
            WALK_FAILED=false

            while [ $DEPTH -lt 4 ]; do
              RESULT=$(gh api graphql -f query='
                query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    issue(number: $number) {
                      issueType { name }
                      parent { number issueType { name } }
                    }
                  }
                }
              ' -f owner="${REPO%/*}" -f repo="${REPO#*/}" -F number="$CURRENT" \
                --jq '.data.repository.issue' 2>/dev/null) || {
                echo "  Could not query parent chain (GraphQL error or parent field unavailable)."
                WALK_FAILED=true
                break
              }

              TYPE=$(echo "$RESULT" | jq -r '.issueType.name // empty' 2>/dev/null) || TYPE=""
              if [ "$TYPE" = "Epic" ]; then
                FOUND_EPIC=true
                break
              fi

              PARENT_NUM=$(echo "$RESULT" | jq -r '.parent.number // empty' 2>/dev/null) || PARENT_NUM=""
              if [ -z "$PARENT_NUM" ] || [ "$PARENT_NUM" = "null" ]; then
                break
              fi
              CURRENT=$PARENT_NUM
              DEPTH=$((DEPTH + 1))
            done

            if [ "$FOUND_EPIC" = "true" ]; then
              echo "  ✓ Issue #${ISSUE_NUM} traces to Epic (via #${CURRENT})"
            elif [ "$WALK_FAILED" = "true" ]; then
              # Fallback: check if the issue type itself is Epic or Phase
              FALLBACK_TYPE=$(gh api graphql -f query='
                query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    issue(number: $number) {
                      issueType { name }
                    }
                  }
                }
              ' -f owner="${REPO%/*}" -f repo="${REPO#*/}" -F number="$ISSUE_NUM" \
                --jq '.data.repository.issue.issueType.name // ""' 2>/dev/null) || FALLBACK_TYPE=""

              if [ "$FALLBACK_TYPE" = "Epic" ]; then
                echo "  ✓ Issue #${ISSUE_NUM} is an Epic (inherent epic traceability)"
              else
                echo "::error::Issue #${ISSUE_NUM} — could not verify epic lineage (parent field may not be available). Ensure it is a sub-issue of the appropriate Phase/Epic."
                LINEAGE_FAILURES=$((LINEAGE_FAILURES + 1))
              fi
            else
              echo "::error::Issue #${ISSUE_NUM} does not trace to any Epic. Add it as a sub-issue of the appropriate Phase/Epic for traceability."
              LINEAGE_FAILURES=$((LINEAGE_FAILURES + 1))
            fi
          done

          echo "::endgroup::"

          if [ "$LINEAGE_FAILURES" -gt 0 ]; then
            echo "✗ ${LINEAGE_FAILURES} issue(s) failed epic lineage check."
            exit 1
          fi

          echo "✓ All linked issues trace to an Epic."
