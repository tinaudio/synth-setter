name: Generate Dataset Shards

# Reusable workflow that owns one provider's generate_dataset invocation.
# Callers fan out across providers (see test-dataset-generation.yml) and pass
# per-provider values via inputs. All providers drive `synth-setter-generate-dataset`
# with a `skypilot_launch.compute_template=...` Hydra override.
#
# Provider-specific behavior:
#   * `skypilot-local` — provisions a kind cluster on the runner via
#     `sky local up`, loads the dev-snapshot image into kind, writes the
#     managed-jobs controller-resource shrink into ~/.sky/config.yaml so the
#     controller pod fits on kind, then invokes against
#     `configs/compute/local-template.yaml`. The launcher detects
#     `cloud: kubernetes` and skips its cred bootstrap. Always tears down
#     kind in `if: always()`.
#   * `runpod` / `oci` — in-container invocation against the matching
#     `configs/compute/*-template.yaml`. The launcher's `_run_cred_bootstrap`
#     writes provider creds inside the container; if SKYPILOT_API_SERVER_ENDPOINT
#     is set, the bootstrap is skipped (the remote API server holds creds).
#
# Required secrets (callers should `secrets: inherit`):
#   RCLONE_CONFIG_R2_ACCESS_KEY_ID, RCLONE_CONFIG_R2_SECRET_ACCESS_KEY,
#   RCLONE_CONFIG_R2_ENDPOINT, R2_ACCOUNT_ID — every provider.
#   RUNPOD_API_KEY — runpod row.
#   OCI_USER_OCID, OCI_TENANCY_OCID, OCI_FINGERPRINT, OCI_REGION,
#     OCI_API_KEY_PEM — oci row.
#   SKYPILOT_API_SERVER_ENDPOINT (optional) — when set, launcher skips local
#     cred bootstrap.
#   WANDB_API_KEY (optional) — forwarded to the worker.

on:
  workflow_call:
    inputs:
      provider:
        description: "skypilot-local, runpod, or oci"
        required: true
        type: string
      dataset_config:
        description: "Hydra experiment name under configs/experiment/ (e.g. `generate_dataset/smoke-shard`)"
        required: true
        type: string
      image_tag:
        description: "Docker image tag (e.g., dev-snapshot, dev-snapshot-<sha>)"
        required: true
        type: string
      cluster_name:
        description: "SkyPilot cluster name. Empty = autogenerated as `synth-setter-manual-<provider>-<run_id>-<run_attempt>`. If overriding, must match SkyPilot's cluster-name regex `[a-zA-Z]([-_.a-zA-Z0-9]*[a-zA-Z0-9])?` (starts with a letter, alphanumeric/period/dash/underscore middle, alphanumeric end)."
        required: false
        type: string
        default: ""
      num_workers:
        description: "Override --num-workers. Empty (default) = use config's num_workers."
        required: false
        type: string
        default: ""
      tail:
        description: "Pass --tail to launcher (stream logs, unconditional teardown). Default false = detached: launcher dispatches and returns immediately. Callers that consume the spec_uri output for downstream validation should pass `tail: true` so the runner blocks until workers finish."
        required: false
        type: boolean
        default: false
      local:
        description: "Pass --local to launcher (force local SDK dispatch, clearing any inherited SKYPILOT_API_SERVER_ENDPOINT). Default false = launcher inherits the SKYPILOT_API_SERVER_ENDPOINT secret if set, else falls through to local SDK."
        required: false
        type: boolean
        default: false
      artifact_name:
        description: "Name of the uploaded run-metadata artifact."
        required: false
        type: string
        default: "run-metadata"
    outputs:
      spec_uri:
        description: "Canonical r2:// URI of the materialized spec (under-prefix `input_spec.json`). Consumed by validate-dataset-shards.yaml."
        value: ${{ jobs.generate.outputs.spec_uri }}
  workflow_dispatch:
    inputs:
      provider:
        description: "Provider to launch on"
        required: true
        type: choice
        default: runpod
        options:
          - skypilot-local
          - runpod
          - oci
      dataset_config:
        description: "Hydra experiment name under configs/experiment/ (e.g. `generate_dataset/smoke-shard`)"
        required: true
        type: string
        default: "generate_dataset/smoke-shard"
      image_tag:
        description: "Docker image tag (e.g., dev-snapshot, dev-snapshot-<sha>)"
        required: false
        type: string
        default: "dev-snapshot"
      cluster_name:
        description: "SkyPilot cluster name. LEAVE EMPTY (recommended for ad-hoc dispatch) — autogenerated as `synth-setter-manual-<provider>-<run_id>-<run_attempt>`. If overriding, must match SkyPilot's cluster-name regex `[a-zA-Z]([-_.a-zA-Z0-9]*[a-zA-Z0-9])?` (starts with a letter, alphanumeric/period/dash/underscore middle, alphanumeric end). Do NOT pass a dataset-config name here."
        required: false
        type: string
        default: ""
      num_workers:
        description: "Override --num-workers. Empty = use the dataset config's num_workers."
        required: false
        type: string
        default: ""
      tail:
        description: "Pass --tail to launcher (stream logs, unconditional teardown). Default false = detached: launcher dispatches and returns immediately so the runner doesn't sit idle for hours streaming logs from a cloud job."
        required: false
        type: boolean
        default: false
      local:
        description: "Force local SDK dispatch (clears any inherited SKYPILOT_API_SERVER_ENDPOINT). Default false = use the SKYPILOT_API_SERVER_ENDPOINT secret if set, else local SDK."
        required: false
        type: boolean
        default: false
      artifact_name:
        description: "Name of the uploaded run-metadata artifact."
        required: false
        type: string
        default: "run-metadata"

permissions:
  contents: read

jobs:
  generate:
    name: Run generate_dataset (${{ inputs.provider }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      spec_uri: ${{ steps.spec_uri.outputs.spec_uri }}
    env:
      IMAGE_TAG: ${{ inputs.image_tag }}
      IMAGE: tinaudio/synth-setter:${{ inputs.image_tag }}
      CONFIG_PATH: ${{ inputs.dataset_config }}
      PROVIDER: ${{ inputs.provider }}
      RUN_METADATA_DIR: /tmp/run-metadata-${{ inputs.provider }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Resolve cluster_name: caller-provided value wins; empty falls back to a
      # manual-default that includes run_id + run_attempt so concurrent manual
      # dispatches don't collide on the launcher's R2 spec key. Validate against
      # SkyPilot's cluster-name regex up-front so an invalid value (e.g. operator
      # typed a dataset-config filename) fails the workflow with a clear message
      # instead of buried `5 of 5 worker(s) failed: ...rc=-1` after fan-out.
      - id: cluster
        env:
          INPUT_CLUSTER_NAME: ${{ inputs.cluster_name }}
        run: |
          set -euo pipefail
          if [[ -n "$INPUT_CLUSTER_NAME" ]]; then
            CLUSTER_NAME="$INPUT_CLUSTER_NAME"
          else
            CLUSTER_NAME="synth-setter-manual-${PROVIDER}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          fi
          SKY_REGEX='^[a-zA-Z]([-_.a-zA-Z0-9]*[a-zA-Z0-9])?$'
          if ! [[ "$CLUSTER_NAME" =~ $SKY_REGEX ]]; then
            echo "::error::cluster_name '${CLUSTER_NAME}' fails SkyPilot regex ${SKY_REGEX}. Cluster names must start with a letter, contain only alphanumerics/dashes/underscores/periods, and end alphanumeric. Leave the dispatch input empty to autogenerate a valid name."
            exit 1
          fi
          echo "name=${CLUSTER_NAME}" >> "${GITHUB_OUTPUT}"
          echo "cluster_name: ${CLUSTER_NAME}"

      # A2 (#1164): pull the worker image in the background so the kind binary
      # install + Python / uv setup can run in parallel. The pull only fills
      # the host Docker cache; nothing downstream of this step reads from it
      # until `kind load docker-image` (skypilot-local row) or
      # `docker run "${IMAGE}"` (runpod / oci row).
      #
      # `wait` doesn't cross GHA steps (each step gets a fresh bash), so the
      # background child writes its exit code to a sentinel file. A later
      # "Wait for image pull" step polls for the file and exits non-zero on
      # a non-zero pull exit, so parallelization can't mask a bad image tag.
      # `nohup` + `disown` detach the child from the step's shell so the
      # step returns immediately. The child inherits `IMAGE`, `PULL_LOG`,
      # and `PULL_EXITCODE` from the step env, which avoids nested quoting.
      - name: Pull image (background)
        env:
          PULL_LOG: ${{ runner.temp }}/docker-pull.log
          PULL_EXITCODE: ${{ runner.temp }}/docker-pull.exitcode
        run: |
          set -euo pipefail
          : > "${PULL_LOG}"
          rm -f "${PULL_EXITCODE}"
          nohup bash -c 'docker pull --quiet "${IMAGE}" >>"${PULL_LOG}" 2>&1; echo "$?" > "${PULL_EXITCODE}"' >/dev/null 2>&1 &
          disown
          echo "Started background docker pull for ${IMAGE}"

      - name: Prepare run-metadata mount
        run: mkdir -p "${RUN_METADATA_DIR}"

      # ----- skypilot-local row: kind setup + launcher
      - name: Install kind (skypilot-local row)
        if: ${{ inputs.provider == 'skypilot-local' }}
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          install_only: true
          version: v0.24.0

      - name: Install kubectl (skypilot-local row)
        if: ${{ inputs.provider == 'skypilot-local' }}
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede # v4.0.1

      - name: Install socat (skypilot-local row)
        if: ${{ inputs.provider == 'skypilot-local' }}
        run: sudo apt-get update -qq && sudo apt-get install -y -qq socat

      - name: Set up Python (skypilot-local row)
        if: ${{ inputs.provider == 'skypilot-local' }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install uv (skypilot-local row)
        if: ${{ inputs.provider == 'skypilot-local' }}
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      # A1 (#1164): cache the launcher venv ($GITHUB_WORKSPACE/.venv-launcher) so a warm hit
      # skips the install entirely. setup-uv's enable-cache caches the wheel
      # *index*; this caches the *resolved/installed* tree. We use an explicit
      # venv (rather than `--system`) because dist-packages on the GHA image is
      # owned by apt and dirty (other tooling installed there); a clean venv
      # gives us a tight, cacheable bag of files.
      #
      # Cache key pins uv.lock + pyproject.toml so any dep change invalidates,
      # plus a literal version pin for skypilot[kubernetes] so updating it
      # below also invalidates. `restore-keys` falls back to the most recent
      # key on partial mismatch — the install step still runs but only needs
      # to update the delta, not rebuild from scratch.
      - name: Restore launcher venv cache (skypilot-local row)
        if: ${{ inputs.provider == 'skypilot-local' }}
        id: launcher_venv_cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.venv-launcher
          key: launcher-uv-${{ runner.os }}-py310-skypilot0.12.0-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: |
            launcher-uv-${{ runner.os }}-py310-skypilot0.12.0-

      # Idempotent: `uv venv` creates the venv if missing; `uv pip install` is
      # a no-op on a cache hit (resolver sees the requested versions already
      # installed). On a cache miss / partial restore, the install reconciles
      # the venv to the requested pin set.
      - name: Install launcher deps (skypilot-local row)
        if: ${{ inputs.provider == 'skypilot-local' }}
        run: |
          set -euo pipefail
          VENV="${GITHUB_WORKSPACE}/.venv-launcher"
          if [[ ! -x "${VENV}/bin/python" ]]; then
            uv venv "${VENV}" --python 3.10
          fi
          uv pip install --python "${VENV}/bin/python" -e . "skypilot[kubernetes]==0.12.0"
          echo "${VENV}/bin" >> "${GITHUB_PATH}"
          sudo apt-get install -y -qq rclone

      - name: sky local up (skypilot-local row)
        if: ${{ inputs.provider == 'skypilot-local' }}
        run: sky local up --no-gpus

      # A2 (#1164): wait for the background `docker pull` to finish, then
      # check the exit code it wrote to the sentinel file. Times out after
      # 10 min so a stuck pull doesn't hang the whole workflow; that's well
      # above the worst observed pull time (~1m for dev-snapshot) but below
      # the step-level timeout-minutes on the launcher step that follows.
      - name: Wait for image pull (skypilot-local row)
        if: ${{ inputs.provider == 'skypilot-local' }}
        timeout-minutes: 10
        env:
          PULL_LOG: ${{ runner.temp }}/docker-pull.log
          PULL_EXITCODE: ${{ runner.temp }}/docker-pull.exitcode
        run: |
          set -euo pipefail
          while [[ ! -f "${PULL_EXITCODE}" ]]; do
            sleep 2
          done
          ec=$(cat "${PULL_EXITCODE}")
          if [[ "${ec}" != "0" ]]; then
            echo "::error::Background docker pull failed (exit=${ec}) for ${IMAGE}"
            cat "${PULL_LOG}" >&2 || true
            exit "${ec}"
          fi
          echo "docker pull completed for ${IMAGE}"

      - name: Load dev-snapshot image into kind (skypilot-local row)
        if: ${{ inputs.provider == 'skypilot-local' }}
        run: kind load docker-image "${IMAGE}" --name skypilot

      # SYNTH_SETTER_CI_MODE=1 activates the launcher's
      # `_ensure_ci_sky_config()` (in src/synth_setter/pipeline/skypilot_launch.py),
      # which writes the managed-jobs controller-resource shrink to
      # ~/.sky/config.yaml so the controller pod fits on a GHA-kind cluster.
      # The workflow-side shrink step moved into the package per PR #1164.
      #
      # `skypilot_launch.local=true` flips the launcher's local-vs-remote dispatch
      # (#841); the skypilot-local caller sets it to clear any inherited
      # SKYPILOT_API_SERVER_ENDPOINT. `skypilot_launch.num_workers=1` overrides
      # the config default because the kind cluster can't host parallel workers
      # (#843). The override array is built conditionally so optional flags
      # don't expand to empty strings.
      #
      # `synth-setter-generate-dataset` writes the canonical spec to
      # `<workspace>/data/<task>/<run>/metadata/input_spec.json` via
      # `write_spec_locally` and uploads that exact file to R2 (single source of
      # truth — both the spec_uri output and downstream validate consume the
      # same run_id). The step output `spec_path` resolves that file so later
      # steps don't have to repeat the glob.
      #
      # 20-min step cap caps a hung launcher so the `if: always()` log-snapshot
      # step still runs. NOTE: step-level timeout sends SIGKILL — `finally`
      # blocks are bypassed; operators may need to `sky jobs cancel` manually.
      # See #876.
      - name: Run synth-setter-generate-dataset against local-template (skypilot-local row)
        id: gen_local
        if: ${{ inputs.provider == 'skypilot-local' }}
        timeout-minutes: 20
        env:
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.RCLONE_CONFIG_R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.RCLONE_CONFIG_R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.RCLONE_CONFIG_R2_ENDPOINT }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          CLUSTER_NAME: ${{ steps.cluster.outputs.name }}
          WORKER_GIT_REF: ${{ github.event.pull_request.head.sha || github.sha }}
          PYTHONPATH: ${{ github.workspace }}
          INPUT_LOCAL: ${{ inputs.local }}
          INPUT_TAIL: ${{ inputs.tail }}
          INPUT_NUM_WORKERS: ${{ inputs.num_workers }}
          SYNTH_SETTER_CI_MODE: "1"
        run: |
          set -euo pipefail
          OVERRIDES=(
            "experiment=$CONFIG_PATH"
            "skypilot_launch.compute_template=configs/compute/local-template.yaml"
            "skypilot_launch.job_name=$CLUSTER_NAME"
            "skypilot_launch.worker_image_tag=$IMAGE_TAG"
          )
          if [[ "$INPUT_LOCAL" == "true" ]]; then
            OVERRIDES+=("skypilot_launch.local=true")
          fi
          if [[ -n "$INPUT_NUM_WORKERS" ]]; then
            OVERRIDES+=("skypilot_launch.num_workers=$INPUT_NUM_WORKERS")
          fi
          if [[ "$INPUT_TAIL" == "true" ]]; then
            OVERRIDES+=("skypilot_launch.tail=true")
          fi
          synth-setter-generate-dataset "${OVERRIDES[@]}" \
            2>&1 | tee "${RUN_METADATA_DIR}/generate.log"
          shopt -s nullglob
          specs=("${GITHUB_WORKSPACE}"/data/*/*/metadata/input_spec.json)
          if [[ "${#specs[@]}" -ne 1 ]]; then
            echo "::error::expected exactly one materialized spec under data/*/*/metadata/, found ${#specs[@]}"
            printf '%s\n' "${specs[@]}"
            exit 1
          fi
          echo "spec_path=${specs[0]}" >> "${GITHUB_OUTPUT}"

      # Capture controller-side state (apiserver + on-pod provision.log) before
      # `sky local down` reaps the kind cluster. See scripts/skypilot/capture-state.sh
      # for what's captured and why. Best-effort — never fails the workflow.
      - name: Capture kind cluster state (skypilot-local row)
        if: ${{ always() && inputs.provider == 'skypilot-local' }}
        run: scripts/skypilot/capture-state.sh

      - name: sky local down (skypilot-local row)
        if: ${{ always() && inputs.provider == 'skypilot-local' }}
        run: sky local down || true

      # Snapshot SkyPilot's two on-disk log roots into the run-metadata dir so
      # the existing `Upload run metadata` step picks them up. Without this,
      # a launcher hang/cancel leaves the operator with only the bare
      # `View logs: sky api logs -l <id>/file_mounts.log` pointer the SDK
      # printed to stdout — the actual log file is destroyed with the runner.
      #   * `~/sky_logs/`                       — CLI invocations (sky local up/down).
      #   * `~/.sky/api_server/clients/<hash>/sky_logs/` — SDK client logs that
      #     `sky api logs -l <id>` resolves to (file_mounts.log, provision.log,
      #     setup.log, etc.). Local API server in 0.12 stores them here.
      # Placed AFTER `sky local down` so local_down.log is captured too.
      - name: Snapshot sky logs (skypilot-local row)
        if: ${{ always() && inputs.provider == 'skypilot-local' }}
        run: |
          set -euo pipefail
          mkdir -p "${RUN_METADATA_DIR}/sky_logs" "${RUN_METADATA_DIR}/sky_api_server_logs"
          cp -r "${HOME}/sky_logs/." "${RUN_METADATA_DIR}/sky_logs/" 2>/dev/null || true
          shopt -s nullglob
          for client_dir in "${HOME}"/.sky/api_server/clients/*/; do
            [[ -d "${client_dir}sky_logs" ]] || continue
            client_hash="$(basename "${client_dir}")"
            mkdir -p "${RUN_METADATA_DIR}/sky_api_server_logs/${client_hash}"
            cp -r "${client_dir}sky_logs/." \
              "${RUN_METADATA_DIR}/sky_api_server_logs/${client_hash}/" 2>/dev/null || true
          done
          echo "=== snapshot sizes ==="
          du -sh "${RUN_METADATA_DIR}/sky_logs" "${RUN_METADATA_DIR}/sky_api_server_logs" 2>/dev/null || true

      # A2 (#1164): mirror of the skypilot-local wait step, gated on the
      # runpod / oci providers so the `docker run` below sees a fully-pulled
      # image.
      - name: Wait for image pull (runpod / oci row)
        if: ${{ inputs.provider == 'runpod' || inputs.provider == 'oci' }}
        timeout-minutes: 10
        env:
          PULL_LOG: ${{ runner.temp }}/docker-pull.log
          PULL_EXITCODE: ${{ runner.temp }}/docker-pull.exitcode
        run: |
          set -euo pipefail
          while [[ ! -f "${PULL_EXITCODE}" ]]; do
            sleep 2
          done
          ec=$(cat "${PULL_EXITCODE}")
          if [[ "${ec}" != "0" ]]; then
            echo "::error::Background docker pull failed (exit=${ec}) for ${IMAGE}"
            cat "${PULL_LOG}" >&2 || true
            exit "${ec}"
          fi
          echo "docker pull completed for ${IMAGE}"

      # ----- runpod / oci row: in-container synth-setter-generate-dataset
      # Optional Hydra overrides are pre-rendered into env-var strings at the
      # outer step (keeping GHA expression evaluation out of the bash
      # block-scalar) and expanded unquoted inside docker so empty values
      # disappear. SKYPILOT_API_SERVER_ENDPOINT (when set) routes the launcher
      # to the remote API server; pass `local: true` to override. The workspace
      # is mounted at /home/build/synth-setter, so the canonical spec the CLI
      # writes inside the container is the same host-side file the outer step
      # resolves as `spec_path`.
      - name: Run synth-setter-generate-dataset (runpod / oci row; in container)
        id: gen_docker
        if: ${{ inputs.provider == 'runpod' || inputs.provider == 'oci' }}
        env:
          SKYPILOT_API_SERVER_ENDPOINT: ${{ secrets.SKYPILOT_API_SERVER_ENDPOINT }}
          TEMPLATE: configs/compute/${{ inputs.provider == 'oci' && 'oci-cpu' || inputs.provider }}-template.yaml
          CLUSTER_NAME: ${{ steps.cluster.outputs.name }}
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_API_KEY_PEM: ${{ secrets.OCI_API_KEY_PEM }}
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.RCLONE_CONFIG_R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.RCLONE_CONFIG_R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.RCLONE_CONFIG_R2_ENDPOINT }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          WORKER_GIT_REF: ${{ github.event.pull_request.head.sha || github.sha }}
          NUM_WORKERS_OVERRIDE: ${{ inputs.num_workers != '' && format('skypilot_launch.num_workers={0}', inputs.num_workers) || '' }}
          TAIL_OVERRIDE: ${{ inputs.tail && 'skypilot_launch.tail=true' || '' }}
          LOCAL_OVERRIDE: ${{ inputs.local && 'skypilot_launch.local=true' || '' }}
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${{ github.workspace }}:/home/build/synth-setter" \
            -v "${RUN_METADATA_DIR}:/run-metadata" \
            -e SKYPILOT_API_SERVER_ENDPOINT \
            -e PROVIDER \
            -e TEMPLATE \
            -e CLUSTER_NAME \
            -e IMAGE_TAG \
            -e RUNPOD_API_KEY \
            -e OCI_USER_OCID \
            -e OCI_TENANCY_OCID \
            -e OCI_FINGERPRINT \
            -e OCI_REGION \
            -e OCI_API_KEY_PEM \
            -e CONFIG_PATH \
            -e WORKER_GIT_REF \
            -e RCLONE_CONFIG_R2_ACCESS_KEY_ID \
            -e RCLONE_CONFIG_R2_SECRET_ACCESS_KEY \
            -e RCLONE_CONFIG_R2_ENDPOINT \
            -e R2_ACCOUNT_ID \
            -e WANDB_API_KEY \
            -e NUM_WORKERS_OVERRIDE \
            -e TAIL_OVERRIDE \
            -e LOCAL_OVERRIDE \
            "${IMAGE}" \
            bash -c '
              set -euo pipefail
              cd /home/build/synth-setter
              git config --global --add safe.directory /home/build/synth-setter
              bash docker/ubuntu22_04/ensure_plugin_symlinks.sh
              synth-setter-generate-dataset \
                "experiment=$CONFIG_PATH" \
                "skypilot_launch.compute_template=$TEMPLATE" \
                "skypilot_launch.job_name=$CLUSTER_NAME" \
                "skypilot_launch.worker_image_tag=$IMAGE_TAG" \
                $LOCAL_OVERRIDE $NUM_WORKERS_OVERRIDE $TAIL_OVERRIDE
            ' \
            2>&1 | tee "${RUN_METADATA_DIR}/generate.log"
          shopt -s nullglob
          specs=("${GITHUB_WORKSPACE}"/data/*/*/metadata/input_spec.json)
          if [[ "${#specs[@]}" -ne 1 ]]; then
            echo "::error::expected exactly one materialized spec under data/*/*/metadata/, found ${#specs[@]}"
            printf '%s\n' "${specs[@]}"
            exit 1
          fi
          echo "spec_path=${specs[0]}" >> "${GITHUB_OUTPUT}"

      # SPEC_PATH is the canonical spec the CLI wrote (via `write_spec_locally`)
      # and uploaded to R2 — same file, same run_id, single source of truth.
      # Exactly one of `gen_local` / `gen_docker` ran (matrix branches are
      # `if:`-gated), so only one of the outputs is non-empty.
      - name: Validate spec exists
        env:
          SPEC_PATH: ${{ steps.gen_local.outputs.spec_path || steps.gen_docker.outputs.spec_path }}
        run: |
          set -euo pipefail
          if [[ -z "${SPEC_PATH}" || ! -f "${SPEC_PATH}" ]]; then
            echo "::error::input_spec.json not found at ${SPEC_PATH:-<unset>}"
            exit 1
          fi
          echo "=== Materialized Spec (${PROVIDER}) ==="
          head -20 "${SPEC_PATH}"

      # The launcher (`src/synth_setter/pipeline/skypilot_launch.py`) emits the
      # canonical spec URI on a stdout sentinel line after resolving it; the
      # tee'd generate.log captures it for both skypilot-local and runpod/oci
      # rows. We grep the marker rather than re-shelling out to the spec-uri
      # console script (which would require a host-side `pip install -e .` for
      # the runpod/oci rows whose workers live inside the container). Marker
      # constant is `_SPEC_URI_STDOUT_SENTINEL` in skypilot_launch.py.
      # `grep || true` keeps a missing marker from exiting the step (grep
      # returns 1 on no-match; with `set -euo pipefail` an unmasked grep
      # failure would skip the explicit empty-check below and surface a
      # confusing pipe-failure instead of the friendly `::error::` message).
      - name: Extract spec_uri from launcher log
        id: spec_uri
        run: |
          set -euo pipefail
          SPEC_URI=$(grep -m1 -oE '::synth-setter-spec-uri::r2://[^[:space:]]+' \
            "${RUN_METADATA_DIR}/generate.log" \
            | sed 's|^::synth-setter-spec-uri::||' || true)
          if [[ -z "${SPEC_URI}" ]]; then
            echo "::error::launcher did not emit a ::synth-setter-spec-uri:: marker; see generate.log"
            exit 1
          fi
          echo "spec_uri=${SPEC_URI}" >> "${GITHUB_OUTPUT}"
          echo "spec_uri: ${SPEC_URI}"

      # Pull the canonical spec into the debug artifact alongside generate.log
      # / sky_logs so operators don't have to chase R2 to inspect the run.
      - name: Upload run metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: |
            /tmp/run-metadata-${{ inputs.provider }}/
            ${{ github.workspace }}/data/*/*/metadata/input_spec.json
          retention-days: 7
          if-no-files-found: warn
