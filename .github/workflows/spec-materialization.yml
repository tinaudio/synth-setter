name: Spec Materialization

on:
  workflow_call:
    inputs:
      image_tag:
        description: "Docker image tag (e.g. dev-snapshot)"
        required: true
        type: string
      experiment:
        description: "Datagen experiment id (e.g. generate_dataset/ci-materialize-test) — composed via Hydra against src/synth_setter/configs/dataset.yaml"
        required: true
        type: string
      artifact_name:
        description: "Name for the uploaded spec artifact"
        required: false
        type: string
        default: "materialized-spec"

jobs:
  materialize-spec:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      # Host-side `Validate spec structure` step below runs
      # `python3 -m synth_setter.pipeline.ci.validate_spec` outside the docker
      # container. `pip install -e .` installs the project + its light base
      # only — pip never installs PEP 735 dependency-groups, so the heavy
      # runtime stays out (see #1139).
      - name: Install synth_setter (light base provides validate_spec deps)
        run: pip install -e .

      # Fail fast if a new top-level import on the validate_spec path needs a dep
      # the light base doesn't carry (it would otherwise surface mid-run).
      - name: Import smoke-guard for validate_spec
        run: python3 -c "from synth_setter.pipeline.ci.validate_spec import main"

      - name: Pull image
        run: docker pull tinaudio/synth-setter:${{ inputs.image_tag }}

      # rclone runs inside the container; the in-runner env only supplies the
      # `RCLONE_CONFIG_R2_*` values the `docker run -e <VAR>` lines forward.
      - name: Set up R2
        uses: ./.github/actions/setup-r2
        with:
          access-key-id: ${{ secrets.RCLONE_CONFIG_R2_ACCESS_KEY_ID }}
          secret-access-key: ${{ secrets.RCLONE_CONFIG_R2_SECRET_ACCESS_KEY }}
          endpoint: ${{ secrets.RCLONE_CONFIG_R2_ENDPOINT }}

      # Mount the PR's code into the container so we test THIS branch's code
      # against the image's environment (Surge XT, Python, pedalboard, etc.).
      # Image has no ENTRYPOINT (#721 dropped it for SkyPilot); CMD defaults
      # to /bin/bash, so `docker run img bash -c '...'` overrides CMD with
      # the bash invocation. EXPERIMENT is forwarded via -e so the inner
      # script references it via $EXPERIMENT instead of splicing a workflow
      # input into the command text.
      - name: Materialize spec in Docker
        env:
          EXPERIMENT: ${{ inputs.experiment }}
        run: |
          mkdir -p /tmp/spec-output
          docker run --rm \
            -v ${{ github.workspace }}:/home/build/synth-setter \
            -v /tmp/spec-output:/spec-output \
            -e RCLONE_CONFIG_R2_TYPE \
            -e RCLONE_CONFIG_R2_PROVIDER \
            -e RCLONE_CONFIG_R2_ACCESS_KEY_ID \
            -e RCLONE_CONFIG_R2_SECRET_ACCESS_KEY \
            -e RCLONE_CONFIG_R2_ENDPOINT \
            -e EXPERIMENT \
            tinaudio/synth-setter:${{ inputs.image_tag }} \
            bash -c '
              set -euo pipefail
              cd /home/build/synth-setter
              # Runner UID != container UID; git refuses to run in untrusted dirs
              git config --global --add safe.directory /home/build/synth-setter
              bash docker/ubuntu22_04/ensure_plugin_symlinks.sh
              # Headless X11 needed because importing pedalboard (via param_specs) requires it
              src/synth_setter/scripts/run-linux-vst-headless.sh \
                python -m synth_setter.pipeline.ci.materialize_spec "$EXPERIMENT" /spec-output
            '

      - name: Validate spec structure
        run: |
          echo "=== Materialized Spec ==="
          cat /tmp/spec-output/input_spec.json
          echo ""
          echo "=== Structural Validation ==="
          python3 -m synth_setter.pipeline.ci.validate_spec /tmp/spec-output/input_spec.json

      - name: Upload spec artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: /tmp/spec-output/input_spec.json
          retention-days: 30
