name: Dataset Generation

# Generates a single VST dataset shard inside Docker. The container
# materializes a DataPipelineSpec, uploads spec to R2, generates the
# shard, and uploads the shard to R2.
#
# Triggers:
# - Manual dispatch: full generation from config
# - Pull request (dataset-related paths): smoke test using ci-smoke-test.yaml

on:
  workflow_dispatch:
    inputs:
      dataset_config:
        description: "Path to dataset config YAML (under configs/dataset/)"
        required: true
        default: "configs/dataset/surge-simple-480k-10k.yaml"
      docker_image_tag:
        description: "Docker image tag (e.g., dev-snapshot, dev-snapshot-<sha>)"
        required: false
        default: "dev-snapshot"
  pull_request:
    paths:
      - "src/data/vst/**"
      - "pipeline/schemas/**"
      - "configs/dataset/**"
      - "scripts/entrypoint_generate_dataset.py"
      - "scripts/docker_entrypoint.sh"
      - ".github/workflows/dataset-generation.yml"
      - "requirements*.txt"

jobs:
  generate-dataset:
    name: Generate VST dataset
    runs-on: ubuntu-latest-4core
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull Docker image
        id: docker
        run: |
          IMAGE="tinaudio/perm:${{ github.event.inputs.docker_image_tag || 'dev-snapshot' }}"
          docker pull "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Generate dataset
        run: |
          set -o pipefail
          METADATA_DIR="/tmp/run-metadata"
          mkdir -p "$METADATA_DIR"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CONFIG="configs/dataset/ci-smoke-test.yaml"
          else
            CONFIG="${{ github.event.inputs.dataset_config }}"
          fi

          docker run --rm \
            -e MODE=generate_dataset \
            -e DATASET_CONFIG="$CONFIG" \
            -v "${METADATA_DIR}:/run-metadata" \
            "${{ steps.docker.outputs.image }}" \
            2>&1 | tee "${METADATA_DIR}/generate.log"

      - name: Validate spec exists
        run: |
          if [ ! -f /tmp/run-metadata/spec.json ]; then
            echo "::error::spec.json not found in /tmp/run-metadata/"
            exit 1
          fi
          echo "Spec:"
          head -20 /tmp/run-metadata/spec.json

      - name: Upload run metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-metadata
          path: /tmp/run-metadata/
          retention-days: 7
          if-no-files-found: warn
