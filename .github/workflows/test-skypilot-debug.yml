name: Test SkyPilot Debug

# Permanent diagnostic matrix for the SkyPilot+RunPod path. Progressive
# canary variants, each adding one piece of the production smoke's complexity.
# Most variants use a standalone inline-Python probe; the `launcher*` and
# `generate-tiny` variants invoke the actual `skypilot_launch_smoke` launcher
# so we can compare its behavior to the inline probe. Read the matrix's
# green/red pattern to identify where the production smoke first breaks.
#
# Layer 1 — orchestration only (no wrapper, no Python, no mount):
#
#   noop             Provision -> submit -> status-poll -> teardown.
#                    PASS = the platform itself is fine; failure here
#                    means the regression is in SkyPilot, RunPod's API,
#                    or the cluster plumbing — not in our code.
#
#   image-pull       Same shape as `noop` but a distinct slot so a
#                    single RunPod transient on `noop` doesn't look
#                    like a regression. `noop` + `image-pull` together
#                    = two independent pod boots per dispatch.
#
# Layer 2 — add ONE production-relevant capability (in isolation):
#
#   spec-mount       Adds SkyPilot file_mounts (production uses this
#                    via `task.update_file_mounts(...)` to ship the
#                    materialized spec). PASS = mount upload during
#                    provisioning works and the worker can read the
#                    mounted file. FAIL = mount upload extends pod-boot
#                    timing past SSH-readiness, OR mounts land in
#                    unexpected paths/permissions on RunPod.
#
#   headless         Headless wrapper around an `echo` (Xvfb +
#                    xsettingsd + openbox + dbus + cleanup trap).
#                    PASS = the 3 wrapper hardening commits in #741
#                    are working. FAIL = something in the wrapper's
#                    child-process lifecycle is again holding the SSH
#                    pipes open past the foreground command's exit
#                    (#735 bug-#1).
#
#   rclone           `rclone copy <small file> r2:...` directly (no
#                    wrapper). Catches `rclone copy` regressions on
#                    RunPod's network — the bug-#2 hang shape from
#                    #735.
#
# Layer 3 — combine two capabilities:
#
#   headless-rclone  Wrapper + rclone. If `headless` and `rclone` both
#                    PASS but this FAILS, the failure is in their
#                    interaction (rclone fds inheriting X-stack pipes,
#                    dbus session seeing unexpected children, etc.).
#
#   pedalboard-load  Wrapper + Python interpreter (`python -c "load
#                    Surge XT"`). Closest to production without rclone
#                    — collectively validates the wrapper hardening
#                    triplet under a long-lived Python interpreter.
#                    Also the canary for #735's bug-#3 (interpreter
#                    shutdown hang).
#
# Layer 4 — invoke the actual production launcher / worker code paths:
#
#   stickiness-probe Same shape as `noop` but with a cluster-name prefix
#                    matching the production smoke (`synth-setter-smoke-*`
#                    vs. matrix's default `synth-setter-debug-*`). Tests
#                    whether RunPod sticky-schedules `synth-setter-smoke-*`
#                    clusters to a specific (possibly bad) pod pool — we
#                    saw the same pod IP across multiple production-smoke
#                    failures while matrix succeeded.
#
#   launcher         Invokes the actual `pipeline.entrypoints.skypilot_launch_smoke`
#                    launcher CLI from the GH-actions runner directly (no
#                    docker), against a minimal template that no-ops on the
#                    worker. PASS = launcher works on RunPod from a bare
#                    Python env; FAIL = launcher has a bug independent of
#                    the dev-snapshot container.
#
#   launcher-in-docker
#                    Same as `launcher` but invoked from inside the
#                    `dev-snapshot` container (matching production-smoke's
#                    shape). If `launcher` PASSes and this FAILs, the
#                    failure is in the docker layer (OpenSSH version,
#                    network namespace, etc.).
#
#   generate-tiny    Invokes the launcher with the production template
#                    (real `generate_dataset.run` in the worker; full
#                    render + rclone upload). The "tiny" qualifier is
#                    aspirational — it's actually a mini production smoke
#                    that exists in the matrix so triage doesn't require
#                    re-dispatching the production workflow separately.
#
# Matrix is RunPod-only by default; OCI debug coverage runs through
# test-dataset-generation.yml's matrixed smoke instead.
#
# Triggers: workflow_dispatch only — RunPod pods are billable. Each
# dispatch spends one pod per matrix variant. Add a `push` trigger only
# temporarily when actively iterating on launcher / wrapper / template
# behavior.
#
# Required secrets:
#   RCLONE_CONFIG_R2_ACCESS_KEY_ID, RCLONE_CONFIG_R2_SECRET_ACCESS_KEY,
#   RCLONE_CONFIG_R2_ENDPOINT                          — Cloudflare R2
#   RUNPOD_API_KEY  — written to ~/.runpod/config.toml by
#                     scripts/skypilot_write_provider_creds.sh so SkyPilot
#                     can provision a pod. Skipped when
#                     SKYPILOT_API_SERVER_ENDPOINT is set (see #785) — the
#                     remote API server holds provider creds and the local
#                     SkyPilot client only needs the endpoint URL.
#
# Optional secrets:
#   SKYPILOT_API_SERVER_ENDPOINT — basic-auth URL to a remote SkyPilot API
#                     server. When set, all sky.* calls dispatch to that
#                     server (which has its own provider creds), so the
#                     local cred bootstrap is skipped.

on:
  workflow_dispatch:
    inputs:
      docker_image_tag:
        description: "Docker image tag (e.g., dev-snapshot, dev-snapshot-<sha>)"
        required: false
        default: "dev-snapshot"
      job_deadline_seconds:
        description: "Wall-clock cap on the launcher's job-status poll loop."
        required: false
        default: "600"

permissions:
  contents: read

env:
  IMAGE_TAG: ${{ inputs.docker_image_tag || 'dev-snapshot' }}
  IMAGE: tinaudio/synth-setter:${{ inputs.docker_image_tag || 'dev-snapshot' }}
  JOB_DEADLINE_SECONDS: ${{ inputs.job_deadline_seconds || '120' }}

jobs:
  debug:
    name: Pure-SkyPilot probe (${{ matrix.variant }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: noop
            mode: inline-sky
            template: configs/compute/runpod-debug-template.yaml
            cluster_prefix: synth-setter-debug
            cluster_suffix: noop
            config: ""
          - variant: image-pull
            mode: inline-sky
            template: configs/compute/runpod-debug-image-pull-template.yaml
            cluster_prefix: synth-setter-debug
            cluster_suffix: image-pull
            config: ""
          - variant: spec-mount
            mode: inline-sky
            template: configs/compute/runpod-debug-spec-mount-template.yaml
            cluster_prefix: synth-setter-debug
            cluster_suffix: spec-mount
            config: ""
          - variant: headless
            mode: inline-sky
            template: configs/compute/runpod-debug-headless-template.yaml
            cluster_prefix: synth-setter-debug
            cluster_suffix: headless
            config: ""
          - variant: rclone
            mode: inline-sky
            template: configs/compute/runpod-debug-rclone-template.yaml
            cluster_prefix: synth-setter-debug
            cluster_suffix: rclone
            config: ""
          - variant: headless-rclone
            mode: inline-sky
            template: configs/compute/runpod-debug-headless-rclone-template.yaml
            cluster_prefix: synth-setter-debug
            cluster_suffix: headless-rclone
            config: ""
          - variant: pedalboard-load
            mode: inline-sky
            template: configs/compute/runpod-debug-pedalboard-template.yaml
            cluster_prefix: synth-setter-debug
            cluster_suffix: pedalboard
            config: ""
          - variant: stickiness-probe
            mode: inline-sky
            template: configs/compute/runpod-debug-template.yaml
            cluster_prefix: synth-setter-smoke
            cluster_suffix: stickiness
            config: ""
          - variant: launcher
            mode: launcher-runner
            template: configs/compute/runpod-debug-launcher-minimal-template.yaml
            cluster_prefix: synth-setter-debug
            cluster_suffix: launcher
            config: configs/dataset/runpod-smoke-shard.yaml
          - variant: launcher-in-docker
            mode: launcher-docker
            template: configs/compute/runpod-debug-launcher-minimal-template.yaml
            cluster_prefix: synth-setter-debug
            cluster_suffix: launcher-docker
            config: configs/dataset/runpod-smoke-shard.yaml
          - variant: generate-tiny
            mode: launcher-runner
            template: configs/compute/runpod-template.yaml
            cluster_prefix: synth-setter-debug
            cluster_suffix: generate-tiny
            config: configs/dataset/runpod-smoke-shard.yaml
          - variant: generate-tiny-in-docker
            mode: launcher-docker
            template: configs/compute/runpod-template.yaml
            cluster_prefix: synth-setter-debug
            cluster_suffix: generate-tiny-docker
            config: configs/dataset/runpod-smoke-shard.yaml

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install skypilot
        run: pip install "skypilot[runpod,oci]==0.12.0"

      - name: Pin image tag in debug template
        env:
          TEMPLATE: ${{ matrix.template }}
        run: |
          sed -i \
            "s|image_id: docker:tinaudio/synth-setter:dev-snapshot|image_id: docker:tinaudio/synth-setter:${IMAGE_TAG}|" \
            "$TEMPLATE"
          grep image_id "$TEMPLATE"

      # Inline-Python probe contract:
      #   - task.workdir = os.getcwd() syncs the GH-actions checkout to the
      #     worker as ~/sky_workdir, so the worker exercises the in-repo
      #     wrapper / templates as authored on the dispatching branch instead
      #     of whatever is baked into the image — wrapper/template iterations
      #     don't require a docker rebuild between dispatches.
      #   - task.update_envs(...) injects R2 creds + a unique R2_DEBUG_PREFIX
      #     for the rclone variants. Other variants ignore the keys; each
      #     template's `envs:` block lists only the ones it actually consumes
      #     (so SkyPilot doesn't error on unset placeholders).
      - name: Run inline SkyPilot probe
        if: matrix.mode == 'inline-sky'
        env:
          SKYPILOT_API_SERVER_ENDPOINT: ${{ secrets.SKYPILOT_API_SERVER_ENDPOINT }}
          PROVIDER: runpod
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.RCLONE_CONFIG_R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.RCLONE_CONFIG_R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.RCLONE_CONFIG_R2_ENDPOINT }}
          R2_BUCKET: intermediate-data
          CLUSTER_NAME: ${{ matrix.cluster_prefix }}-${{ matrix.cluster_suffix }}-${{ github.run_id }}
          DEADLINE: ${{ env.JOB_DEADLINE_SECONDS }}
          TEMPLATE: ${{ matrix.template }}
          VARIANT: ${{ matrix.variant }}
          LOG_PATH: /tmp/debug-pure-sky-${{ matrix.cluster_suffix }}.log
        run: |
          set -euo pipefail
          if [[ -z "${SKYPILOT_API_SERVER_ENDPOINT:-}" ]]; then
            bash scripts/skypilot_write_provider_creds.sh
          else
            echo "SKYPILOT_API_SERVER_ENDPOINT is set; remote API server holds provider creds, skipping local cred bootstrap"
          fi

          python - <<'PY' 2>&1 | tee "$LOG_PATH"
          import os, time
          import sky

          cluster = os.environ["CLUSTER_NAME"]
          deadline_seconds = int(os.environ["DEADLINE"])
          template_path = os.environ["TEMPLATE"]
          variant = os.environ["VARIANT"]

          print(f"[probe] launching cluster={cluster} variant={variant}")
          task = sky.Task.from_yaml(template_path)
          task.workdir = os.getcwd()
          print(f"[probe] workdir set to {task.workdir}")
          task.update_envs(
              {
                  "RCLONE_CONFIG_R2_TYPE": "s3",
                  "RCLONE_CONFIG_R2_PROVIDER": "Cloudflare",
                  "RCLONE_CONFIG_R2_ACCESS_KEY_ID": os.environ["R2_ACCESS_KEY_ID"],
                  "RCLONE_CONFIG_R2_SECRET_ACCESS_KEY": os.environ["R2_SECRET_ACCESS_KEY"],
                  "RCLONE_CONFIG_R2_ENDPOINT": os.environ["R2_ENDPOINT"],
                  "R2_BUCKET": os.environ["R2_BUCKET"],
                  "R2_DEBUG_PREFIX": f"data/skypilot-debug/{cluster}/",
              }
          )
          launch_req = sky.launch(
              task,
              cluster_name=cluster,
              idle_minutes_to_autostop=0,
              down=True,
          )
          job_id, _ = sky.stream_and_get(launch_req)
          print(f"[probe] launch resolved, job_id={job_id}")

          deadline = time.monotonic() + deadline_seconds
          terminal = {
              sky.JobStatus.SUCCEEDED,
              sky.JobStatus.FAILED,
              sky.JobStatus.FAILED_SETUP,
              sky.JobStatus.FAILED_DRIVER,
              sky.JobStatus.CANCELLED,
          }
          final = None
          while time.monotonic() < deadline:
              statuses = sky.stream_and_get(sky.job_status(cluster, [job_id])) or {}
              status = statuses.get(job_id)
              print(f"[probe]   status={status.name if status else 'None'}")
              if status in terminal:
                  final = status
                  break
              time.sleep(5)

          try:
              print(f"[probe] --- worker log ---")
              sky.tail_logs(cluster_name=cluster, job_id=job_id, follow=False)
              print(f"[probe] --- end worker log ---")
          except Exception as e:
              print(f"[probe] tail_logs failed: {e}")

          print(f"[probe] tearing down cluster={cluster}")
          sky.stream_and_get(sky.down(cluster))
          print(f"[probe] done, final_status={final.name if final else 'TIMED_OUT'}")
          if final != sky.JobStatus.SUCCEEDED:
              raise SystemExit(
                  f"probe did not see SUCCEEDED within {deadline_seconds}s "
                  f"(final={final})"
              )
          PY

      # Full requirements-app.txt install (skypilot + python-dotenv + loguru +
      # pedalboard + mido + numpy + pydantic + click + ...). The launcher's
      # import chain (skypilot_launch_smoke -> spec.py -> src.data.vst ->
      # core.py) pulls in the whole runtime, so a targeted install is
      # whack-a-mole — full requirements-app keeps the launcher-runner mode
      # honestly mirroring what a developer would have on their laptop.
      - name: Install launcher deps (launcher-runner mode)
        if: matrix.mode == 'launcher-runner'
        run: pip install -r requirements-app.txt

      # The launcher's `upload_spec_to_r2` shells out to `rclone copyto` to
      # ship the materialized spec to R2 (#749 mitigation). The dev-snapshot
      # image has rclone baked in, but the bare GH-actions runner doesn't —
      # install it for launcher-runner mode only. launcher-docker mode runs
      # the launcher inside the image and skips this.
      - name: Install rclone (launcher-runner mode)
        if: matrix.mode == 'launcher-runner'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq rclone

      # Launcher invokes the cred-bootstrap script itself (capturing stdout
      # via subprocess.run) and bridges RCLONE_CONFIG_R2_* into os.environ
      # from the bare R2_* secrets via _apply_bare_r2_fallback. No manual
      # rclone-prefix exports needed here.
      - name: Run launcher (launcher-runner mode)
        if: matrix.mode == 'launcher-runner'
        env:
          SKYPILOT_API_SERVER_ENDPOINT: ${{ secrets.SKYPILOT_API_SERVER_ENDPOINT }}
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.RCLONE_CONFIG_R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.RCLONE_CONFIG_R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.RCLONE_CONFIG_R2_ENDPOINT }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          PYTHONPATH: ${{ github.workspace }}
          CLUSTER_NAME: ${{ matrix.cluster_prefix }}-${{ matrix.cluster_suffix }}-${{ github.run_id }}
          CONFIG_PATH: ${{ matrix.config }}
          TEMPLATE: ${{ matrix.template }}
          LOG_PATH: /tmp/debug-pure-sky-${{ matrix.cluster_suffix }}.log
        run: |
          set -euo pipefail
          python -m pipeline.entrypoints.skypilot_launch_smoke \
            --config "$CONFIG_PATH" \
            --template "$TEMPLATE" \
            --cluster-name "$CLUSTER_NAME" \
            --tail \
            2>&1 | tee "$LOG_PATH"

      # Same as launcher-runner but inside the dev-snapshot container.
      # The launcher's internal cred-bootstrap is the single source of truth.
      - name: Run launcher (launcher-docker mode)
        if: matrix.mode == 'launcher-docker'
        env:
          SKYPILOT_API_SERVER_ENDPOINT: ${{ secrets.SKYPILOT_API_SERVER_ENDPOINT }}
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.RCLONE_CONFIG_R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.RCLONE_CONFIG_R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.RCLONE_CONFIG_R2_ENDPOINT }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          CLUSTER_NAME: ${{ matrix.cluster_prefix }}-${{ matrix.cluster_suffix }}-${{ github.run_id }}
          CONFIG_PATH: ${{ matrix.config }}
          TEMPLATE: ${{ matrix.template }}
          LOG_PATH: /tmp/debug-pure-sky-${{ matrix.cluster_suffix }}.log
        run: |
          set -euo pipefail
          docker pull "$IMAGE"
          docker run --rm \
            -v "${{ github.workspace }}:/home/build/synth-setter" \
            -e SKYPILOT_API_SERVER_ENDPOINT \
            -e RUNPOD_API_KEY \
            -e CLUSTER_NAME \
            -e CONFIG_PATH \
            -e TEMPLATE \
            -e RCLONE_CONFIG_R2_ACCESS_KEY_ID \
            -e RCLONE_CONFIG_R2_SECRET_ACCESS_KEY \
            -e RCLONE_CONFIG_R2_ENDPOINT \
            -e R2_ACCOUNT_ID \
            -e PYTHONPATH=/home/build/synth-setter \
            "$IMAGE" \
            bash -c '
              set -euo pipefail
              cd /home/build/synth-setter
              git config --global --add safe.directory /home/build/synth-setter
              bash scripts/ensure_plugin_symlinks.sh
              python -m pipeline.entrypoints.skypilot_launch_smoke \
                --config "$CONFIG_PATH" \
                --template "$TEMPLATE" \
                --cluster-name "$CLUSTER_NAME" \
                --tail
            ' \
            2>&1 | tee "$LOG_PATH"

      - name: Upload run metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skypilot-debug-${{ matrix.cluster_suffix }}-metadata
          path: /tmp/debug-pure-sky-${{ matrix.cluster_suffix }}.log
          retention-days: 7
          if-no-files-found: warn
