name: Test SkyPilot Debug

# Three parallel debug variants of test-dataset-generation.yml. Each fans out
# a different "shape" of the launcher → SkyPilot → RunPod path so a green/red
# matrix tells us where the production hang lives:
#
#   debug-image          : run the launcher inside the dev-snapshot Docker
#                          image (mirrors test-dataset-generation exactly,
#                          minus the worker pipeline)
#   debug-launcher-bare  : run the launcher on the bare GHA runner with the
#                          repo's requirements installed via pip
#   debug-pure-sky       : skip the launcher entirely; call sky.launch /
#                          stream_and_get / tail_logs / down inline from a
#                          bare GHA runner
#
# Same `runpod-debug-template.yaml` (run block is `echo "skypilot-debug job
# done"`) for all three; same `--job-deadline-seconds 30` (or its inline
# equivalent) so a stuck cluster surfaces in seconds. Each job uses a unique
# cluster name so the three pods don't collide.
#
# Triggers:
# - Manual dispatch
# - Push to feat/skypilot-runpod-smoke when the launcher / debug template /
#   this workflow changes (auto-iterate; remove the `push` trigger once the
#   launcher is stable on RunPod — every push spends RunPod budget).
#
# Required secrets:
#   R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_ENDPOINT — Cloudflare R2
#   WANDB_API_KEY                                       — Weights & Biases
#   RUNPOD_API_KEY                                      — written to
#                                                         ~/.runpod/config.toml

on:
  workflow_dispatch:
    inputs:
      docker_image_tag:
        description: "Docker image tag (e.g., dev-snapshot, dev-snapshot-<sha>)"
        required: false
        default: "dev-snapshot"
      job_deadline_seconds:
        description: "Wall-clock cap on the launcher's job-status poll loop."
        required: false
        default: "30"
  push:
    branches:
      - feat/skypilot-runpod-smoke
    paths:
      - "pipeline/entrypoints/skypilot_launch_smoke.py"
      - "configs/compute/runpod-debug-template.yaml"
      - ".github/workflows/test-skypilot-debug.yml"

permissions:
  contents: read

env:
  IMAGE_TAG: ${{ inputs.docker_image_tag || 'dev-snapshot' }}
  IMAGE: tinaudio/synth-setter:${{ inputs.docker_image_tag || 'dev-snapshot' }}
  JOB_DEADLINE_SECONDS: ${{ inputs.job_deadline_seconds || '30' }}

jobs:
  # ------------------------------------------------------------------------
  # debug-image: launcher invoked inside the dev-snapshot Docker container.
  # Mirrors test-dataset-generation.yml's launch step exactly, minus the real
  # worker. If this fails but debug-launcher-bare succeeds, the image runtime
  # is the suspect; if both fail, the launcher is.
  # ------------------------------------------------------------------------
  debug-image:
    name: Image-runtime launcher (debug)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Pull image
        run: docker pull "$IMAGE"

      - name: Pin image tag in debug template
        run: |
          sed -i \
            "s|image_id: docker:tinaudio/synth-setter:dev-snapshot|image_id: docker:tinaudio/synth-setter:${IMAGE_TAG}|" \
            configs/compute/runpod-debug-template.yaml
          grep image_id configs/compute/runpod-debug-template.yaml

      - name: Write .env from secrets
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
        run: |
          cat > .env <<EOF
          RCLONE_CONFIG_R2_TYPE=s3
          RCLONE_CONFIG_R2_PROVIDER=Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
          RCLONE_CONFIG_R2_ENDPOINT=${R2_ENDPOINT}
          WANDB_S3_ENDPOINT_URL=${R2_ENDPOINT}
          WANDB_API_KEY=${WANDB_API_KEY}
          EOF
          chmod 600 .env

      - name: Prepare run-metadata mount
        run: mkdir -p /tmp/run-metadata

      - name: Launch SkyPilot debug job (inside container)
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          DEADLINE: ${{ env.JOB_DEADLINE_SECONDS }}
          CLUSTER_NAME: synth-setter-debug-image-${{ github.run_id }}
        run: |
          set -o pipefail
          docker run --rm \
            -v "${{ github.workspace }}:/home/build/synth-setter" \
            -v /tmp/run-metadata:/run-metadata \
            -e RUNPOD_API_KEY \
            -e DEADLINE \
            -e CLUSTER_NAME \
            -e PYTHONPATH=/home/build/synth-setter \
            "$IMAGE" \
            bash -c '
              set -euo pipefail
              cd /home/build/synth-setter
              git config --global --add safe.directory /home/build/synth-setter
              mkdir -p plugins
              ln -sf "/usr/lib/vst3/Surge XT.vst3" "plugins/Surge XT.vst3"
              mkdir -p ~/.runpod
              umask 077
              printf "[default]\napi_key = \"%s\"\n" "$RUNPOD_API_KEY" > ~/.runpod/config.toml
              python -m pipeline.entrypoints.skypilot_launch_smoke \
                --template configs/compute/runpod-debug-template.yaml \
                --cluster-name "$CLUSTER_NAME" \
                --job-deadline-seconds "$DEADLINE" \
                --spec-out /tmp/input_spec.json
            ' \
            2>&1 | tee /tmp/run-metadata/debug-image.log

      - name: Upload run metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skypilot-debug-image-metadata
          path: /tmp/run-metadata/
          retention-days: 7
          if-no-files-found: warn

  # ------------------------------------------------------------------------
  # debug-launcher-bare: same launcher, run on the bare GHA runner with the
  # repo's app requirements installed via pip. Isolates the image from the
  # launcher: if this works but debug-image hangs, the dev-snapshot runtime
  # is at fault; if both work, the bug is somewhere in the production
  # worker (generate_dataset).
  # ------------------------------------------------------------------------
  debug-launcher-bare:
    name: Bare-runner launcher (debug)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install launcher deps
        # We only need what `pipeline.entrypoints.skypilot_launch_smoke` and
        # the modules it transitively imports require to RUN — `materialize_spec`
        # imports src.data.vst.__init__ which loads pedalboard etc. The full
        # requirements-app.txt covers all of these without us second-guessing.
        run: pip install -r requirements-app.txt

      - name: Write .env from secrets
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
        run: |
          cat > .env <<EOF
          RCLONE_CONFIG_R2_TYPE=s3
          RCLONE_CONFIG_R2_PROVIDER=Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
          RCLONE_CONFIG_R2_ENDPOINT=${R2_ENDPOINT}
          WANDB_S3_ENDPOINT_URL=${R2_ENDPOINT}
          WANDB_API_KEY=${WANDB_API_KEY}
          EOF
          chmod 600 .env

      - name: Pin image tag in debug template
        run: |
          sed -i \
            "s|image_id: docker:tinaudio/synth-setter:dev-snapshot|image_id: docker:tinaudio/synth-setter:${IMAGE_TAG}|" \
            configs/compute/runpod-debug-template.yaml
          grep image_id configs/compute/runpod-debug-template.yaml

      - name: Stage empty plugin bundle for materialize_spec's plugin-exists check
        # The launcher's materialize_spec validates that spec.plugin_path
        # resolves to an existing path; the smoke config points at
        # `plugins/Surge XT.vst3`, which only ships inside the dev-snapshot
        # image. extract_renderer_version is NOT called on the launcher
        # path (renderer_version is pinned to SURGE_XT_RENDERER_VERSION),
        # so the bundle's contents don't matter — an empty directory is
        # enough to satisfy the exists check. The no-op debug worker
        # never reads the plugin either.
        run: mkdir -p "plugins/Surge XT.vst3"

      - name: Launch SkyPilot debug job (bare runner)
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          DEADLINE: ${{ env.JOB_DEADLINE_SECONDS }}
          PYTHONPATH: ${{ github.workspace }}
          CLUSTER_NAME: synth-setter-debug-bare-${{ github.run_id }}
        run: |
          set -o pipefail
          mkdir -p ~/.runpod
          umask 077
          printf "[default]\napi_key = \"%s\"\n" "$RUNPOD_API_KEY" > ~/.runpod/config.toml
          python -m pipeline.entrypoints.skypilot_launch_smoke \
            --template configs/compute/runpod-debug-template.yaml \
            --cluster-name "$CLUSTER_NAME" \
            --job-deadline-seconds "$DEADLINE" \
            --spec-out /tmp/input_spec.json \
            2>&1 | tee /tmp/debug-launcher-bare.log

      - name: Upload run metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skypilot-debug-launcher-bare-metadata
          path: |
            /tmp/debug-launcher-bare.log
            /tmp/input_spec.json
          retention-days: 7
          if-no-files-found: warn

  # ------------------------------------------------------------------------
  # debug-pure-sky: bypass the launcher entirely. Inline calls to sky.launch /
  # stream_and_get / tail_logs / down. Two matrix variants:
  #   - noop:     run block is `echo "..."` (no headless wrapper). Baseline.
  #   - headless: run block is `scripts/run-linux-vst-headless.sh echo "..."`.
  #               If this hangs but `noop` succeeds, the headless wrapper's
  #               child-process lifecycle (Xvfb + xsettingsd + openbox + dbus)
  #               is what blocks SkyPilot from registering job completion on
  #               RunPod — i.e., the production worker hang lives there.
  # ------------------------------------------------------------------------
  debug-pure-sky:
    name: Pure-SkyPilot probe (${{ matrix.variant }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: noop
            template: configs/compute/runpod-debug-template.yaml
            cluster_suffix: noop
          - variant: headless
            template: configs/compute/runpod-debug-headless-template.yaml
            cluster_suffix: headless

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install skypilot
        run: pip install "skypilot[runpod]==0.12.0"

      - name: Pin image tag in debug template
        env:
          TEMPLATE: ${{ matrix.template }}
        run: |
          sed -i \
            "s|image_id: docker:tinaudio/synth-setter:dev-snapshot|image_id: docker:tinaudio/synth-setter:${IMAGE_TAG}|" \
            "$TEMPLATE"
          grep image_id "$TEMPLATE"

      - name: Run inline SkyPilot probe
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          CLUSTER_NAME: synth-setter-debug-pure-${{ matrix.cluster_suffix }}-${{ github.run_id }}
          DEADLINE: ${{ env.JOB_DEADLINE_SECONDS }}
          TEMPLATE: ${{ matrix.template }}
          LOG_PATH: /tmp/debug-pure-sky-${{ matrix.cluster_suffix }}.log
        run: |
          set -o pipefail
          mkdir -p ~/.runpod
          umask 077
          printf "[default]\napi_key = \"%s\"\n" "$RUNPOD_API_KEY" > ~/.runpod/config.toml

          python - <<'PY' 2>&1 | tee "$LOG_PATH"
          import os, time
          import sky

          cluster = os.environ["CLUSTER_NAME"]
          deadline_seconds = int(os.environ["DEADLINE"])
          template_path = os.environ["TEMPLATE"]

          print(f"[probe] launching cluster={cluster} template={template_path}")
          task = sky.Task.from_yaml(template_path)
          launch_req = sky.launch(
              task,
              cluster_name=cluster,
              idle_minutes_to_autostop=0,
              down=True,
          )
          job_id, _ = sky.stream_and_get(launch_req)
          print(f"[probe] launch resolved, job_id={job_id}")

          deadline = time.monotonic() + deadline_seconds
          terminal = {
              sky.JobStatus.SUCCEEDED,
              sky.JobStatus.FAILED,
              sky.JobStatus.FAILED_SETUP,
              sky.JobStatus.FAILED_DRIVER,
              sky.JobStatus.CANCELLED,
          }
          final = None
          while time.monotonic() < deadline:
              statuses = sky.stream_and_get(sky.job_status(cluster, [job_id])) or {}
              status = statuses.get(job_id)
              print(f"[probe]   status={status.name if status else 'None'}")
              if status in terminal:
                  final = status
                  break
              time.sleep(5)

          try:
              print(f"[probe] --- worker log ---")
              sky.tail_logs(cluster_name=cluster, job_id=job_id, follow=False)
              print(f"[probe] --- end worker log ---")
          except Exception as e:
              print(f"[probe] tail_logs failed: {e}")

          try:
              q = sky.stream_and_get(sky.queue(cluster))
              print(f"[probe] queue: {q}")
          except Exception as e:
              print(f"[probe] queue failed: {e}")

          print(f"[probe] tearing down cluster={cluster}")
          sky.stream_and_get(sky.down(cluster))
          print(f"[probe] done, final_status={final.name if final else 'TIMED_OUT'}")
          if final != sky.JobStatus.SUCCEEDED:
              raise SystemExit(
                  f"probe did not see SUCCEEDED within {deadline_seconds}s "
                  f"(final={final})"
              )
          PY

      - name: Upload run metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skypilot-debug-pure-sky-${{ matrix.cluster_suffix }}-metadata
          path: /tmp/debug-pure-sky-${{ matrix.cluster_suffix }}.log
          retention-days: 7
          if-no-files-found: warn
