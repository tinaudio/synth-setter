name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

# One review run per PR; a new push supersedes the in-flight review of the stale diff.
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          # --comment alone silently no-ops on clean/low-confidence PRs, so we ask
          # for an explicit summary on every completed run — see #1865.
          prompt: >-
            /code-review:code-review
            ${{ github.repository }}/pull/${{ github.event.pull_request.number }}
            --comment
            (Review this PR even if it is a draft — this repository reviews draft
            PRs; do not skip for draft status. Regardless of the review outcome,
            you MUST finish by posting a summary to this PR with `gh pr comment`:
            list the findings if any, otherwise post an explicit "No issues found"
            acknowledgment so the review is always visible.)
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
