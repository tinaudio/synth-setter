name: Tests (conda)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "src/synth_setter/configs/**"
      - "scripts/**"
      - "environment.yaml"
      - "pyproject.toml"
      - ".github/workflows/test-conda.yml"
  pull_request:
    branches: [main, "release/*", "dev"]
    paths:
      - "src/**"
      - "tests/**"
      - "src/synth_setter/configs/**"
      - "scripts/**"
      - "environment.yaml"
      - "pyproject.toml"
      - ".github/workflows/test-conda.yml"

defaults:
  run:
    # Login shell so the conda env activated by setup-micromamba is on PATH.
    shell: bash -el {0}

jobs:
  run_tests_conda:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up conda env from environment.yaml
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yaml
          environment-name: myenv
          cache-environment: true
          cache-environment-key: env-${{ hashFiles('environment.yaml', 'pyproject.toml') }}
          init-shell: bash

      # conda owns the torch stack (environment.yaml); the rest of the heavy
      # runtime lives in PEP 735 groups since #1139. uv pip installs `--group
      # dev` (⊇ runtime) on top, leaving conda's torch binaries authoritative.
      - name: Install uv
        run: pip install uv

      - name: Install project + runtime/dev groups (conda owns torch)
        run: uv pip install --python "$(which python)" --group dev -e .

      - name: List dependencies
        run: |
          micromamba list
          pip list

      - name: Run pytest
        env:
          HYDRA_FULL_ERROR: "1"
        run: pytest -n auto -m "not slow" -vv -s
