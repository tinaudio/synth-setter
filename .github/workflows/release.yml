# Coexists with release-drafter.yml:
# - Release Drafter maintains a rolling draft release from PR labels (preview)
# - This workflow creates published releases from conventional commits (official)
name: Semantic Release

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release:
    if: "!contains(github.event.head_commit.message, 'chore(release)')"
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APPROVAL_BOT_APP_ID }}
          private-key: ${{ secrets.APPROVAL_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      # build_command runs `uv lock`; the PSR action does not provision uv.
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.12.13"

      - uses: python-semantic-release/python-semantic-release@v9
        with:
          github_token: ${{ steps.app-token.outputs.token }}
