name: BATS Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/**/*.sh"
      - "tests/**/*.bats"
      - ".github/workflows/bats-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "scripts/**/*.sh"
      - "tests/**/*.bats"
      - ".github/workflows/bats-tests.yml"

jobs:
  bats:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Install BATS
        run: sudo apt-get update -qq && sudo apt-get install -y -qq bats
      - name: Run BATS tests
        run: bats --recursive tests/
