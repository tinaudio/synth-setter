name: Test Dataset Generation

# Smoke test for the SkyPilot launcher (pipeline.entrypoints.skypilot_launch_smoke)
# matrixed over RunPod + OCI. See docs/design/skypilot-compute-integration.md.
#
# Required secrets:
#   R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_ENDPOINT — Cloudflare R2.
#   RUNPOD_API_KEY — written to ~/.runpod/config.toml so SkyPilot's RunPod
#     backend can `sky check runpod` (env var alone is insufficient).
#   OCI_USER_OCID, OCI_TENANCY_OCID, OCI_FINGERPRINT, OCI_REGION,
#     OCI_COMPARTMENT_OCID, OCI_API_KEY_PEM — written to ~/.oci/config +
#     ~/.sky/config.yaml so SkyPilot's OCI backend can `sky check oci`.
#     OCI runs continue-on-error while the second target beds in.

on:
  workflow_dispatch:
    inputs:
      dataset_config:
        description: "Path to dataset config YAML (under configs/dataset/)"
        required: true
        default: "configs/dataset/runpod-smoke-shard.yaml"
      docker_image_tag:
        description: "Docker image tag (e.g., dev-snapshot, dev-snapshot-<sha>)"
        required: false
        default: "dev-snapshot"
  pull_request:
    paths:
      - "src/data/vst/**"
      - "pipeline/schemas/**"
      - "configs/dataset/**"
      - "configs/compute/**"
      - "pipeline/entrypoints/**"
      - "scripts/docker_entrypoint.py"
      - "scripts/run-linux-vst-headless.sh"
      - "scripts/skypilot_worker_run.sh"
      - "pipeline/entrypoints/skypilot_launch_smoke.py"
      - ".github/workflows/test-dataset-generation.yml"
      - "requirements*.txt"

permissions:
  contents: read

# Provisions billable RunPod/OCI capacity — coalesce stacked PR pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Matrix over RunPod + OCI. Both cells exercise the same provider-neutral
  # launcher (pipeline.entrypoints.skypilot_launch_smoke) against a
  # provider-specific compute template, with --num-workers 3 so the
  # partitioner is exercised end-to-end. Cluster names include
  # github.run_attempt so re-running a failed job doesn't collide on the
  # launcher's R2 spec key. continue-on-error flows from matrix.continue_on_error
  # so flipping OCI to blocking is a one-line change in three matrices.
  generate:
    name: Launch generate_dataset on ${{ matrix.provider }} via SkyPilot
    runs-on: ubuntu-latest
    # Forks can't read the secrets — fail fast instead of provisioning a
    # pod/VM that errors on missing creds. workflow_dispatch is gated by
    # repo write permissions.
    if: >-
      github.event_name == 'workflow_dispatch'
      || github.event.pull_request.head.repo.full_name == github.repository
    continue-on-error: ${{ matrix.continue_on_error }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - provider: runpod
            template: configs/compute/runpod-template.yaml
            cluster_prefix: synth-setter-smoke-runpod
            pin_search: "image_id: docker:tinaudio/synth-setter:dev-snapshot"
            pin_replace: "image_id: docker:tinaudio/synth-setter:{IMAGE_TAG}"
            oci_image_tag: ""
            continue_on_error: false
          - provider: oci
            template: configs/compute/oci-cpu-template.yaml
            cluster_prefix: synth-setter-smoke-oci
            pin_search: 'WORKER_IMAGE: "tinaudio/synth-setter:dev-snapshot"'
            pin_replace: 'WORKER_IMAGE: "tinaudio/synth-setter:{IMAGE_TAG}"'
            oci_image_tag: skypilot:cpu-ubuntu-2204
            continue_on_error: true
    env:
      DATASET_CONFIG: >-
        ${{
          github.event_name == 'pull_request'
            && 'configs/dataset/runpod-smoke-shard.yaml'
            || (inputs.dataset_config || 'configs/dataset/runpod-smoke-shard.yaml')
        }}
      IMAGE_TAG: ${{ inputs.docker_image_tag || 'dev-snapshot' }}
      IMAGE: tinaudio/synth-setter:${{ inputs.docker_image_tag || 'dev-snapshot' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Pull image
        run: docker pull "${IMAGE}"

      # Pin the per-provider image reference so the worker pulls the same
      # image we just smoke-tested locally above. Bash substitutes the
      # literal `{IMAGE_TAG}` placeholder in matrix.pin_replace at runtime.
      - name: Pin worker image tag in compute template
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          TEMPLATE: ${{ matrix.template }}
          PIN_SEARCH: ${{ matrix.pin_search }}
          PIN_REPLACE: ${{ matrix.pin_replace }}
        run: |
          set -euo pipefail
          REPLACE="${PIN_REPLACE//\{IMAGE_TAG\}/${IMAGE_TAG}}"
          PIN_COUNT=$(grep -cF "${PIN_SEARCH}" "${TEMPLATE}" || true)
          if [[ "${PIN_COUNT}" != "1" ]]; then
            echo "::error::expected exactly 1 occurrence of PIN_SEARCH in ${TEMPLATE}, found ${PIN_COUNT}" >&2
            exit 1
          fi
          sed -i "s|${PIN_SEARCH}|${REPLACE}|" "${TEMPLATE}"
          if ! grep -qF "${REPLACE}" "${TEMPLATE}"; then
            echo "::error::sed pin failed: '${REPLACE}' not found in ${TEMPLATE} after substitution" >&2
            exit 1
          fi
          if [[ "${REPLACE}" != "${PIN_SEARCH}" ]] && grep -qF "${PIN_SEARCH}" "${TEMPLATE}"; then
            echo "::error::sed pin failed: '${PIN_SEARCH}' still present in ${TEMPLATE} after substitution" >&2
            exit 1
          fi
          grep -F "${REPLACE}" "${TEMPLATE}"

      - name: Prepare run-metadata mount
        run: mkdir -p "/tmp/run-metadata-${{ matrix.provider }}"

      # Launcher submits via sky.launch + stream_and_get; job-level
      # timeout-minutes: 60 is the safety bound. Cred-write switches on
      # $PROVIDER inside the heredoc; umask 077 keeps every cred file 600.
      # R2/W&B secrets land in container env via -e flags (no .env on disk).
      # Provider-specific secrets are gated on matrix.provider — the OCI cell
      # never sees RUNPOD_API_KEY and vice versa, so a leaky dependency in
      # one cell can't exfiltrate the other provider's credentials.
      # The runtime `pip install skypilot[oci]` bridge is removed once
      # dev-snapshot rebuilds with [oci] baked in (post-merge follow-up).
      - name: Launch SkyPilot job (inside container; streams logs + blocks until done)
        env:
          PROVIDER: ${{ matrix.provider }}
          TEMPLATE: ${{ matrix.template }}
          CLUSTER_NAME: ${{ matrix.cluster_prefix }}-${{ github.run_id }}-${{ github.run_attempt }}
          OCI_IMAGE_TAG: ${{ matrix.oci_image_tag }}
          RUNPOD_API_KEY: ${{ matrix.provider == 'runpod' && secrets.RUNPOD_API_KEY || '' }}
          OCI_USER_OCID: ${{ matrix.provider == 'oci' && secrets.OCI_USER_OCID || '' }}
          OCI_TENANCY_OCID: ${{ matrix.provider == 'oci' && secrets.OCI_TENANCY_OCID || '' }}
          OCI_FINGERPRINT: ${{ matrix.provider == 'oci' && secrets.OCI_FINGERPRINT || '' }}
          OCI_REGION: ${{ matrix.provider == 'oci' && secrets.OCI_REGION || '' }}
          OCI_COMPARTMENT_OCID: ${{ matrix.provider == 'oci' && secrets.OCI_COMPARTMENT_OCID || '' }}
          OCI_API_KEY_PEM: ${{ matrix.provider == 'oci' && secrets.OCI_API_KEY_PEM || '' }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          CONFIG_PATH: ${{ env.DATASET_CONFIG }}
          WORKER_GIT_REF: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${{ github.workspace }}:/home/build/synth-setter" \
            -v "/tmp/run-metadata-${PROVIDER}:/run-metadata" \
            -e PROVIDER \
            -e TEMPLATE \
            -e CLUSTER_NAME \
            -e OCI_IMAGE_TAG \
            -e RUNPOD_API_KEY \
            -e OCI_USER_OCID \
            -e OCI_TENANCY_OCID \
            -e OCI_FINGERPRINT \
            -e OCI_REGION \
            -e OCI_COMPARTMENT_OCID \
            -e OCI_API_KEY_PEM \
            -e CONFIG_PATH \
            -e WORKER_GIT_REF \
            -e RCLONE_CONFIG_R2_TYPE=s3 \
            -e RCLONE_CONFIG_R2_PROVIDER=Cloudflare \
            -e RCLONE_CONFIG_R2_ACCESS_KEY_ID="${R2_ACCESS_KEY_ID}" \
            -e RCLONE_CONFIG_R2_SECRET_ACCESS_KEY="${R2_SECRET_ACCESS_KEY}" \
            -e RCLONE_CONFIG_R2_ENDPOINT="${R2_ENDPOINT}" \
            -e WANDB_API_KEY="${WANDB_API_KEY}" \
            -e PYTHONPATH=/home/build/synth-setter \
            "${IMAGE}" \
            bash -c '
              set -euo pipefail
              cd /home/build/synth-setter
              git config --global --add safe.directory /home/build/synth-setter
              mkdir -p plugins
              ln -sf "/usr/lib/vst3/Surge XT.vst3" "plugins/Surge XT.vst3"
              umask 077
              case "$PROVIDER" in
                runpod)
                  mkdir -p "$HOME/.runpod"
                  printf "[default]\napi_key = \"%s\"\n" "$RUNPOD_API_KEY" > "$HOME/.runpod/config.toml"
                  ;;
                oci)
                  mkdir -p "$HOME/.oci" "$HOME/.sky"
                  printf "%s\n" "$OCI_API_KEY_PEM" > "$HOME/.oci/oci_api_key.pem"
                  chmod 600 "$HOME/.oci/oci_api_key.pem"
                  printf "[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s/.oci/oci_api_key.pem\n" \
                    "$OCI_USER_OCID" "$OCI_FINGERPRINT" "$OCI_TENANCY_OCID" "$OCI_REGION" "$HOME" \
                    > "$HOME/.oci/config"
                  chmod 600 "$HOME/.oci/config"
                  printf "oci:\n  default:\n    compartment_ocid: %s\n    image_tag_general: %s\n" \
                    "$OCI_COMPARTMENT_OCID" "$OCI_IMAGE_TAG" \
                    > "$HOME/.sky/config.yaml"
                  grep -Eq "^region=.+" "$HOME/.oci/config" || { echo "::error::OCI_REGION secret is empty" >&2; exit 1; }
                  grep -Eq "compartment_ocid: .+" "$HOME/.sky/config.yaml" || { echo "::error::OCI_COMPARTMENT_OCID secret is empty" >&2; exit 1; }
                  if ! python -c "import oci" 2>/dev/null; then
                    echo "[oci-bridge] dev-snapshot lacks oci sdk; installing skypilot[oci] at runtime"
                    pip install --quiet "skypilot[oci]==0.12.0" || { echo "::error::oci bridge install failed" >&2; exit 1; }
                  fi
                  sky check oci
                  ;;
                *)
                  echo "ERROR: unknown PROVIDER=$PROVIDER" >&2
                  exit 1
                  ;;
              esac
              python -m pipeline.entrypoints.skypilot_launch_smoke \
                --config "$CONFIG_PATH" \
                --template "$TEMPLATE" \
                --cluster-name "$CLUSTER_NAME" \
                --num-workers 3 \
                --spec-out /tmp/input_spec.json
              cp /tmp/input_spec.json /run-metadata/input_spec.json
              chmod 0644 /run-metadata/input_spec.json
            ' \
            2>&1 | tee "/tmp/run-metadata-${PROVIDER}/generate.log"

      - name: Validate spec exists
        run: |
          set -euo pipefail
          SPEC_PATH="/tmp/run-metadata-${{ matrix.provider }}/input_spec.json"
          if [[ ! -f "${SPEC_PATH}" ]]; then
            echo "::error::input_spec.json not found at ${SPEC_PATH}"
            exit 1
          fi
          echo "=== Materialized Spec (${{ matrix.provider }}) ==="
          head -20 "${SPEC_PATH}"

      - name: Upload run metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-run-metadata-${{ matrix.provider }}
          path: /tmp/run-metadata-${{ matrix.provider }}/
          retention-days: 7
          if-no-files-found: warn

  # validate_spec is provider-neutral; per-cell variation is the artifact
  # name. `if: !cancelled()` decouples each provider's validate cell from
  # the OTHER provider's generate outcome — RunPod transients won't skip
  # OCI validation. continue-on-error flows from matrix include for
  # symmetry with `generate`.
  validate-spec:
    name: Validate ${{ matrix.provider }} spec structure
    needs: generate
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: ${{ matrix.continue_on_error }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - provider: runpod
            continue_on_error: false
          - provider: oci
            continue_on_error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download run metadata artifact
        uses: actions/download-artifact@v4
        with:
          name: test-run-metadata-${{ matrix.provider }}

      - name: Validate spec structure
        run: python3 -m pipeline.ci.validate_spec input_spec.json

  # validate_shard.py is provider-neutral; per-cell variation is the
  # artifact name. See validate-spec for `if: !cancelled()` rationale.
  validate-shard:
    name: Validate ${{ matrix.provider }} shards
    needs: generate
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: ${{ matrix.continue_on_error }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - provider: runpod
            continue_on_error: false
          - provider: oci
            continue_on_error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download run metadata artifact
        uses: actions/download-artifact@v4
        with:
          name: test-run-metadata-${{ matrix.provider }}

      - name: Install PyYAML for config parsing
        run: pip install pyyaml

      # R2 bucket from configs/image/dev-snapshot.yaml; R2 prefix + shard
      # filenames from the materialized spec artifact. Every shard in
      # spec.shards must exist in R2 — partitioning bugs surface as
      # missing-shard rclone failures.
      - name: Download every shard from R2 and validate
        env:
          IMAGE: tinaudio/synth-setter:${{ inputs.docker_image_tag || 'dev-snapshot' }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          set -euo pipefail
          R2_BUCKET=
          R2_BUCKET=$(python3 -c "import yaml; print(yaml.safe_load(open('configs/image/dev-snapshot.yaml'))['r2_bucket'])")
          R2_PREFIX=
          R2_PREFIX=$(python3 -c "import json; print(json.load(open('input_spec.json'))['r2_prefix'])")
          mapfile -t SHARD_FILES < <(python3 -c "import json; [print(s['filename']) for s in json.load(open('input_spec.json'))['shards']]")

          echo "R2 bucket: ${R2_BUCKET}"
          echo "R2 prefix: ${R2_PREFIX}"
          echo "Shards to validate: ${SHARD_FILES[*]}"

          mkdir -p /tmp/shard-download
          docker pull "${IMAGE}"

          for SHARD_FILE in "${SHARD_FILES[@]}"; do
            echo "::group::Download and validate ${SHARD_FILE}"
            docker run --rm \
              -e RCLONE_CONFIG_R2_TYPE=s3 \
              -e RCLONE_CONFIG_R2_PROVIDER=Cloudflare \
              -e RCLONE_CONFIG_R2_ACCESS_KEY_ID="${R2_ACCESS_KEY_ID}" \
              -e RCLONE_CONFIG_R2_SECRET_ACCESS_KEY="${R2_SECRET_ACCESS_KEY}" \
              -e RCLONE_CONFIG_R2_ENDPOINT="${R2_ENDPOINT}" \
              -e PYTHONPATH=/home/build/synth-setter \
              -v /tmp/shard-download:/download \
              "${IMAGE}" \
              rclone copy --checksum \
                "r2:${R2_BUCKET}/${R2_PREFIX}${SHARD_FILE}" \
                /download/

            docker run --rm \
              -v "${{ github.workspace }}:/home/build/synth-setter:ro" \
              -v /tmp/shard-download:/download:ro \
              -v "$(pwd)/input_spec.json:/spec/input_spec.json:ro" \
              -e PYTHONPATH=/home/build/synth-setter \
              "${IMAGE}" \
              python3 -m pipeline.ci.validate_shard \
                /spec/input_spec.json \
                "/download/${SHARD_FILE}"
            echo "::endgroup::"
          done

          echo "All ${#SHARD_FILES[@]} shards validated"
          ls -la /tmp/shard-download/
