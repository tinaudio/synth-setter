name: Test Dataset Generation

# Smoke test for the data-pipeline. Three execution modes share the same
# matrix shape and the same `validate-spec` / `validate-shard` downstream:
#
#   * `local`  — runs `pipeline.ci.materialize_spec` + `docker_entrypoint.py
#     generate_dataset` directly inside the dev-snapshot container on the
#     GitHub runner. No SkyPilot launcher, no cloud creds (R2 only). Manual
#     dispatch fallback for ad-hoc smoke; superseded by `skypilot-local` for
#     PR coverage.
#   * `skypilot-local` — provisions a kind cluster on the runner via
#     `sky local up`, loads the dev-snapshot image into kind, and invokes the
#     unified launcher against `configs/compute/local-template.yaml`
#     (cloud: kubernetes). PR default — exercises the same launcher /
#     cred-bootstrap path as the cloud providers, closing the #806 unification
#     gap. No billable capacity.
#   * `runpod` / `oci` — invoke `pipeline.entrypoints.skypilot_launch_smoke`
#     against the matching `configs/compute/*-template.yaml`. Manual dispatch
#     only. See docs/design/skypilot-compute-integration.md.
#
# All non-`local` rows let the launcher invoke the cred-bootstrap script
# (`pipeline.entrypoints.skypilot_launch_smoke._run_cred_bootstrap`); the
# launcher captures the script's stdout via `subprocess.run(capture_output=True)`
# so a `tee`'d caller workflow can't leak secrets.
#
# Provider matrix policy (computed in the `setup` job):
#   * pull_request (same repo) → skypilot-local only
#   * pull_request (fork)      → empty (forks can't read secrets)
#   * workflow_dispatch        → respect `inputs.provider`
#                                (all = skypilot-local + runpod + oci;
#                                 or local / skypilot-local / runpod / oci)
#
# Required secrets:
#   R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_ENDPOINT, R2_ACCOUNT_ID —
#     Cloudflare R2 (used by every provider; the launcher's cred-bootstrap
#     also writes ~/.cloudflare/accountid using R2_ACCOUNT_ID for SkyPilot's
#     R2 storage adaptor once #749 is unblocked).
#   RUNPOD_API_KEY — written to ~/.runpod/config.toml so SkyPilot's RunPod
#     backend can `sky check runpod` (env var alone is insufficient).
#   OCI_USER_OCID, OCI_TENANCY_OCID, OCI_FINGERPRINT, OCI_REGION,
#     OCI_COMPARTMENT_OCID, OCI_API_KEY_PEM — written to ~/.oci/config +
#     ~/.sky/config.yaml so SkyPilot's OCI backend can `sky check oci`.
#   SKYPILOT_API_SERVER_ENDPOINT (optional) — when set, the launcher skips
#     the cred-bootstrap because the remote API server (#785) holds creds.

on:
  workflow_dispatch:
    inputs:
      dataset_config:
        description: "Path to dataset config YAML (under configs/dataset/)"
        required: true
        default: "configs/dataset/runpod-smoke-shard.yaml"
      docker_image_tag:
        description: "Docker image tag (e.g., dev-snapshot, dev-snapshot-<sha>)"
        required: false
        default: "dev-snapshot"
      provider:
        description: "Provider(s) to launch on (manual runs only; PR runs use skypilot-local)"
        required: false
        type: choice
        default: all
        options:
          - all
          - local
          - skypilot-local
          - runpod
          - oci
  pull_request:
    paths:
      - "src/data/vst/**"
      - "pipeline/schemas/**"
      - "configs/dataset/**"
      - "configs/compute/**"
      - "pipeline/entrypoints/**"
      - "scripts/docker_entrypoint.py"
      - "scripts/run-linux-vst-headless.sh"
      - "scripts/ensure_plugin_symlinks.sh"
      - "scripts/sync_worker_checkout.sh"
      - "scripts/skypilot_write_provider_creds.sh"
      - "pipeline/entrypoints/skypilot_launch_smoke.py"
      - ".github/workflows/test-dataset-generation.yml"
      - "requirements*.txt"

permissions:
  contents: read

# Coalesce stacked PR pushes — saves runner minutes on `local` PRs and
# avoids burning RunPod/OCI capacity on superseded `workflow_dispatch` runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Compute the provider list at runtime. Provider-specific values
  # (template, cluster prefix) are derived from the provider name in the
  # consuming jobs via expressions, so the only thing this job has to
  # publish is the JSON array.
  #
  # Policy:
  #   * pull_request (same repo) → skypilot-local only (free; exercises the
  #     unified launcher path on a local kind cluster)
  #   * pull_request (fork)      → empty (forks can't read secrets)
  #   * workflow_dispatch        → respect `inputs.provider`
  #     - `all` expands to skypilot-local + runpod + oci. The legacy `local`
  #       (docker-only) row is opt-in via the dropdown for ad-hoc fallback.
  #
  # Empty array → downstream matrices skip naturally; no `has_jobs` flag.
  setup:
    name: Compute provider list
    runs-on: ubuntu-latest
    outputs:
      providers: ${{ steps.matrix.outputs.providers }}
    steps:
      - id: matrix
        env:
          EVENT_NAME: ${{ github.event_name }}
          PROVIDER_INPUT: ${{ inputs.provider || 'all' }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "pull_request" && "${PR_HEAD_REPO}" == "${REPO}" ]]; then
            providers='["skypilot-local"]'
          elif [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            case "${PROVIDER_INPUT}" in
              local)          providers='["local"]' ;;
              skypilot-local) providers='["skypilot-local"]' ;;
              runpod)         providers='["runpod"]' ;;
              oci)            providers='["oci"]' ;;
              *)              providers='["skypilot-local","runpod","oci"]' ;;
            esac
          else
            providers='[]'
          fi
          echo "providers=${providers}" >> "${GITHUB_OUTPUT}"
          echo "providers: ${providers}"

  # Matrix over the providers selected by `setup`. Cells fork by provider:
  #
  #   * `local` — runs `pipeline.ci.materialize_spec` and
  #     `scripts/docker_entrypoint.py generate_dataset` directly inside the
  #     dev-snapshot container, single-rank. No SkyPilot, no cloud creds. Pragmatic
  #     PR smoke; should be replaced by SkyPilot's `local` cloud (#806) so all
  #     providers exercise the same launcher path.
  #   * `runpod` / `oci` — invoke the same provider-neutral launcher
  #     (`pipeline.entrypoints.skypilot_launch_smoke`) against the matching
  #     `configs/compute/*-template.yaml`, with `--num-workers 3` so the
  #     partitioner is exercised end-to-end. Cluster names include
  #     `github.run_attempt` so re-running a failed job doesn't collide on the
  #     launcher's R2 spec key.
  generate:
    name: Run generate_dataset (${{ matrix.provider }})
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        provider: ${{ fromJSON(needs.setup.outputs.providers) }}
    env:
      DATASET_CONFIG: >-
        ${{
          github.event_name == 'pull_request'
            && 'configs/dataset/runpod-smoke-shard.yaml'
            || (inputs.dataset_config || 'configs/dataset/runpod-smoke-shard.yaml')
        }}
      IMAGE_TAG: ${{ inputs.docker_image_tag || 'dev-snapshot' }}
      IMAGE: tinaudio/synth-setter:${{ inputs.docker_image_tag || 'dev-snapshot' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Pull image
        run: docker pull "${IMAGE}"

      - name: Prepare run-metadata mount
        run: mkdir -p "/tmp/run-metadata-${{ matrix.provider }}"

      # `local` provider: skip SkyPilot entirely. Materialize the spec inside
      # the dev-snapshot container, then invoke `docker_entrypoint.py
      # generate_dataset` there against rank=0/world=1. Output spec lands in
      # /run-metadata/input_spec.json, matching the shape produced by the
      # SkyPilot launcher branch so the downstream `validate-spec` /
      # `validate-shard` jobs are provider-agnostic. Should be replaced by a
      # SkyPilot local-cloud template (#806).
      - name: Run generate_dataset locally (inside container)
        if: ${{ matrix.provider == 'local' }}
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          CONFIG_PATH: ${{ env.DATASET_CONFIG }}
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${{ github.workspace }}:/home/build/synth-setter" \
            -v "/tmp/run-metadata-${{ matrix.provider }}:/run-metadata" \
            -e CONFIG_PATH \
            -e RCLONE_CONFIG_R2_TYPE=s3 \
            -e RCLONE_CONFIG_R2_PROVIDER=Cloudflare \
            -e RCLONE_CONFIG_R2_ACCESS_KEY_ID="${R2_ACCESS_KEY_ID}" \
            -e RCLONE_CONFIG_R2_SECRET_ACCESS_KEY="${R2_SECRET_ACCESS_KEY}" \
            -e RCLONE_CONFIG_R2_ENDPOINT="${R2_ENDPOINT}" \
            -e SYNTH_SETTER_WORKER_RANK=0 \
            -e SYNTH_SETTER_NUM_WORKERS=1 \
            -e PYTHONPATH=/home/build/synth-setter \
            "${IMAGE}" \
            bash -c '
              set -euo pipefail
              cd /home/build/synth-setter
              git config --global --add safe.directory /home/build/synth-setter
              bash scripts/ensure_plugin_symlinks.sh
              python -m pipeline.ci.materialize_spec "$CONFIG_PATH" /run-metadata
              python scripts/docker_entrypoint.py generate_dataset \
                --spec /run-metadata/input_spec.json
              chmod 0644 /run-metadata/input_spec.json
            ' \
            2>&1 | tee "/tmp/run-metadata-${{ matrix.provider }}/generate.log"

      # ------------------------------------------------------------------
      # `skypilot-local` row: provision a local kind cluster on the runner
      # and invoke the launcher against configs/compute/local-template.yaml.
      # The launcher (`pipeline.entrypoints.skypilot_launch_smoke`) detects
      # `cloud: kubernetes` → runs the cred-bootstrap with `--provider local`
      # (R2 only) and calls `sky.check.check(['kubernetes'])` in-process before
      # `sky.launch` to populate the SDK's enabled-clouds cache (see
      # test-skypilot-local.yml from #834 for the cache-quirk write-up).
      # ------------------------------------------------------------------
      - name: Install kind (skypilot-local row)
        if: ${{ matrix.provider == 'skypilot-local' }}
        uses: helm/kind-action@v1
        with:
          install_only: true
          version: v0.24.0

      - name: Install kubectl (skypilot-local row)
        if: ${{ matrix.provider == 'skypilot-local' }}
        uses: azure/setup-kubectl@v4

      - name: Install socat (skypilot-local row)
        if: ${{ matrix.provider == 'skypilot-local' }}
        run: sudo apt-get update -qq && sudo apt-get install -y -qq socat

      - name: Set up Python (skypilot-local row)
        if: ${{ matrix.provider == 'skypilot-local' }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install launcher deps (skypilot-local row)
        if: ${{ matrix.provider == 'skypilot-local' }}
        run: |
          pip install -r requirements-app.txt
          pip install "skypilot[kubernetes]==0.12.0"
          sudo apt-get install -y -qq rclone

      - name: sky local up (skypilot-local row)
        if: ${{ matrix.provider == 'skypilot-local' }}
        run: sky local up --no-gpus

      - name: Load dev-snapshot image into kind (skypilot-local row)
        if: ${{ matrix.provider == 'skypilot-local' }}
        run: kind load docker-image "${IMAGE}" --name skypilot

      # Launcher invokes the cred-bootstrap script itself (capturing stdout
      # via subprocess.run, never tee'ing to logs). For `--provider local`
      # the bootstrap writes only R2 cred files — kind needs no compute
      # provider auth. RCLONE_CONFIG_R2_* env vars are bridged from the
      # workflow env to os.environ inside main() so upload_spec_to_r2's
      # rclone subprocess sees them.
      - name: Run launcher against local-template (skypilot-local row)
        if: ${{ matrix.provider == 'skypilot-local' }}
        env:
          SKYPILOT_API_SERVER_ENDPOINT: ${{ secrets.SKYPILOT_API_SERVER_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          CONFIG_PATH: ${{ env.DATASET_CONFIG }}
          CLUSTER_NAME: synth-setter-smoke-skypilot-local-${{ github.run_id }}-${{ github.run_attempt }}
          WORKER_GIT_REF: ${{ github.event.pull_request.head.sha || github.sha }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          set -euo pipefail
          python -m pipeline.entrypoints.skypilot_launch_smoke \
            --config "$CONFIG_PATH" \
            --template configs/compute/local-template.yaml \
            --cluster-name "$CLUSTER_NAME" \
            --worker-image-tag "$IMAGE_TAG" \
            --num-workers 3 \
            --spec-out "/tmp/run-metadata-${{ matrix.provider }}/input_spec.json" \
            --tail \
            2>&1 | tee "/tmp/run-metadata-${{ matrix.provider }}/generate.log"
          chmod 0644 "/tmp/run-metadata-${{ matrix.provider }}/input_spec.json"

      - name: sky local down (skypilot-local row)
        if: ${{ always() && matrix.provider == 'skypilot-local' }}
        run: sky local down || true

      # ------------------------------------------------------------------
      # `runpod` / `oci` rows: in-container launcher invocation. The launcher
      # invokes scripts/skypilot_write_provider_creds.sh itself with
      # `subprocess.run(capture_output=True)` — its stdout never touches the
      # workflow log. When SKYPILOT_API_SERVER_ENDPOINT is set the launcher
      # skips the bootstrap entirely (the remote API server holds provider
      # creds — see #785).
      # ------------------------------------------------------------------
      - name: Launch SkyPilot job (inside container; streams logs + blocks until done)
        if: ${{ matrix.provider == 'runpod' || matrix.provider == 'oci' }}
        env:
          SKYPILOT_API_SERVER_ENDPOINT: ${{ secrets.SKYPILOT_API_SERVER_ENDPOINT }}
          PROVIDER: ${{ matrix.provider }}
          TEMPLATE: configs/compute/${{ matrix.provider == 'oci' && 'oci-cpu' || matrix.provider }}-template.yaml
          CLUSTER_NAME: synth-setter-smoke-${{ matrix.provider }}-${{ github.run_id }}-${{ github.run_attempt }}
          OCI_IMAGE_TAG: ${{ matrix.provider == 'oci' && 'skypilot:cpu-ubuntu-2204' || '' }}
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
          OCI_API_KEY_PEM: ${{ secrets.OCI_API_KEY_PEM }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          CONFIG_PATH: ${{ env.DATASET_CONFIG }}
          WORKER_GIT_REF: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${{ github.workspace }}:/home/build/synth-setter" \
            -v "/tmp/run-metadata-${PROVIDER}:/run-metadata" \
            -e SKYPILOT_API_SERVER_ENDPOINT \
            -e PROVIDER \
            -e TEMPLATE \
            -e CLUSTER_NAME \
            -e IMAGE_TAG \
            -e OCI_IMAGE_TAG \
            -e RUNPOD_API_KEY \
            -e OCI_USER_OCID \
            -e OCI_TENANCY_OCID \
            -e OCI_FINGERPRINT \
            -e OCI_REGION \
            -e OCI_COMPARTMENT_OCID \
            -e OCI_API_KEY_PEM \
            -e CONFIG_PATH \
            -e WORKER_GIT_REF \
            -e R2_ACCESS_KEY_ID \
            -e R2_SECRET_ACCESS_KEY \
            -e R2_ENDPOINT \
            -e R2_ACCOUNT_ID \
            -e WANDB_API_KEY \
            -e PYTHONPATH=/home/build/synth-setter \
            "${IMAGE}" \
            bash -c '
              set -euo pipefail
              cd /home/build/synth-setter
              git config --global --add safe.directory /home/build/synth-setter
              bash scripts/ensure_plugin_symlinks.sh
              python -m pipeline.entrypoints.skypilot_launch_smoke \
                --config "$CONFIG_PATH" \
                --template "$TEMPLATE" \
                --cluster-name "$CLUSTER_NAME" \
                --worker-image-tag "$IMAGE_TAG" \
                --num-workers 3 \
                --spec-out /tmp/input_spec.json \
                --tail
              cp /tmp/input_spec.json /run-metadata/input_spec.json
              chmod 0644 /run-metadata/input_spec.json
            ' \
            2>&1 | tee "/tmp/run-metadata-${PROVIDER}/generate.log"

      - name: Validate spec exists
        run: |
          set -euo pipefail
          SPEC_PATH="/tmp/run-metadata-${{ matrix.provider }}/input_spec.json"
          if [[ ! -f "${SPEC_PATH}" ]]; then
            echo "::error::input_spec.json not found at ${SPEC_PATH}"
            exit 1
          fi
          echo "=== Materialized Spec (${{ matrix.provider }}) ==="
          head -20 "${SPEC_PATH}"

      - name: Upload run metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-run-metadata-${{ matrix.provider }}
          path: /tmp/run-metadata-${{ matrix.provider }}/
          retention-days: 7
          if-no-files-found: warn

  # validate_spec is provider-neutral; per-cell variation is the artifact
  # name. `if: !cancelled()` decouples each provider's validate cell from
  # the OTHER provider's generate outcome — RunPod transients won't skip
  # OCI validation.
  validate-spec:
    name: Validate ${{ matrix.provider }} spec structure
    needs: [setup, generate]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        provider: ${{ fromJSON(needs.setup.outputs.providers) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download run metadata artifact
        uses: actions/download-artifact@v4
        with:
          name: test-run-metadata-${{ matrix.provider }}

      - name: Validate spec structure
        run: python3 -m pipeline.ci.validate_spec input_spec.json

  # validate_shard.py is provider-neutral; per-cell variation is the
  # artifact name. See validate-spec for `if: !cancelled()` rationale.
  validate-shard:
    name: Validate ${{ matrix.provider }} shards
    needs: [setup, generate]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        provider: ${{ fromJSON(needs.setup.outputs.providers) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download run metadata artifact
        uses: actions/download-artifact@v4
        with:
          name: test-run-metadata-${{ matrix.provider }}

      - name: Install PyYAML for config parsing
        run: pip install pyyaml

      # R2 bucket from configs/image/dev-snapshot.yaml; R2 prefix + shard
      # filenames from the materialized spec artifact. Every shard in
      # spec.shards must exist in R2 — partitioning bugs surface as
      # missing-shard rclone failures.
      - name: Download every shard from R2 and validate
        env:
          IMAGE: tinaudio/synth-setter:${{ inputs.docker_image_tag || 'dev-snapshot' }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          set -euo pipefail
          R2_BUCKET=
          R2_BUCKET=$(python3 -c "import yaml; print(yaml.safe_load(open('configs/image/dev-snapshot.yaml'))['r2_bucket'])")
          R2_PREFIX=
          R2_PREFIX=$(python3 -c "import json; print(json.load(open('input_spec.json'))['r2_prefix'])")
          mapfile -t SHARD_FILES < <(python3 -c "import json; [print(s['filename']) for s in json.load(open('input_spec.json'))['shards']]")

          echo "R2 bucket: ${R2_BUCKET}"
          echo "R2 prefix: ${R2_PREFIX}"
          echo "Shards to validate: ${SHARD_FILES[*]}"

          mkdir -p /tmp/shard-download
          docker pull "${IMAGE}"

          for SHARD_FILE in "${SHARD_FILES[@]}"; do
            echo "::group::Download and validate ${SHARD_FILE}"
            docker run --rm \
              -e RCLONE_CONFIG_R2_TYPE=s3 \
              -e RCLONE_CONFIG_R2_PROVIDER=Cloudflare \
              -e RCLONE_CONFIG_R2_ACCESS_KEY_ID="${R2_ACCESS_KEY_ID}" \
              -e RCLONE_CONFIG_R2_SECRET_ACCESS_KEY="${R2_SECRET_ACCESS_KEY}" \
              -e RCLONE_CONFIG_R2_ENDPOINT="${R2_ENDPOINT}" \
              -e PYTHONPATH=/home/build/synth-setter \
              -v /tmp/shard-download:/download \
              "${IMAGE}" \
              rclone copy --checksum \
                "r2:${R2_BUCKET}/${R2_PREFIX}${SHARD_FILE}" \
                /download/

            docker run --rm \
              -v "${{ github.workspace }}:/home/build/synth-setter:ro" \
              -v /tmp/shard-download:/download:ro \
              -v "$(pwd)/input_spec.json:/spec/input_spec.json:ro" \
              -e PYTHONPATH=/home/build/synth-setter \
              "${IMAGE}" \
              python3 -m pipeline.ci.validate_shard \
                /spec/input_spec.json \
                "/download/${SHARD_FILE}"
            echo "::endgroup::"
          done

          echo "All ${#SHARD_FILES[@]} shards validated"
          ls -la /tmp/shard-download/
