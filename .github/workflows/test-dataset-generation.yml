name: Test Dataset Generation

# Smoke test for the data-pipeline. Execution modes share the same
# `validate-dataset-shards.yaml` downstream:
#
#   * `skypilot-local` — invokes `generate-dataset-shards.yaml` with
#     `local: true, num_workers: '1'` to provision a kind cluster on the
#     runner, load dev-snapshot into kind, and launch against
#     `configs/compute/local-template.yaml`. PR default — exercises the same
#     launcher / cred-bootstrap path as the cloud providers, closing the #806
#     unification gap. No billable capacity.
#   * `runpod` / `oci` — invoke `generate-dataset-shards.yaml` against the
#     matching cloud template. Manual dispatch only. See
#     docs/design/skypilot-compute-integration.md.
#
# Every row lets the launcher invoke the cred-bootstrap script
# (`synth_setter.pipeline.skypilot_launch._run_cred_bootstrap`); the launcher
# captures the script's stdout via `subprocess.run(capture_output=True)` so a
# `tee`'d caller workflow can't leak secrets.
#
# Stage handoff is via R2: each generate job writes the canonical
# under-prefix copy at `r2://<bucket>/<prefix>input_spec.json` (the spec's
# own self-described URI, emitted by `synth-setter-spec-uri`). The validate
# job below consumes `needs.generate-launcher.outputs.spec_uri`. The
# run-metadata artifact upload remains for debugging, but it's no longer
# load-bearing.
#
# Provider matrix policy (computed in the `setup` job):
#   * pull_request (same repo) → skypilot-local only
#   * pull_request (fork)      → empty (forks can't read secrets)
#   * workflow_dispatch        → respect `inputs.provider`
#                                (all = skypilot-local + runpod + oci;
#                                 or skypilot-local / runpod / oci)
#
# Required secrets:
#   RCLONE_CONFIG_R2_ACCESS_KEY_ID, RCLONE_CONFIG_R2_SECRET_ACCESS_KEY,
#   RCLONE_CONFIG_R2_ENDPOINT, R2_ACCOUNT_ID —
#     Cloudflare R2 (used by every provider; the launcher's cred-bootstrap
#     also writes ~/.cloudflare/accountid using R2_ACCOUNT_ID for SkyPilot's
#     R2 storage adaptor once #749 is unblocked).
#   RUNPOD_API_KEY — written to ~/.runpod/config.toml so SkyPilot's RunPod
#     backend can `sky check runpod` (env var alone is insufficient).
#   OCI_USER_OCID, OCI_TENANCY_OCID, OCI_FINGERPRINT, OCI_REGION,
#     OCI_API_KEY_PEM — written to ~/.oci/config + ~/.oci/oci_api_key.pem
#     so SkyPilot's OCI backend can `sky check oci`. SkyPilot defaults to
#     the root compartment when oci.default.compartment_ocid is unset, so
#     ~/.sky/config.yaml is no longer managed here — see #876.
#   SKYPILOT_API_SERVER_ENDPOINT (optional) — when set, the launcher skips
#     the cred-bootstrap because the remote API server (#785) holds creds.

on:
  workflow_dispatch:
    inputs:
      dataset_config:
        description: "Hydra experiment name under configs/experiment/ (e.g. `generate_dataset/smoke-shard`)"
        required: true
        default: "generate_dataset/smoke-shard"
      docker_image_tag:
        description: "Docker image tag (e.g., dev-snapshot, dev-snapshot-<sha>)"
        required: false
        default: "dev-snapshot"
      provider:
        description: "Provider(s) to launch on (manual runs only; PR runs use skypilot-local)"
        required: false
        type: choice
        default: all
        options:
          - all
          - skypilot-local
          - runpod
          - oci
  # Trigger paths are intentionally narrow — this workflow burns runner minutes
  # (skypilot-local kind cluster + dev-snapshot image pull). Only list paths
  # whose changes can plausibly break dataset generation. In particular:
  #
  #   * `pyproject.toml` is NOT listed. The worker container pulls the
  #     pre-built `dev-snapshot` image, so dep bumps don't reach the worker
  #     side from here. The launcher side IS affected (the `skypilot-local`
  #     row runs `uv pip install --system -e .` in
  #     `generate-dataset-shards.yaml`'s "Install launcher deps" step), so
  #     pyproject changes that break that install would fail this workflow
  #     too — but they would fail `test.yml` (also `pip install -e .`) and
  #     `docker-build-validation.yml` (rebuilds the image) FIRST. We accept
  #     that redundant coverage in exchange for not firing on the steady
  #     stream of lint / test / dev-only pyproject changes (mutmut, gitlint,
  #     ruff config, dev-only deps) that were the largest source of
  #     false-positive runs.
  #   * `configs/experiment/**` is narrowed to `generate_dataset/**` — the
  #     other subdirs (surge/fm/kosc/...) are training experiments and don't
  #     feed this workflow's Hydra compose.
  #   * `src/synth_setter/pipeline/schemas/**` is enumerated to the specific
  #     files actually imported by the generation path (`spec.py`, `prefix.py`).
  #     `shard_metadata.py` is downstream-only; `image_config.py` is consumed
  #     by `pipeline/ci/load_image_config.py` for `docker-build-validation.yml`,
  #     not by anything `test-dataset-generation` invokes.
  pull_request:
    paths:
      - "src/synth_setter/data/vst/**"
      - "src/synth_setter/pipeline/schemas/spec.py"
      - "src/synth_setter/pipeline/schemas/prefix.py"
      - "configs/experiment/generate_dataset/**"
      - "configs/dataset.yaml"
      - "configs/render/**"
      - "configs/r2/**"
      - "configs/compute/**"
      - "src/synth_setter/cli/generate_dataset.py"
      - "src/synth_setter/pipeline/ci/**"
      - "src/synth_setter/pipeline/r2_io.py"
      - "docker/ubuntu22_04/run-linux-vst-headless.sh"
      - "docker/ubuntu22_04/ensure_plugin_symlinks.sh"
      - "scripts/sync_worker_checkout.sh"
      - "scripts/skypilot/write_provider_creds.sh"
      - "src/synth_setter/pipeline/skypilot_launch.py"
      - ".github/workflows/test-dataset-generation.yml"
      - ".github/workflows/generate-dataset-shards.yaml"
      - ".github/workflows/validate-dataset-shards.yaml"

permissions:
  contents: read

# Coalesce stacked PR pushes — saves runner minutes on `local` PRs. The
# `workflow_dispatch` suffix gives each manual run its own group so a
# re-dispatch to the same ref doesn't cancel an in-flight intentional run;
# on PR/push the suffix is empty (the leading dash lives inside the conditional
# so the group key stays byte-identical to the prior `${{ github.workflow }}-
# ${{ github.ref }}` form there, and PR pushes still coalesce).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}${{ github.event_name == 'workflow_dispatch' && format('-{0}', github.run_id) || '' }}
  cancel-in-progress: true

jobs:
  # Compute the provider list at runtime, plus the R2 bucket the validate
  # job will pull specs and shards from. Outputs:
  #   * `providers`           — provider matrix (drives generate + validate).
  #   * `output_formats`      — shard-format axis. On pull_request both rows
  #                             (`hdf5`, `wds`) run because the workflow pins a
  #                             per-format experiment config for each. On
  #                             workflow_dispatch the matrix collapses to the
  #                             single format the dispatched config resolves to
  #                             — a single config hardcodes one `output_format`,
  #                             and the spec-format cross-check would otherwise
  #                             fail the non-matching cell.
  #   * `r2_bucket`           — Cloudflare R2 bucket name (from
  #                             configs/image/dev-snapshot.yaml). Used to
  #                             construct the spec_uri the validate job pulls.
  #
  # Policy:
  #   * pull_request (same repo) → skypilot-local only (free; exercises the
  #     unified launcher path on a local kind cluster)
  #   * pull_request (fork)      → empty (forks can't read secrets)
  #   * workflow_dispatch        → respect `inputs.provider`
  #     - `all` expands to skypilot-local + runpod + oci.
  #
  # Empty array → downstream matrices skip naturally; no `has_jobs` flag.
  setup:
    name: Compute provider list + R2 bucket
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      providers: ${{ steps.compose.outputs.providers }}
      output_formats: ${{ steps.compose.outputs.output_formats }}
      r2_bucket: ${{ steps.compose.outputs.r2_bucket }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # configs/hydra/default.yaml's `defaults` block overrides job_logging /
      # hydra_logging to `colorlog`, which is provided by the hydra-colorlog
      # plugin. Without it, Hydra compose fails with MissingConfigException
      # ("Could not find 'hydra/job_logging/colorlog'"). Pin both to the same
      # versions as [project.dependencies] in pyproject.toml. The next step
      # composes the dispatched config to resolve `output_format` (dispatch
      # only) and `r2_bucket` (always).
      - name: Install Hydra for dataset-config composition
        run: pip install "hydra-core==1.3.2" "hydra-colorlog==1.2.0"

      # Single Hydra compose resolves both `output_format` (dispatch-only;
      # on PR the matrix is pinned `["hdf5","wds"]`) and `r2_bucket` (always —
      # the launcher uses `${r2.bucket}` for its R2 upload destination).
      # Merged from the previous two-step setup per PR #1164 (B2).
      #
      # On pull_request we pin two distinct per-format experiment configs
      # (`smoke-shard` for hdf5, `ci-materialize-test-wds` for wds), so the
      # matrix expands to both cells. On workflow_dispatch the user supplies
      # a single experiment config which hardcodes one `output_format`, so the
      # matrix collapses to whatever that config resolves to — otherwise the
      # cell whose `matrix.output_format` doesn't match would deterministically
      # fail the spec-format cross-check.
      - id: compose
        env:
          EVENT_NAME: ${{ github.event_name }}
          PROVIDER_INPUT: ${{ inputs.provider || 'all' }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          REPO: ${{ github.repository }}
          DATASET_CONFIG: >-
            ${{
              github.event_name == 'pull_request'
                && 'generate_dataset/smoke-shard'
                || (inputs.dataset_config || 'generate_dataset/smoke-shard')
            }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "pull_request" && "${PR_HEAD_REPO}" == "${REPO}" ]]; then
            providers='["skypilot-local"]'
          elif [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            case "${PROVIDER_INPUT}" in
              skypilot-local) providers='["skypilot-local"]' ;;
              runpod)         providers='["runpod"]' ;;
              oci)            providers='["oci"]' ;;
              *)              providers='["skypilot-local","runpod","oci"]' ;;
            esac
          else
            providers='[]'
          fi
          COMPOSE_STDERR=$(mktemp)
          if ! COMPOSE_OUT=$(python3 -c "
          import os
          from pathlib import Path
          from hydra import compose, initialize_config_dir
          cfg_dir = str(Path.cwd() / 'configs')
          experiment = os.environ['DATASET_CONFIG']
          with initialize_config_dir(version_base='1.3', config_dir=cfg_dir):
              cfg = compose(config_name='dataset', overrides=[f'experiment={experiment}'])
          print(cfg.output_format)
          print(cfg.r2.bucket)
          " 2>"${COMPOSE_STDERR}"); then
            echo "Hydra compose failed for experiment='${DATASET_CONFIG}' (stderr below):" >&2
            cat "${COMPOSE_STDERR}" >&2
            rm -f "${COMPOSE_STDERR}"
            exit 1
          fi
          rm -f "${COMPOSE_STDERR}"
          COMPOSED_FORMAT=$(echo "${COMPOSE_OUT}" | sed -n '1p')
          R2_BUCKET=$(echo "${COMPOSE_OUT}" | sed -n '2p')
          if [[ "${providers}" == "[]" ]]; then
            output_formats='[]'
          elif [[ "${EVENT_NAME}" == "pull_request" ]]; then
            output_formats='["hdf5","wds"]'
          else
            output_formats="[\"${COMPOSED_FORMAT}\"]"
          fi
          echo "providers=${providers}" >> "${GITHUB_OUTPUT}"
          echo "output_formats=${output_formats}" >> "${GITHUB_OUTPUT}"
          echo "r2_bucket=${R2_BUCKET}" >> "${GITHUB_OUTPUT}"
          echo "providers: ${providers}"
          echo "output_formats: ${output_formats}"
          echo "r2_bucket: ${R2_BUCKET}"

  # `skypilot-local` / `runpod` / `oci` rows: route through the official
  # launcher reusable. Cluster name includes `github.run_attempt` so re-running
  # a failed job doesn't collide on the launcher's R2 spec key. The
  # `--num-workers 1` override for skypilot-local mirrors today's hardcoded
  # behavior — the single-node kind cluster can't host parallel workers (#843).
  generate-launcher:
    name: Run generate_dataset (${{ matrix.provider }} / ${{ matrix.output_format }})
    needs: setup
    if: ${{ needs.setup.outputs.providers != '[]' && needs.setup.outputs.output_formats != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        provider: ${{ fromJSON(needs.setup.outputs.providers) }}
        output_format: ${{ fromJSON(needs.setup.outputs.output_formats) }}
    uses: ./.github/workflows/generate-dataset-shards.yaml
    with:
      provider: ${{ matrix.provider }}
      dataset_config: >-
        ${{
          github.event_name == 'pull_request'
            && (matrix.output_format == 'wds'
                && 'generate_dataset/smoke-shard-wds'
                || 'generate_dataset/smoke-shard')
            || (inputs.dataset_config || 'generate_dataset/smoke-shard')
        }}
      image_tag: ${{ inputs.docker_image_tag || 'dev-snapshot' }}
      cluster_name: synth-setter-smoke-${{ matrix.provider }}-${{ matrix.output_format }}-${{ github.run_id }}-${{ github.run_attempt }}
      num_workers: ${{ matrix.provider == 'skypilot-local' && '1' || '' }}
      tail: true
      local: ${{ matrix.provider == 'skypilot-local' }}
      artifact_name: test-run-metadata-${{ matrix.provider }}-${{ matrix.output_format }}
    secrets: inherit

  # validate-spec + validate-shard pull the spec from R2 directly via the
  # canonical `spec_uri` output emitted by `synth-setter-spec-uri`. `if:
  # !cancelled()` decouples each provider × output_format cell from the OTHER
  # cells' generate outcomes — RunPod transients won't skip OCI validation,
  # and an hdf5 failure won't skip wds.
  validate:
    name: Validate ${{ matrix.provider }} / ${{ matrix.output_format }} dataset
    needs: [setup, generate-launcher]
    if: ${{ !cancelled() && needs.setup.outputs.providers != '[]' && needs.setup.outputs.output_formats != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        provider: ${{ fromJSON(needs.setup.outputs.providers) }}
        output_format: ${{ fromJSON(needs.setup.outputs.output_formats) }}
    uses: ./.github/workflows/validate-dataset-shards.yaml
    with:
      image_tag: ${{ inputs.docker_image_tag || 'dev-snapshot' }}
      spec_uri: ${{ needs.generate-launcher.outputs.spec_uri }}
    secrets: inherit
