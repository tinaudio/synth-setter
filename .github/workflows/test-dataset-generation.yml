name: Test Dataset Generation

# Smoke test for the data-pipeline. Execution modes share the same
# `validate-dataset-shards.yaml` downstream:
#
#   * `skypilot-local` â€” invokes `generate-dataset-shards.yaml` with
#     `local: true, num_workers: '1'` to provision a kind cluster on the
#     runner, load dev-snapshot into kind, and launch against
#     `src/synth_setter/configs/compute/local-template.yaml`. Hourly schedule default â€”
#     exercises the same launcher / cred-bootstrap path as the cloud providers,
#     closing the #806 unification gap. No billable capacity.
#   * `runpod` / `oci` â€” invoke `generate-dataset-shards.yaml` against the
#     matching cloud template. Run weekly via the `0 7 * * 0` cron and on
#     demand via `workflow_dispatch`. See
#     docs/design/skypilot-compute-integration.md.
#
# Every row lets the launcher invoke the cred-bootstrap script
# (`synth_setter.pipeline.skypilot_launch._run_cred_bootstrap`); the launcher
# captures the script's stdout via `subprocess.run(capture_output=True)` so a
# `tee`'d caller workflow can't leak secrets.
#
# Stage handoff is via R2: each generate cell writes the canonical
# under-prefix copy at `r2://<bucket>/<prefix>input_spec.json`. The validate
# job below indexes `needs.setup.outputs.spec_uris` â€” a JSON map keyed by
# `<provider>-<output_format>` that the `setup` job populates by calling
# `synth-setter-spec-uri --from-experiment ... --run-id-override ...` once
# per cell. Routing through the non-matrix `setup` output sidesteps the
# `needs.<matrix-job>.outputs.<x>` scalar collapse (#1154). The run-metadata
# artifact upload remains for debugging, but it's no longer load-bearing.
#
# Provider matrix policy (computed in the `setup` job):
#   * schedule (hourly `0 * * * *`)    â†’ skypilot-local Ă— {hdf5, wds}.
#                                        PR presubmit coverage moves to
#                                        `test-local-launcher-roundtrip.yml`
#                                        in #1170 (open at time of writing);
#                                        this workflow is now schedule +
#                                        dispatch only.
#   * schedule (weekly `0 7 * * 0`)    â†’ all providers (skypilot-local +
#                                        runpod + oci) Ă— {hdf5, wds} â€”
#                                        the only paid-capacity coverage
#                                        outside manual dispatch.
#   * workflow_dispatch                â†’ respect `inputs.provider`
#                                        (all = skypilot-local + runpod + oci;
#                                         or skypilot-local / runpod / oci)
#
# Required secrets:
#   RCLONE_CONFIG_R2_ACCESS_KEY_ID, RCLONE_CONFIG_R2_SECRET_ACCESS_KEY,
#   RCLONE_CONFIG_R2_ENDPOINT, R2_ACCOUNT_ID â€”
#     Cloudflare R2 (used by every provider; the launcher's cred-bootstrap
#     also writes ~/.cloudflare/accountid using R2_ACCOUNT_ID for SkyPilot's
#     R2 storage adaptor once #749 is unblocked).
#   RUNPOD_API_KEY â€” written to ~/.runpod/config.toml so SkyPilot's RunPod
#     backend can `sky check runpod` (env var alone is insufficient).
#   OCI_USER_OCID, OCI_TENANCY_OCID, OCI_FINGERPRINT, OCI_REGION,
#     OCI_API_KEY_PEM â€” written to ~/.oci/config + ~/.oci/oci_api_key.pem
#     so SkyPilot's OCI backend can `sky check oci`. SkyPilot defaults to
#     the root compartment when oci.default.compartment_ocid is unset, so
#     ~/.sky/config.yaml is no longer managed here â€” see #876.
#   SKYPILOT_API_SERVER_ENDPOINT (optional) â€” when set, the launcher skips
#     the cred-bootstrap because the remote API server (#785) holds creds.

on:
  # Two cron axes (#1164, #1170):
  #   * `0 * * * *` (top of every hour) â€” skypilot-local Ă— {hdf5, wds}. Keeps
  #     the launcher / kind / R2 path under near-continuous coverage; PR-presubmit
  #     duty for that round-trip lives in test-local-launcher-roundtrip.yml
  #     (lands via #1170).
  #   * `0 7 * * 0` (Sunday 07:00 UTC = ~midnight Pacific Satâ†’Sun) â€” full
  #     provider matrix (skypilot-local + runpod + oci) Ă— {hdf5, wds}.
  #     Only paid-capacity touch outside manual dispatch; gives us weekly
  #     RunPod / OCI signal so credential rot or backend regressions surface
  #     before someone needs to dispatch a real cloud run.
  # The setup job branches on `github.event.schedule` to map each cron to the
  # right (providers, output_formats) pair.
  schedule:
    - cron: "0 * * * *"
    - cron: "0 7 * * 0"
  workflow_dispatch:
    inputs:
      dataset_config:
        description: "Hydra experiment name under src/synth_setter/configs/experiment/ (e.g. `generate_dataset/smoke-shard`)"
        required: true
        default: "generate_dataset/smoke-shard"
      docker_image_tag:
        description: "Docker image tag (e.g., dev-snapshot, dev-snapshot-<sha>)"
        required: false
        default: "dev-snapshot"
      provider:
        description: "Provider(s) to launch on (manual override; the hourly cron always uses skypilot-local and the weekly cron uses all three)"
        required: false
        type: choice
        default: all
        options:
          - all
          - skypilot-local
          - runpod
          - oci
  # No `pull_request` trigger: presubmit coverage of the launcher / R2
  # round-trip path moves to `test-local-launcher-roundtrip.yml` (added in
  # #1170, open at time of writing), which runs in ~8-10 min on ubuntu-latest.
  # This workflow is intentionally schedule + dispatch only â€” the full
  # launcher-on-kind-on-runner path is too expensive to fire per PR.

permissions:
  contents: read

# Per-trigger concurrency keys. With hourly + weekly schedules on the same
# `refs/heads/main`, a single workflow-level group would let an hourly tick
# cancel an in-flight weekly all-providers (runpod + oci) run mid-flight,
# burning paid capacity without producing a result. Mixing
# `github.event.schedule` (the cron string, only set on schedule events) into
# the group separates the hourly and weekly axes; falling back to
# `github.event_name` keeps `workflow_dispatch` in its own group too.
# `cancel-in-progress: true` is still desirable per-group so a re-scheduled
# tick of the same cron supersedes a stuck prior run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.schedule || github.event_name }}
  cancel-in-progress: true

jobs:
  # Compute the provider list at runtime, plus the R2 bucket the validate
  # job will pull specs and shards from. Outputs:
  #   * `providers`           â€” provider matrix (drives generate + validate).
  #   * `output_formats`      â€” shard-format axis. On the hourly schedule and
  #                             the weekly schedule both `hdf5` and `wds` run;
  #                             on workflow_dispatch the matrix collapses to
  #                             the single format the dispatched config
  #                             resolves to â€” a single config hardcodes one
  #                             `output_format`, and the spec-format cross-check
  #                             would otherwise fail the non-matching cell.
  #   * `r2_bucket`           â€” Cloudflare R2 bucket name (from
  #                             src/synth_setter/configs/image/dev-snapshot.yaml). Used to
  #                             construct the spec_uri the validate job pulls.
  #
  # Policy:
  #   * schedule, cron `0 * * * *` (hourly)  â†’ skypilot-local Ă— {hdf5, wds}.
  #     Free coverage of the unified launcher / kind / R2 path.
  #   * schedule, cron `0 7 * * 0` (weekly)  â†’ all providers (skypilot-local +
  #     runpod + oci) Ă— {hdf5, wds}. Only paid-capacity touch outside dispatch;
  #     surfaces credential rot or backend regressions on the cloud providers.
  #   * workflow_dispatch                    â†’ respect `inputs.provider`. `all`
  #     expands to skypilot-local + runpod + oci. Format is whatever the
  #     dispatched experiment config compiles to.
  #
  # Empty array â†’ downstream matrices skip naturally; no `has_jobs` flag.
  setup:
    name: Compute provider list + R2 bucket + per-cell spec_uri map
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      providers: ${{ steps.matrix.outputs.providers }}
      output_formats: ${{ steps.matrix.outputs.output_formats }}
      r2_bucket: ${{ steps.bucket.outputs.r2_bucket }}
      spec_uris: ${{ steps.spec_uris.outputs.spec_uris }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # `--no-deps` keeps torch / skypilot / librosa out of this setup-only env;
      # the explicit `hydra-core` + `hydra-colorlog` pair matches
      # `configs/hydra/default.yaml`'s `colorlog` job_logging selector, and the
      # `pydantic` / `python-dotenv` pair covers `synth-setter-spec-uri`'s
      # transitive import of `synth_setter.pipeline.schemas.spec`. If the CLI
      # grows a new top-level dep, add it here â€” see #25 for tracking drift.
      - name: Install synth-setter for Hydra compose + spec-uri CLI
        run: |
          pip install --no-deps -e .
          pip install "hydra-core==1.3.2" "hydra-colorlog==1.2.0" "pydantic>=2,<3" python-dotenv

      # Provider axis:
      #   schedule, cron `0 * * * *` (hourly) â†’ skypilot-local
      #   schedule, cron `0 7 * * 0` (weekly) â†’ skypilot-local + runpod + oci
      #   workflow_dispatch                   â†’ respect inputs.provider
      #   anything else                       â†’ empty array â†’ downstream skips
      #
      # Output-format axis:
      #   schedule (either cron) â†’ both hdf5 and wds
      #   workflow_dispatch      â†’ single format derived by Hydra-composing the
      #     dispatched experiment config; the cell whose `matrix.output_format`
      #     doesn't match would deterministically fail the spec-format
      #     cross-check, so collapse the matrix to that one format.
      #
      # The Hydra compose in the workflow_dispatch branch captures stderr to a
      # temp file so a missing-experiment / config-typing / missing-key failure
      # surfaces in the action log instead of leaving operators with only
      # "Process completed with exit code 1".
      #
      # An unknown `SCHEDULE_CRON` (someone adding a third cron without
      # updating this dispatch) falls through to the empty-array branch so
      # the matrix renders as a no-op rather than silently running the wrong
      # axes; the explicit echo to stderr makes the misconfig visible in the
      # action log.
      - id: matrix
        env:
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE_CRON: ${{ github.event.schedule }}
          PROVIDER_INPUT: ${{ inputs.provider || 'all' }}
          DISPATCH_DATASET_CONFIG: ${{ inputs.dataset_config || 'generate_dataset/smoke-shard' }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "schedule" ]]; then
            case "${SCHEDULE_CRON}" in
              "0 * * * *")  providers='["skypilot-local"]' ;;
              "0 7 * * 0")  providers='["skypilot-local","runpod","oci"]' ;;
              *)
                echo "::warning ::Unknown schedule cron '${SCHEDULE_CRON}' â€” emitting empty matrix" >&2
                providers='[]'
                ;;
            esac
          elif [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            case "${PROVIDER_INPUT}" in
              skypilot-local) providers='["skypilot-local"]' ;;
              runpod)         providers='["runpod"]' ;;
              oci)            providers='["oci"]' ;;
              *)              providers='["skypilot-local","runpod","oci"]' ;;
            esac
          else
            providers='[]'
          fi
          if [[ "${providers}" == "[]" ]]; then
            output_formats='[]'
          elif [[ "${EVENT_NAME}" == "schedule" ]]; then
            output_formats='["hdf5","wds"]'
          else
            DISPATCH_STDERR=$(mktemp)
            if ! DISPATCH_FORMAT=$(python3 -c "
          import os
          import sys
          from pathlib import Path
          from hydra import compose, initialize_config_dir
          cfg_dir = str(Path.cwd() / 'src' / 'synth_setter' / 'configs')
          experiment = os.environ['DISPATCH_DATASET_CONFIG']
          with initialize_config_dir(version_base='1.3', config_dir=cfg_dir):
              cfg = compose(config_name='dataset', overrides=[f'experiment={experiment}'])
          sys.stdout.write(cfg.output_format)
          " 2>"${DISPATCH_STDERR}" | tail -n 1); then
              echo "Hydra compose failed for experiment='${DISPATCH_DATASET_CONFIG}' (stderr below):" >&2
              cat "${DISPATCH_STDERR}" >&2
              rm -f "${DISPATCH_STDERR}"
              exit 1
            fi
            rm -f "${DISPATCH_STDERR}"
            output_formats="[\"${DISPATCH_FORMAT}\"]"
          fi
          echo "providers=${providers}" >> "${GITHUB_OUTPUT}"
          echo "output_formats=${output_formats}" >> "${GITHUB_OUTPUT}"
          echo "providers: ${providers}"
          echo "output_formats: ${output_formats}"

      # Bucket comes from the composed dataset config (the source of truth the
      # launcher uses for `spec.r2_bucket` and therefore for its R2 upload
      # destination). Post-Hydra migration, the experiment id is composed
      # against `src/synth_setter/configs/dataset.yaml` rather than read from a YAML path â€”
      # `r2_bucket` resolves through `${r2.bucket}` from the `r2` config group.
      - id: bucket
        env:
          DATASET_CONFIG: >-
            ${{
              github.event_name == 'schedule'
                && 'generate_dataset/smoke-shard'
                || (inputs.dataset_config || 'generate_dataset/smoke-shard')
            }}
        run: |
          set -euo pipefail
          R2_BUCKET=$(python3 -c "
          import os
          from pathlib import Path
          from hydra import compose, initialize_config_dir
          cfg_dir = str(Path.cwd() / 'src' / 'synth_setter' / 'configs')
          experiment = os.environ['DATASET_CONFIG']
          with initialize_config_dir(version_base='1.3', config_dir=cfg_dir):
              cfg = compose(config_name='dataset', overrides=[f'experiment={experiment}'])
          print(cfg.r2.bucket)
          ")
          echo "r2_bucket=${R2_BUCKET}" >> "${GITHUB_OUTPUT}"
          echo "r2_bucket: ${R2_BUCKET}"

      # Precompute spec_uri for every (provider, output_format) cell, keyed
      # `<provider>-<output_format>`. Routing the URI through this non-matrix
      # output dodges the `needs.<matrix-job>.outputs.<x>` scalar collapse â€”
      # see #1154. The per-cell `run_id` formula matches the one
      # `generate-launcher` passes (#1154 fix is bi-directional). The temp
      # `rows` file holds one JSON object per cell so a `synth-setter-spec-uri`
      # failure aborts via `set -e` instead of being swallowed by an enclosing
      # pipe/command-substitution; the post-loop `jq -sc add` collapses them.
      - name: Compute per-cell spec_uri map
        id: spec_uris
        env:
          PROVIDERS_JSON: ${{ steps.matrix.outputs.providers }}
          FORMATS_JSON: ${{ steps.matrix.outputs.output_formats }}
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_DATASET_CONFIG: ${{ inputs.dataset_config || 'generate_dataset/smoke-shard' }}
          RUN_ID_BASE: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          providers_n=$(printf '%s' "$PROVIDERS_JSON" | jq 'length')
          formats_n=$(printf '%s' "$FORMATS_JSON" | jq 'length')
          if [[ "$providers_n" -eq 0 || "$formats_n" -eq 0 ]]; then
            echo "spec_uris={}" >> "$GITHUB_OUTPUT"
            echo "spec_uris: {}"
            exit 0
          fi
          rows=$(mktemp)
          trap 'rm -f "$rows"' EXIT
          while read -r prov; do
            while read -r fmt; do
              if [[ "$EVENT_NAME" == "schedule" ]]; then
                if [[ "$fmt" == "wds" ]]; then
                  exp="generate_dataset/smoke-shard-wds"
                else
                  exp="generate_dataset/smoke-shard"
                fi
              else
                exp="$DISPATCH_DATASET_CONFIG"
              fi
              rid="${RUN_ID_BASE}-${prov}-${fmt}"
              if ! uri=$(synth-setter-spec-uri --from-experiment "$exp" --run-id-override "$rid"); then
                echo "::error::synth-setter-spec-uri failed for experiment=${exp} run_id=${rid}"
                exit 1
              fi
              if [[ -z "$uri" ]]; then
                echo "::error::synth-setter-spec-uri returned empty URI for experiment=${exp} run_id=${rid}"
                exit 1
              fi
              jq -nc --arg k "${prov}-${fmt}" --arg v "$uri" '{($k): $v}' >> "$rows"
            done < <(printf '%s' "$FORMATS_JSON" | jq -r '.[]')
          done < <(printf '%s' "$PROVIDERS_JSON" | jq -r '.[]')
          json=$(jq -sc 'add // {}' < "$rows")
          actual_n=$(printf '%s' "$json" | jq 'length')
          expected_n=$(( providers_n * formats_n ))
          if [[ "$actual_n" -ne "$expected_n" ]]; then
            echo "::error::spec_uris cardinality mismatch: expected ${expected_n}, got ${actual_n}"
            exit 1
          fi
          echo "spec_uris=$json" >> "$GITHUB_OUTPUT"
          echo "spec_uris: $json"

  # `skypilot-local` / `runpod` / `oci` rows: route through the official
  # launcher reusable. Cluster name includes `github.run_attempt` so re-running
  # a failed job doesn't collide on the launcher's R2 spec key. The
  # `--num-workers 1` override for skypilot-local mirrors today's hardcoded
  # behavior â€” the single-node kind cluster can't host parallel workers (#843).
  generate-launcher:
    name: Run generate_dataset (${{ matrix.provider }} / ${{ matrix.output_format }})
    needs: setup
    if: ${{ needs.setup.outputs.providers != '[]' && needs.setup.outputs.output_formats != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        provider: ${{ fromJSON(needs.setup.outputs.providers) }}
        output_format: ${{ fromJSON(needs.setup.outputs.output_formats) }}
    uses: ./.github/workflows/generate-dataset-shards.yaml
    with:
      provider: ${{ matrix.provider }}
      dataset_config: >-
        ${{
          github.event_name == 'schedule'
            && (matrix.output_format == 'wds'
                && 'generate_dataset/smoke-shard-wds'
                || 'generate_dataset/smoke-shard')
            || (inputs.dataset_config || 'generate_dataset/smoke-shard')
        }}
      image_tag: ${{ inputs.docker_image_tag || 'dev-snapshot' }}
      cluster_name: synth-setter-smoke-${{ matrix.provider }}-${{ matrix.output_format }}-${{ github.run_id }}-${{ github.run_attempt }}
      num_workers: ${{ matrix.provider == 'skypilot-local' && '1' || '' }}
      tail: true
      local: ${{ matrix.provider == 'skypilot-local' }}
      artifact_name: test-run-metadata-${{ matrix.provider }}-${{ matrix.output_format }}
      run_id: ${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.provider }}-${{ matrix.output_format }}
    secrets: inherit

  # Each validate cell reads its own spec_uri from `needs.setup.outputs.spec_uris`
  # â€” a non-matrix JSON map indexed by `<provider>-<output_format>`, populated
  # by the setup job via `synth-setter-spec-uri --from-experiment ...
  # --run-id-override ...`. Routing through `needs.setup` (a single non-matrix
  # job) instead of `needs.generate-launcher` (matrix) sidesteps GHA's
  # matrix-outputs scalar collapse documented at #1154; per-cell pairing is
  # restored because each generate cell wrote under the same per-cell run_id
  # formula. `if: !cancelled()` decouples each cell from the OTHER cells'
  # generate outcomes â€” RunPod transients won't skip OCI validation, and an
  # hdf5 failure won't skip wds.
  validate:
    name: Validate ${{ matrix.provider }} / ${{ matrix.output_format }} dataset
    needs: [setup, generate-launcher]
    if: ${{ !cancelled() && needs.setup.outputs.providers != '[]' && needs.setup.outputs.output_formats != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        provider: ${{ fromJSON(needs.setup.outputs.providers) }}
        output_format: ${{ fromJSON(needs.setup.outputs.output_formats) }}
    uses: ./.github/workflows/validate-dataset-shards.yaml
    with:
      image_tag: ${{ inputs.docker_image_tag || 'dev-snapshot' }}
      spec_uri: ${{ fromJSON(needs.setup.outputs.spec_uris)[format('{0}-{1}', matrix.provider, matrix.output_format)] }}
    secrets: inherit
