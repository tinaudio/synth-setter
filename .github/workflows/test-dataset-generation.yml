name: Test Dataset Generation

# Smoke test for the data-pipeline. Three execution modes share the same
# `validate-dataset-shards.yaml` downstream:
#
#   * `local`  — runs `pipeline.ci.materialize_spec` + `docker_entrypoint.py
#     generate_dataset` directly inside the dev-snapshot container on the
#     GitHub runner. No SkyPilot launcher, no cloud creds (R2 only). Manual
#     dispatch fallback for ad-hoc smoke; superseded by `skypilot-local` for
#     PR coverage. Stays inline here — it doesn't go through the
#     `generate-dataset-shards.yaml` reusable.
#   * `skypilot-local` — invokes `generate-dataset-shards.yaml` with
#     `local: true, num_workers: '1'` to provision a kind cluster on the
#     runner, load dev-snapshot into kind, and launch against
#     `configs/compute/local-template.yaml`. PR default — exercises the same
#     launcher / cred-bootstrap path as the cloud providers, closing the #806
#     unification gap. No billable capacity.
#   * `runpod` / `oci` — invoke `generate-dataset-shards.yaml` against the
#     matching cloud template. Manual dispatch only. See
#     docs/design/skypilot-compute-integration.md.
#
# All non-`local` rows let the launcher invoke the cred-bootstrap script
# (`pipeline.entrypoints.skypilot_launch._run_cred_bootstrap`); the launcher
# captures the script's stdout via `subprocess.run(capture_output=True)` so a
# `tee`'d caller workflow can't leak secrets.
#
# Provider matrix policy (computed in the `setup` job):
#   * pull_request (same repo) → skypilot-local only
#   * pull_request (fork)      → empty (forks can't read secrets)
#   * workflow_dispatch        → respect `inputs.provider`
#                                (all = skypilot-local + runpod + oci;
#                                 or local / skypilot-local / runpod / oci)
#
# Required secrets:
#   RCLONE_CONFIG_R2_ACCESS_KEY_ID, RCLONE_CONFIG_R2_SECRET_ACCESS_KEY,
#   RCLONE_CONFIG_R2_ENDPOINT, R2_ACCOUNT_ID —
#     Cloudflare R2 (used by every provider; the launcher's cred-bootstrap
#     also writes ~/.cloudflare/accountid using R2_ACCOUNT_ID for SkyPilot's
#     R2 storage adaptor once #749 is unblocked).
#   RUNPOD_API_KEY — written to ~/.runpod/config.toml so SkyPilot's RunPod
#     backend can `sky check runpod` (env var alone is insufficient).
#   OCI_USER_OCID, OCI_TENANCY_OCID, OCI_FINGERPRINT, OCI_REGION,
#     OCI_COMPARTMENT_OCID, OCI_API_KEY_PEM — written to ~/.oci/config +
#     ~/.sky/config.yaml so SkyPilot's OCI backend can `sky check oci`.
#   SKYPILOT_API_SERVER_ENDPOINT (optional) — when set, the launcher skips
#     the cred-bootstrap because the remote API server (#785) holds creds.

on:
  workflow_dispatch:
    inputs:
      dataset_config:
        description: "Path to dataset config YAML (under configs/dataset/)"
        required: true
        default: "configs/dataset/runpod-smoke-shard.yaml"
      docker_image_tag:
        description: "Docker image tag (e.g., dev-snapshot, dev-snapshot-<sha>)"
        required: false
        default: "dev-snapshot"
      provider:
        description: "Provider(s) to launch on (manual runs only; PR runs use skypilot-local)"
        required: false
        type: choice
        default: all
        options:
          - all
          - local
          - skypilot-local
          - runpod
          - oci
  pull_request:
    paths:
      - "src/data/vst/**"
      - "pipeline/schemas/**"
      - "configs/dataset/**"
      - "configs/compute/**"
      - "pipeline/entrypoints/**"
      - "scripts/docker_entrypoint.py"
      - "scripts/run-linux-vst-headless.sh"
      - "scripts/ensure_plugin_symlinks.sh"
      - "scripts/sync_worker_checkout.sh"
      - "scripts/skypilot_write_provider_creds.sh"
      - "pipeline/entrypoints/skypilot_launch.py"
      - ".github/workflows/test-dataset-generation.yml"
      - ".github/workflows/generate-dataset-shards.yaml"
      - ".github/workflows/validate-dataset-shards.yaml"
      - "requirements*.txt"

permissions:
  contents: read

# Coalesce stacked PR pushes — saves runner minutes on `local` PRs and
# avoids burning RunPod/OCI capacity on superseded `workflow_dispatch` runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Compute the provider list at runtime. Three outputs:
  #   * `providers`           — full union (drives the validate matrix).
  #   * `providers_local`     — subset routed through the inline `generate-local`
  #                             job (no launcher).
  #   * `providers_launcher`  — subset routed through the
  #                             `generate-dataset-shards.yaml` reusable.
  # Reusable workflows can't be invoked conditionally inside a single matrix
  # job (each `uses:` job is fixed), so the split happens here.
  #
  # Policy:
  #   * pull_request (same repo) → skypilot-local only (free; exercises the
  #     unified launcher path on a local kind cluster)
  #   * pull_request (fork)      → empty (forks can't read secrets)
  #   * workflow_dispatch        → respect `inputs.provider`
  #     - `all` expands to skypilot-local + runpod + oci. The legacy `local`
  #       (docker-only) row is opt-in via the dropdown for ad-hoc fallback.
  #
  # Empty array → downstream matrices skip naturally; no `has_jobs` flag.
  setup:
    name: Compute provider list
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      providers: ${{ steps.matrix.outputs.providers }}
      providers_local: ${{ steps.matrix.outputs.providers_local }}
      providers_launcher: ${{ steps.matrix.outputs.providers_launcher }}
    steps:
      - id: matrix
        env:
          EVENT_NAME: ${{ github.event_name }}
          PROVIDER_INPUT: ${{ inputs.provider || 'all' }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "pull_request" && "${PR_HEAD_REPO}" == "${REPO}" ]]; then
            providers='["skypilot-local"]'
          elif [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            case "${PROVIDER_INPUT}" in
              local)          providers='["local"]' ;;
              skypilot-local) providers='["skypilot-local"]' ;;
              runpod)         providers='["runpod"]' ;;
              oci)            providers='["oci"]' ;;
              *)              providers='["skypilot-local","runpod","oci"]' ;;
            esac
          else
            providers='[]'
          fi
          providers_local=$(python3 -c "import json,sys; ps=json.loads(sys.argv[1]); print(json.dumps([p for p in ps if p == 'local']))" "${providers}")
          providers_launcher=$(python3 -c "import json,sys; ps=json.loads(sys.argv[1]); print(json.dumps([p for p in ps if p != 'local']))" "${providers}")
          echo "providers=${providers}" >> "${GITHUB_OUTPUT}"
          echo "providers_local=${providers_local}" >> "${GITHUB_OUTPUT}"
          echo "providers_launcher=${providers_launcher}" >> "${GITHUB_OUTPUT}"
          echo "providers: ${providers}"
          echo "providers_local: ${providers_local}"
          echo "providers_launcher: ${providers_launcher}"

  # `local` provider: inline docker run, no SkyPilot. Materializes the spec
  # inside dev-snapshot, then `docker_entrypoint.py generate_dataset`
  # against rank=0/world=1. Output spec lands in /run-metadata/input_spec.json,
  # matching the shape produced by the launcher branch so validate-spec /
  # validate-shard are provider-agnostic. Should be replaced by a SkyPilot
  # local-cloud template (#806).
  generate-local:
    name: Run generate_dataset (${{ matrix.provider }})
    needs: setup
    if: ${{ needs.setup.outputs.providers_local != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        provider: ${{ fromJSON(needs.setup.outputs.providers_local) }}
    env:
      DATASET_CONFIG: >-
        ${{
          github.event_name == 'pull_request'
            && 'configs/dataset/runpod-smoke-shard.yaml'
            || (inputs.dataset_config || 'configs/dataset/runpod-smoke-shard.yaml')
        }}
      IMAGE_TAG: ${{ inputs.docker_image_tag || 'dev-snapshot' }}
      IMAGE: tinaudio/synth-setter:${{ inputs.docker_image_tag || 'dev-snapshot' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Pull image
        run: docker pull --quiet "${IMAGE}"

      - name: Prepare run-metadata mount
        run: mkdir -p "/tmp/run-metadata-${{ matrix.provider }}"

      - name: Run generate_dataset locally (inside container)
        env:
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.RCLONE_CONFIG_R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.RCLONE_CONFIG_R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.RCLONE_CONFIG_R2_ENDPOINT }}
          CONFIG_PATH: ${{ env.DATASET_CONFIG }}
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${{ github.workspace }}:/home/build/synth-setter" \
            -v "/tmp/run-metadata-${{ matrix.provider }}:/run-metadata" \
            -e CONFIG_PATH \
            -e RCLONE_CONFIG_R2_TYPE=s3 \
            -e RCLONE_CONFIG_R2_PROVIDER=Cloudflare \
            -e RCLONE_CONFIG_R2_ACCESS_KEY_ID \
            -e RCLONE_CONFIG_R2_SECRET_ACCESS_KEY \
            -e RCLONE_CONFIG_R2_ENDPOINT \
            -e SYNTH_SETTER_WORKER_RANK=0 \
            -e SYNTH_SETTER_NUM_WORKERS=1 \
            -e PYTHONPATH=/home/build/synth-setter \
            "${IMAGE}" \
            bash -c '
              set -euo pipefail
              cd /home/build/synth-setter
              git config --global --add safe.directory /home/build/synth-setter
              bash scripts/ensure_plugin_symlinks.sh
              python -m pipeline.ci.materialize_spec "$CONFIG_PATH" /run-metadata
              python scripts/docker_entrypoint.py generate_dataset \
                --spec /run-metadata/input_spec.json
              chmod 0644 /run-metadata/input_spec.json
            ' \
            2>&1 | tee "/tmp/run-metadata-${{ matrix.provider }}/generate.log"

      - name: Validate spec exists
        run: |
          set -euo pipefail
          SPEC_PATH="/tmp/run-metadata-${{ matrix.provider }}/input_spec.json"
          if [[ ! -f "${SPEC_PATH}" ]]; then
            echo "::error::input_spec.json not found at ${SPEC_PATH}"
            exit 1
          fi
          echo "=== Materialized Spec (${{ matrix.provider }}) ==="
          head -20 "${SPEC_PATH}"

      - name: Upload run metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-run-metadata-${{ matrix.provider }}
          path: /tmp/run-metadata-${{ matrix.provider }}/
          retention-days: 7
          if-no-files-found: warn

  # `skypilot-local` / `runpod` / `oci` rows: route through the official
  # launcher reusable. Cluster name includes `github.run_attempt` so re-running
  # a failed job doesn't collide on the launcher's R2 spec key. The
  # `--num-workers 1` override for skypilot-local mirrors today's hardcoded
  # behavior — the single-node kind cluster can't host parallel workers (#843).
  generate-launcher:
    name: Run generate_dataset (${{ matrix.provider }})
    needs: setup
    if: ${{ needs.setup.outputs.providers_launcher != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        provider: ${{ fromJSON(needs.setup.outputs.providers_launcher) }}
    uses: ./.github/workflows/generate-dataset-shards.yaml
    with:
      provider: ${{ matrix.provider }}
      dataset_config: >-
        ${{
          github.event_name == 'pull_request'
            && 'configs/dataset/runpod-smoke-shard.yaml'
            || (inputs.dataset_config || 'configs/dataset/runpod-smoke-shard.yaml')
        }}
      image_tag: ${{ inputs.docker_image_tag || 'dev-snapshot' }}
      cluster_name: synth-setter-smoke-${{ matrix.provider }}-${{ github.run_id }}-${{ github.run_attempt }}
      num_workers: ${{ matrix.provider == 'skypilot-local' && '1' || '' }}
      tail: true
      local: ${{ matrix.provider == 'skypilot-local' }}
      api_server: ""
      artifact_name: test-run-metadata-${{ matrix.provider }}
    secrets: inherit

  # validate-spec + validate-shard are provider-neutral; per-cell variation
  # is the artifact name. `if: !cancelled()` decouples each provider's
  # validate cell from the OTHER provider's generate outcome — RunPod
  # transients won't skip OCI validation.
  validate:
    name: Validate ${{ matrix.provider }} dataset
    needs: [setup, generate-local, generate-launcher]
    if: ${{ !cancelled() && needs.setup.outputs.providers != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        provider: ${{ fromJSON(needs.setup.outputs.providers) }}
    uses: ./.github/workflows/validate-dataset-shards.yaml
    with:
      image_tag: ${{ inputs.docker_image_tag || 'dev-snapshot' }}
      artifact_name: test-run-metadata-${{ matrix.provider }}
    secrets: inherit
