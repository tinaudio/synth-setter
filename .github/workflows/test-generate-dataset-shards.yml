name: Test Generate Dataset Shards (Real R2 + VST)

# Runs the `integration_r2`-gated end-to-end test in
# `tests/test_generate_dataset.py` against real Cloudflare R2 inside
# the `tinaudio/synth-setter:dev-snapshot` Docker image so the real Surge XT
# render path (Xvfb + xsettingsd + dbus) runs against the live R2 bucket.
# Mirrors `test-local-launcher-roundtrip.yml`'s R2 secrets + fork-PR gate
# and `test-vst-slow.yml`'s Docker + headless-X11 wrapper.

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag (e.g. dev-snapshot, dev-snapshot-<sha>)"
        required: false
        default: "dev-snapshot"
  pull_request:
    paths:
      - "tests/test_generate_dataset.py"
      - "tests/conftest.py"
      - "src/synth_setter/configs/dataset.yaml"
      - "src/synth_setter/configs/experiment/generate_dataset/**"
      - "src/synth_setter/configs/render/**"
      - "src/synth_setter/configs/r2/**"
      - "src/synth_setter/cli/generate_dataset.py"
      - ".github/workflows/test-generate-dataset-shards.yml"

permissions:
  contents: read

# Coalesce stacked PR pushes; run_id is included so manual workflow_dispatch
# re-runs against the same ref do not self-cancel.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && github.run_id || 'auto' }}
  cancel-in-progress: true

jobs:
  generate-dataset-shards:
    name: Generate dataset shards -> real R2 (Docker + VST)
    runs-on: ubuntu-latest-4core
    timeout-minutes: 30
    # Fork PRs can't see repo secrets; the rclone auth ping would fail and
    # burn runner minutes. Same gating pattern as test-local-launcher-roundtrip.yml.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository }}
    env:
      IMAGE: tinaudio/synth-setter:${{ inputs.image_tag || 'dev-snapshot' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Pull image
        run: docker pull "$IMAGE"

      # rclone runs inside the container; the in-runner env only supplies the
      # `RCLONE_CONFIG_R2_*` values the `docker run -e <VAR>` lines forward.
      - name: Set up R2
        uses: ./.github/actions/setup-r2
        with:
          access-key-id: ${{ secrets.RCLONE_CONFIG_R2_ACCESS_KEY_ID }}
          secret-access-key: ${{ secrets.RCLONE_CONFIG_R2_SECRET_ACCESS_KEY }}
          endpoint: ${{ secrets.RCLONE_CONFIG_R2_ENDPOINT }}

      # `run-linux-vst-headless.sh` wraps pytest because pedalboard imports
      # load the VST host which needs a live X display, so the headless
      # wrapper has to apply at the pytest level (not the entire container).
      # `ensure_plugin_symlinks.sh` recreates the in-image
      # `plugins/Surge XT.vst3` symlink that the workspace bind-mount shadows;
      # without it the worker resolves `plugin_path: plugins/Surge XT.vst3`
      # (from `src/synth_setter/configs/render/surge_xt.yaml`) to a missing
      # host file.
      - name: Run generate-dataset-shards e2e in Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/build/synth-setter \
            -e HYDRA_FULL_ERROR=1 \
            -e "SYNTH_SETTER_PLUGIN_PATH=/usr/lib/vst3/Surge XT.vst3" \
            -e RCLONE_CONFIG_R2_TYPE \
            -e RCLONE_CONFIG_R2_PROVIDER \
            -e RCLONE_CONFIG_R2_ACCESS_KEY_ID \
            -e RCLONE_CONFIG_R2_SECRET_ACCESS_KEY \
            -e RCLONE_CONFIG_R2_ENDPOINT \
            "$IMAGE" \
            bash -c '
              set -euo pipefail
              cd /home/build/synth-setter
              git config --global --add safe.directory /home/build/synth-setter
              bash docker/ubuntu22_04/ensure_plugin_symlinks.sh
              src/synth_setter/scripts/run-linux-vst-headless.sh \
                pytest tests/test_generate_dataset.py \
                  -m "integration_r2" \
                  -vv -s
            '
