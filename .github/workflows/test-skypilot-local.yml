name: Test SkyPilot Local

# Smoke test for SkyPilot's local Kubernetes ("kind") backend on a GitHub
# Actions runner. Spins up a kind cluster via `sky local up`, registers it as
# the SkyPilot "kubernetes" cloud, and launches the
# `local-debug-rclone-template.yaml` task — which uploads a sentinel file to
# Cloudflare R2 from inside the pod. No RunPod / OCI capacity used.
#
# Goal: verify the rclone-prefixed R2 env vars (RCLONE_CONFIG_R2_*) flow
# through `task.update_envs` into the worker pod, and that the worker can
# talk to R2 from inside kind. If this passes but the cloud-provider matrices
# (test-dataset-generation.yml runpod/oci) fail, the regression is in the
# cloud backend wiring, not the launcher's env or task wiring.
#
# Triggers: `workflow_dispatch` for ad-hoc runs, plus a `pull_request` trigger
# scoped narrowly to changes in this workflow or the local-debug template (the
# only inputs to the smoke). `sky local up` + image pull + sky launch is ~5–10
# min of runner time per dispatch — keep the path filter tight so unrelated PRs
# don't pay the runner cost. Fork PRs are skipped via the job-level `if:` since
# they can't read the R2 secrets.
#
# Required secrets:
#   RCLONE_CONFIG_R2_ACCESS_KEY_ID, RCLONE_CONFIG_R2_SECRET_ACCESS_KEY,
#   RCLONE_CONFIG_R2_ENDPOINT                          — Cloudflare R2.
#
# No provider creds: kind doesn't need RunPod / OCI keys. The
# `skypilot_write_provider_creds.sh` cred bootstrap is therefore not invoked
# here — provider keys are a no-op for the kubernetes backend.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/synth_setter/configs/compute/local-debug-rclone-template.yaml"
      - ".github/workflows/test-skypilot-local.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  local:
    name: SkyPilot local kind + R2 rclone smoke
    # Fork PRs can't read repo secrets, so the R2 step would fail with empty
    # values. Workflow_dispatch is unrestricted; PR runs are gated to same-repo.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLUSTER_NAME: synth-setter-local-${{ github.run_id }}-${{ github.run_attempt }}
      TEMPLATE: src/synth_setter/configs/compute/local-debug-rclone-template.yaml
      LOG_PATH: /tmp/skypilot-local-debug.log
      R2_BUCKET: intermediate-data
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # `sky local up` shells out to kind + kubectl. The runner image has
      # docker preinstalled but neither kind nor kubectl, so install both.
      # `helm/kind-action` with `install_only: true` pins the kind release
      # and validates its checksum, vs. curl-piping the binary unverified.
      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true
          version: v0.24.0

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      # SkyPilot's Kubernetes backend uses `kubectl port-forward` for the SSH
      # control channel into pods, which delegates to `socat` under the hood.
      # The stock ubuntu-latest runner doesn't ship it, so `sky check
      # kubernetes` reports "Kubernetes: disabled" and the subsequent
      # sky.launch raises NoCloudAccessError.
      - name: Install socat (kubectl port-forward dependency)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq socat

      # skypilot[runpod,oci,kubernetes]==0.12.0 + kubernetes==35.0.0 are pinned
      # in [project.dependencies]; --frozen installs the validated closure.
      - name: Install SkyPilot via uv sync --frozen
        run: uv sync --frozen --extra cpu --no-default-groups --group dev

      # Provision the local kind cluster. `--no-gpus` keeps the cluster CPU-
      # only so the runner image's missing nvidia-container-toolkit doesn't
      # gate the smoke. `sky local up` creates the kind cluster (default kind
      # name "skypilot") and points kubectl at it; that context is what
      # `sky check kubernetes` validates and what subsequent `sky launch`
      # calls schedule onto. The SkyPilot cluster name passed to `sky.launch`
      # below (`CLUSTER_NAME`, run-scoped) is independent — kind names the
      # backing cluster, SkyPilot names the logical job cluster.
      - name: sky local up
        run: uv run sky local up --no-gpus

      # rclone runs inside the worker pod (not on the runner); setup-r2 only
      # exports the `RCLONE_CONFIG_R2_*` env the `sky launch` step reads via
      # `os.environ` and forwards into the pod through `task.update_envs`.
      - name: Set up R2
        uses: ./.github/actions/setup-r2
        with:
          access-key-id: ${{ secrets.RCLONE_CONFIG_R2_ACCESS_KEY_ID }}
          secret-access-key: ${{ secrets.RCLONE_CONFIG_R2_SECRET_ACCESS_KEY }}
          endpoint: ${{ secrets.RCLONE_CONFIG_R2_ENDPOINT }}

      # Launch the local-debug rclone task. R2 env vars are forwarded into
      # the worker pod via task.update_envs — same wiring the production
      # launcher uses on the cloud backends, so a regression here flags an
      # env-forwarding bug that would otherwise only surface on a billable
      # provider.
      #
      # The Python script runs `sky.check.check(['kubernetes'])` IN-PROCESS
      # before `sky.launch`. Without it, `sky.launch` raises
      # NoCloudAccessError on a fresh ubuntu-latest runner: SkyPilot 0.12's
      # API-server architecture caches enabled-clouds per process, and a
      # CLI-step `sky check` doesn't always populate the cache the SDK reads
      # — sharing the call from inside the same Python process is the
      # robust workaround.
      - name: sky launch (local-debug rclone task)
        run: |
          set -o pipefail
          uv run python - <<'PY' 2>&1 | tee "$LOG_PATH"
          import os
          import sys

          import sky
          import sky.check

          cluster = os.environ["CLUSTER_NAME"]
          template_path = os.environ["TEMPLATE"]

          print("[probe] sky.check.check(['kubernetes'])")
          sky.check.check(clouds=["kubernetes"], quiet=False)

          print(f"[probe] launching cluster={cluster} on local kind kubernetes")
          task = sky.Task.from_yaml(template_path)
          task.update_envs(
              {
                  "RCLONE_CONFIG_R2_TYPE": "s3",
                  "RCLONE_CONFIG_R2_PROVIDER": "Cloudflare",
                  "RCLONE_CONFIG_R2_ACCESS_KEY_ID": os.environ["RCLONE_CONFIG_R2_ACCESS_KEY_ID"],
                  "RCLONE_CONFIG_R2_SECRET_ACCESS_KEY": os.environ["RCLONE_CONFIG_R2_SECRET_ACCESS_KEY"],
                  "RCLONE_CONFIG_R2_ENDPOINT": os.environ["RCLONE_CONFIG_R2_ENDPOINT"],
                  "R2_BUCKET": os.environ["R2_BUCKET"],
                  "R2_DEBUG_PREFIX": f"data/skypilot-local-debug/{cluster}/",
              }
          )
          launch_req = sky.launch(
              task,
              cluster_name=cluster,
              idle_minutes_to_autostop=0,
              down=True,
          )
          job_id, _ = sky.stream_and_get(launch_req)
          print(f"[probe] launched job_id={job_id}, tailing logs")
          rc = sky.tail_logs(cluster_name=cluster, job_id=job_id, follow=True)
          print(f"[probe] tail_logs rc={rc}")
          if rc != 0:
              sys.exit(rc)
          PY

      # Always tear down the kind cluster so concurrent dispatches don't
      # collide on the same cluster name and the runner's docker daemon
      # exits clean.
      - name: sky local down
        if: always()
        run: uv run sky local down || true

      - name: Upload run metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skypilot-local-debug-metadata
          path: /tmp/skypilot-local-debug.log
          retention-days: 7
          if-no-files-found: warn
