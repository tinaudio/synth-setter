name: Docs

# Phase 2 (this file): on merge to main (or manual dispatch), build the mkdocs
# site, merge the benchmark chart from the gh-pages data branch, and deploy
# the combined site to GitHub Pages via actions/deploy-pages@v4. Phase 1 (#966)
# uploaded site/ as a downloadable PR artifact; that behavior is intentionally
# replaced here — reviewers preview locally via `mkdocs serve`. See #967.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "src/synth_setter/pipeline/schemas/spec.py"
      - "src/synth_setter/schemas/**"
      - ".github/workflows/docs.yml"
  # PR builds run build-docs only (no Pages deploy) — see #967.
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "src/synth_setter/pipeline/schemas/spec.py"
      - "src/synth_setter/schemas/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:
  # Redeploy after the benchmark workflow pushes new chart data to gh-pages.
  # gh-pages is the benchmark-action's persistence layer (see
  # docs/reference/audio-similarity-benchmarks.md); this workflow merges its
  # dev/bench/ content into the deployed site, so a bench-only update must
  # also trigger a deploy.
  workflow_run:
    workflows: ["VST Slow Tests"]
    types: [completed]
    branches: [main]

# Least-privilege default; ``pages: write`` / ``id-token: write`` live only
# on ``deploy-docs`` so PR runs (including from forks) can't reach Pages.
permissions:
  contents: read

# Serialize Pages deploys: cancel-in-progress: false lets an in-flight deploy
# finish (avoids a half-published site) while still queuing the next one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # PR-only build smoke check; deploy-docs handles publishing on push/main.
  build-docs:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Pinned so a future workflow-level grant can't silently re-broaden this job.
    permissions:
      contents: read
    steps:
      - name: Checkout docs source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # Heavy runtime lives in PEP 735 groups since #1139; `--group dev`
      # transitively includes `docs` + `runtime`, so mkdocstrings can import the
      # package and the schema/docs-build pytest steps have the full stack.
      - name: Install docs + dev groups
        run: uv pip install --system --group dev -e .

      # Two pytest invocations because the conftest hygiene differs per path — see PR #1065.
      - name: Run schema tests (preserves tests/schemas/conftest.py)
        run: pytest tests/schemas/ -q --confcutdir=tests/schemas

      - name: Build site and run docs-build integration test
        run: pytest tests/test_docs_build.py -q --noconftest

  # Skips: pull_request (covered by build-docs), failed workflow_run (would
  # republish stale bench data), workflow_dispatch off main (no feature-branch
  # publishing).
  deploy-docs:
    if: github.event_name != 'pull_request' && (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') && (github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout docs source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # mkdocstrings imports the package, so the docs build needs the heavy
      # runtime (in PEP 735 groups since #1139) plus the `docs` group.
      - name: Install docs + runtime groups
        run: uv pip install --system --group docs --group runtime -e .

      - name: Build site
        run: mkdocs build --strict

      # Discriminate 404 (branch absent, soft-skip) from 5xx/auth (fail loud);
      # a blanket continue-on-error on the checkout would mask transient blips.
      - name: Probe gh-pages branch existence
        id: probe_ghpages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          http_code=$(curl -sS --retry 3 --retry-delay 2 \
            -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/branches/gh-pages")
          case "$http_code" in
            200) echo "gh-pages branch exists"; echo "exists=true" >> "$GITHUB_OUTPUT" ;;
            404) echo "gh-pages branch absent - bench merge will be skipped"; echo "exists=false" >> "$GITHUB_OUTPUT" ;;
            *)   echo "Unexpected HTTP $http_code from branches/gh-pages" >&2; exit 1 ;;
          esac

      - name: Fetch benchmark history from gh-pages data branch
        if: steps.probe_ghpages.outputs.exists == 'true'
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages-data

      # rm -rf before cp -R; otherwise an existing site/dev/bench would
      # nest the copy as site/dev/bench/bench/.
      - name: Merge benchmark chart into site
        if: steps.probe_ghpages.outputs.exists == 'true'
        run: |
          if [ -d gh-pages-data/dev/bench ]; then
            rm -rf site/dev/bench
            mkdir -p site/dev
            cp -R gh-pages-data/dev/bench site/dev/bench
            echo "Merged benchmark chart into site/dev/bench"
          else
            echo "gh-pages branch exists but has no dev/bench/ — skipping bench merge"
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
