name: Docs

# Phase 2 (this file): on merge to main (or manual dispatch), build the mkdocs
# site, merge the benchmark chart from the gh-pages data branch, and deploy
# the combined site to GitHub Pages via actions/deploy-pages@v4. Phase 1 (#966)
# uploaded site/ as a downloadable PR artifact; that behavior is intentionally
# replaced here — reviewers preview locally via `mkdocs serve`. See #967.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "src/pipeline/schemas/spec.py"
      - ".github/workflows/docs.yml"
  workflow_dispatch:
  # Redeploy after the benchmark workflow pushes new chart data to gh-pages.
  # gh-pages is the benchmark-action's persistence layer (see
  # docs/reference/audio-similarity-benchmarks.md); this workflow merges its
  # dev/bench/ content into the deployed site, so a bench-only update must
  # also trigger a deploy.
  workflow_run:
    workflows: ["VST Slow Tests"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize Pages deploys: cancel-in-progress: false lets an in-flight deploy
# finish (avoids a half-published site) while still queuing the next one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Skip on workflow_run when the upstream run didn't succeed — otherwise
    # we'd republish stale chart data after a failed bench run.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout docs source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install docs extras
        run: pip install -e '.[docs]'

      - name: Build site
        run: mkdocs build --strict

      # gh-pages is the benchmark-action's persistence layer; only its
      # dev/bench/ subtree is republished by the next step. The probe lets a
      # fresh repo (no gh-pages branch yet) deploy docs without bench while
      # still failing the workflow loudly on transient checkout errors —
      # `continue-on-error: true` on the checkout itself would also swallow
      # network / auth failures, not just a missing branch.
      - name: Probe gh-pages branch existence
        id: probe_ghpages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh api "repos/${{ github.repository }}/branches/gh-pages" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch benchmark history from gh-pages data branch
        if: steps.probe_ghpages.outputs.exists == 'true'
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages-data

      # rm -rf before cp avoids the cp -R nested-directory hazard: if
      # site/dev/bench already exists (mkdocs emits there in the future, or
      # this step is re-run), cp -R would create site/dev/bench/bench/.
      - name: Merge benchmark chart into site
        if: steps.probe_ghpages.outputs.exists == 'true'
        run: |
          if [ -d gh-pages-data/dev/bench ]; then
            rm -rf site/dev/bench
            mkdir -p site/dev
            cp -R gh-pages-data/dev/bench site/dev/bench
            echo "Merged benchmark chart into site/dev/bench"
          else
            echo "gh-pages branch exists but has no dev/bench/ — skipping bench merge"
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
