# This workflow finds which files were changed, prints them,
# and runs `pre-commit` on those files.

# Inspired by the sktime library:
# https://github.com/alan-turing-institute/sktime/blob/main/.github/workflows/test.yml

name: Code Quality PR

on:
  pull_request:
    branches: [main, "release/*", "dev"]

jobs:
  code-quality:
    runs-on: ubuntu-latest

    steps:
      # fetch-depth: 0 is required by the pydoclint-exclude-ratchet step below,
      # which diffs against the PR base SHA — see #938 (P6 blind spot).
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # `--only-group dev` installs lint/type-check tools without the torch stack.
      - name: Install dev tools (uv sync --frozen, no torch)
        run: uv sync --frozen --only-group dev

      # Put the uv venv on PATH so pre-commit finds the synced ruff/pyright/pydoclint.
      - name: Activate uv venv on PATH
        run: echo "${GITHUB_WORKSPACE}/.venv/bin" >> "$GITHUB_PATH"

      - name: Find changed files
        id: changed_files
        uses: tj-actions/changed-files@v45
        with:
          separator: " "

      - name: List changed files
        run: echo '${{ steps.changed_files.outputs.all_changed_files }}'

      - name: Run pre-commits
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --files ${{ steps.changed_files.outputs.all_changed_files }}

      # Closes pydoclint's P6 blind spot: a new function/class added to a file
      # listed in [tool.pydoclint].exclude would otherwise enter main without
      # ever being linted. The guard fails the PR if it finds one, forcing the
      # author to either clean the file (preferred) or revert the addition.
      # See #938.
      - name: Guard against new defs in pydoclint-excluded files
        run: uv run python scripts/check_no_new_funcs_in_pydoclint_excluded.py --base ${{ github.event.pull_request.base.sha }}
