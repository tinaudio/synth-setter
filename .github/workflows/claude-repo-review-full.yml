name: Claude Repo Review (Full)

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

# One full review per PR; a new push supersedes the in-flight review of the stale diff.
concurrency:
  group: claude-repo-review-full-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  repo-review-full:
    runs-on: ubuntu-latest
    # repo-review-full fans out one agent per applicable checklist, so it needs
    # generous headroom.
    timeout-minutes: 55
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      # fetch-depth: 0 — one fan-out agent reads git blame/history for context.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # The /repo-review-full skill is repo-local (.claude/skills -> agent/skills),
      # so no plugin_marketplaces is needed; the action discovers it as a project skill.
      - name: Run Claude repo-review-full
        id: repo-review-full
        uses: anthropics/claude-code-action@12531344451323133b0493233c759991ac61da12 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          # /repo-review-full posts inline comments by default; no extra flag needed.
          prompt: >-
            /repo-review-full ${{ github.event.pull_request.number }}
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

      - name: Capture Claude failure result
        id: capture-claude-failure
        if: ${{ failure() && steps.repo-review-full.outputs.execution_file != '' }}
        continue-on-error: true
        shell: bash
        env:
          EXECUTION_FILE: ${{ steps.repo-review-full.outputs.execution_file }}
        run: |
          jq '[.[] | select(.type == "result") | {type, subtype, is_error, result, errors, duration_ms, num_turns, total_cost_usd}]' \
            "$EXECUTION_FILE" > "$RUNNER_TEMP/claude-failure.json"

      - name: Upload Claude failure result
        id: upload-claude-failure
        if: ${{ always() && steps.capture-claude-failure.outcome == 'success' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: claude-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/claude-failure.json
          retention-days: 7
