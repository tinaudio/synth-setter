name: CI Triage Agent

# Autonomous triage on failed workflow runs. Design: #923.
# Gated on the CLAUDE_CODE_OAUTH_TOKEN secret — no-op without it.
#
# Required secrets:
#   CLAUDE_CODE_OAUTH_TOKEN — Claude Code headless OAuth token. Generate
#                             with `claude setup-token` locally; set on the
#                             repo with `gh secret set`. No-op without it.
#   GITHUB_TOKEN            — auto-provided; used for branch / PR / issue
#                             writes under the job's `permissions:` block.

on:
  workflow_run:
    workflows:
      - "Tests"
      - "Code Quality PR"
      - "GPU Tests"
      - "MPS Tests"
      - "CPU Slow Tests"
      - "Test Dataset Generation"
      - "Validate Dataset Shards"
      - "Test SkyPilot Local"
      - "Test SkyPilot Debug"
      - "VST Slow Tests"
      - "Docker Image Build and Push"
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: "Failed workflow run ID to triage"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

concurrency:
  group: ci-triage-${{ github.event.workflow_run.id || github.event.inputs.run_id }}
  cancel-in-progress: false

jobs:
  triage:
    # Skip success runs and skip forks (write perms must not run against
    # untrusted code).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'failure' &&
       github.event.workflow_run.head_repository.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Verify CLAUDE_CODE_OAUTH_TOKEN is configured
        id: token-check
        env:
          HAS_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
        run: |
          set -euo pipefail
          if [ "${HAS_TOKEN}" != "true" ]; then
            echo "::notice::CLAUDE_CODE_OAUTH_TOKEN is not configured — triage skipped."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve failing run ID
        if: steps.token-check.outputs.configured == 'true'
        id: run
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "id=${{ github.event.inputs.run_id }}" >> "$GITHUB_OUTPUT"
          else
            echo "id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          fi

      # Cooldown: one triage attempt per failing run ID. The branch-existence
      # check is what protects against duplicate work — typical sources are
      # manual `workflow_dispatch` re-runs against the same run_id, or a
      # second `workflow_run` event firing if the failing workflow itself is
      # re-run from the UI. (`workflow_run` fires once per workflow run, not
      # per matrix job, so multiple in-matrix failures already collapse to a
      # single triage trigger.)
      - name: Check for existing triage branch (cooldown)
        if: steps.token-check.outputs.configured == 'true'
        id: cooldown
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="ci-triage/run-${{ steps.run.outputs.id }}"
          if gh api "repos/${{ github.repository }}/branches/${BRANCH}" >/dev/null 2>&1; then
            echo "::notice::Triage branch ${BRANCH} already exists — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.token-check.outputs.configured == 'true' && steps.cooldown.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Pinned act release with SHA-256 verification. Bump ACT_VERSION + the
      # matching checksum from the upstream `checksums.txt` together.
      - name: Install nektos/act (pinned + checksum-verified)
        if: steps.token-check.outputs.configured == 'true' && steps.cooldown.outputs.skip != 'true'
        env:
          ACT_VERSION: v0.2.88
          ACT_SHA256: 1eb9996682dfcc053ac8f3f90f2ec50376f0cdfc229712d82da03d673c63a2b3
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/act.tar.gz \
            "https://github.com/nektos/act/releases/download/${ACT_VERSION}/act_Linux_x86_64.tar.gz"
          echo "${ACT_SHA256}  /tmp/act.tar.gz" | sha256sum -c -
          sudo tar -xzf /tmp/act.tar.gz -C /usr/local/bin act
          act --version

      # Pinned Claude Code CLI release. Bump CLAUDE_CODE_VERSION intentionally;
      # do not float to `latest` so triage runs stay reproducible across days.
      - name: Install Claude Code CLI (pinned)
        if: steps.token-check.outputs.configured == 'true' && steps.cooldown.outputs.skip != 'true'
        env:
          CLAUDE_CODE_VERSION: 2.1.105
        run: |
          set -euo pipefail
          npm install -g "@anthropic-ai/claude-code@${CLAUDE_CODE_VERSION}"
          claude --version

      # Path A in the triage prompt runs `make format`, which invokes
      # `pre-commit run -a` and must have pre-commit on PATH. Setup Python
      # explicitly so the toolchain is deterministic across runner images.
      - name: Set up Python + pre-commit (for Path A `make format`)
        if: steps.token-check.outputs.configured == 'true' && steps.cooldown.outputs.skip != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install pre-commit
        if: steps.token-check.outputs.configured == 'true' && steps.cooldown.outputs.skip != 'true'
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install pre-commit
          pre-commit --version

      # Write run metadata to a JSON sidecar so the agent can jq it instead
      # of inheriting potentially-unsafe strings via shell interpolation.
      - name: Write triage context sidecar
        if: steps.token-check.outputs.configured == 'true' && steps.cooldown.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ steps.run.outputs.id }}
          TRIAGE_BRANCH: ${{ steps.cooldown.outputs.branch }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/triage
          gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}" \
            --jq '{run_id: .id, name, head_branch, head_sha, conclusion, html_url, event, workflow_id}' \
            > /tmp/triage/run.json
          jq -n \
            --arg repo "${{ github.repository }}" \
            --arg branch "${TRIAGE_BRANCH}" \
            --slurpfile run /tmp/triage/run.json \
            '{repo: $repo, triage_branch: $branch, run: $run[0]}' \
            > /tmp/triage/context.json
          echo "::group::Triage context"
          cat /tmp/triage/context.json
          echo "::endgroup::"

      - name: Run triage agent (claude -p headless)
        if: steps.token-check.outputs.configured == 'true' && steps.cooldown.outputs.skip != 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          claude -p "$(cat .github/triage/triage-prompt.md)" \
            --output-format stream-json \
            --verbose \
            --max-turns 30 \
            --permission-mode acceptEdits \
            --add-dir "${GITHUB_WORKSPACE}" \
            --add-dir /tmp/triage \
            | tee /tmp/triage/transcript.jsonl

      - name: Upload triage transcript
        if: always() && steps.token-check.outputs.configured == 'true' && steps.cooldown.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ci-triage-transcript-${{ steps.run.outputs.id }}
          path: /tmp/triage/
          retention-days: 14
