name: GPU Tests

# Runs only @pytest.mark.gpu tests on a GPU runner.
# Manual dispatch and post-merge to main.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"

jobs:
  run_tests:
    runs-on: gpu-x64

    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        # GitHub GPU runner ships NVIDIA driver 12080 (CUDA 12.0).
        # torch >=2.7.0 requires CUDA 13.x — cap it via PIP_CONSTRAINT
        # so CI stays compatible without changing requirements-torch.txt.
        run: |
          python -m pip install --upgrade pip
          echo 'torch<2.7.0' > /tmp/torch-constraint.txt
          PIP_CONSTRAINT=/tmp/torch-constraint.txt pip install -r requirements.txt
          pip install sh

      - name: List dependencies
        run: |
          python -m pip list

      - name: Run GPU tests
        env:
          HYDRA_FULL_ERROR: "1"
        run: |
          pytest -vv -s -m gpu
