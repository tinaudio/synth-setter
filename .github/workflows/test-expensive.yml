name: Slow Tests

# Runs the @pytest.mark.slow suite while skipping GPU-marked tests.
# Triggered post-merge on main (and via manual dispatch).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"

concurrency:
  group: test-expensive-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run_slow_tests:
    # Larger runner: the slow CPU suite runs PyTorch forward passes on the FFN
    # smoke fixtures, and the standard 2-core/7 GB `ubuntu-latest` OOMs during
    # those passes. `ubuntu-latest-4core` (4 vCPU / 16 GB) is the smallest
    # GitHub-hosted label that fits — see `docs/reference/github-actions.md`
    # for the runner inventory. Don't downgrade without a CPU+memory probe.
    runs-on: ubuntu-latest-4core

    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system sh

      - name: List dependencies
        run: uv pip list --system

      - name: Run slow (non-GPU) tests
        env:
          HYDRA_FULL_ERROR: "1"
        run: |
          pytest -vv -s -m "slow and not gpu"
