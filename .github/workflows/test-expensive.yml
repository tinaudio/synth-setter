name: Slow Tests

# Runs the @pytest.mark.slow suite while skipping GPU-marked tests.
# Triggered post-merge on main (and via manual dispatch).
on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: test-expensive-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run_slow_tests:
    runs-on: ubuntu-latest

    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system sh

      - name: List dependencies
        run: uv pip list --system

      - name: Cache MNIST dataset
        uses: actions/cache@v4
        with:
          path: data/MNIST
          key: mnist-dataset-v1

      - name: Run slow (non-GPU) tests
        env:
          HYDRA_FULL_ERROR: "1"
        run: |
          pytest -vv -s -m "slow and not gpu"
