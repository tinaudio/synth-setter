"src/synth_setter/data/surge_datamodule.py" = ["D102", "D103", "D107"]
"src/synth_setter/data/vst/core.py" = ["D102", "D103", "D107"]
"src/synth_setter/data/vst/generate_vst_dataset.py" = ["D102", "D103", "D107"]
"src/synth_setter/data/vst/param_spec.py" = ["D102", "D103", "D107"]
"src/synth_setter/metrics.py" = ["D102", "D103", "D107"]
# S603/S607: rclone subprocess calls in R2 integration test fixtures.
"tests/pipeline/data/test_r2_report.py" = ["S603", "S607"]
# ANN001: pytest fixture-injected args left un-annotated on legacy callsites.
"tests/tools/test_surge_xt_interactive.py" = ["ANN001"]
