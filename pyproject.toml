[project]
name = "synth-setter"
version = "0.1.0"
description = "Studying the effect of permutation symmetry on audio synthesiser parameter inference."
readme = "README.md"
requires-python = ">=3.10"
dependencies = []

[tool.pytest.ini_options]
addopts = [
  "--color=yes",
  "--durations=0",
  "--strict-markers",
  "--doctest-modules",
]
filterwarnings = [
  "ignore::DeprecationWarning",
  "ignore::UserWarning",
]
log_cli = "True"
markers = [
  "slow: slow tests",
  "requires_vst: requires a VST plugin binary (Surge XT) — skipped unless plugin is present",
]
minversion = "6.0"
testpaths = "tests/"

[tool.ruff]
line-length = 99
target-version = "py310"

[tool.ruff.lint]
select = ["D417", "E", "F", "W", "I", "UP"]
extend-ignore = ["E203", "E402", "E501", "F401", "F841"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.coverage.report]
exclude_lines = [
    "pragma: nocover",
    "raise NotImplementedError",
    "raise NotImplementedError()",
    "if __name__ == .__main__.:",
]
