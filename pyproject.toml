[project]
name = "synth-setter"
version = "5.0.0"
description = "Studying the effect of permutation symmetry on audio synthesiser parameter inference."
authors = [{name = "Khaled Tinubu"}, {name = "tinaudio"}]
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  # --------- hydra --------- #
  "hydra-colorlog==1.2.0",
  "hydra-core==1.3.2",
  "hydra-optuna-sweeper==1.2.0",
  # --------- loggers --------- #
  "tensorboard",
  "wandb",
  # --------- pipeline --------- #
  "click<8.2",
  "numpy",
  "oci",
  "pydantic>=2",
  "pydantic-settings>=2",
  "pyyaml",
  "tomli; python_version < '3.11'",
  # Pin must stay in sync with the bare-runner install in
  # .github/workflows/test-skypilot-debug.yml.
  "skypilot[runpod,oci]==0.12.0",
  "structlog",
  "tenacity",
  "webdataset",
  # --------- runtime --------- #
  "dask[distributed]",
  "einops",
  "h5py",
  "hdf5plugin",
  "librosa",
  "loguru==0.7.3",
  "matplotlib",
  "mido",
  "pandas",
  "pedalboard",
  "POT",
  "pyloudnorm",
  "python-dotenv",
  "rich",
  "rootutils",
  "runpod==1.8.1",
  "scipy==1.14.1",
  "sh",
  "threadpoolctl",
  # --------- eval metrics --------- #
  "pesto-pitch==2.0.1",
  "dtw-python==1.7.4",
  "kymatio==0.3.0",
]

[project.optional-dependencies]
torch = [
  # Install with an explicit index (via uv's --torch-backend) when targeting
  # CUDA wheels in Docker.
  "torch>=2.0.0",
  "torchvision>=0.15.0",
  "torchaudio>=2.0.0",
  "lightning>=2.6.0",
  "torchmetrics>=0.11.4",
]
dev = [
  "hypothesis",
  "mutmut==3.5.*",
  "pre-commit",
  "pyright==1.1.408",
  "pytest",
  "pytest-benchmark",
  "pytest-xdist",
  "ruff",
]
docs = [
  "mkdocs",
  "mkdocs-material",
  "mkdocstrings[python]",
  "griffe-pydantic",
]
all = [
  "synth-setter[torch,dev]",
]


[project.scripts]
synth-setter-train = "synth_setter.cli.train:main"
synth-setter-eval = "synth_setter.cli.eval:main"
synth-setter-generate-dataset = "synth_setter.cli.generate_dataset:main"






[tool.setuptools.packages.find]
# PEP src-layout: the only Python package this project ships is `synth_setter`,
# living at src/synth_setter/. Setuptools discovers subpackages automatically.
where = ["src"]

[tool.setuptools.package-dir]
"" = "src"


[tool.pytest.ini_options]
addopts = [
  "--color=yes",
  "--durations=0",
  "--strict-markers",
  "--doctest-modules",
]
filterwarnings = [
  "ignore::DeprecationWarning",
  "ignore::UserWarning",
]
log_cli = "True"
markers = [
  "slow: slow tests",
  "gpu: tests requiring a GPU",
  "mps: tests requiring Apple MPS (Metal)",
  "hypothesis: property-based tests (hypothesis)",
  "pipeline: pipeline integration tests",
  "benchmark: performance benchmarks",
  "requires_vst: requires a VST plugin binary (Surge XT) — skipped unless plugin is present",
  "r2: tests requiring R2/rclone access",
  "docker_smoke: smoke tests that run inside the built Docker image",
  "network: tests that may make outbound network calls (e.g. `git fetch`)",
  "infra: tests that assert invariants of the devcontainer + GitHub Actions configuration",
]
minversion = "6.0"
pythonpath = ["src"]
testpaths = "tests/"


[tool.ruff]
target-version = "py310"
line-length = 99
exclude = ["logs", "data"]
# Legacy files excluded until per-file lint cleanup is done (see issue #25).
extend-exclude = []

[tool.ruff.lint]
# E=pycodestyle errors, F=pyflakes, I=isort, S=bandit security,
# T=T10 (print) + T20 (debugger), UP=pyupgrade, W=pycodestyle warnings,
# ANN001=missing-type-function-argument,
# D102/D103/D107=pydocstyle missing-docstring-on-{method,function,__init__}
# (closes pydoclint's "no docstring → skip checks" blind spot — see #938).
select = ["E", "F", "I", "S", "T", "UP", "W", "ANN001", "D102", "D103", "D107"]
# E501: line length handled by ruff-format, S101: allow assert in tests
ignore = ["E501", "S101"]

[tool.ruff.lint.per-file-ignores]
"notebooks/**" = ["E702", "E722", "F841", "T201", "ANN001", "D102", "D103", "D107"]
"src/synth_setter/pipeline/data/add_music2latent.py" = ["S605", "D102", "D103", "D107"]
"src/synth_setter/evaluation/compute_audio_metrics.py" = ["T201", "ANN001", "D102", "D103", "D107"]
"src/synth_setter/pipeline/data/stats.py" = ["E402", "T201", "ANN001"]
"src/synth_setter/tools/sig_perf.py" = ["E402", "T201", "D102", "D103", "D107"]
"src/synth_setter/tools/model_from_wandb.py" = ["E402", "D102", "D103", "D107"]
"src/synth_setter/tools/paramspec_to_table.py" = ["E402", "T201", "D102", "D103", "D107"]
"src/synth_setter/tools/plot_param2tok.py" = ["E402", "E741", "F841", "T201", "D102", "D103", "D107"]
"src/synth_setter/evaluation/predict_vst_audio.py" = ["E402", "F841", "D102", "D103", "D107"]
# S603/S606/S607: idle/passthrough use os.execvp by design — replace-process
# semantics so Docker SIGTERM reaches the exec'd PID 1.
