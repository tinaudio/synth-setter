[project]
name = "synth-permutations"
version = "0.1.0"
description = "Studying the effect of permutation symmetry on audio synthesiser parameter inference."
readme = "README.md"
requires-python = ">=3.10"
dependencies = []

[tool.pytest.ini_options]
addopts = [
  "--color=yes",
  "--durations=0",
  "--strict-markers",
  "--doctest-modules",
]
filterwarnings = [
  "ignore::DeprecationWarning",
  "ignore::UserWarning",
]
log_cli = "True"
markers = [
  "slow: slow tests",
  "gpu: tests requiring a GPU",
  "hypothesis: property-based tests (hypothesis)",
  "pipeline: pipeline integration tests",
  "benchmark: performance benchmarks",
  "requires_vst: requires a VST plugin binary (Surge XT) — skipped unless plugin is present",
  "r2: tests requiring R2/rclone access",
]
minversion = "6.0"
testpaths = "tests/"

[tool.ruff]
target-version = "py310"
line-length = 99
exclude = ["logs", "data"]
# Legacy files excluded until per-file lint cleanup is done (see issue #25).
extend-exclude = []

[tool.ruff.lint]
# E=pycodestyle errors, F=pyflakes, I=isort, S=bandit security,
# T=T10 (print) + T20 (debugger), UP=pyupgrade, W=pycodestyle warnings
select = ["E", "F", "I", "S", "T", "UP", "W"]
# E501: line length handled by ruff-format, S101: allow assert in tests
ignore = ["E501", "S101"]

[tool.ruff.lint.per-file-ignores]
"notebooks/**" = ["E702", "E722", "F841", "T201"]
"scripts/add_music2latent.py" = ["S605"]
"scripts/compute_audio_metrics.py" = ["T201"]
"scripts/get_dataset_stats.py" = ["E402", "T201"]
"scripts/make_sig_perf.py" = ["E402", "T201"]
"scripts/model_from_wandb_repl.py" = ["E402"]
"scripts/paramspec_to_table.py" = ["E402", "T201"]
"scripts/plot_param2tok.py" = ["E402", "E741", "F841", "T201"]
"scripts/predict_vst_audio.py" = ["E402", "F841"]
# S603/S607: rclone subprocess calls use CLI args (user-controlled, not untrusted input).
# T201: click.echo used for CLI output.
"scripts/r2_shard_report.py" = ["S603", "S607", "T201"]
"scripts/reshard_data.py" = ["T201"]
"scripts/subdir_funtime.py" = ["F841"]
# S603/S607: rclone subprocess calls in R2 integration test fixtures.
"tests/scripts/test_r2_shard_report.py" = ["S603", "S607"]
"src/eval.py" = ["E402", "F841"]
"src/models/components/transformer.py" = ["F841"]
"src/models/components/vae.py" = ["E402", "T201"]
"src/models/ksin_ff_module.py" = ["F821"]
"src/models/surge_ff_module.py" = ["F821"]
"src/train.py" = ["E402"]
"src/utils/__init__.py" = ["F401"]
"src/utils/callbacks.py" = ["F821", "T201"]

[tool.interrogate]
verbose = 2
fail-under = 80
ignore-init-module = true
ignore-init-method = true
ignore-module = true
ignore-nested-functions = true

[tool.docformatter]
wrap-summaries = 99
wrap-descriptions = 99
style = "sphinx"
black = true

[tool.semantic_release]
version_toml = ["pyproject.toml:project.version"]
branch = "main"
build_command = ""
commit_message = "chore(release): {version} [skip ci]"
changelog_file = "CHANGELOG.md"

# Major bumps: handled by default via "feat!:" prefix or "BREAKING CHANGE:" footer
# Pre-1.0: breaking changes bump minor (standard semver pre-1.0 behavior)
[tool.semantic_release.commit_parser_options]
allowed_tags = ["build", "chore", "ci", "docs", "feat", "fix", "internal-feat", "internal-fix", "monitoring", "perf", "refactor", "revert", "style", "test"]
minor_tags = ["feat"]
patch_tags = ["fix", "perf", "revert"]

[tool.coverage.report]
exclude_lines = [
    "pragma: nocover",
    "raise NotImplementedError",
    "raise NotImplementedError()",
    "if __name__ == .__main__.:",
]

[tool.mutmut]
# src/ excluded: mutmut v3 asserts module names don't start with "src." (it
# assumes src-layout, but this project imports `src` as a package).
paths_to_mutate = ["scripts/"]
tests_dir = ["tests/scripts/"]
pytest_add_cli_args = ["-o", "addopts=--color=yes --durations=0 --strict-markers", "-m", "not slow and not requires_vst and not r2 and not gpu and not benchmark"]
