[tool.semantic_release]
version_toml = ["pyproject.toml:project.version"]
branch = "main"
build_command = ""
commit_message = "chore(release): {version} [skip ci]"
changelog_file = "CHANGELOG.md"

# Major bumps: handled by default via "feat!:" prefix or "BREAKING CHANGE:" footer
# Pre-1.0: breaking changes bump minor (standard semver pre-1.0 behavior)
[tool.semantic_release.commit_parser_options]
allowed_tags = ["build", "chore", "ci", "docs", "feat", "fix", "internal-feat", "internal-fix", "monitoring", "perf", "refactor", "revert", "style", "test"]
minor_tags = ["feat"]
patch_tags = ["fix", "perf", "revert"]


[tool.coverage.report]
exclude_lines = [
    "pragma: nocover",
    "raise NotImplementedError",
    "raise NotImplementedError()",
    "if __name__ == .__main__.:",
]


[tool.mutmut]
# Phase 4 moved the previously-scripts/-resident Python tools into
# src/synth_setter/{evaluation,tools,pipeline/data}/; scripts/ci/ retains the
# job-queue CLI used by .github/workflows/job-queue*.yaml.
paths_to_mutate = [
    "src/synth_setter/evaluation/",
    "src/synth_setter/tools/",
    "src/synth_setter/pipeline/data/",
    "scripts/ci/",
]
tests_dir = [
    "tests/evaluation/",
    "tests/tools/",
    "tests/pipeline/data/",
    "tests/scripts/ci/",
]
pytest_add_cli_args = ["-m", "not slow and not requires_vst and not r2 and not gpu and not benchmark"]
