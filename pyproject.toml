    (^|/)\.git(/|$)
  | (^|/)\.tox(/|$)
  | (^|/)\.venv(/|$)
  | ^build/
  | ^dist/
  | ^node_modules/
  | ^\.claude/
  | ^\.worktrees/
  | ^notebooks/
  | ^pipeline/ci/load_image_config\.py$
  | ^pipeline/ci/validate_shard\.py$
  | ^pipeline/ci/validate_spec\.py$
  | ^pipeline/entrypoints/generate_dataset\.py$
  | ^pipeline/entrypoints/skypilot_launch\.py$
  | ^pipeline/partitioning\.py$
