[tool.interrogate]
verbose = 2
fail-under = 80
ignore-init-module = true
ignore-init-method = true
ignore-module = true
ignore-nested-functions = true

# wrap-summaries = 0 (not 99): a wrapped summary's 2nd line trips ruff D205, which
# no tool auto-fixes. Pinned by tests/infra/test_docstring_tooling_consistency.py.
[tool.docformatter]
wrap-summaries = 0
wrap-descriptions = 99
style = "sphinx"
black = true

# pydoclint: signature ↔ docstring consistency checks. Rule families documented
# at https://jsh9.github.io/pydoclint/violation_codes.html. Sphinx style chosen
# to match existing :param:/:return: docstrings and [tool.docformatter] above.

[tool.pydoclint]
style = "sphinx"
arg-type-hints-in-signature = true
arg-type-hints-in-docstring = false
check-return-types = false
check-yield-types = true
check-style-mismatch = true
require-return-section-when-returning-nothing = false
skip-checking-raises = false
skip-checking-short-docstrings = false
allow-init-docstring = true
check-class-attributes = true
# Read `# noqa: DOCxxx` from the def line (flake8/ruff convention) rather
# than from the closing-`"""` line. The pydoclint CLI default is
# "docstring"; flipping to "definition" aligns suppressions with the rest
# of this repo's lint stack so contributors don't get a silently inert
# suppression. See the adversarial probe summary on #939 and #938.
native-mode-noqa-location = "definition"
# Legacy violations are pinned in .pydoclint-baseline.txt (one row per
# (file, line, rule code)). New violations — including in files that
# used to be on the path exclude list — fail the hook. Audit baseline
# diffs in PR reviews; cleanup chunks delete rows. See #938.
baseline = ".pydoclint-baseline.txt"
# Disabled so pydoclint won't silently shrink the baseline when a contributor
# fixes a row's underlying violation. Regenerate manually with
# `pydoclint --generate-baseline=1 src/ tests/ scripts/` and commit the diff.
# Otherwise a successful fix produces a "no new violations, count unchanged"
# outcome that's hard to reason about. Tracked under #938.
auto-regenerate-baseline = false
# Path-level exclude regex (verbose). Infra-only after the baseline swap —
# tests/fixtures/ retained because tests/fixtures/baseline_repo and diff_repo
# are mock-repo data shelled out to by the test suite (conceptually adjacent
# to notebooks/: code-but-not-production-code), not legacy violations to
# clean up via the baseline.
exclude = '''(?x)
    (^|/)\.git(/|$)
  | (^|/)\.tox(/|$)
  | (^|/)\.venv(/|$)
  | ^build/
  | ^dist/
  | ^node_modules/
  | ^\.claude/
  | ^\.worktrees/
  | ^notebooks/
  | ^tests/fixtures/
'''

[tool.semantic_release]
version_toml = ["pyproject.toml:project.version"]
branch = "main"
build_command = ""
commit_message = "chore(release): {version} [skip ci]"
changelog_file = "CHANGELOG.md"

# Major bumps: handled by default via "feat!:" prefix or "BREAKING CHANGE:" footer
# Pre-1.0: breaking changes bump minor (standard semver pre-1.0 behavior)
[tool.semantic_release.commit_parser_options]
allowed_tags = ["automation", "build", "chore", "ci", "docs", "feat", "fix", "internal-feat", "internal-fix", "monitoring", "perf", "refactor", "revert", "style", "test"]
minor_tags = ["feat"]
patch_tags = ["fix", "perf", "revert"]



[tool.coverage.run]
source = ["src/synth_setter", "scripts/ci"]
branch = true
parallel = true
concurrency = ["thread", "multiprocessing"]
relative_files = true
omit = ["**/__main__.py"]


[tool.coverage.paths]
source = ["src/synth_setter", "*/src/synth_setter"]
scripts = ["scripts/ci", "*/scripts/ci"]


[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "raise NotImplementedError()",
    "if __name__ == .__main__.:",
    "if (typing\\.)?TYPE_CHECKING:",
    "@(typing\\.)?overload",
    "@(abc\\.)?abstractmethod",
    "\\.\\.\\.\\s*$",
]



[tool.mutmut]
# Phase 4 moved the previously-scripts/-resident Python tools into
# src/synth_setter/{evaluation,tools,pipeline/data}/; scripts/ci/ retains the
# job-queue CLI used by .github/workflows/job-queue*.yaml.
paths_to_mutate = [
    "src/synth_setter/evaluation/",
    "src/synth_setter/tools/",
    "src/synth_setter/pipeline/data/",
    "scripts/ci/",
]
tests_dir = [
    "tests/evaluation/",
    "tests/tools/",
    "tests/pipeline/data/",
    "tests/scripts/ci/",
]
# mutmut copies only `paths_to_mutate` into `mutants/` and strips the real
# `src/` off `sys.path` (see mutmut/__main__.py:setup_source_paths). Without
# `also_copy`, transitive imports from the un-mutated rest of the package
# (e.g. `synth_setter.cli`, `synth_setter.pipeline.r2_io`) fail with
# ImportError during stats collection. Copy the whole package so the sandbox
# can resolve them.
also_copy = ["src/synth_setter/"]
pytest_add_cli_args = ["-m", "not slow and not requires_vst and not r2 and not gpu and not benchmark"]
