[tool.interrogate]
verbose = 2
fail-under = 80
ignore-init-module = true
ignore-init-method = true
ignore-module = true
ignore-nested-functions = true

[tool.docformatter]
wrap-summaries = 99
wrap-descriptions = 99
style = "sphinx"
black = true

# pydoclint: signature ↔ docstring consistency checks. Rule families documented
# at https://jsh9.github.io/pydoclint/violation_codes.html. Sphinx style chosen
# to match existing :param:/:return: docstrings and [tool.docformatter] above.

[tool.pydoclint]
style = "sphinx"
arg-type-hints-in-signature = true
arg-type-hints-in-docstring = false
check-return-types = true
check-yield-types = true
check-style-mismatch = true
require-return-section-when-returning-nothing = false
skip-checking-raises = false
skip-checking-short-docstrings = false
allow-init-docstring = true
check-class-attributes = true
# Read `# noqa: DOCxxx` from the def line (flake8/ruff convention) rather
# than from the closing-`"""` line. The pydoclint CLI default is
# "docstring"; flipping to "definition" aligns suppressions with the rest
# of this repo's lint stack so contributors don't get a silently inert
# suppression. See the adversarial probe summary on #939 and #938.
native-mode-noqa-location = "definition"
