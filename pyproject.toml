  | ^src/synth_setter/tools/surge_xt_interactive\.py$
  | ^src/synth_setter/data/audio_datamodule\.py$
  | ^src/synth_setter/data/fm_datamodule\.py$
  | ^src/synth_setter/data/kosc_datamodule\.py$
  | ^src/synth_setter/data/ksin_datamodule\.py$
  | ^src/synth_setter/data/surge_datamodule\.py$
