[project]
name = "synth-setter"
version = "1.0.0"
description = "Studying the effect of permutation symmetry on audio synthesiser parameter inference."
authors = [{name = "Khaled Tinubu"}, {name = "tinaudio"}]
readme = "README.md"
requires-python = ">=3.10"
dependencies = []

[tool.pytest.ini_options]
addopts = [
  "--color=yes",
  "--durations=0",
  "--strict-markers",
  "--doctest-modules",
]
filterwarnings = [
  "ignore::DeprecationWarning",
  "ignore::UserWarning",
]
log_cli = "True"
markers = [
  "slow: slow tests",
  "gpu: tests requiring a GPU",
  "mps: tests requiring Apple MPS (Metal)",
  "hypothesis: property-based tests (hypothesis)",
  "pipeline: pipeline integration tests",
  "benchmark: performance benchmarks",
  "requires_vst: requires a VST plugin binary (Surge XT) — skipped unless plugin is present",
  "r2: tests requiring R2/rclone access",
  "docker_smoke: smoke tests that run inside the built Docker image",
  "network: tests that may make outbound network calls (e.g. `git fetch`)",
]
minversion = "6.0"
testpaths = "tests/"

[tool.ruff]
target-version = "py310"
line-length = 99
exclude = ["logs", "data"]
# Legacy files excluded until per-file lint cleanup is done (see issue #25).
extend-exclude = []

[tool.ruff.lint]
# E=pycodestyle errors, F=pyflakes, I=isort, S=bandit security,
# T=T10 (print) + T20 (debugger), UP=pyupgrade, W=pycodestyle warnings,
# ANN001=missing-type-function-argument
select = ["E", "F", "I", "S", "T", "UP", "W", "ANN001"]
# E501: line length handled by ruff-format, S101: allow assert in tests
ignore = ["E501", "S101"]

[tool.ruff.lint.per-file-ignores]
"notebooks/**" = ["E702", "E722", "F841", "T201", "ANN001"]
"scripts/add_music2latent.py" = ["S605"]
"scripts/compute_audio_metrics.py" = ["T201", "ANN001"]
"scripts/get_dataset_stats.py" = ["E402", "T201", "ANN001"]
"scripts/make_sig_perf.py" = ["E402", "T201"]
"scripts/model_from_wandb_repl.py" = ["E402"]
"scripts/paramspec_to_table.py" = ["E402", "T201"]
"scripts/plot_param2tok.py" = ["E402", "E741", "F841", "T201"]
"scripts/predict_vst_audio.py" = ["E402", "F841"]
# S603/S606/S607: idle/passthrough use os.execvp by design — replace-process
# semantics so Docker SIGTERM reaches the exec'd PID 1.
"scripts/docker_entrypoint.py" = ["S603", "S606", "S607"]
# S603/S607: rclone subprocess calls use CLI args (user-controlled, not untrusted input).
# T201: click.echo used for CLI output.
"scripts/r2_shard_report.py" = ["S603", "S607", "T201"]
"scripts/reshard_data.py" = ["T201"]
# .claude/skills/_shared/post_review.py: CLI helper that shells out to `gh` and
# prints html_url on success. S603/S607 are the bandit warnings for subprocess
# with a partial path — `gh` is on PATH by design (same pattern used by the
# scripts/r2_shard_report.py exemption above).
".claude/skills/_shared/post_review.py" = ["T201", "S603", "S607"]
"scripts/rewrite_dataset_to_latest.py" = ["ANN001"]
"scripts/subdir_funtime.py" = ["F841", "ANN001"]
# S603/S607: rclone subprocess calls in R2 integration test fixtures.
"tests/scripts/test_r2_shard_report.py" = ["S603", "S607"]
# ANN001: pytest fixture-injected args left un-annotated on legacy callsites.
"tests/scripts/test_surge_xt_interactive.py" = ["ANN001"]
"tests/pipeline/test_schemas/test_config.py" = ["ANN001"]
"tests/pipeline/test_schemas/test_prefix.py" = ["ANN001"]
"tests/test_benchmarks.py" = ["ANN001"]
"tests/test_configs.py" = ["ANN001"]
"src/eval.py" = ["E402", "F841"]
# ANN001: directory-wide ignore for legacy untyped function args under src/models/.
# New code under src/models/ should still annotate; remove this entry once legacy
# callsites are cleaned up.
"src/models/**" = ["ANN001"]
"src/models/components/transformer.py" = ["F841"]
"src/models/components/vae.py" = ["E402", "T201"]
"src/models/ksin_ff_module.py" = ["F821"]
"src/models/surge_ff_module.py" = ["F821"]
"src/train.py" = ["E402"]
"src/utils/__init__.py" = ["F401"]
"src/utils/callbacks.py" = ["F821", "T201", "ANN001"]
"src/utils/math.py" = ["ANN001"]

[tool.interrogate]
verbose = 2
fail-under = 80
ignore-init-module = true
ignore-init-method = true
ignore-module = true
ignore-nested-functions = true

[tool.docformatter]
wrap-summaries = 99
wrap-descriptions = 99
style = "sphinx"
black = true

# pydoclint: signature ↔ docstring consistency checks. Rule families documented
# at https://jsh9.github.io/pydoclint/violation_codes.html. Sphinx style chosen
# to match existing :param:/:return: docstrings and [tool.docformatter] above.
[tool.pydoclint]
style = "sphinx"
arg-type-hints-in-signature = true
arg-type-hints-in-docstring = false
check-return-types = true
check-yield-types = true
check-style-mismatch = true
require-return-section-when-returning-nothing = false
skip-checking-raises = false
skip-checking-short-docstrings = false
allow-init-docstring = true
check-class-attributes = true
# Path-level exclude regex (verbose). Default infra paths plus files that
