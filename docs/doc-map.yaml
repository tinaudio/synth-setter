  # ── Testing primer ──────────────────────────────────────────────
  - doc: docs/reference/testing.md
    description: Test layout, fixtures, markers, and the cpu/mps/gpu CI lane split
    sources:
      - pattern: "tests/conftest.py"
        covers: "Hydra cfg_train/cfg_train_lance/cfg_eval/cfg_dataset/cfg_surge_xt fixtures, accelerator parametrize, param_spec_name parametrize, experiment_name parametrize, _build_surge_xt_smoke_cfg, surge_xt_smoke_datasets, _validate_surge_dataset, Lance smoke helpers (_write_lance_smoke_split, fake_surge_smoke_lance_datasets, _LANCE_SMOKE_*), shared assertion helpers (train_loss_keys, assert_finite_train_loss, assert_log_per_param_mse_wired), shared constants (NUM_FIXTURE_SAMPLES, VST_HEADLESS_WRAPPER)"
      - pattern: "tests/claude_hooks/conftest.py"
        covers: "Autouse gate-override env scrub (GATE_OVERRIDE_ENV_VARS) so hook subprocesses see their documented default modes"
      - pattern: "tests/_vst.py"
        covers: "PLUGIN_PATH, VST_AVAILABLE, VST_SUBPROCESS_TIMEOUT_SECONDS"
      - pattern: "tests/test_train.py"
        covers: "E2E Hydra train / resume / Surge XT smoke + train→eval round-trip"
      - pattern: "tests/pipeline/**"
        covers: "Lance pipeline stress/integration coverage — shard claims, resume, partitioning, dataset lineage, spec/R2 IO, torchsynth-backed stress suite"
      - pattern: "tests/test_eval.py"
        covers: "Train→eval round-trip reference implementation"
      - pattern: "tests/cli/**"
        covers: "CLI-entrypoint unit tests (e.g. checkpoint migration)"
      - pattern: "tests/helpers/lance_fixtures.py"
        covers: "Shared write_lance_shard writer backing the Lance datamodule fixtures and the lance_torch dataloader test datasets (tests/helpers/lance_torch_datasets.py)"
      - pattern: "tests/helpers/run_if.py"
        covers: "RunIf decorator (min_gpus, etc.)"
      - pattern: ".github/workflows/test.yml"
        covers: "Default PR CI — runs make test-ci-unit (marker filter centralized in the Makefile, #1353)"
      - pattern: ".github/workflows/cpu-slow.yml"
        covers: "Post-merge slow CPU-only lane — runs make test-ci-slow (#1353); runner sized to avoid PyTorch CPU OOM; auto-files a ci-automation Bug on post-merge failure"
      - pattern: ".github/workflows/test-mps.yml"
        covers: "Pre-submit MPS lane on macos-latest (-m mps), triggered on src/synth_setter/configs/ PRs"
      - pattern: ".github/workflows/test-gpu.yml"
        covers: "Twice-weekly GPU lane on gpu-x64 (-m gpu)"
      - pattern: ".github/workflows/deflake-mps.yml"
        covers: "Manual-dispatch diagnostic loop on macos-latest — reruns a single pytest node N times via pytest-repeat (#1260 flake harness); uploads failed tmp_paths per iteration."
      - pattern: "pyproject.toml"
        covers: "Marker registration ([tool.pytest.ini_options].markers) and default selector"
        scope: "pytest-config"
      - pattern: "Makefile"
        covers: "CPU test target marker selectors"
        scope: "testing"
      - pattern: "Makefile"
        covers: "Darwin VST serialization and Linux headless wrapper"
        scope: "testing"
      - pattern: "Makefile"
        covers: "CI test marker source of truth"
        scope: "testing"
      - pattern: "src/synth_setter/scripts/run-linux-vst-headless.sh"
        covers: "Headless X11/Xvfb wrapper bootstrapped by test-full-* / test-vst-cpu on Linux"
      - pattern: "tests/_meta/**"
        covers: "AST-based meta-tests enforcing structural invariants on other test modules (e.g., no Hydra config-initializer imports in canonical entrypoint test files)"
      - pattern: "tests/infra/**"
        covers: "Devcontainer + GHA invariant tests — attached-mode MODE=idle, gh-auth flow, no baked secrets, post-create budget, post-create agent full-auto seeding (Codex config + agy wrapper), act --list parse, Makefile install-plugins targets + Dockerfile pin parity, PR-review model-routing + review-launcher contract tests (Claude/Codex/OpenCode role pinning, launcher dry-run and degrade paths)"
      - pattern: "tests/integration/**"
        covers: "Four classes of integration tests: (1) launcher-against-real-R2 round-trips with a stubbed VST renderer subprocess — fast PR-tier alternative to the kind + dev-snapshot matrix in `test-dataset-generation.yml`, run by `test-local-launcher-roundtrip.yml` (path-scoped) on same-repo PRs; (2) unmarked cross-platform shard-dispatch tests (`test_parallel_shard_dispatch.py`) that run in the default fast lane via `test.yml`; (3) real-Surge parallel renders parametrized over cadence cells (`test_parallel_shard_render_linux.py`, `requires_vst`+`slow`) run by `test-vst-slow.yml` — the cadence coverage retired from `test-dataset-generation-render-matrix.yml`; and (4) real-R2 streaming round-trips for pipeline/dataloader reads (`test_lance_r2_multipart.py`, `test_lance_torch_r2.py`, `test_finalize_dataset_r2.py`, `test_add_embeddings_r2.py`; `integration_r2`+`r2`+`slow`) that run wherever R2 credentials are provisioned. The `integration_r2` marker spans classes 1 and 4 — it gates on credentials, it does not identify a class."
      - pattern: ".github/workflows/test-local-launcher-roundtrip.yml"
        covers: "Fast PR-tier (~8-10 min) lane for `tests/integration/`: invokes the `synth-setter-generate-dataset` CLI entrypoint (`cli.generate_dataset.main()`, which then calls `generate()` internally) end-to-end against real R2 with the VST renderer subprocess stubbed; no kind, no sky.launch, no dev-snapshot image pull. Gated on same-repo PRs (forks skipped). Unique per-run R2 prefix + best-effort rclone purge teardown. PR #1170; tracks #1164."
      - pattern: ".github/workflows/test-generate-dataset-from-spec-uri.yml"
        covers: "PR-tier e2e for the spec-URI operator CLI (`synth-setter-generate-dataset-from-spec-uri <uri>`): real spec upload to R2, real CLI subprocess driven by the `r2://` / `s3://` URI inside the dev-snapshot Docker image (real Surge render, real shard uploads, real R2 probes; no stubs) — `tests/integration/test_generate_dataset_from_spec_uri_r2.py`. Same-repo PRs only; unique per-run R2 prefix + best-effort rclone purge teardown."

