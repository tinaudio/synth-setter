# doc-map.yaml — Structural mapping for doc-drift detection
#
# This file encodes which source files SHOULD be documented where.
# Grep-based detection catches drift when docs reference changed files.
# This mapping catches drift by OMISSION — when code adds something
# new and no doc mentions it.
#
# Review after each major refactor. The doc-drift skill checks this
# file for staleness (dead patterns, orphan sources) automatically.

version: 1

docs:
  # ── Docker reference ────────────────────────────────────────────
  - doc: docs/reference/dependency-management.md
    description: uv sync command surface, relock cadence, Linux resync flip
    sources:
      - pattern: "pyproject.toml"
        covers: "[project.dependencies], [project.optional-dependencies] backend extras (cpu, cu128) and legacy shims (torch, dev, docs, all), [dependency-groups] dev+docs, [tool.uv].conflicts, [[tool.uv.index]], [tool.uv.sources]"
      - pattern: "uv.lock"
        covers: "Committed universal lockfile (macOS + Linux + Windows resolution); regenerate with `uv lock` after pyproject edits and review the diff in PRs"
      - pattern: ".github/workflows/uv-lock-check.yml"
        covers: "macOS + Linux matrix running `uv lock --check` on every PR that touches pyproject.toml or uv.lock; catches stale-lock drift"
      - pattern: "docker/ubuntu22_04/Dockerfile"
        covers: "Container install via `uv sync --frozen --extra ${TORCH_BACKEND} --no-install-project` against the committed lock; dev-base stage installs the package editable on top"

  - doc: docs/reference/docker.md
    description: Docker build, run, debug reference
    sources:
      - pattern: "docker/**"
        covers: "Dockerfile stages, base images, layer structure, BuildKit secret mounts, devcontainer-tools stage"
      - pattern: ".devcontainer/Dockerfile"
        covers: "Dev container wrapper over devcontainer-tools stage, per-developer customization"
      - pattern: "src/synth_setter/pipeline/schemas/image_config.py"
        covers: "Pydantic model fields, validation behavior, strict/forbid semantics"
      - pattern: "src/synth_setter/configs/image/**"
        covers: "YAML field names and values, build parameters, defaults"
      - pattern: "Makefile"
        covers: "docker-build-* targets (dev-snapshot, devcontainer-tools), DOCKER_SECRETS, DOCKER_BUILD_FLAGS"
        scope: "docker"
      - pattern: "src/synth_setter/scripts/run-linux-vst-headless.sh"
        covers: "Headless X11 bootstrap, Xvfb setup, LIBGL_ALWAYS_SOFTWARE"
      - pattern: ".github/workflows/docker-build-validation.yml"
        covers: "CI steps, required secrets, tag scheme, smoke test flow, devcontainer-tools publish, GHCR mirror tags (ghcr.io/tinaudio/synth-setter), packages: write permission"

  # ── W&B integration reference ───────────────────────────────────
  - doc: docs/reference/wandb-integration.md
    description: W&B logging, auth, metrics, and artifact reference
    sources:
      - pattern: "src/synth_setter/configs/logger/wandb.yaml"
        covers: "Entity, project, log_model setting, offline mode"
      - pattern: "src/synth_setter/configs/logger/many_loggers.yaml"
        covers: "Default logger compose — which loggers are enabled out of the box"
      - pattern: "src/synth_setter/cli/train.py"
        covers: "WandbLogger instantiation, trainer integration, run lifecycle"
      - pattern: "src/synth_setter/cli/eval.py"
        covers: "Checkpoint resolution from W&B, evaluation logging"
      - pattern: "src/synth_setter/cli/generate_dataset.py"
        covers: "WandbLogger lifecycle for dataset generation: spec → hyperparams + dataset-spec artifact, per-shard + summary history rows, run id pinned to spec.run_id, inline oracle eval resuming the run to append test/* rows"
      - pattern: "src/synth_setter/configs/dataset.yaml"
        covers: "Default `logger: wandb` for dataset generation; entity/project sourced from logger/wandb.yaml"
      - pattern: "sweeps/**"
        covers: "Operator-authored W&B sweep configs driving `synth-setter-generate-dataset`; entity/project pinned in YAML, cadence-grid parameters threaded as Hydra overrides"
      - pattern: "src/synth_setter/utils/logging_utils.py"
        covers: "Metric logging helpers, hyperparameter logging, log_hyperparameters"
      - pattern: "src/synth_setter/utils/callbacks.py"
        covers: "W&B callback integrations, visualization uploads"

  # ── Data pipeline design doc ────────────────────────────────────
  - doc: docs/design/data-pipeline.md
    description: Distributed data pipeline design (RunPod + R2)
    sources:
      - pattern: "src/synth_setter/pipeline/schemas/prefix.py"
        covers: "Run ID prefix generation, shard ID scheme, deterministic naming"
      - pattern: "src/synth_setter/configs/experiment/**"
        covers: "Dataset generation configs, shard counts, sample counts, synth params"
      - pattern: "src/synth_setter/cli/generate_dataset.py"
        covers: "Dataset generation entrypoint: sequential or (when `render.parallel=True`) thread-pool-parallel multi-shard dispatch with R2 skip-existing probe (worker-side resumability MVP, #750) and per-shard `render.max_retries` retry loop around the renderer subprocess; @hydra.main CLI (`python -m synth_setter.cli.generate_dataset experiment=<id>`) composed from src/synth_setter/configs/dataset.yaml"
      - pattern: "src/synth_setter/configs/finalize_dataset.yaml"
        covers: "Finalize @hydra.main entry config; required `dataset_spec_uri` loads the persisted DatasetSpec from R2 (file://, r2://, or bare path); overrides `hydra.run.dir` because `task_name`/`run_name` are not in this cfg"
      - pattern: "src/synth_setter/cli/finalize_dataset.py"
        covers: "Finalize entrypoint: loads DatasetSpec from `cfg.dataset_spec_uri` via `load_spec_from_uri`, dispatches on `spec.output_format` (wds → `finalize_wds` streaming Welford / hdf5 → `finalize_hdf5` reshard + stats), writes `dataset.complete` marker last (R2 source-of-truth idempotency)"
      - pattern: ".github/workflows/generate-dataset-shards.yaml"
        covers: "Reusable launcher fan-out across providers (skypilot-local kind, runpod, oci); per-provider artifact upload; emits a `spec_uri` workflow output (the materialized spec's canonical under-prefix `input_spec.json` URI, computed by the `synth-setter-spec-uri` console script — see `src/synth_setter/pipeline/ci/spec_uri.py`) consumed by validate-dataset-shards"
      - pattern: ".github/workflows/validate-dataset-shards.yaml"
        covers: "Reusable spec + shard validation downstream of generate-dataset-shards; takes the `spec_uri` (r2://) emitted by generate-dataset-shards as its `spec_uri` input"
      - pattern: ".github/workflows/nightly-parallel-datagen.yml"
        covers: "Nightly + workflow_dispatch running generate-dataset with `++render.parallel=true` against real Surge XT + real R2, then validating spec + shards via `pipeline.ci.{validate_spec,validate_shard}`. Per-run unique `task_name` scopes the ephemeral R2 prefix to `data/<task_name>/<run_id>/` (preserves the `data/` invariant); always-on rclone purge on cleanup. Fills the CI gap left by the slow + requires_vst Linux Xvfb integration test."
      - pattern: "src/synth_setter/pipeline/ci/**"
        covers: "CI validation scripts, spec materialization, shard validation, and spec-URI extraction (`spec_uri.py` / `synth-setter-spec-uri`)"
      - pattern: "src/synth_setter/pipeline/r2_io.py"
        covers: "rclone-backed R2 helpers — URI handling, download, upload, size probe; single rclone call site shared by CI validators and the worker entrypoint's skip-existing probe"
      - pattern: "src/synth_setter/pipeline/spec_io.py"
        covers: "`input_spec.json` read/write/upload/discover helpers (`load_spec_from_uri`, `local_spec_path`, `write_spec_locally`, `upload_spec`, `find_input_specs`) — sole call site for writing the operator-side local mirror at `<workspace>/data/<task_name>/<run_id>/metadata/input_spec.json` (runner anchors at `_OPERATOR_WORKSPACE` via :func:`synth_setter.workspace.operator_workspace`, not Hydra's runtime output dir) and the R2 copy at `spec.r2.input_spec_uri()`; called from `cli/generate_dataset.py`'s `main()`. `load_spec_from_uri` is the thin wrapper around `read_spec_text` + `DatasetSpec.model_validate_json` used by `pipeline/data/reshard.py` so the reshard CLI parses specs without dragging Hydra into its import graph. `find_input_specs` glob-discovers already-materialized specs under a local `data/` root and is added for future use by `cli/generate_dataset.py`; not yet wired."
      - pattern: "src/synth_setter/pipeline/constants.py"
        covers: "Input spec filename, rclone remote name, and canonical `r2://` URI scheme constants"
      - pattern: "src/synth_setter/pipeline/schemas/r2_location.py"
        covers: "`R2Location` nested R2-storage model (bucket + prefix_root + prefix) plus `uri()` / `rclone_prefix()` / `shard_uri()` helpers — the single source of R2 URI construction"
      - pattern: "src/synth_setter/pipeline/schemas/spec.py"
        covers: "DatasetSpec (carries a nested `R2Location` via the `r2` field), RenderConfig, ShardSpec; OUTPUT_FORMAT_TO_EXTENSION / EXTENSION_TO_OUTPUT_FORMAT inverse-pair dispatch maps (DatasetSpec is built by spec_from_cfg in cli/generate_dataset.py from a Hydra-composed cfg; the suffix-dispatch maps are consumed by the renderer CLI's main() in data/vst/generate_vst_dataset.py — main() reads Path(data_file).suffix, looks it up in EXTENSION_TO_OUTPUT_FORMAT, and calls writers.make_hdf5_dataset or writers.make_wds_dataset)"
      - pattern: "src/synth_setter/pipeline/schemas/shard_metadata.py"
        covers: "ShardMetadata — strict pydantic sidecar payload written into wds tar shards as metadata.json and into HDF5 shards as audio.attrs; mirrored across both formats by make_hdf5_dataset / make_wds_dataset in writers.py."
      - pattern: "src/synth_setter/data/vst/writers.py"
        covers: "make_hdf5_dataset + make_wds_dataset entrypoints; per-batch sample-save helpers; ShardMetadata sidecar wiring; CLI suffix dispatch via EXTENSION_TO_OUTPUT_FORMAT."
      - pattern: "src/synth_setter/data/vst/shapes.py"
        covers: "Shared shape primitives consumed by writers + (planned) shard validator — DATASET_FIELD_NAMES, mel-front-end constants, audio_dataset_shape / mel_dataset_shape / param_array_dataset_shape."

  # ── SkyPilot compute integration design doc ─────────────────────
  - doc: docs/design/skypilot-compute-integration.md
    description: SkyPilot dispatch for the data pipeline — single generic launcher consumed by every `synth-setter-*` entrypoint with compute support (RunPod + OCI smoke)
    sources:
      - pattern: "src/synth_setter/pipeline/skypilot_launch.py"
        covers: "Generic `dispatch_via_skypilot(sky_cfg)` entrypoint: managed-jobs SDK via `sky.jobs.launch`, two-phase validate-then-side-effect, tail/detach split keyed on `sky_cfg.tail`. Callers thread domain envs through `sky_cfg.extra_envs` (merged after `resolve_worker_env`; rejected on collision with `_WORKER_ENV_KEYS`). Job-name fallback is domain-neutral (`synth-setter-<uuid8>`)."
      - pattern: "src/synth_setter/configs/compute/runpod-template.yaml"
        covers: 'SkyPilot Task YAML for RunPod: resources block, image_id injected per-launch by the launcher (`sky_cfg.worker_image_tag`, default `"dev-snapshot"`) via `_override_image_id`, env-var injection (RCLONE_CONFIG_R2_*), R2-URI spec contract (`WORKER_SPEC_URI` carries the canonical `input_spec.json` URI for CI validate-time consumers; the worker rebuilds the spec from pinned Hydra overrides)'
      - pattern: "src/synth_setter/configs/compute/oci-cpu-template.yaml"
        covers: "SkyPilot Task YAML for OCI CPU: resources block (Flex shape, no image_id — OCI rejects `docker:<image>`, so `_override_image_id` skips OCI Resources and the worker image is fed via the `WORKER_IMAGE` env), docker-in-run worker invocation, --privileged hammer for Xvfb/dbus (#776), delegates WORKER_GIT_REF checkout + uv install to `scripts/sync_worker_checkout.sh`, then invokes `synth-setter-generate-dataset-from-hydra` against the synced checkout."
      - pattern: "docker/ubuntu22_04/ensure_plugin_symlinks.sh"
        covers: "Idempotent helper that recreates the plugins/<plugin>.vst3 symlink that the Dockerfile bakes but that GHA workflows destroy when they bind-mount $(pwd) over /home/build/synth-setter. Reads SYNTH_SETTER_PLUGIN_PATH (default /usr/lib/vst3/Surge XT.vst3)."
      - pattern: "scripts/sync_worker_checkout.sh"
        covers: "Shared `git fetch + checkout WORKER_GIT_REF` + `uv pip install -e .[torch]` helper called by both runpod-template.yaml and oci-cpu-template.yaml run: blocks. No-op when WORKER_GIT_REF is unset (operators); when set, full transitive resolve handles PRs that add new top-level packages."
      - pattern: "scripts/skypilot/write_provider_creds.sh"
        covers: "Per-provider cred writer extracted from the test-dataset-generation workflow heredoc: PROVIDER=runpod writes ~/.runpod/config.toml; PROVIDER=oci writes ~/.oci/config + ~/.oci/oci_api_key.pem (SkyPilot's OCI backend defaults to the root compartment when oci.default.compartment_ocid is unset, so ~/.sky/config.yaml is no longer managed here — see #876). The kind / kubernetes 'local' provider is handled directly in the CI workflow; the launcher skips this script for that case. Mode 600 via umask 077; require_var fails closed on missing secrets."
      - pattern: "src/synth_setter/scripts/run-linux-vst-headless.sh"
        covers: "Headless wrapper cleanup contract on RunPod (drop exec on dbus-run-session, </dev/null detach on backgrounded daemons, wait + pkill -P $$ to reap orphan grandchildren); load-bearing for SkyPilot's job-status reporter to observe SSH-pipe EOF"
      - pattern: ".github/workflows/test-dataset-generation.yml"
        covers: "End-to-end smoke matrixed over `skypilot-local` (kind cluster) + RunPod + OCI: generate → validate-spec → validate-shard, per-provider artifacts. No `pull_request` trigger after #1164/#1170 — presubmit launcher / R2 round-trip duty moves to test-local-launcher-roundtrip.yml. Hourly `schedule` (`0 * * * *`) runs `skypilot-local × {hdf5, wds}`; weekly `schedule` (`0 7 * * 0`) runs all providers × `{hdf5, wds}` (only paid-capacity touch outside manual dispatch). Cred bootstrap is gated on SKYPILOT_API_SERVER_ENDPOINT — see #785."
      - pattern: ".github/workflows/test-skypilot-debug.yml"
        covers: "Permanent diagnostic matrix for the SkyPilot+RunPod path (workflow_dispatch only). Same cred-bootstrap gate as test-dataset-generation: writer is invoked iff SKYPILOT_API_SERVER_ENDPOINT is unset."
      - pattern: ".github/workflows/test-skypilot-local.yml"
        covers: "kind/local-Kubernetes smoke for the launcher's env-forwarding contract. Triggers on workflow_dispatch and on pull_request events that touch the workflow file or the local-debug template (path-filtered). sky local up + sky launch on the kubernetes backend with no billable cloud capacity — verifies RCLONE_CONFIG_R2_* flow through task.update_envs into the worker pod."
      - pattern: "src/synth_setter/configs/compute/local-debug-rclone-template.yaml"
        covers: "SkyPilot Task YAML for the kubernetes backend (no `image_id`, defers to SkyPilot's stock kube image). Setup installs rclone; run uploads a sentinel file to R2 with the same flags the production worker uses. Used by test-skypilot-local.yml."
      - pattern: "src/synth_setter/configs/compute/local-template.yaml"
        covers: "SkyPilot Task YAML for the kind/kubernetes 'local' provider (production-path smoke, distinct from local-debug-rclone-template.yaml). Resources sized for GHA-kind allocatable; run: invokes sync_worker_checkout.sh then `synth-setter-generate-dataset-from-hydra`. `WORKER_SPEC_URI` carries the canonical input_spec.json URI for validate-time consumers; the worker rebuilds the spec from pinned Hydra overrides."
      - pattern: "scripts/skypilot/capture-state.sh"
        covers: "Best-effort kube-apiserver + controller on-pod sky_logs snapshot called from generate-dataset-shards.yaml (skypilot-local row) before `sky local down` reaps the kind cluster. Captures pod describes, events, controller logs, and the controller's provision.log so scheduling-side hangs are diagnosable post-mortem (#876). Bash-3.2 portable so the same script runs on macOS CI."
      - pattern: "pyproject.toml"
        covers: "skypilot[runpod,oci,kubernetes]==0.12.0 listed under [project.dependencies] — required, not optional"
        scope: "skypilot"

  # ── Storage provenance spec ─────────────────────────────────────
  - doc: docs/design/storage-provenance-spec.md
    description: R2 bucket layout, path conventions, ID schemes
    sources:
      - pattern: "src/synth_setter/pipeline/schemas/prefix.py"
        covers: "Run ID format, shard ID format, prefix construction rules"
      - pattern: "src/synth_setter/pipeline/data/r2_report.py"
        covers: "R2 listing commands, shard status reporting, path parsing"
      - pattern: "src/synth_setter/configs/dataset/*.yaml"
        covers: "`r2` group (`bucket` + `prefix_root`) for the nested `R2Location` field on `DatasetSpec`"
      - pattern: "src/synth_setter/cli/generate_dataset.py"
        covers: "rclone upload of spec and shard files, R2 path construction"
        scope: "rclone"
      - pattern: "src/synth_setter/pipeline/spec_io.py"
        covers: "`input_spec.json` writers — `write_spec_locally` materializes the operator-side local mirror at `<workspace>/data/<task_name>/<run_id>/metadata/input_spec.json` (runner anchors at `_OPERATOR_WORKSPACE` via :func:`synth_setter.workspace.operator_workspace`, anticipating §3a's `metadata/` target layout); `upload_spec` writes the R2 copy at `spec.r2.input_spec_uri()` (flat MVP path per #385)."
      - pattern: "src/synth_setter/pipeline/constants.py"
        covers: "INPUT_SPEC_FILENAME constant"

  # ── Training pipeline design doc ────────────────────────────────
  - doc: docs/design/training-pipeline.md
    description: Training pipeline design — Hydra configs, Lightning training, RunPod portability
    sources:
      - pattern: "src/synth_setter/cli/train.py"
        covers: "Training entry point, Hydra config composition, operator-workspace bootstrap (sets ``$PROJECT_ROOT`` so ``configs/paths/default.yaml`` interpolates under any install layout)"
      - pattern: "src/synth_setter/models/**"
        covers: "Lightning module definitions, forward pass, loss computation, optimizer config"
      - pattern: "src/synth_setter/data/**"
        covers: "Data modules, dataset classes, VST rendering, data loading"
      - pattern: "src/synth_setter/configs/train.yaml"
        covers: "Top-level training config, Hydra defaults list, config groups"
      - pattern: "src/synth_setter/configs/trainer/**"
        covers: "Trainer configs (CPU, GPU, MPS, DDP), accelerator settings"
      - pattern: "src/synth_setter/configs/model/**"
        covers: "Model architecture configs, encoder variants, flow/FFN/VAE configs"
      - pattern: "src/synth_setter/configs/data/**"
        covers: "Data module configs, dataset paths, batch sizes, preprocessing"
      - pattern: "src/synth_setter/configs/callbacks/**"
        covers: "Training callbacks, checkpoint saving, early stopping, visualization"
      - pattern: "src/synth_setter/configs/experiment/**"
        covers: "Experiment overrides, hyperparameter combinations, ablation configs"
      - pattern: "src/synth_setter/configs/logger/wandb.yaml"
        covers: "W&B entity, project, log_model for checkpoint durability"
      - pattern: "docker/**"
        covers: "Training Docker image, GPU support, environment portability"
        scope: "training"

  # ── Eval pipeline design doc ────────────────────────────────────
  - doc: docs/design/eval-pipeline.md
    description: Evaluation pipeline design — predict, render, metrics, R2 integration
    sources:
      - pattern: "src/synth_setter/cli/eval.py"
        covers: "Evaluation entry point, checkpoint loading, Hydra config composition"
      - pattern: "src/synth_setter/evaluation/predict_vst_audio.py"
        covers: "Audio prediction script, VST rendering, parameter-to-audio pipeline"
      - pattern: "src/synth_setter/evaluation/compute_audio_metrics.py"
        covers: "Audio metric computation, MSS/wMFCC/SOT/RMS distance metrics, parallel workers"
      - pattern: "renderscript.sh"
        covers: "Cross-platform rendering script, Xvfb auto-detection"
      - pattern: "src/synth_setter/configs/eval.yaml"
        covers: "Evaluation config entry point, Hydra defaults, evaluation: gates, render: composition entry"
      - pattern: "src/synth_setter/configs/render/**"
        covers: "Render-group composed by eval.yaml defaults; supplies param_spec_name, preset_path, optional plugin_path consumed by _run_predict_postprocessing in cli/eval.py"
      - pattern: "src/synth_setter/configs/callbacks/eval_surge.yaml"
        covers: "Eval-specific callback config, prediction writer setup"
      - pattern: "src/synth_setter/configs/callbacks/prediction_writer.yaml"
        covers: "Prediction writer callback, output format, batch handling"
      - pattern: "src/synth_setter/metrics.py"
        covers: "Metric definitions, evaluation scoring functions"
      - pattern: "src/synth_setter/data/vst/**"
        covers: "VST plugin loading, parameter specs, audio generation for eval"
      - pattern: "scripts/audio_dirs/*.txt"
        covers: "Audio directory lists for metric computation reference sets"

  # ── Getting started ─────────────────────────────────────────────
  - doc: docs/getting-started.md
    description: Onboarding — local dev, Codespaces, and dev container flows
    sources:
      - pattern: "Makefile"
        covers: "Local dev targets — install (uv + .venv + deps + pre-commit), install-surge-xt (download + md5 verify + extract Surge XT VST3), SURGE_XT_VERSION + related vars"
        scope: "local-dev"
      - pattern: ".devcontainer/cpu/devcontainer.json"
        covers: "CPU dev container config — remoteUser, mounts (bash-history named volume + per-user tmux-resurrect named volumes for dev and root + plugins/ anonymous overlay), --env-file .env, initializeCommand, postCreateCommand, VS Code terminal profile defaulting to tmux"
      - pattern: ".devcontainer/gpu/devcontainer.json"
        covers: "GPU dev container config — remoteUser, mounts (bash-history named volume + per-user tmux-resurrect named volumes for dev and root + plugins/ anonymous overlay), --env-file .env, initializeCommand, postCreateCommand, VS Code terminal profile defaulting to tmux"
      - pattern: ".devcontainer/root_gpu/devcontainer.json"
        covers: "Root-user GPU dev container variant — remoteUser defaults to root, docker-in-docker + act features, --gpus all, VS Code terminal profile defaulting to tmux"
      - pattern: ".devcontainer/tmux.conf"
        covers: "tmux config installed to ~/.tmux.conf by post-create.sh — mouse mode, true color, 1-indexed windows, larger scrollback, vi copy mode, intuitive split keys, TPM plugin manager + tmux-resurrect + tmux-continuum (auto-restore on, 5-min save interval, resurrect state pinned to ~/.local/share/tmux/resurrect so the named volume can persist it)"
      - pattern: ".devcontainer/initialize.sh"
        covers: "Host-side initializeCommand — refuses pointer-file `.git` (worktree/submodule/--separate-git-dir), ensures .env exists"
      - pattern: ".devcontainer/post-create.sh"
        covers: "First-run setup — git safety, pre-commit install, root-to-dev privilege drop, install ~/.tmux.conf for both root and dev users, bootstrap TPM in $HOME/.tmux/plugins/tpm and install tmux plugins (tmux-resurrect, tmux-continuum) non-interactively for both root and dev users"
      - pattern: "src/synth_setter/configs/logger/many_loggers.yaml"
        covers: "Default logger compose — referenced in §4c for enable/disable workflow"
        scope: "wandb-config"

  # ── GitHub taxonomy ─────────────────────────────────────────────
  - doc: docs/design/github-taxonomy.md
    description: Issue types, labels, milestones, project board, CI metadata gate
    sources:
      - pattern: ".github/workflows/pr-metadata-gate.yaml"
        covers: "Domain label list, issue type validation, milestone enforcement"
      - pattern: ".github/ISSUE_TEMPLATE/**"
        covers: "Issue templates, required fields, type-specific forms"
      - pattern: ".github/PULL_REQUEST_TEMPLATE.md"
        covers: "PR template structure, required sections"

  # ── Configuration reference ────────────────────────────────────
  - doc: docs/reference/configuration-reference.md
    description: Configuration architecture layers, cloud provider comparison, boundary rules, known gaps
    sources:
      - pattern: "src/synth_setter/configs/experiment/**"
        covers: "Pipeline input configs (Pydantic-validated DatasetSpec) + Hydra experiment composition / defaults list"
      - pattern: "src/synth_setter/configs/dataset.yaml"
        covers: "Datagen Hydra entry point, defaults list"
      - pattern: "src/synth_setter/configs/finalize_dataset.yaml"
        covers: "Finalize Hydra entry point, single required `dataset_spec_uri`, `paths`/`hydra` defaults"
      - pattern: "src/synth_setter/configs/train.yaml"
        covers: "Training entry point, Hydra defaults"
      - pattern: "src/synth_setter/configs/eval.yaml"
        covers: "Eval entry point, Hydra defaults"
      - pattern: "src/synth_setter/pipeline/schemas/spec.py"
        covers: "DatasetSpec / RenderConfig / ShardSpec Pydantic models, spec_from_cfg() flow"
      - pattern: "src/synth_setter/cli/train.py"
        covers: "Training entry point, Hydra composition, instantiation flow"
      - pattern: "src/synth_setter/configs/logger/wandb.yaml"
        covers: "W&B logger config, log_model, entity/project"
      - pattern: "src/synth_setter/pipeline/schemas/prefix.py"
        covers: "DatasetConfigId, DatasetRunId, R2Prefix, make_r2_prefix()"
      - pattern: "src/synth_setter/pipeline/constants.py"
        covers: "INPUT_SPEC_FILENAME constant"

  # ── Testing primer ──────────────────────────────────────────────
  - doc: docs/reference/testing.md
    description: Test layout, fixtures, markers, and the cpu/mps/gpu CI lane split
    sources:
      - pattern: "tests/conftest.py"
        covers: "Hydra cfg_train/cfg_eval/cfg_dataset/cfg_surge_xt fixtures, accelerator parametrize, param_spec_name parametrize, experiment_name parametrize, _build_surge_xt_smoke_cfg, surge_xt_smoke_datasets, _validate_surge_dataset, shared constants (NUM_FIXTURE_SAMPLES, VST_HEADLESS_WRAPPER, _VST_SUBPROCESS_TIMEOUT_SECONDS)"
      - pattern: "tests/test_train.py"
        covers: "E2E Hydra train / resume / Surge XT smoke + train→eval round-trip"
      - pattern: "tests/test_eval.py"
        covers: "Train→eval round-trip reference implementation"
      - pattern: "tests/helpers/run_if.py"
        covers: "RunIf decorator (min_gpus, etc.)"
      - pattern: ".github/workflows/test.yml"
        covers: "Default PR CI: -m 'not slow and not gpu and not mps'"
      - pattern: ".github/workflows/cpu-slow.yml"
        covers: "Post-merge slow CPU-only lane (-m 'slow and not gpu and not mps and not requires_vst') — runner sized to avoid PyTorch CPU OOM; auto-files a ci-automation Bug on post-merge failure"
      - pattern: ".github/workflows/test-mps.yml"
        covers: "Pre-submit MPS lane on macos-latest (-m mps), triggered on src/synth_setter/configs/ PRs"
      - pattern: ".github/workflows/test-gpu.yml"
        covers: "Twice-weekly GPU lane on gpu-x64 (-m gpu)"
      - pattern: ".github/workflows/deflake-mps.yml"
        covers: "Manual-dispatch diagnostic loop on macos-latest — reruns a single pytest node N times via pytest-repeat (#1260 flake harness); uploads failed tmp_paths per iteration."
      - pattern: "pyproject.toml"
        covers: "Marker registration ([tool.pytest.ini_options].markers) and default selector"
        scope: "pytest-config"
      - pattern: "Makefile"
        covers: "test-fast / test-full-cpu / test-full-gpu / test-full-mps / test-vst-cpu targets and the Linux HEADLESS_WRAPPER auto-prepend"
        scope: "testing"
      - pattern: "src/synth_setter/scripts/run-linux-vst-headless.sh"
        covers: "Headless X11/Xvfb wrapper bootstrapped by test-full-* / test-vst-cpu on Linux"
      - pattern: "tests/infra/**"
        covers: "Devcontainer + GHA invariant tests — attached-mode MODE=idle, gh-auth flow, no baked secrets, post-create budget, act --list parse"
      - pattern: "tests/integration/**"
        covers: "Two classes of integration tests: (1) launcher-against-real-R2 round-trips with a stubbed VST renderer subprocess (`integration_r2` marker) — fast PR-tier alternative to the kind + dev-snapshot matrix in `test-dataset-generation.yml`, run by `test-local-launcher-roundtrip.yml` on same-repo PRs; and (2) unmarked cross-platform shard-dispatch tests (`test_parallel_shard_dispatch.py`) that run in the default fast lane via `test.yml`."
      - pattern: ".github/workflows/test-local-launcher-roundtrip.yml"
        covers: "Fast PR-tier (~8-10 min) lane for `tests/integration/`: invokes the `synth-setter-generate-dataset` CLI entrypoint (`cli.generate_dataset.main()`, which then calls `generate()` internally) end-to-end against real R2 with the VST renderer subprocess stubbed; no kind, no sky.launch, no dev-snapshot image pull. Gated on same-repo PRs (forks skipped). Unique per-run R2 prefix + best-effort rclone purge teardown. PR #1170; tracks #1164."

