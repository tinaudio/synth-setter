      - pattern: ".github/PULL_REQUEST_TEMPLATE.md"
        covers: "PR template structure, required sections"
      - pattern: "scripts/ci/pr_body_lint.py"
        covers: "Canonical PR-body section linter (Why → What changed → Test plan, alias map, warn/block modes) backing the check-pr-body-shape gate"

  # ── Configuration reference ────────────────────────────────────
  - doc: docs/reference/configuration-reference.md
    description: Configuration architecture layers, cloud provider comparison, boundary rules, known gaps
    sources:
      - pattern: "src/synth_setter/configs/experiment/**"
        covers: "Pipeline input configs (Pydantic-validated DatasetSpec) + Hydra experiment composition / defaults list"
      - pattern: "src/synth_setter/configs/dataset.yaml"
        covers: "Datagen Hydra entry point, defaults list"
      - pattern: "src/synth_setter/configs/finalize_dataset.yaml"
        covers: "Finalize Hydra entry point, single required `dataset_root_uri`, `paths`/`hydra` defaults"
      - pattern: "src/synth_setter/configs/train.yaml"
        covers: "Training entry point, Hydra defaults"
      - pattern: "src/synth_setter/configs/eval.yaml"
        covers: "Eval entry point, Hydra defaults"
      - pattern: "src/synth_setter/pipeline/schemas/spec.py"
        covers: "DatasetSpec / RenderConfig / ShardSpec Pydantic models, spec_from_cfg() flow"
      - pattern: "src/synth_setter/cli/train.py"
        covers: "Training entry point, Hydra composition, instantiation flow"
      - pattern: "src/synth_setter/configs/logger/wandb.yaml"
        covers: "W&B logger config, log_model, entity/project"
      - pattern: "src/synth_setter/pipeline/schemas/prefix.py"
        covers: "DatasetConfigId, DatasetRunId, R2Prefix, make_r2_prefix(), assert_r2_prefix_matches()"
      - pattern: "src/synth_setter/pipeline/constants.py"
        covers: "INPUT_SPEC_FILENAME constant"

  # ── Testing primer ──────────────────────────────────────────────
  - doc: docs/reference/testing.md
    description: Test layout, fixtures, markers, and the cpu/mps/gpu CI lane split
    sources:
      - pattern: "tests/conftest.py"
        covers: "Hydra cfg_train/cfg_train_lance/cfg_eval/cfg_dataset/cfg_surge_xt fixtures, accelerator parametrize, param_spec_name parametrize, experiment_name parametrize, _build_surge_xt_smoke_cfg, surge_xt_smoke_datasets, _validate_surge_dataset, Lance smoke helpers (_write_lance_smoke_split, fake_surge_smoke_lance_datasets, _LANCE_SMOKE_*), shared constants (NUM_FIXTURE_SAMPLES, VST_HEADLESS_WRAPPER)"
      - pattern: "tests/_vst.py"
        covers: "PLUGIN_PATH, VST_AVAILABLE, VST_SUBPROCESS_TIMEOUT_SECONDS"
      - pattern: "tests/test_train.py"
        covers: "E2E Hydra train / resume / Surge XT smoke + train→eval round-trip"
      - pattern: "tests/test_eval.py"
        covers: "Train→eval round-trip reference implementation"
      - pattern: "tests/helpers/lance_fixtures.py"
        covers: "Shared write_lance_shard writer backing the Lance datamodule fixtures"
      - pattern: "tests/helpers/run_if.py"
        covers: "RunIf decorator (min_gpus, etc.)"
      - pattern: ".github/workflows/test.yml"
        covers: "Default PR CI — runs make test-ci-unit (marker filter centralized in the Makefile, #1353)"
      - pattern: ".github/workflows/cpu-slow.yml"
        covers: "Post-merge slow CPU-only lane — runs make test-ci-slow (#1353); runner sized to avoid PyTorch CPU OOM; auto-files a ci-automation Bug on post-merge failure"
      - pattern: ".github/workflows/test-mps.yml"
        covers: "Pre-submit MPS lane on macos-latest (-m mps), triggered on src/synth_setter/configs/ PRs"
      - pattern: ".github/workflows/test-gpu.yml"
        covers: "Twice-weekly GPU lane on gpu-x64 (-m gpu)"
      - pattern: ".github/workflows/deflake-mps.yml"
        covers: "Manual-dispatch diagnostic loop on macos-latest — reruns a single pytest node N times via pytest-repeat (#1260 flake harness); uploads failed tmp_paths per iteration."
      - pattern: "pyproject.toml"
        covers: "Marker registration ([tool.pytest.ini_options].markers) and default selector"
        scope: "pytest-config"
      - pattern: "Makefile"
        covers: "test-fast / test-full-cpu / test-full-gpu / test-full-mps / test-vst-cpu targets, the test-ci-unit/slow/nightly CI marker source of truth (#1353), and the Linux HEADLESS_WRAPPER auto-prepend"
        scope: "testing"
      - pattern: "src/synth_setter/scripts/run-linux-vst-headless.sh"
        covers: "Headless X11/Xvfb wrapper bootstrapped by test-full-* / test-vst-cpu on Linux"
      - pattern: "tests/_meta/**"
        covers: "AST-based meta-tests enforcing structural invariants on other test modules (e.g., no Hydra config-initializer imports in canonical entrypoint test files)"
      - pattern: "tests/infra/**"
        covers: "Devcontainer + GHA invariant tests — attached-mode MODE=idle, gh-auth flow, no baked secrets, post-create budget, post-create agent full-auto seeding (Codex config + agy wrapper), act --list parse"
      - pattern: "tests/integration/**"
        covers: "Three classes of integration tests: (1) launcher-against-real-R2 round-trips with a stubbed VST renderer subprocess (`integration_r2` marker) — fast PR-tier alternative to the kind + dev-snapshot matrix in `test-dataset-generation.yml`, run by `test-local-launcher-roundtrip.yml` on same-repo PRs; (2) unmarked cross-platform shard-dispatch tests (`test_parallel_shard_dispatch.py`) that run in the default fast lane via `test.yml`; and (3) real-Surge parallel renders parametrized over cadence cells (`test_parallel_shard_render_linux.py`, `requires_vst`+`slow`) run by `test-vst-slow.yml` — the cadence coverage retired from `test-dataset-generation-render-matrix.yml`."
      - pattern: ".github/workflows/test-local-launcher-roundtrip.yml"
        covers: "Fast PR-tier (~8-10 min) lane for `tests/integration/`: invokes the `synth-setter-generate-dataset` CLI entrypoint (`cli.generate_dataset.main()`, which then calls `generate()` internally) end-to-end against real R2 with the VST renderer subprocess stubbed; no kind, no sky.launch, no dev-snapshot image pull. Gated on same-repo PRs (forks skipped). Unique per-run R2 prefix + best-effort rclone purge teardown. PR #1170; tracks #1164."

  # ── Agent harness parity (Claude + Codex) ───────────────────────
  - doc: docs/reference/agent-harness-parity.md
    description: Claude/Codex hook-enforcement divergence, per-hook CI backstops, skill-discovery parity
    sources:
      - pattern: "agent/hooks/_lib.sh"
        covers: "has_skill discovery globs for the Claude marketplace and Codex plugin-manifest layouts"
      - pattern: "scripts/dev/link-skills.sh"
        covers: "Projects the installed tinaudio/skills marketplace into ~/.agents/skills so Agent-Skills-standard CLIs (Gemini, Antigravity) discover the full pack; wired via make link-skills + post-create.sh"
      - pattern: "agent/hooks/worktree-guard.sh"
        covers: "WORKTREE_GUARD_MODE block/warn/off tiering (local-safety, no CI backstop)"
      - pattern: "agent/hooks/no-baseline-additions.sh"
        covers: "Pydoclint-baseline-row block; CI runs pydoclint but does not gate on baseline-row growth"
      - pattern: "agent/hooks/git-commit-trailer-check.sh"
        covers: "Co-Authored-By / attribution-trailer block; no dedicated CI gate, PR-title gitlint is the residual"
      - pattern: "agent/hooks/no-yaml-run-comments.sh"
        covers: "YAML run/setup block-scalar comment block; CI backstop via test-act.yaml + test_workflows_under_act.py"
      - pattern: "agent/hooks/pre-pr-review-gate.sh"
        covers: "Pre-PR review-sentinel gate; CI backstop via test.yml + code-quality-pr.yaml + pr-metadata-gate.yaml"
      - pattern: "agent/hooks/pr-readiness-stop.sh"
        covers: "Stop-gate on red CI / non-mergeable; CI backstop via branch protection + required checks"
      - pattern: "tests/claude_hooks/test_skill_discovery_parity.py"
        covers: "Parity assertion that every agent/skills/* resolves via both the Claude and Codex globs"
      - pattern: "tests/infra/test_agent_hooks_suite.py"
        covers: "Runs the full agent/hooks/test.sh bash suite in CI under a simulated Codex skill layout"

  # ── macOS VM provisioning (Tart) ────────────────────────────────
  - doc: docs/getting-started.md
    description: macOS VM dev-env path via Tart — prebuilt image or Packer build (§ B.3)
    sources:
      - pattern: "tart/**"
        covers: "Packer template, packer variables (synth_setter_git_ref/python_version/uv_version/vm_name/surge_xt_version/codex_version/base_image_digest), provisioner steps, brew packages (git/gh/jq/rclone/bats-core/tmux/zellij/node), Codex CLI + Antigravity (agy) installs, venv layout via `uv sync --frozen` (MPS-capable torch from PyPI), VST3 path, smoke tests, .zshrc auto-activation, ~/.zprofile env defaults (HYDRA_FULL_ERROR/PYTHONDONTWRITEBYTECODE/PYTHONFAULTHANDLER/PYTHONUNBUFFERED/WANDB_DATA_DIR), prebuilt image at registry-1.docker.io/tinaudio/synth-setter-macos, Docker Hub publishing workflow, local validate/build helper (build.sh)"
        scope: "tart"

  # ── Surge XT interactive guide ──────────────────────────────────
  - doc: docs/guides/surge-xt-interactive.md
    description: Interactive Surge XT prediction audition and patch-recording guide
    sources:
      - pattern: "src/synth_setter/tools/surge_xt_interactive.py"
        covers: "CLI flags, interactive session lifecycle (audio + editor + keyboard threads, stop_event), p/q keybindings, recorded-patch HDF5 output, append-vs-fresh directory semantics, PLAYBACK_SAMPLE_RATE / SAMPLE_RATE / BUFFER_SIZE / MAKE_DATASET_* constants, optional --checkpoint-path eval pipeline (eval_patches: src/synth_setter/cli/eval.py mode=predict + predict_vst_audio.py + compute_audio_metrics.py), directory-of-splits output"
      - pattern: "src/synth_setter/data/vst/core.py"
        covers: "load_plugin warm-up timing (_EDITOR_INIT_DELAY_SECONDS, non-Darwin only — macOS skips per #714), set_params, render_params per-sample reload rationale (silent-render workaround)"
        scope: "interactive"
      - pattern: "src/synth_setter/data/vst/generate_vst_dataset.py"
        covers: "generate_sample / VSTDataSample / make_spectrogram — per-sample render and feature-extraction primitives invoked by the writers in writers.py"
        scope: "interactive"
      - pattern: "src/synth_setter/data/vst/writers.py"
        covers: "make_hdf5_dataset accepts fixed_synth_params_list / fixed_note_params_list to render captured patches into train.h5; audio dtype float16; mel shape comes from shapes.mel_dataset_shape"
        scope: "interactive"
      - pattern: "src/synth_setter/data/vst/shapes.py"
        covers: "Source of truth for the (channels, n_mels, n_frames) trailing-dims of mel_spec output and (channels, time_samples) trailing-dims of audio output written by make_hdf5_dataset"
        scope: "interactive"

