# Installed to ~/.tmux.conf by .devcontainer/post-create.sh; tmux auto-loads
# it when the VS Code terminal profile launches tmux.

# Enable mouse support (scroll, click panes, drag to resize, select text)
set -g mouse on

# Use 256 colors / true color
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Start window and pane numbering at 1 (easier to reach on keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Bigger scrollback buffer
set -g history-limit 50000

# Faster key response (no delay after Escape)
set -sg escape-time 0

# Vi keys in copy mode
setw -g mode-keys vi

# Keep selection highlighted on mouse release, don't exit copy mode
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-no-clear

# More intuitive split bindings
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Plugins (managed by TPM; installed by .devcontainer/post-create.sh).
# resurrect saves/restores sessions on demand; continuum automates the saving.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# Restore is opt-in: continuum keeps auto-saving, but a rebuilt container starts
# with a clean session. Bring the saved one back on demand with prefix + Ctrl-r.
set -g @continuum-restore 'off'
# Save every 5 minutes (continuum default is 15). Lower interval = a rebuild
# loses at most ~5 min of session edits, at the cost of more writes to the
# resurrect named volume — fine for a single-user devcontainer.
set -g @continuum-save-interval '5'
# Pin resurrect state to a fixed path so a named volume in devcontainer.json
# can mount it and survive container rebuilds.
set -g @resurrect-dir '~/.local/share/tmux/resurrect'
# Revive claude/gh panes as themselves on rebuild; resurrect drops non-default
# programs to bare bash otherwise. Relaunches fresh (no in-app state).
set -g @resurrect-processes '"~claude" "~gh"'

# Must be the last line. Bootstraps TPM and loads the plugins above.
run '~/.tmux/plugins/tpm/tpm'
