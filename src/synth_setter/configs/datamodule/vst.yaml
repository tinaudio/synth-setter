_target_: synth_setter.data.lance_datamodule.LanceVSTDataModule
dataset_root: ${paths.output_dir}/data
download_dataset_root_uri: null
use_saved_mean_and_variance: true
batch_size: 128
ot: true
# Per dataloader, so enabling validation doubles the live worker count. Sized
# against host RAM, not cores — see getting-started.md §8.
num_workers: 4
persistent_workers: true
# Null delegates prefetch depth to PyTorch; in-process loading ignores it.
prefetch_factor: null
# Opt-in Lance-native fragment-sequential train reads (#2251); v1 single-rank only.
use_fragment_sampler: false
# Lance scanner read-ahead batches on the fragment-sampler path.
batch_readahead: 8
predict_file: null
# Mandatory: each concrete config declares its synth's spec — a default here
# would silently pair the wrong spec with the dataset.
param_spec_name: ???
