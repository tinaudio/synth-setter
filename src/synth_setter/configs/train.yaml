# @package _global_

# specify here default configuration
# order of defaults determines the order in which configs override each other
defaults:
  - _self_
  - datamodule: ???
  - model: ???
  - callbacks: default
  - logger: many_loggers # set logger here or use command line (e.g. `python train.py logger=wandb`)
  - trainer: gpu
  - paths: default
  - extras: default
  - hydra: default
  - r2: default # bucket the train-end model artifact uploads/references its checkpoint under

  # render settings the val audio probe re-renders predictions with; only needed
  # when training.val_audio_probe is on (e.g. `render=surge_xt`)
  - render: null

  # embedding-conditioning profiles pairing a stored Lance column with its
  # encoder settings on both the datamodule and the model (e.g. `conditioning=same_s`)
  - conditioning: null

  # experiment configs allow for version control of specific hyperparameters
  # e.g. best hyperparameters for given model and datamodule
  - experiment: null

  # config for hyperparameter optimization
  - hparams_search: null

  # optional local config for machine/user specific settings
  # it's optional since it doesn't need to exist and is excluded from version control
  - optional local: default

  # debugging config (enable through command line, e.g. `python train.py debug=default)
  - debug: null

# task name, determines output directory path
task_name: "train"

# tags to help you identify your experiments
# you can overwrite this in experiment configs
# overwrite from command line with `python train.py tags="[first_tag, second_tag]"`
tags: ["dev"]

# set False to skip model training
train: True

# evaluate on test set, using best model weights achieved during training
# lightning chooses best weights based on the metric specified in checkpoint callback
test: True

# simply provide checkpoint path to resume training
ckpt_path: null

# seed for random number generators in pytorch, numpy and python.random
seed: null

training:
  # Auto-resume from the newest last.ckpt: null/"off" | "auto" | "require" (errors when
  # none found); excludes explicit `ckpt_path`. See docs/design/training-pipeline.md §6.2.
  resume: null
  # Optional `r2://bucket/key` override for the checkpoint upload target the model
  # W&B artifact references; null auto-derives
  # `r2://{r2.bucket}/checkpoints/{config_id}/model.ckpt`.
  upload_checkpoints_uri: null
  # Mirror each ModelCheckpoint write to R2 mid-run (synchronous on rank 0; best
  # for single-device runs) so a host crash before train-end can't strand it.
  upload_checkpoints_during_training: false
  # "auto" wires the off-loop probe when render, validation, and R2 are available;
  # `true` requires them and `false` disables.
  val_audio_probe: auto
  # Samples taken from the first val batch; each costs a plugin load plus a render.
  val_audio_probe_samples: 5
