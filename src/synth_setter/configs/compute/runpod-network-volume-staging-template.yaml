# Staging-only variant of the network-volume template: the copy writes R2 ->
# mounted volume, so it needs no 750 GB local disk — small-disk GPU hosts are
# far easier to schedule. GPU (not CPU) pods on purpose: SkyPilot cannot SSH
# into RunPod CPU pods (600s timeout -> teardown loop), so cheap CPU staging
# is not currently viable. Any-of is capped at sub-$1/hr tiers — an rclone
# copy gains nothing from H-class hosts.
resources:
  cloud: runpod
  accelerators: { RTX3090:1, RTX4090:1, A40:1, L40S:1, RTX6000-Ada:1 }
  use_spot: false
  disk_size: 50

volumes:
  /workspace/network-volume: ${NETWORK_VOLUME}

envs:
  RCLONE_CONFIG_R2_TYPE: ""
  RCLONE_CONFIG_R2_PROVIDER: ""
  RCLONE_CONFIG_R2_ACCESS_KEY_ID: ""
  RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ""
  RCLONE_CONFIG_R2_ENDPOINT: ""
  WORKER_GIT_REF: ""
  SYNTH_SETTER_WORKER_RANK: ""
  SYNTH_SETTER_NUM_WORKERS: ""

setup: |
  set -euo pipefail
  echo "synth-setter worker ready (host: $(hostname))"
