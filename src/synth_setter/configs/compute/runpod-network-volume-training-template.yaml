# Full-dataset RunPod template backed by the persistent dataset network volume.
# The launcher injects commands, credentials, and provenance.

# Any-of spans budget SKUs plus data-center-native tiers so the scheduler can
# still place the task in whichever DC hosts the mounted volume (e.g. US-CA-2
# and AP-JP-1 stock RTX6000-Ada/L40S/H100/H200 but rarely consumer cards).
resources:
  cloud: runpod
  accelerators:
    {
      RTX3090:1,
      RTX4090:1,
      A40:1,
      L40S:1,
      RTX6000-Ada:1,
      H100-SXM:1,
      H200-SXM:1,
    }
  use_spot: false
  disk_size: 750

volumes:
  /workspace/network-volume: ${NETWORK_VOLUME}

envs:
  RCLONE_CONFIG_R2_TYPE: ""
  RCLONE_CONFIG_R2_PROVIDER: ""
  RCLONE_CONFIG_R2_ACCESS_KEY_ID: ""
  RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ""
  RCLONE_CONFIG_R2_ENDPOINT: ""
  WORKER_GIT_REF: ""
  SYNTH_SETTER_WORKER_RANK: ""
  SYNTH_SETTER_NUM_WORKERS: ""
  OPERATOR_SSH_PUBKEYS_B64: ""

# Operator SSH access (#2297): the launcher forwards the operator's public
# keys base64-encoded; decoding them in setup makes the pod reachable from
# the launching machine without RunPod account-key or provisioning-key access.
setup: |
  set -euo pipefail
  if [ -n "${OPERATOR_SSH_PUBKEYS_B64:-}" ]; then
    mkdir -p ~/.ssh
    printf '%s' "${OPERATOR_SSH_PUBKEYS_B64}" | base64 -d >> ~/.ssh/authorized_keys
    chmod 600 ~/.ssh/authorized_keys
  fi
  echo "synth-setter worker ready (host: $(hostname))"
