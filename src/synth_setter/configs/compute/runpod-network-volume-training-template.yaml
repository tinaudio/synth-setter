# Full-dataset RunPod template backed by the persistent dataset network volume.
# The launcher injects commands, credentials, and provenance.

resources:
  cloud: runpod
  accelerators: { RTX3090:1, RTX4090:1, A40:1 }
  use_spot: false
  disk_size: 750

volumes:
  /workspace/network-volume: synth-setter-datasets-us-ks-2

envs:
  RCLONE_CONFIG_R2_TYPE: ""
  RCLONE_CONFIG_R2_PROVIDER: ""
  RCLONE_CONFIG_R2_ACCESS_KEY_ID: ""
  RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ""
  RCLONE_CONFIG_R2_ENDPOINT: ""
  WORKER_GIT_REF: ""
  SYNTH_SETTER_WORKER_RANK: ""
  SYNTH_SETTER_NUM_WORKERS: ""

setup: |
  set -euo pipefail
  echo "synth-setter worker ready (host: $(hostname))"
