# H-class variant of the network-volume training template: any-of over the
# top training tiers so the scheduler takes whichever the volume's data
# center stocks (B200 > H200 > H100 by capability, priced accordingly).
resources:
  cloud: runpod
  accelerators: { H100-SXM:1, H200-SXM:1, B200:1 }
  use_spot: false
  disk_size: 750

volumes:
  /workspace/network-volume: ${NETWORK_VOLUME}

envs:
  RCLONE_CONFIG_R2_TYPE: ""
  RCLONE_CONFIG_R2_PROVIDER: ""
  RCLONE_CONFIG_R2_ACCESS_KEY_ID: ""
  RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ""
  RCLONE_CONFIG_R2_ENDPOINT: ""
  WORKER_GIT_REF: ""
  SYNTH_SETTER_WORKER_RANK: ""
  SYNTH_SETTER_NUM_WORKERS: ""

setup: |
  set -euo pipefail
  echo "synth-setter worker ready (host: $(hostname))"
