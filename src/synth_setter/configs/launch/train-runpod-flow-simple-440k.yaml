# RunPod launch for flow matching on the finalized 440k Surge Simple dataset.
#
# The surge/flow_simple_440k experiment owns the dataset pin and every
# scientific knob (#2196); the cmd carries only experiment selection and
# operational flags.

compute: runpod/training
worker_image_tag: devcontainer-tools
env_file: .env
# Detach after SkyPilot accepts the launch so GitHub Actions does not wait for training.
tail: false
cmd: >-
  cd /home/build/synth-setter &&
  bash scripts/sync_worker_checkout.sh &&
  exec synth-setter-train
  "experiment=${EXPERIMENT:-surge/flow_simple_440k}"
  training.upload_checkpoints_during_training=true
  hydra.run.dir=/home/build/synth-setter/train-run
