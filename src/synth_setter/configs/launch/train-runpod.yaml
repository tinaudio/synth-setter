# SkyPilot launch config for a manually-dispatched training run on RunPod.
#
# The .github/workflows/train.yml launch_config input points here. Fields
# mirror SkypilotLaunchConfig; relative paths resolve from the repo root.
# Workflow inputs can override the experiment and dataset defaults below.
#
# Worker provenance (storage-provenance-spec.md §12): sync_worker_checkout.sh
# moves the baked checkout to the launcher-forwarded WORKER_GIT_REF so
# `git rev-parse HEAD` records the dispatched SHA; the launcher injects
# IMAGE_TAG into every rank's env.

compute_template: src/synth_setter/configs/compute/runpod-template.yaml
worker_image_tag: dev-snapshot
env_file: .env
# tail=false detaches after submission; follow with `sky jobs logs --name <job>`.
tail: false
cmd: >-
  cd /home/build/synth-setter &&
  bash scripts/sync_worker_checkout.sh &&
  exec synth-setter-train
  "experiment=${EXPERIMENT:-surge/ffn_simple}"
  "datamodule.download_dataset_root_uri=${DATASET_ROOT_URI:-r2://experiments/data/surge-simple-lance-1k-2k-2k/surge-simple-lance-1k-2k-2k-20260716T163226347Z/}"
  training.upload_checkpoints_during_training=true
  hydra.run.dir=/home/build/synth-setter/train-run
