# Smoke variant of eval-runpod.yaml: evaluates model-ffn_simple:latest on two
# test batches to exercise the full dispatch path (workflow → launcher →
# SkyPilot worker → wandb checkpoint resolve → trainer.test) at minimal GPU
# cost. Pair with train-runpod-smoke.yaml, which publishes the junk artifact.

compute: runpod/smoke
worker_image_tag: devcontainer-tools
env_file: .env
# tail=true keeps the dispatcher attached so the Actions job reflects the
# worker run end-to-end.
tail: true
cmd: >-
  cd /home/build/synth-setter &&
  bash scripts/sync_worker_checkout.sh &&
  exec src/synth_setter/scripts/run-linux-vst-headless.sh
  synth-setter-eval
  experiment=surge/wandb_checkpoint/ffn_simple
  trainer.limit_test_batches=2
  hydra.run.dir=/home/build/synth-setter/eval-run
