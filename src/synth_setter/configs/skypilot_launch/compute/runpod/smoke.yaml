# Smoke-tier RunPod pool. Any one cheap GPU is enough for the smoke run
# (32 samples); the set is wide so a stocked-out tier doesn't fail the launch
# — SkyPilot picks the cheapest available match. Add/remove tiers as RunPod
# inventory drifts.
name: runpod-smoke
resources:
  - cloud: runpod
    accelerators:
      RTX3070: 1
      RTX3080: 1
      RTX3090: 1
      RTXA4000: 1
      RTX4000Ada: 1
      A40: 1
      RTX4090: 1
    use_spot: false
    disk_size: 50
