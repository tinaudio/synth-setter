# SkyPilot dispatch knobs for synth-setter-generate-dataset.
# The compute group stays null → run in-process; select an option via
# `skypilot_launch/compute=<option>` (e.g. runpod/smoke, local/kind) to
# dispatch via SkyPilot. See generate_dataset.main for dispatch semantics.

defaults:
  - compute: null
  - _self_

env_file: .env
job_name: null
num_workers: 1
worker_image_tag: devcontainer-tools
tail: false
api_server: null
local: false
