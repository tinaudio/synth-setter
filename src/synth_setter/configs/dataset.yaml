# @package _global_

# Top-level @hydra.main composition for dataset generation. Mirrors eval.yaml's
# shape: each group below contributes a slice of the DatasetSpec the entrypoint
# constructs in main(). Required (???) fields are filled in by an experiment.

defaults:
  - _self_
  - datamodule: ???
  - render: ???
  - r2: default
  - paths: default
  - hydra: default
  - skypilot_launch: default
  - experiment: ???
  - logger: wandb
  - extras: default

task_name: ???
# ``configs/hydra/default.yaml`` interpolates ``${run_name}`` into ``hydra.run.dir``;
# dataset experiments don't have a distinct run_name concept (the spec's ``run_id`` is
# computed by ``DatasetSpec``'s default_factory from ``task_name`` + ``created_at`` at
# construction), so default it to ``task_name`` for the Hydra output-dir interpolation.
# Dropped before DatasetSpec construction (it's not a spec field).
run_name: ${task_name}
output_format: hdf5
base_seed: 42

# Wandb run tags; parity with train.yaml/eval.yaml. ``extras: default`` sets
# ``enforce_tags: True`` â€” a non-empty default keeps that path from prompting/raising.
# Masked out of ``DatasetSpec`` by ``from_hydra_cfg`` (not a spec field).
tags: ["dev", "generate_dataset"]

# Optional dataset-copy source root URI. ``null`` samples fresh params (the
# default). Set to a root of source shards (bare path, ``file://``, or ``r2://``)
# to instead re-render each same-named shard's params; the source must share
# this config's ``render.param_spec_name``. An ``r2://`` source is downloaded
# per shard at copy time. Override directly, e.g.
# ``copy_dataset_root_uri=r2://bucket/prefix/task/run``.
copy_dataset_root_uri: null

# Forwarded by ``synth-setter-finalize-dataset`` to ``stream_stats_wds`` /
# ``get_stats_hdf5``; ``true`` substitutes ``std=1.0`` at zero-variance mel
# bins instead of raising. Smoke configs override to ``true``.
mask_degenerate_bins: false

# Run synth-setter-finalize-dataset inline after generate completes.
# Local-run path only; ignored (with an INFO log) when
# skypilot_launch.compute_template is set.
finalize_inline: false

# Run surge/fake_oracle inline (subprocess) after finalize. Requires
# finalize_inline=true + output_format=hdf5. Local-run only.
oracle_eval_inline: false

# Null default: ``DatasetSpec._drop_null_run_id`` mode='before' validator pops
# a ``None`` ``run_id`` so the field's ``default_factory`` (``_default_run_id``)
# fires from ``task_name`` + ``created_at``. Keeping the key present lets the
# finalize workflow's ``run_id=<value>`` Hydra override resolve under strict.
run_id: null

train_val_test_sizes: ???
# ``r2:`` lands here from the ``r2: default`` group composition above. Its
# shape (``bucket`` + ``prefix_root``) matches the nested ``R2Location`` model
# on ``DatasetSpec``; the spec's ``prefix`` is filled by the model validator
# from ``task_name`` + ``run_id`` at construction.
