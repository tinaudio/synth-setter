# @package _global_

# Top-level @hydra.main composition for dataset generation. Mirrors eval.yaml's
# shape: each group below contributes a slice of the DatasetSpec the entrypoint
# constructs in main(). Required (???) fields are filled in by an experiment.

defaults:
  - _self_
  - data: ???
  - render: ???
  - r2: default
  - paths: default
  - hydra: default
  - skypilot_launch: default
  - experiment: ???

task_name: ???
# ``configs/hydra/default.yaml`` interpolates ``${run_name}`` into ``hydra.run.dir``;
# dataset experiments don't have a distinct run_name concept (the spec's ``run_id`` is
# computed by ``DatasetSpec``'s default_factory from ``task_name`` + ``created_at`` at
# construction), so default it to ``task_name`` for the Hydra output-dir interpolation.
# Dropped before DatasetSpec construction (it's not a spec field).
run_name: ${task_name}
output_format: hdf5
base_seed: 42

# Materialized as ``null`` so finalize-dataset.yaml can pin the generate stage's
# ``run_id`` via the ``run_id=<value>`` Hydra override form (strict mode requires
# the key to exist). Leaving this ``null`` on the generate path is handled by
# ``DatasetSpec._normalize_r2_input``'s mode='before' shim, which calls
# ``_fill_default_r2_prefix`` to materialize ``run_id`` from
# ``task_name`` + ``created_at`` when missing/None before field validation.
run_id: null

train_val_test_sizes: ???
# ``r2:`` lands here from the ``r2: default`` group composition above. Its
# shape (``bucket`` + ``prefix_root``) matches the nested ``R2Location`` model
# on ``DatasetSpec``; the spec's ``prefix`` is filled by the model validator
# from ``task_name`` + ``run_id`` at construction.
