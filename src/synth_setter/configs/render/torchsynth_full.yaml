# In-process torchsynth backend (no plugin host): plugin_path is the bare backend
# name, renderer_version pins the installed package version, and there is no preset
# file — the baseline patch lives in torchsynth_param_spec.py.
plugin_path: torchsynth
plugin_state_path: ""
param_spec_name: torchsynth_full
renderer_version: "1.0.2"
renderer_backend: torchsynth
sample_rate: 44100
channels: 2
velocity: 100
signal_duration_seconds: 4.0
min_loudness: -55.0
samples_per_shard: 10000

# Surfaced at their RenderConfig defaults (mirroring surge_xt.yaml) so plain
# ``render.<field>=...`` overrides compose without ``+``.
samples_per_render_batch: 32
max_retries: 0
parallel: false
# One shared voice per shard: rebuilding it per render would dominate render time.
plugin_reload_cadence: once
# torchsynth has no plugin editor; RenderConfig rejects any other cadence.
gui_toggle_cadence: never
param_sample_cadence: sample
