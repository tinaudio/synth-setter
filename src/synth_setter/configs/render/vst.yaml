renderer_backend: pedalboard
sample_rate: 44100
channels: 2
velocity: 100
signal_duration_seconds: 4.0
min_loudness: -55.0
audio_dtype: float16
mel_spec_dtype: float32
samples_per_shard: 10000
samples_per_render_batch: 32
max_retries: 0
parallel: false
plugin_reload_cadence: once
# macOS rejects ``render``; cadence sweeps override this safe default (#714, #489).
gui_toggle_cadence: once
param_sample_cadence: sample
