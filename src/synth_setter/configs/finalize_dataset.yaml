# @package _global_
defaults:
  - paths: default
  - hydra: default
  - _self_

dataset_spec_uri: ???

# Surfaces ${task_name} so hydra/default.yaml's run.dir + job_logging
# interpolations resolve; run.dir is also overridden below because the
# group default references ${run_name}, which this cfg does not surface.
task_name: finalize_dataset

hydra:
  run:
    dir: ${paths.log_dir}/finalize_dataset/${now:%Y-%m-%d_%H-%M-%S}
