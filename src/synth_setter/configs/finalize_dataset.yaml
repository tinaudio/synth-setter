# @package _global_
defaults:
  - paths: default
  - hydra: default
  - _self_

dataset_spec_uri: ???

# ``hydra/default.yaml`` interpolates ${task_name} into ``run.dir`` and
# ``job_logging.handlers.file.filename``; surface a literal task_name so
# both resolve. ``run.dir`` is also overridden because the group default
# additionally references ${run_name}, which this config does not surface.
# ``_self_`` is last in ``defaults`` so this block overrides the group.
task_name: finalize_dataset

hydra:
  run:
    dir: ${paths.log_dir}/finalize_dataset/${now:%Y-%m-%d_%H-%M-%S}
