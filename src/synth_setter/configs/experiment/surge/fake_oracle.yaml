# @package _global_

defaults:
  - surge/base
  - override /model: vst_fake_oracle
  - override /datamodule: surge
  - override /callbacks: eval_vst
  - override /trainer: cpu
  - _self_

run_name: fake_oracle
experiment_name: surge-fake-oracle

mode: predict

tags:
  - surge
  - oracle

callbacks:
  log_per_param_mse:
    _target_: synth_setter.utils.callbacks.LogPerParamMSE
    param_spec: ${datamodule.param_spec_name}
  plot_proj_ii: null

datamodule:
  batch_size: 1

ckpt_path: null

evaluation:
  render_vst: true
  compute_metrics: true
  rerender_target: false
  num_workers: 1
