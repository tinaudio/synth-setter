# @package _global_

defaults:
  - surge/base
  - override /model: surge_fake_oracle
  - override /datamodule: surge
  - override /callbacks: eval_surge
  - override /trainer: cpu
  - _self_

run_name: fake_oracle
experiment_name: surge-fake-oracle

model:
  net:
    # FakeOracleNet ignores d_out: it returns a fixed dummy param and never
    # builds a projection of this width; -1 marks it a dead knob, not a real size.
    d_out: -1

mode: predict

tags:
  - surge
  - oracle

callbacks:
  log_per_param_mse:
    _target_: synth_setter.utils.callbacks.LogPerParamMSE
    # Track the render group's spec for per-param MSE labels; fall back to
    # surge_xt when no render group is composed so the callback still instantiates.
    param_spec: ${oc.select:render.param_spec_name,surge_xt}
  plot_proj_ii: null

datamodule:
  batch_size: 1

ckpt_path: null

evaluation:
  render_vst: true
  compute_metrics: true
  rerender_target: false
  num_workers: 1
