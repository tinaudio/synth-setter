# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /datamodule: surge_simple
  - override /callbacks: default_vst
  - override /trainer: gpu
  - _self_

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

experiment_name: surge-full

tags:
  - surge

seed: 3123123

logger:
  wandb:
    tags: ${tags}
    name: ${experiment_name}_${run_name}
    group: ${experiment_name}

callbacks:
  model_checkpoint:
    monitor: null
  early_stopping: null

trainer:
  gradient_clip_val: 0.5
  # The batch limit applies per rank; row count depends on world size and batch size.
  limit_val_batches: 20
  precision: bf16-mixed
  # VST schedulers use trainer.max_steps for CosineAnnealingLR.T_max.
  min_steps: 1_000_000
  max_steps: 1_000_000
  log_every_n_steps: 100
  val_check_interval: 10_000
