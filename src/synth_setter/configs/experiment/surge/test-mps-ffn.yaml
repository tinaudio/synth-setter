# @package _global_

# MPS FFN counterpart to test-mps-fake-oracle with shared smoke-config wiring.

defaults:
  - surge/base
  - override /model: vst_ffn
  - override /datamodule: surge
  - override /trainer: mps
  - override /callbacks: [default_vst, eval_vst]
  - _self_

run_name: ffn
experiment_name: surge-full-onehot

tags:
  - surge

logger: null
test: false

model:
  compile: false
  scheduler: null

datamodule:
  batch_size: 1
  pin_memory: false
  ot: false
  # Requires sibling stats.npz; see #1002.
  use_saved_mean_and_variance: true
  num_workers: 0

trainer:
  devices: 1
  precision: "32-true"
  max_steps: 1
  check_val_every_n_epoch: 1
  val_check_interval: 1.0
  log_every_n_steps: 1
  enable_model_summary: false
  limit_val_batches: 1.0
  deterministic: true

callbacks:
  log_per_param_mse:
    _target_: synth_setter.utils.callbacks.LogPerParamMSE
    param_spec: ${datamodule.param_spec_name}
  plot_proj_ii: null
  model_checkpoint:
    save_last: true
  # The fixture sets lr_monitor to None (was: ``del``); ``instantiate_callbacks`` skips
  # entries without ``_target_``, so ``null`` here is behaviorally equivalent.
  lr_monitor: null
