# @package _global_

# Sibling of test-mps-fake-oracle.yaml for the surge/ffn_full experiment — see that file's
# header for the lockstep contract with cfg_surge_xt_global; this variant targets surge_ffn
# instead of surge_fake_oracle.

defaults:
  - surge/base
  - override /model: surge_ffn
  - override /data: surge
  - override /trainer: mps
  - override /callbacks: [default_surge, eval_surge]
  - _self_

run_name: ffn
experiment_name: surge-full-onehot

tags:
  - surge

logger: null
test: false

model:
  compile: false
  scheduler: null
  net:
    # Mandatory override — must equal the encoded width of the param_spec used by the run.
    # The smoke fixture passes ``len(param_specs["surge_4"])``; production callers should
    # set this to ``len(param_specs[<their-spec>])`` via the CLI override.
    d_out: ???

data:
  batch_size: 1
  pin_memory: false
  ot: false
  # Requires sibling stats.npz; see #1002.
  use_saved_mean_and_variance: true
  num_workers: 0

trainer:
  devices: 1
  precision: "32-true"
  max_steps: 1
  check_val_every_n_epoch: 1
  val_check_interval: 1.0
  log_every_n_steps: 1
  enable_model_summary: false
  limit_val_batches: 1.0
  deterministic: true

callbacks:
  log_per_param_mse:
    _target_: synth_setter.utils.callbacks.LogPerParamMSE
    # Mandatory override — must equal the ``param_spec_name`` the run is wired for
    # (paired with ``model.net.d_out`` above). The smoke fixture passes ``"surge_4"``;
    # production callers should supply ``<their-spec>`` via the CLI.
    param_spec: ???
  plot_proj_ii: null
  model_checkpoint:
    save_last: true
  # The fixture sets lr_monitor to None (was: ``del``); ``instantiate_callbacks`` skips
  # entries without ``_target_``, so ``null`` here is behaviorally equivalent.
  lr_monitor: null
