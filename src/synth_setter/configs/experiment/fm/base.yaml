# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - /experiment/fm/algorithm: conditional
  - override /data: fm
  - override /callbacks: default
  - override /trainer: gpu

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

experiment_name: fm
run_name: base

tags:
  - fm
  - algo_${data.algorithm}

seed: 12345

logger:
  wandb:
    tags: ${tags}
    group: fm_${data.algorithm}_400k
    name: fm_${data.algorithm}_${run_name}

callbacks:
  early_stopping: null
  model_checkpoint:
    monitor: val/lsd
