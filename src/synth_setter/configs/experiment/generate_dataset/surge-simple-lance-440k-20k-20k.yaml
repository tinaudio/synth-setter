# @package _global_

# Full-scale surge_simple Lance dataset: 480k total samples → 192 shards at
# samples_per_shard=2500, written to the experiments bucket.
# Inherited split masters keep rows stable across dataset sizes and shard layouts.

defaults:
  - override /datamodule: surge_simple
  - override /render: surge_simple
  - _self_

task_name: surge-simple-lance-440k-20k-20k

output_format: lance

train_val_test_sizes: [440000, 20000, 20000]

r2:
  bucket: experiments

render:
  # 2500-sample shards keep each parallel render+upload unit short and bound
  # the work a retry repeats.
  samples_per_shard: 2500
  parallel: true
  # Retry budget rides out transient renderer-subprocess crashes in a long unattended run.
  max_retries: 5
  # Load the plugin once per shard; reloading per render dominates wall-clock otherwise.
  plugin_reload_cadence: once
