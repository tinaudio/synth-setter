# @package _global_

defaults:
  - override /datamodule: surge
  - override /render: surge_xt
  - _self_

task_name: surge-xt-lance-2m-40k-10k

output_format: lance

train_val_test_sizes: [2000000, 40000, 10000]

r2:
  bucket: experiments

render:
  # Production tuning: reload once per shard to keep plugin-load overhead off the render path.
  samples_per_shard: 2500
  parallel: true
  max_retries: 5
  plugin_reload_cadence: once
