# @package _global_

# Smoke config for the torchsynth Python backend: 12 samples → 3 shards at
# samples_per_shard=4, finalized inline so the output trains directly
# (experiment=torchsynth/ffn_smoke). Mirrors smoke-shard.yaml with the
# render/datamodule identity swapped to torchsynth.

defaults:
  - override /datamodule: torchsynth
  - override /render: torchsynth
  - _self_

task_name: torchsynth-smoke

# 12-sample renders have constant mel bins; mask so finalize stays green.
mask_degenerate_bins: true

finalize_inline: true

train_val_test_sizes: [4, 4, 4]

render:
  sample_rate: 44100
  min_loudness: -55.0
  samples_per_render_batch: 4
  samples_per_shard: 4
