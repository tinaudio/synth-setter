# @package _global_

# One torchsynth shard rendered in-process (no plugin host). Minimal operator
# experiment for validating the Python backend before larger runs.

defaults:
  # dataset.yaml requires a datamodule choice; DatasetSpec never consumes it,
  # and no torchsynth-specific lance datamodule exists yet.
  - override /datamodule: surge_simple
  - override /render: torchsynth_simple
  - _self_

task_name: torchsynth-smoke

output_format: lance

train_val_test_sizes: [1, 0, 0]

render:
  samples_per_render_batch: 1
  samples_per_shard: 1
