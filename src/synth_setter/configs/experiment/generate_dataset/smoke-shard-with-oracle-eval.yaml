# @package _global_

# Used by the generate-and-finalize-dataset workflow with oracle_eval=true;
# mirrors smoke-shard-with-finalize.yaml but additionally runs the
# surge/fake_oracle eval inline so the same CLI process verifies the
# parameter-array round-trip survived generate + finalize.
defaults:
  - /experiment/generate_dataset/smoke-shard-with-finalize@_global_
  - _self_

# Inline oracle evaluation needs nonzero val/test splits because setup opens all splits.
# Use shard-aligned sizes.
train_val_test_sizes: [4, 4, 4]

oracle_eval_inline: true
