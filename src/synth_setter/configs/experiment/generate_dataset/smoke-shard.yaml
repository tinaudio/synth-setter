# @package _global_

# CI smoke-test config (test-dataset-generation workflow on PR). 12 total
# samples → 3 shards at samples_per_shard=4, exercising the partitioner without
# burning compute.

defaults:
  - override /datamodule: surge_simple
  - override /render: surge_simple
  - _self_

task_name: smoke-shard

# 12-sample renders have constant mel bins; mask so finalize stays green
# if dask's FP noise stops hiding them on the hdf5 path.
mask_degenerate_bins: true

train_val_test_sizes: [4, 4, 4]

render:
  sample_rate: 44100
  # Smoke tests verify behavior, not quality; -60 dB gives headroom for
  # shard-cadence seeded renders where one patch may land near the floor.
  min_loudness: -60.0
  samples_per_render_batch: 4
  samples_per_shard: 4
  gui_toggle_cadence: once
  plugin_reload_cadence: render
