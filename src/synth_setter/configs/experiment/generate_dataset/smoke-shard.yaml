# @package _global_

# CI smoke-test config (test-dataset-generation workflow on PR). 12 total
# samples → 3 shards at samples_per_shard=4, exercising the partitioner without
# burning compute.

defaults:
  - override /data: surge_simple
  - override /render: surge_simple
  - _self_

task_name: smoke-shard

# 12-sample renders have deterministically constant mel positions Welford
# reports as zero variance; the hdf5 path masks the same bins so its dask
# compute does not regress the CI cell if FP noise stops hiding them.
# Production datasets keep the strict default in ``configs/dataset.yaml``.
mask_degenerate_bins: true

train_val_test_sizes: [12, 0, 0]

render:
  sample_rate: 16000
  min_loudness: -50.0
  samples_per_render_batch: 4
  samples_per_shard: 4
  # Materialized so the render-matrix workflow can resolve
  # `render.gui_toggle_cadence=<cell>` / `render.plugin_reload_cadence=<cell>`
  # overrides against this experiment without flipping the platform-aware
  # default in `configs/render/surge_xt.yaml`. The base values match the
  # Pydantic schema defaults — overrides flow through the cross-field
  # validator (`RenderConfig._always_on_requires_plugin_reload_once`).
  gui_toggle_cadence: never
  plugin_reload_cadence: render
