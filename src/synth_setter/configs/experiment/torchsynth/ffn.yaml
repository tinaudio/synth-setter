# @package _global_

defaults:
  - override /datamodule: torchsynth
  - override /model: ffn
  - override /callbacks: default
  - override /trainer: gpu
  - _self_

experiment_name: torchsynth
run_name: ffn
tags: [torchsynth]

# val/loss has a high irreducible floor (near-inaudible params); the audio-domain
# metric reflects actual inversion quality — see PR #1810 experiment log.
callbacks:
  model_checkpoint:
    monitor: val/lsd
  early_stopping: null

# Fresh train rows each epoch: E2 vs E5 in the PR #1810 log show the fixed split
# memorizes (val rises past the 0.0833 prior) while resampling crosses below it.
datamodule:
  resample_train_per_epoch: true

model:
  compile: false
  params_per_token: 1
  loss_fn: mse
  net:
    amin: 1.0e-10
    center: true
    f_max: null
    f_min: 0.0
    _target_: synth_setter.models.components.residual_mlp.LogMelCNNResidualMLP
    hop_length: 441
    in_dim: ${datamodule.signal_length}
    mel_norm: slaney
    mel_scale: slaney
    n_fft: 1_102
    n_mels: 128
    out_dim: ${datamodule.num_params}
    pad_mode: constant
    power: 2.0
    sample_rate: ${datamodule.sample_rate}
    top_db: 80.0
    window: hamming
