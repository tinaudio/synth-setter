# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /datamodule: ksin_ood
  - override /callbacks: default
  - override /trainer: gpu

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

experiment_name: ksin_ood
run_name: base

tags:
  - ksin_ood
  - k_${datamodule.k}

seed: 12345

trainer:
  min_epochs: 10
  max_epochs: 1000
  limit_val_batches: 0.0

logger:
  wandb:
    tags: ${tags}
    group: ${datamodule.k}sin_ood
    name: ${datamodule.k}sin_ood_${run_name}

callbacks:
  early_stopping: null
  model_checkpoint:
    monitor: train/loss
