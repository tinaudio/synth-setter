# https://wandb.ai

wandb:
  _target_: lightning.pytorch.loggers.wandb.WandbLogger
  # name: "" # name of the run (normally generated by wandb)
  save_dir: "${paths.output_dir}"
  offline: False
  id: null # pass correct id to resume experiment!
  anonymous: null # enable anonymous logging
  project: "${oc.env:WANDB_PROJECT,synth-setter}"
  # No checkpoint files to W&B (5 GB total quota); the train-end model-{config_id}
  # artifact references the R2-stored checkpoint instead.
  log_model: False
  prefix: "" # a string to put at the beginning of metric keys
  entity: ${oc.env:WANDB_ENTITY,null} # set to name of your wandb team (defaults to user's default entity)
  group: ""
  tags: []
  job_type: ""
  settings:
    _target_: wandb.Settings
    code_dir: .
    # ``wrap`` not ``redirect``: redirect's output.log never uploads in wandb 0.26.x
    # (#1465); wrap sees only this process, hence ``_check_call_streamed``'s stderr tee.
    console: wrap
    # Resumed sessions (generate → finalize → oracle eval) share one run id; multipart
    # gives each its own logs/output_*.log instead of overwriting output.log — #1604.
    console_multipart: true
