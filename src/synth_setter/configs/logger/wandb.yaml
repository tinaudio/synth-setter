# https://wandb.ai

wandb:
  _target_: lightning.pytorch.loggers.wandb.WandbLogger
  # name: "" # name of the run (normally generated by wandb)
  save_dir: "${paths.output_dir}"
  offline: False
  id: null # pass correct id to resume experiment!
  anonymous: null # enable anonymous logging
  project: "${oc.env:WANDB_PROJECT,synth-setter}"
  log_model: "all" # upload every checkpoint as W&B artifact (crash-resilient)
  prefix: "" # a string to put at the beginning of metric keys
  entity: ${oc.env:WANDB_ENTITY,null} # set to name of your wandb team (defaults to user's default entity)
  group: ""
  tags: []
  job_type: ""
  settings:
    _target_: wandb.Settings
    code_dir: .
