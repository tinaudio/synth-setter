# @package _global_

defaults:
  - _self_
  - datamodule: ??? # choose datamodule with `test_dataloader()` for evaluation
  - model: ???
  - logger: null
  - trainer: gpu
  - paths: default
  - extras: default
  - hydra: default
  - callbacks: none
  - experiment: null
  - render: null

task_name: "eval"

tags: ["dev"]
mode: test

# Predict-mode post-processing; gated off so `mode: test`/`validate` stay unchanged.
evaluation:
  render_vst: false
  compute_metrics: false
  rerender_target: true
  num_workers: 1
  # Render-order probe (#489): probe runs automatically when params are uniform;
  # non-zero seed raises if params are non-uniform rather than silently skipping.
  shuffle_seed: 0
  # Opt-in: an `r2://bucket/prefix` mirror of the whole run dir, copied after eval.
  upload_output_dir_uri: null

# passing checkpoint path is necessary for evaluation
ckpt_path: ???

# Opt-in W&B lineage (storage-provenance-spec §5): the train + dataset config_ids this
# eval consumes. When set + a WandbLogger is active, eval consumes
# `model-{consumed_train_config_id}` and `data-{consumed_dataset_config_id}` (each at
# `consumed_artifact_alias`) before testing; each null ref is skipped.
consumed_train_config_id: null
consumed_dataset_config_id: null
consumed_artifact_alias: latest
