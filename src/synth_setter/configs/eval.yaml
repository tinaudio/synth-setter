# @package _global_

defaults:
  - _self_
  - datamodule: ??? # choose datamodule with `test_dataloader()` for evaluation
  - model: ???
  - logger: null
  - trainer: gpu
  - paths: default
  - extras: default
  - hydra: default
  - callbacks: none
  # `render` before `experiment` (matching train.yaml/dataset.yaml): Hydra only
  # lets an experiment override groups declared ahead of it.
  - render: null
  - experiment: null

task_name: "eval"

tags: ["dev"]
mode: test

# Predict-mode post-processing; gated off so `mode: test`/`validate` stay unchanged.
evaluation:
  render_vst: false
  compute_metrics: false
  rerender_target: true
  num_workers: 1
  # Render-order probe (#489): probe runs automatically when params are uniform;
  # non-zero seed raises if params are non-uniform rather than silently skipping.
  shuffle_seed: 0
  # Opt-in: an `r2://bucket/prefix` mirror of the whole run dir, copied after eval.
  upload_output_dir_uri: null

# passing checkpoint path is necessary for evaluation
ckpt_path: ???

# W&B model lineage (storage-provenance-spec §5): the train config ID this eval consumes.
# Dataset lineage is discovered from ``datamodule.dataset_root/input_spec.json``.
consumed_train_config_id: null
