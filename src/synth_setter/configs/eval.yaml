# @package _global_

defaults:
  - _self_
  - datamodule: ??? # choose datamodule with `test_dataloader()` for evaluation
  - model: ???
  - logger: null
  - trainer: gpu
  - paths: default
  - extras: default
  - hydra: default
  - callbacks: none
  - experiment: null
  - render: null

task_name: "eval"

tags: ["dev"]
mode: test

# Predict-mode post-processing; gated off so `mode: test`/`validate` stay unchanged.
evaluation:
  render_vst: false
  compute_metrics: false
  rerender_target: true
  num_workers: 1
  # Opt-in render-order probe (#489): forwarded to compute_audio_metrics, which
  # scores a symlink view permuting pred.wav across sample dirs (gated on uniform
  # params). No effect unless compute_metrics is also true.
  shuffle_pred_audio: false
  shuffle_seed: 0
  # Opt-in: an `r2://bucket/prefix` mirror of the whole run dir, copied after eval.
  upload_output_dir_uri: null

# passing checkpoint path is necessary for evaluation
ckpt_path: ???
