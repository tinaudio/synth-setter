coverage:
  status:
    project:
      default:
        target: auto
        threshold: 0.5%
        informational: true
    patch:
      default:
        target: 80%
        informational: true

comment:
  layout: "diff, flags, components, files"
  behavior: default
  require_changes: false

flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    # `unit-cpu` is the aggregate of both per-OS sub-flags; ubuntu and macos
    # jobs in test.yml upload under `unit-cpu,unit-cpu-<os>` so the parent
    # flag preserves history while the per-OS flags catch platform-specific
    # regressions that would otherwise be hidden by carryforward.
    - name: unit-cpu
      paths:
        - src/synth_setter/
        - scripts/ci/
    - name: unit-cpu-linux
      paths:
        - src/synth_setter/
        - scripts/ci/
    - name: unit-cpu-macos
      paths:
        - src/synth_setter/
        - scripts/ci/
    - name: slow-cpu
      paths:
        - src/synth_setter/
        - scripts/ci/
    - name: unit-gpu
      paths:
        - src/synth_setter/
    - name: unit-mps
      paths:
        - src/synth_setter/
    - name: vst
      paths:
        - src/synth_setter/data/vst/
        - src/synth_setter/evaluation/compute_audio_metrics.py

component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
        threshold: 0.5%
        informational: true
  individual_components:
    - component_id: pipeline
      name: pipeline
      paths:
        - src/synth_setter/pipeline/**
      statuses:
        - type: project
          target: 90%
          informational: true
    - component_id: models
      name: models
      paths:
        - src/synth_setter/models/**
      statuses:
        - type: project
          target: 85%
          informational: true
    - component_id: data
      name: data
      paths:
        - src/synth_setter/data/**
    - component_id: evaluation
      name: evaluation
      paths:
        - src/synth_setter/evaluation/**
    - component_id: tools
      name: tools
      paths:
        - src/synth_setter/tools/**
    - component_id: cli
      name: cli
      paths:
        - src/synth_setter/cli/**
    - component_id: scripts-ci
      name: scripts-ci
      paths:
        - scripts/ci/**

ignore:
  - "tests/**"
  - "**/__main__.py"
  - "docs/**"
  - "scripts/skypilot/**"
